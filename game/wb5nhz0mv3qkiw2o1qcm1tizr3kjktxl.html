<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hello Cat</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">

    <style>	
      @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@200;500&display=swap');	
      @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@200;500&family=MuseoModerno:wght@600&display=swap');	

      /* 1. GLOBAL RESET & PURPLE BACKGROUND */
      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #2a1b3d !important;
        background: radial-gradient(circle, #382150 0%, #150d1c 100%) !important;
        /* Center content */
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Arial', sans-serif;
      }

      /* 2. LOADING COVER */
      #loading-cover {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: radial-gradient(circle, #382150 0%, #150d1c 100%) !important;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
      }

      #loading-logo {
        max-width: 260px;
        height: auto;
        margin-bottom: 30px;
        animation: logoBounce 2s ease-in-out infinite;
      }

      /* 3. GLASS LOADING BOX */
      .loading-container {
        width: 380px;
        background-color: rgba(90, 50, 120, 0.25);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 15px;
        padding: 20px 25px;
        display: flex;
        flex-direction: column;
        align-items: center;
        backdrop-filter: blur(5px);
        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      }

      .loading-header {
        width: 100%;
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
        color: #ffffff;
        font-family: 'Arial Black', Gadget, sans-serif;
        font-size: 12px;
        letter-spacing: 1.5px;
      }

      .progress-track {
        width: 100%;
        height: 14px;
        background: #140d1b;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: inset 0 2px 5px rgba(0,0,0,0.6);
      }

      .progress-fill {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, #5b367e, #7c4dff);
        transition: width 0.2s ease-out;
        box-shadow: 0 0 10px rgba(124, 77, 255, 0.3);
      }

      /* 4. GAME CONTAINER (Set to 100% to fill screen) */
      #unity-container {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
      }
      
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      /* 5. FULLSCREEN BUTTON */
      #fullscreen-btn {
        position: absolute;
        bottom: 20px;
        right: 20px;
        width: 40px;
        height: 40px;
        background-color: rgba(255, 255, 255, 0.15);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 8px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s;
        z-index: 100;
      }
      #fullscreen-btn:hover {
        background-color: rgba(255, 255, 255, 0.3);
      }
      #fullscreen-icon {
        width: 20px;
        height: 20px;
        fill: white;
      }

      /* Animations */
      @keyframes logoBounce {
        0%, 100% { transform: translateY(0); }
        50%      { transform: translateY(-15px); }
      }

      #loading-cover.fade-out {
        animation: fadeOut 500ms ease forwards;
      }

      @keyframes fadeOut {
        to { opacity: 0; visibility: hidden; }
      }
    </style>
  </head>
  
  <body class="dark">
    
    <div id="loading-cover">
      <img id="loading-logo" src="logo.png" alt="Logo">
      <div class="loading-container">
        <div class="loading-header">
          <span>LOADING</span>
          <span id="progress-text">0%</span>
        </div>
        <div class="progress-track">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
      </div>
    </div>

    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas"></canvas>
    </div>

    <div id="fullscreen-btn" title="Go Fullscreen">
      <svg id="fullscreen-icon" viewBox="0 0 24 24">
        <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
      </svg>
    </div>

    <script>
      const buildUrl = "Build";
      const loaderUrl = buildUrl + "/v6.loader.js";
      const config = {
        dataUrl: buildUrl + "/v6.data.unityweb",
        frameworkUrl: buildUrl + "/v6.framework.js.unityweb",
        codeUrl: buildUrl + "/v6.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Hello Cat",
        productVersion: "0.1",
      };

      const container = document.querySelector("#unity-container");
      const canvas = document.querySelector("#unity-canvas");
      const loadingCover = document.querySelector("#loading-cover");
      const fill = document.getElementById("progress-fill");
      const text = document.getElementById("progress-text");
      const fsButton = document.getElementById("fullscreen-btn");

      // --- FULLSCREEN LOGIC ---
      function toggleFullscreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(err => {
              console.log(`Error attempting to enable fullscreen: ${err.message}`);
            });
        } else {
            if (document.exitFullscreen) {
              document.exitFullscreen();
            }
        }
      }

      fsButton.addEventListener('click', toggleFullscreen);

      const canFullscreen = (function() {
        for (const key of [
            'exitFullscreen',
            'webkitExitFullscreen',
            'webkitCancelFullScreen',
            'mozCancelFullScreen',
            'msExitFullscreen',
          ]) {
          if (key in document) {
            return true;
          }
        }
        return false;
      }());


      // Start loading
      const script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          if(fill) fill.style.width = (100 * progress) + "%";
          if(text) text.innerHTML = Math.round(100 * progress) + "%";

        }).then((unityInstance) => {
          if(loadingCover) {
            loadingCover.classList.add("fade-out");
            setTimeout(() => {
              loadingCover.style.display = "none";
            }, 550);
          }

          if (canFullscreen) {
            // Fullscreen logic handles itself via CSS now
          }
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);

      // Mobile optimization
      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        container.className = "unity-mobile";
        config.devicePixelRatio = 1.5;
      }
    </script>
  </body>
</html>
