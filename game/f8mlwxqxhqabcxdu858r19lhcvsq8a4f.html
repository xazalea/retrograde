<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Farm0+</title>
    <style>
      /* 1. GLOBAL RESET & PURPLE BACKGROUND */
      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        /* Force Deep Purple Gradient */
        background: #2a1b3d;
        background: radial-gradient(circle, #382150 0%, #150d1c 100%);
        /* Center the game container */
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Arial', sans-serif;
      }

      /* 2. SPLASH SCREEN (Purple Overlay) */
      #loading-cover {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: radial-gradient(circle, #382150 0%, #150d1c 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
      }

      #loading-logo {
        max-width: 260px;
        height: auto;
        margin-bottom: 30px;
        animation: logoBounce 2s ease-in-out infinite;
      }

      /* 3. GLASS LOADING BOX */
      .loading-container {
        width: 380px;
        /* Semi-transparent purple glass */
        background-color: rgba(90, 50, 120, 0.25);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 15px;
        padding: 20px 25px;
        display: flex;
        flex-direction: column;
        align-items: center;
        backdrop-filter: blur(5px);
        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      }

      .loading-header {
        width: 100%;
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
        color: #ffffff;
        font-family: 'Arial Black', Gadget, sans-serif;
        font-size: 12px;
        letter-spacing: 1.5px;
      }

      .progress-track {
        width: 100%;
        height: 14px;
        background: #140d1b;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: inset 0 2px 5px rgba(0,0,0,0.6);
      }

      .progress-fill {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, #5b367e, #7c4dff);
        transition: width 0.2s ease-out;
        box-shadow: 0 0 10px rgba(124, 77, 255, 0.3);
      }

      /* 4. GAME CONTAINER (Sizing handled by JS) */
      #unity-container {
        position: relative;
        box-shadow: 0 0 40px rgba(0,0,0,0.6); 
      }

      #unity-canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      /* ANIMATIONS */
      @keyframes logoBounce {
        0%, 100% { transform: translateY(0); }
        50%      { transform: translateY(-15px); }
      }

      #loading-cover.fade-out {
        animation: fadeOut 500ms ease forwards;
      }

      @keyframes fadeOut {
        to { opacity: 0; visibility: hidden; }
      }
    </style>
  </head>
  
  <body>
    
    <div id="loading-cover">
      <img id="loading-logo" src="logo.png" alt="Logo">
      <div class="loading-container">
        <div class="loading-header">
          <span>LOADING</span>
          <span id="progress-text">0%</span>
        </div>
        <div class="progress-track">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
      </div>
    </div>

    <div id="unity-container">
      <canvas id="unity-canvas"></canvas>
    </div>

    <script>
      const buildUrl = "Build";
      const loaderUrl = buildUrl + "/2.loader.js";
      const config = {
        dataUrl: buildUrl + "/2.data",
        frameworkUrl: buildUrl + "/2.framework.js",
        codeUrl: buildUrl + "/2.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Farm0+",
        productVersion: "1.0",
      };

      const container = document.querySelector("#unity-container");
      const canvas = document.querySelector("#unity-canvas");
      const loadingCover = document.querySelector("#loading-cover");
      const fill = document.getElementById("progress-fill");
      const text = document.getElementById("progress-text");

      // --- RESIZE LOGIC (Strict 350x600 Ratio) ---
      function resizeGame() {
        var gameWidth = 350;
        var gameHeight = 600;
        var targetRatio = gameWidth / gameHeight;

        var windowWidth = window.innerWidth;
        var windowHeight = window.innerHeight;
        var windowRatio = windowWidth / windowHeight;

        var finalWidth, finalHeight;

        if (windowRatio > targetRatio) {
           // Window is wider than game -> Fit Height, adjust Width
           finalHeight = windowHeight;
           finalWidth = finalHeight * targetRatio;
        } else {
           // Window is narrower than game -> Fit Width, adjust Height
           finalWidth = windowWidth;
           finalHeight = finalWidth / targetRatio;
        }

        container.style.width = finalWidth + "px";
        container.style.height = finalHeight + "px";
      }

      // Listen for window resizing
      window.addEventListener('resize', resizeGame);
      resizeGame(); // Initial call to set size immediately

      // Load Unity Script
      const script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          // Update the custom Progress Bar
          if(fill) fill.style.width = (100 * progress) + "%";
          if(text) text.innerHTML = Math.round(100 * progress) + "%";
        }).then((unityInstance) => {
          // Hide splash screen when loaded
          if(loadingCover) {
            loadingCover.classList.add("fade-out");
            setTimeout(() => {
              loadingCover.style.display = "none";
            }, 550);
          }
          // Ensure size is correct after load
          resizeGame();
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
