<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Color Dash</title>
    
    
    <style type="text/css">@font-face {font-family:Fredoka One;font-style:normal;font-weight:400;src:url(/cf-fonts/s/fredoka-one/5.0.8/latin/400/normal.woff2);unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+2000-206F,U+2074,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD;font-display:swap;}@font-face {font-family:Exo 2;font-style:normal;font-weight:700;src:url(/cf-fonts/v/exo-2/5.0.16/cyrillic-ext/wght/normal.woff2);unicode-range:U+0460-052F,U+1C80-1C88,U+20B4,U+2DE0-2DFF,U+A640-A69F,U+FE2E-FE2F;font-display:swap;}@font-face {font-family:Exo 2;font-style:normal;font-weight:700;src:url(/cf-fonts/v/exo-2/5.0.16/vietnamese/wght/normal.woff2);unicode-range:U+0102-0103,U+0110-0111,U+0128-0129,U+0168-0169,U+01A0-01A1,U+01AF-01B0,U+0300-0301,U+0303-0304,U+0308-0309,U+0323,U+0329,U+1EA0-1EF9,U+20AB;font-display:swap;}@font-face {font-family:Exo 2;font-style:normal;font-weight:700;src:url(/cf-fonts/v/exo-2/5.0.16/cyrillic/wght/normal.woff2);unicode-range:U+0301,U+0400-045F,U+0490-0491,U+04B0-04B1,U+2116;font-display:swap;}@font-face {font-family:Exo 2;font-style:normal;font-weight:700;src:url(/cf-fonts/v/exo-2/5.0.16/latin/wght/normal.woff2);unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+2074,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD;font-display:swap;}@font-face {font-family:Exo 2;font-style:normal;font-weight:700;src:url(/cf-fonts/v/exo-2/5.0.16/latin-ext/wght/normal.woff2);unicode-range:U+0100-02AF,U+0304,U+0308,U+0329,U+1E00-1E9F,U+1EF2-1EFF,U+2020,U+20A0-20AB,U+20AD-20CF,U+2113,U+2C60-2C7F,U+A720-A7FF;font-display:swap;}</style>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- Main Menu -->
    <div id="startScreen" class="overlay">
        <div class="top-left-hud">
            <div class="score-display" id="highestScoreContainer">
                Best Score: <span id="highestScore">0</span>
            </div>
        </div>

        <div class="top-right-controls">
            <div id="musicIcon" class="icon-btn">
                <svg class="icon-on" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                <svg class="icon-off" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M4.27 3L3 4.27l9 9v.28c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4v-1.73L19.73 21 21 19.73 4.27 3zM14 7h4V3h-6v4.18l2 2V7z"/></svg>
            </div>
            <div id="sfxIcon" class="icon-btn">
                <svg class="icon-on" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                <svg class="icon-off" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
            </div>
        </div>

        <div class="menu-content">
            <h1>
                <span>C</span><span>O</span><span>L</span><span>O</span><span>R</span><span><span>&nbsp;</span></span><span>D</span><span>A</span><span>S</span><span>H</span>
            </h1>
            <button id="startBtn">Play</button>

            <div class="theme-chooser">
                <h3>CHOOSE A THEME</h3>
                <div class="theme-options">
                    <div class="theme-btn active" data-theme="auto">
                        <div class="theme-preview" id="theme-auto"></div>
                        <span>Auto</span>
                    </div>
                    <div class="theme-btn" data-theme="sky">
                        <div class="theme-preview" id="theme-day"></div>
                        <span>Light</span>
                    </div>
                    <div class="theme-btn" data-theme="dusk">
                        <div class="theme-preview" id="theme-dusk"></div>
                        <span>Dusk</span>
                    </div>
                    <div class="theme-btn" data-theme="nightfall">
                        <div class="theme-preview" id="theme-night"></div>
                        <span>Dark</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <canvas id="game"></canvas>

    <div id="hud">
        <div id="health" class="hud-left"></div>
        <div id="score" class="hud-center">Score: 0</div>
        <div id="powerup-status" class="hud-right"></div>
    </div>

    <!-- Game Over Screen -->
    <div id="gameOverScreen" class="overlay" style="display:none">
        <div class="popup">
            <h2 class="popup-title">Good Try!</h2>

            <div id="newHighScoreMessage" class="new-high-score" style="display: none;">NEW BEST SCORE!</div>

            <div class="score-summary">
                <div class="score-box">
                    <div class="score-label">Your Score</div>
                    <div class="score-value" id="finalScoreValue">0</div>
                </div>
                <div class="score-box">
                    <div class="score-label">Best Score</div>
                    <div class="score-value" id="gameOverHighestScoreValue">0</div>
                </div>
            </div>

            <div class="popup-buttons">
                <button id="restartBtn" class="popup-btn-primary">Play Again</button>
                <button id="homeBtn" class="popup-btn-secondary">Menu</button>
            </div>
        </div>
    </div>

    <script type="text/javascript">
        window.SDK_OPTIONS = {
            gameId: "apry8igioaarecxbc5wx2be8sdzvcdtt",
            onEvent: function (a) {
                switch (a.name) {
                    case "SDK_GAME_PAUSE":
                        // pause game logic / mute audio
                        pauseGameForAd();
                        break;
                    case "SDK_GAME_START":
                        // advertisement done, resume game logic and unmute audio
                        resumeGameAfterAd();
                        break;
                    case "SDK_READY":
                        // when sdk is ready
                        break;
                }
            }
        };
        (function (a, b, c) {
            var d = a.getElementsByTagName(b)[0];
            a.getElementById(c) || (a = a.createElement(b), a.id = c, a.src = "https://api.gamemonetize.com/sdk.js", d.parentNode.insertBefore(a, d))
        })(document, "script", "gamemonetize-sdk");
    </script>
    <script src="game.js"></script>
</body>
</html>
