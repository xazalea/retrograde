<script>
    window.onload = function() {
        var canvas = document.getElementById('gameCanvas');
        if (canvas) {
            canvas.setAttribute('tabindex', '1');
            canvas.focus();
            canvas.addEventListener('click', function() {
                canvas.focus();
            });
        }
    };

    window.SDK_OPTIONS = {
        gameId: "v2537t64ojk8ia8pa1r0d7xdrhlqq9xt",
        onEvent: function(event) {
            if (typeof createjs === 'undefined' || !createjs.Ticker || typeof gameData === 'undefined') {
                return;
            }

            if (event.name === 'SDK_GAME_PAUSE') {
                gameData.paused = true;
                createjs.Ticker.setPaused(true);
            }
            
            if (event.name === 'SDK_GAME_START') {
                gameData.paused = false;
                createjs.Ticker.setPaused(false);
                
                var canvas = document.getElementById('gameCanvas');
                if (canvas) {
                    canvas.focus();
                }
            }
        }
    };
</script>

                <canvas id="gameCanvas" width="1280" height="768" tabindex="1"></canvas>
