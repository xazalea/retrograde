<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Red Ball Flight - Ad Driven Loading</title>
    
    <script type="text/javascript">
       window.loadingStarted = false; // Flag to track loading state

       window.SDK_OPTIONS = {
          gameId: "ixig62jclkgq0lulkqm7xy40rhwo7rxq", 
          onEvent: function (a) {
             switch (a.name) {
                case "SDK_GAME_PAUSE": if (window.pauseGame) window.pauseGame(); break;
                case "SDK_GAME_START": 
                    if (window.resumeGame) window.resumeGame();
                    // FIX: Ad khatam hone par loading bar shuru karein
                    if(!window.loadingStarted) {
                        window.startLoadingProcess(); 
                    }
                    break;
                case "SDK_READY":
                    // SDK ready hai, lekin loading GAME_START ka intezar karegi
                    console.log("SDK Ready. Waiting for Ad to finish...");
                    break;
             }
          }
       };
    (function (a, b, c) {
       var d = a.getElementsByTagName(b)[0];
       a.getElementById(c) || (a = a.createElement(b), a.id = c, a.src = "https://api.gamemonetize.com/sdk.js", d.parentNode.insertBefore(a, d))
    })(document, "script", "gamemonetize-sdk"); 
    </script>
    
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; display: flex; justify-content: center; align-items: center; font-family: sans-serif; }
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        canvas { height: 100vh; width: auto; aspect-ratio: 9 / 16; max-width: 100vw; background: #4ec0ca; touch-action: none; cursor: pointer; }
        
        #loading-screen { position: absolute; inset: 0; background: #4ec0ca; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; }
        .loader-bar { width: 250px; height: 20px; background: rgba(0,0,0,0.2); border-radius: 10px; overflow: hidden; border: 3px solid white; margin-top: 20px; }
        #progress { width: 0%; height: 100%; background: #2ecc71; transition: width 0.1s linear; }
        .loading-text { font-size: 24px; font-weight: bold; text-transform: uppercase; text-shadow: 2px 2px 0 #000; }

        #ui { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 5; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; }
        .top-bar { display: flex; justify-content: space-between; font-size: 24px; font-weight: bold; color: white; text-shadow: 2px 2px 0 #000; }
        #modal { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; text-align: center; color: white; display: none; }
        #modal-title { font-size: 40px; font-weight: 900; margin-bottom: 20px; text-transform: uppercase; }
        .action-btn { padding: 15px 40px; font-size: 20px; cursor: pointer; background: #2ecc71; color: #fff; border: 4px solid #fff; border-radius: 50px; font-weight: bold; text-transform: uppercase; pointer-events: auto; outline: none; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="loading-screen">
            <div id="status-text" class="loading-text">Waiting for Ad...</div>
            <div class="loader-bar"><div id="progress"></div></div>
        </div>

        <canvas id="gameCanvas"></canvas>
        <div id="ui">
            <div class="top-bar">
                <div>Score: <span id="score">0</span></div>
                <div>Level: <span id="level">1</span></div>
            </div>
        </div>
        <div id="modal">
            <div id="modal-title">Red Ball<br>Flight</div>
            <button id="action-button" class="action-btn">Start Game</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('score');
        const levelSpan = document.getElementById('level');
        const modal = document.getElementById('modal');
        const actionBtn = document.getElementById('action-button');
        const loadingScreen = document.getElementById('loading-screen');
        const progress = document.getElementById('progress');
        const statusText = document.getElementById('status-text');

        canvas.width = 450; canvas.height = 800; 

        // Loading Control Logic
        window.startLoadingProcess = function() {
            if(window.loadingStarted) return;
            window.loadingStarted = true;
            statusText.innerText = "Loading Game...";
            
            let loadPercent = 0;
            let loadInterval = setInterval(() => {
                loadPercent += 2;
                progress.style.width = loadPercent + "%";
                if (loadPercent >= 100) {
                    clearInterval(loadInterval);
                    loadingScreen.style.display = "none";
                    modal.style.display = "flex";
                }
            }, 100); // Exact 5 Seconds (100ms * 50 steps)
        };

        // Safety Fallback (agar Ad block ho ya load na ho toh 6s baad khud shuru ho jaye)
        setTimeout(() => {
            if(!window.loadingStarted) window.startLoadingProcess();
        }, 6000);

        let gameRunning = false, waitingForFirstTap = false, isAdPlaying = false;
        let score = 0, level = 1, frames = 0, gameSpeed = 3.5, pipes = [], particles = [];

        const pipeColors = ["#73bf2e", "#e67e22", "#9b59b6", "#e74c3c", "#3498db", "#f1c40f", "#1abc9c", "#34495e"];
        const ball = { x: 90, y: 400, radius: 18, gravity: 0.35, velocity: 0, jump: -7, rotation: 0 };

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq, type, duration, vol) {
            if (isAdPlaying || audioCtx.state === 'suspended') return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + duration);
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + duration);
            } catch(e){}
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = -10;
                this.size = Math.random() * 8 + 4;
                this.speedY = Math.random() * 3 + 2;
                this.speedX = (Math.random() - 0.5) * 4;
                this.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
            }
            update() { this.y += this.speedY; this.x += this.speedX; }
            draw() { ctx.fillStyle = this.color; ctx.fillRect(this.x, this.y, this.size, this.size); }
        }

        function handleAction(e) {
            if (e) e.preventDefault();
            if (isAdPlaying || modal.style.display === 'flex' || loadingScreen.style.display === 'flex') return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if (waitingForFirstTap) { waitingForFirstTap = false; gameRunning = true; return; }
            if (gameRunning) { ball.velocity = ball.jump; playSound(450, 'triangle', 0.1, 0.1); }
        }

        canvas.addEventListener('mousedown', handleAction);
        canvas.addEventListener('touchstart', handleAction, {passive: false});

        function startSequence(nextLevel) {
            modal.style.display = 'none';
            particles = []; pipes = []; ball.y = 400; ball.velocity = 0;
            if (!nextLevel) { score = 0; level = 1; gameSpeed = 3.5; }
            scoreSpan.innerText = score; levelSpan.innerText = level;
            setTimeout(() => { waitingForFirstTap = true; gameRunning = false; }, 50);
            if (frames === 0) loop();
        }

        actionBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            const isNext = actionBtn.innerText.includes("NEXT") || actionBtn.innerText.includes("LEVEL");
            startSequence(isNext);
        });

        function checkCollision(circle, rectX, rectY, rectW, rectH) {
            let closestX = Math.max(rectX, Math.min(circle.x, rectX + rectW));
            let closestY = Math.max(rectY, Math.min(circle.y, rectY + rectH));
            let dX = circle.x - closestX; let dY = circle.y - closestY;
            return (dX * dX + dY * dY) < (circle.radius * circle.radius);
        }

        function draw3DPipe(x, y, width, height, color) {
            let grad = ctx.createLinearGradient(x, 0, x + width, 0);
            grad.addColorStop(0, color); grad.addColorStop(0.3, "#fff");
            grad.addColorStop(0.5, color); grad.addColorStop(1, "black");
            ctx.fillStyle = grad; ctx.fillRect(x, y, width, height);
            ctx.fillStyle = color; ctx.strokeStyle = "black"; ctx.lineWidth = 1;
            if (y === 0) { ctx.fillRect(x-4, height-25, width+8, 25); ctx.strokeRect(x-4, height-25, width+8, 25); }
            else { ctx.fillRect(x-4, y, width+8, 25); ctx.strokeRect(x-4, y, width+8, 25); }
        }

        function loop() {
            let skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            skyGrad.addColorStop(0, "#4ec0ca"); skyGrad.addColorStop(1, "#dcf4f5");
            ctx.fillStyle = skyGrad; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ded895"; ctx.fillRect(0, canvas.height - 100, canvas.width, 100);
            ctx.fillStyle = "#73bf2e"; ctx.fillRect(0, canvas.height - 100, canvas.width, 20);

            if (gameRunning && !waitingForFirstTap) {
                ball.velocity += ball.gravity; ball.y += ball.velocity;
                if (frames % 100 === 0) {
                    let gap = Math.max(145, 180 - (level * 3));
                    let top = Math.random() * (canvas.height - gap - 350) + 120;
                    pipes.push({ x: canvas.width, y: top, gap: gap, passed: false });
                }
                pipes.forEach((p, i) => {
                    p.x -= gameSpeed;
                    let cIdx = (level - 1) % pipeColors.length;
                    draw3DPipe(p.x, 0, 65, p.y, pipeColors[cIdx]);
                    draw3DPipe(p.x, p.y + p.gap, 65, canvas.height - (p.y + p.gap), pipeColors[cIdx]);
                    if (checkCollision(ball, p.x, 0, 65, p.y) || checkCollision(ball, p.x, p.y+p.gap, 65, canvas.height)) triggerGameOver();
                    if (p.x + 65 < ball.x && !p.passed) {
                        score++; p.passed = true; scoreSpan.innerText = score;
                        playSound(600, 'sine', 0.1, 0.05);
                        if (score % 12 === 0) triggerLevelUp();
                    }
                    if (p.x + 100 < 0) pipes.splice(i, 1);
                });
                if (ball.y + ball.radius > canvas.height - 100 || ball.y - ball.radius < 0) triggerGameOver();
            } else if (waitingForFirstTap) {
                ball.y = 400 + Math.sin(frames * 0.1) * 5;
            }

            particles.forEach((p, i) => { p.update(); p.draw(); if (p.y > canvas.height) particles.splice(i, 1); });

            ctx.save(); ctx.translate(ball.x, ball.y); ball.rotation += 0.05; ctx.rotate(ball.rotation);
            let bGrad = ctx.createRadialGradient(-6, -6, 2, 0, 0, ball.radius);
            bGrad.addColorStop(0, "#ff5e5e"); bGrad.addColorStop(1, "#8b0000");
            ctx.beginPath(); ctx.arc(0, 0, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = bGrad; ctx.fill(); ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.stroke();
            ctx.restore();

            if (waitingForFirstTap) {
                ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.font = "bold 24px Arial"; ctx.textAlign = "center";
                ctx.fillText("READY? TAP TO FLY!", canvas.width/2, canvas.height/2 + 60);
            }
            frames++;
            requestAnimationFrame(loop);
        }

        function triggerLevelUp() {
            playSound(700, 'sine', 0.4, 0.1);
            gameRunning = false; level++; gameSpeed += 0.4;
            for(let i=0; i<50; i++) particles.push(new Particle());
            modal.style.display = 'flex';
            document.getElementById('modal-title').innerHTML = "LEVEL "+(level-1)+"<br>COMPLETE!";
            actionBtn.innerText = "NEXT: LEVEL " + level;
        }

        function triggerGameOver() {
            if (!gameRunning) return;
            playSound(150, 'sawtooth', 0.4, 0.2);
            gameRunning = false; waitingForFirstTap = false;
            modal.style.display = 'flex';
            document.getElementById('modal-title').innerText = "GAME OVER";
            actionBtn.innerText = "TRY AGAIN";
            if (typeof sdk !== 'undefined' && sdk.showBanner) sdk.showBanner();
        }

        window.pauseGame = () => { isAdPlaying = true; gameRunning = false; };
        window.resumeGame = () => { isAdPlaying = false; };
    </script>
</body>
</html>
