	<script>
		var gmodule = {
			get exports() {
				return this._exports;
			},
			set exports(v) {
				if (!this._exports) {
					this._exports = {}
				}

				this._exports[v.name] = v;
			}
		};

		function arequire(path) {
			var a = path.split("/").pop();
			return gmodule.exports["_" + a];
		}
	</script>
	<script type="text/javascript">
		window.SDK_OPTIONS = {
			gameId: "9fmzaqn02wmdbvc4vmy8nfbkufkly271",
			onEvent: function (a) {
				switch (a.name) {
					case "SDK_GAME_PAUSE":
						// pause game logic / mute audio
						Laya.timer.scale = 0;     // 暂停所有定时器
						Laya.SoundManager.stopAll();
						break;
					case "SDK_GAME_START":
						Laya.timer.scale = 1;     // 恢复定时器
						 Laya.SoundManager.playMusic("sounds/bgm.mp3")
						// advertisement done, resume game logic and unmute audio
						break;
					case "SDK_READY":
						// when sdk is ready
						StartGame();
						console.error("SDK_READY");
						break;
				}
			}
		};
		(function (a, b, c) {
			var d = a.getElementsByTagName(b)[0];
			a.getElementById(c) || (a = a.createElement(b), a.id = c, a.src = "https://api.gamemonetize.com/sdk.js", d.parentNode.insertBefore(a, d))
		})(document, "script", "gamemonetize-sdk"); 
	</script>

	<script>

		const keysToBlockWhenFramed = [32, 33, 34, 35, 36, 37, 38, 39, 40, 44];
		document.addEventListener('keydown', function (info) {
			if (window != window.top && keysToBlockWhenFramed.indexOf(info.which) > -1) {
				info.preventDefault();
				info.stopPropagation();
			}
		}, true)
		document.addEventListener("mousedown", function () {

		document.addEventListener("touchstart", function () {

		//游戏加载时关闭触控

		})


		function loadLib(url) {
			var script = document.createElement("script");
			script.async = false;
			script.src = url;
			document.body.appendChild(script);
		}
		function StartGame(url) {
			var s = document.createElement('script');
			s.src = 'index.js';  // ← 如果你的入口不是 index.js，这里改掉
			s.async = false;
			document.body.appendChild(s);
		}
	</script>

	<script>
		(function () {
			// 1) 让 canvas 可被聚焦
			function getCanvas() {
				return document.querySelector('canvas, #layaCanvas, #unity-canvas');
			}
			function makeFocusable(el) {
				if (!el) return;
				el.setAttribute('tabindex', '0');
				el.style.outline = 'none';
			}

			// 2) 抢回焦点
			function claimFocus() {
				const c = getCanvas();
				if (c) { try { c.focus(); } catch (e) { } }
				try { window.focus(); } catch (e) { }
				if (document.body && document.body.focus) { try { document.body.focus(); } catch (e) { } }
			}

			// 3) 关键键阻止页面默认行为（防止方向键滚动到 iframe）
			const KEY_BLOCK = new Set(['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' ', 'Space', 'w', 'a', 's', 'd', 'W', 'A', 'S', 'D']);
			window.addEventListener('keydown', (e) => {
				if (KEY_BLOCK.has(e.key)) e.preventDefault();
			}, { capture: true, passive: false });

			// 4) 在这些时机统一“夺回焦点”
			window.addEventListener('load', () => { makeFocusable(getCanvas()); claimFocus(); });
			document.addEventListener('pointerdown', () => { makeFocusable(getCanvas()); claimFocus(); }, true);
			window.addEventListener('focus', claimFocus);
			document.addEventListener('visibilitychange', () => { if (!document.hidden) claimFocus(); }, true);

			// 5) 给 GM SDK 的事件也挂上（成功/失败都能恢复）
			window.SDK_OPTIONS = window.SDK_OPTIONS || {};
			const origOnEvent = window.SDK_OPTIONS.onEvent;
			window.SDK_OPTIONS.onEvent = function (a) {
				try {
					if (a && a.name === 'SDK_GAME_PAUSE') { gmPause && gmPause(); }
					if (a && a.name === 'SDK_GAME_START') { gmResume && gmResume(); claimFocus(); }
					if (a && a.name === 'SDK_READY') { claimFocus(); }
				} catch (e) { }
				if (typeof origOnEvent === 'function') try { origOnEvent(a); } catch (e) { }
			};

			// 6) 兜底：广告失败/被拦时也恢复
			window.__gmInterstitial = async function showGMInterstitial(safeResume) {
				try {
					if (window.sdk && typeof sdk.showInterstitial === 'function') {
						await sdk.showInterstitial(); // 你的 GM 版本如名称不同，替换这里
					} else if (window.sdk && typeof sdk.showAd === 'function') {
						await sdk.showAd('interstitial');
					}
				} catch (e) {
					// 播放失败/被拦
				} finally {
					if (typeof safeResume === 'function') safeResume();
					claimFocus();
				}
			};
		})();
	</script>
