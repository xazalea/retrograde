    <!-- GameMonetize.com HTML5 SDK Integration - STEP 1 -->
    <!-- This script initializes the GameMonetize SDK and defines event handlers. -->
    <script type="text/javascript">
        window.SDK_OPTIONS = {
            gameId: "exk5zftpns3wcr41el1buf3jtsbn1cug", // Your provided GameId for GameMonetize.com
            onEvent: function (a) {
                switch (a.name) {
                    case "SDK_GAME_PAUSE":
                        // This event is triggered when an advertisement is about to be displayed.
                        // It's crucial to pause the game logic and mute any game audio.
                        GameManager.pauseGame(true); // Pause game, `true` indicates SDK initiated pause
                        console.log("SDK_GAME_PAUSE: Game paused by SDK, audio effectively muted.");
                        break;
                    case "SDK_GAME_START":
                        // This event is triggered when an advertisement has finished playing.
                        // It's crucial to resume game logic and unmute game audio.
                        console.log("SDK_GAME_START: Ad done. Preparing for game resume.");

                        // After the ad, we show a "Press to Play" message to avoid jarring transitions.
                        // The specific game state (next level, game over, game win) will be handled
                        // when the user clicks the "PLAY" button.
                        let message = "Press PLAY to continue!";
                        let title = "READY!";
                        if (GameManager.pendingGameState === 'game_over') {
                            title = "GAME OVER";
                            message = "You ran out of lives! Press PLAY to restart.";
                        } else if (GameManager.pendingGameState === 'game_win') {
                            title = "YOU WIN!";
                            message = "Congratulations! Press PLAY to restart.";
                        } else if (GameManager.pendingGameState === 'next_level') {
                            title = "LEVEL " + GameManager.currentLevel + " COMPLETE!";
                            message = "Get ready for Level " + (GameManager.currentLevel + 1) + "! Press PLAY.";
                        }

                        GameManager.showMessageBox(title, message, "PLAY", () => {
                            GameManager.hideMessageBox();
                            // Based on the pending game state, proceed with the next action
                            if (GameManager.pendingGameState === 'next_level') {
                                GameManager.currentLevel++; // Increment level AFTER ad finishes and user presses play
                                GameManager.startLevel();
                            } else {
                                // For game over or win, reset the entire game
                                GameManager.resetGame();
                            }
                            GameManager.pendingGameState = null; // Clear state after processing
                            GameManager.resumeGame(); // Resume game loop
                        });
                        break;
                    case "SDK_READY":
                        // This event confirms that the SDK is fully loaded and ready to be used.
                        console.log("GameMonetize SDK is ready!");
                        break;
                }
            }
        };
        // This IIFE (Immediately Invoked Function Expression) injects the GameMonetize SDK script.
        (function (a, b, c) {
            var d = a.getElementsByTagName(b)[0];
            a.getElementById(c) || (a = a.createElement(b), a.id = c, a.src = "https://api.gamemonetize.com/sdk.js", d.parentNode.insertBefore(a, d))
        })(document, "script", "gamemonetize-sdk");
    </script>
    <style>
        /* Base styles for the entire page, centering the game container */
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(to right, #6a11cb 0%, #2575fc 100%); /* Deep purple to blue gradient */
            color: #ecf0f1; /* Light gray text */
            overflow: hidden; /* Prevent scrolling */
        }

        /* Styling for the main game container box */
        .game-container {
            background-color: rgba(0, 0, 0, 0.7); /* Semi-transparent black background for the game area */
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5); /* Stronger shadow */
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 5px solid #ffcc00; /* Neon yellow border */
            position: relative;
            z-index: 1;
            width: 90%; /* Responsive width for container */
            max-width: 850px; /* Maximum width on large screens */
            height: auto; /* Allow height to adjust based on content */
            min-height: 400px; /* Ensure a minimum height for smaller screens */
        }

        /* Styling for the main game title */
        h1 {
            font-family: 'Press Start 2P', cursive; /* Arcade-style font for title */
            color: #00ffcc; /* Neon green */
            text-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc, 0 0 30px #00ffcc; /* Neon glow effect */
            margin-bottom: 20px;
            font-size: 2.5rem;
            text-align: center;
        }

        /* Styling for the game canvas */
        canvas {
            background-color: #1a1a2e; /* Dark space blue background for game area */
            border: 3px solid #ff00ff; /* Neon pink border */
            border-radius: 10px;
            display: block;
            touch-action: none; /* Disable default touch actions (like scrolling/zooming) on canvas */
            width: 100%; /* Make canvas fill its responsive container width */
            height: auto; /* Maintain aspect ratio */
            aspect-ratio: 4/3; /* Enforce a 4:3 aspect ratio for consistent gameplay view */
            max-height: calc(100vh - 200px); /* Limit canvas height to fit on smaller screens with header/footer */
        }

        /* Styling for the game information (score, lives, level) */
        .game-info {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-top: 15px;
            font-family: 'Press Start 2P', cursive;
            font-size: 1.2rem;
            color: #fff;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
            padding: 0 10px;
        }

        /* Styling for the custom message box (used for welcome/play messages) */
        .message-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.9); /* Semi-transparent background */
            border: 3px solid #ffcc00;
            border-radius: 15px;
            padding: 30px 40px;
            text-align: center;
            font-family: 'Press Start 2P', cursive;
            color: #00ffcc; /* Neon green text */
            font-size: 1.5rem;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            z-index: 10; /* Ensure it's above other elements */
            display: none; /* Hidden by default */
            white-space: nowrap; /* Prevent text wrapping for short messages */
        }

        /* Styling for buttons within the message box */
        .message-box button {
            background: linear-gradient(to right, #00ffcc 0%, #00b386 100%); /* Green gradient */
            color: #1a1a2e; /* Dark blue text */
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-family: 'Press Start 2P', cursive;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 25px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease; /* Smooth transition for hover effects */
        }

        /* Hover effect for message box buttons */
        .message-box button:hover {
            transform: translateY(-3px); /* Lift button slightly */
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4); /* Enhanced shadow */
            filter: brightness(1.1); /* Slightly brighter */
        }

        /* Responsive adjustments for smaller screens (tablets) */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
                margin-bottom: 15px;
            }
            .game-info {
                font-size: 1rem;
                flex-direction: column; /* Stack score, lives, level vertically */
                align-items: center;
            }
            .message-box {
                font-size: 1.2rem;
                padding: 20px 30px;
            }
            .message-box button {
                font-size: 1rem;
                padding: 12px 25px;
            }
        }

        /* Responsive adjustments for very small screens (phones) */
        @media (max-width: 480px) {
            h1 {
                font-size: 1.5rem;
            }
            .game-info {
                font-size: 0.9rem;
            }
            .message-box {
                font-size: 1rem;
                padding: 15px 25px;
            }
            .message-box button {
                font-size: 0.9rem;
                padding: 10px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>ARCADE BREAKOUT</h1>
        <canvas id="breakoutCanvas"></canvas>
        <div class="game-info">
            <div>SCORE: <span id="score">0</span></div>
            <div>LIVES: <span id="lives">3</span></div>
            <div>LEVEL: <span id="level">1</span></div>
        </div>

        <!-- Custom Message Box for welcome, and 'press to start' prompts -->
        <div id="messageBox" class="message-box">
            <p id="messageText"></p>
            <button id="messageButton">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        // Game Configuration - Centralized parameters for easy tuning
        const GameConfig = {
            initialLives: 3,
            maxLevels: 5, // Total number of levels in the game
            ball: {
                radius: 10,
                initialSpeed: 2, // Base speed for Level 1
                speedIncreasePerLevel: 0.75, // How much base speed increases per level
                speedIncreaseFactorPerHit: 1.015, // Multiplier for speed increase after each hit (1.5%)
                maxSpeed: 12 // Absolute maximum speed the ball can reach
            },
            paddle: {
                height: 15,
                width: 100,
                speed: 7 // Keyboard/fixed movement speed
            },
            bricks: {
                padding: 10,
                offsetTop: 30, // Y-offset from canvas top for the first row of bricks
                offsetLeft: 30, // X-offset from canvas left for the first column of bricks
                width: 75,
                height: 20,
                initialRowCount: 5, // Number of brick rows in Level 1
                rowsIncreasePerLevel: 2, // How many rows are added per level (for "2x bigger")
                columnCount: 8 // Fixed number of brick columns
            },
            bonuses: {
                extraLifeBrickCount: 3 // Number of bricks to hit for an extra life
            },
            messages: {
                levelReadyDelay: 2000 // Delay before starting next level after "READY!" message (if not using "Press to Play")
            }
        };

        // GameManager Object - Encapsulates all game logic and state
        const GameManager = {
            // Game State Variables
            score: 0,
            lives: 0,
            currentLevel: 0,
            gameActive: false, // Controls if game loop is running
            animationFrameId: null, // Stores ID for requestAnimationFrame
            levelTransitionTimeout: null, // Stores ID for setTimeout used in level transitions
            pendingGameState: null, // Tracks state after ad ('next_level', 'game_over', 'game_win')

            // Input State Variables
            rightPressed: false,
            leftPressed: false,
            lastMouseX: -1, // Tracks previous mouse X for delta movement
            lastTouchX: -1, // Tracks previous touch X for delta movement

            // Game Elements (Ball, Paddle, Bricks data)
            ballX: 0,
            ballY: 0,
            ballDx: 0,
            ballDy: 0,
            paddleX: 0,
            bricks: [],
            bricksHitSinceLastLifeBonus: 0, // Counter for extra life bonus

            // UI Element References
            canvas: null,
            ctx: null,
            ui: {
                scoreDisplay: null,
                livesDisplay: null,
                levelDisplay: null,
                messageBox: null,
                messageText: null,
                messageButton: null
            },

            // Sound Synths - Tone.js instances
            audio: {
                wallSynth: null,
                paddleSynth: null,
                brickSynth: null,
                levelUpSynth: null,
                winSynth: null,
                loseSynth: null,
                lifeGainSynth: null // New synth for extra life
            },

            /**
             * Initializes the GameManager, setting up UI, audio, and event listeners.
             */
            init: function() {
                console.log("GameManager: Initializing game components.");

                // Get canvas and context
                this.canvas = document.getElementById('breakoutCanvas');
                this.ctx = this.canvas.getContext('2d');

                // Get UI element references
                this.ui.scoreDisplay = document.getElementById('score');
                this.ui.livesDisplay = document.getElementById('lives');
                this.ui.levelDisplay = document.getElementById('level');
                this.ui.messageBox = document.getElementById('messageBox');
                this.ui.messageText = document.getElementById('messageText');
                this.ui.messageButton = document.getElementById('messageButton');

                this.initAudio(); // Initialize Tone.js synths for sound effects
                this.addEventListeners(); // Setup input listeners
                this.resizeCanvas(); // Perform initial canvas sizing and element positioning
                
                // Add resize listener, ensuring 'this' context is preserved for GameManager
                window.addEventListener('resize', this.resizeCanvas.bind(this));

                // Display initial welcome message and prompt user to start,
                // crucial for enabling audio context on user interaction.
                this.showMessageBox("WELCOME!", "Click PLAY to start!", "PLAY", () => {
                    this.hideMessageBox();
                    this.resetGame(); // Start the first game
                    // Ensure Tone.js audio context starts upon user interaction
                    if (Tone.context.state !== 'running') {
                        Tone.start();
                    }
                });
            },

            /**
             * Initializes Tone.js PolySynth instances for various in-game sound effects.
             */
            initAudio: function() {
                // Ensure Tone.js context is running, or attempt to start it.
                if (Tone.context.state !== 'running') {
                    Tone.start();
                }

                this.audio.wallSynth = new Tone.PolySynth(Tone.Synth, {
                    oscillator: { type: "square" }, envelope: { attack: 0.001, decay: 0.1, sustain: 0.0, release: 0.05 },
                    volume: -10 // Quieter hit sound
                }).toDestination();

                this.audio.paddleSynth = new Tone.PolySynth(Tone.Synth, {
                    oscillator: { type: "triangle" }, envelope: { attack: 0.001, decay: 0.15, sustain: 0.0, release: 0.1 },
                    volume: -8 // Medium hit sound
                }).toDestination();

                this.audio.brickSynth = new Tone.PolySynth(Tone.Synth, {
                    oscillator: { type: "sine" }, envelope: { attack: 0.001, decay: 0.08, sustain: 0.0, release: 0.03 },
                    volume: -6 // Louder hit sound
                }).toDestination();

                this.audio.levelUpSynth = new Tone.PolySynth(Tone.Synth, {
                    oscillator: { type: "sawtooth" }, envelope: { attack: 0.05, decay: 0.2, sustain: 0, release: 0.3 },
                    volume: -5
                }).toDestination();

                this.audio.winSynth = new Tone.PolySynth(Tone.Synth, {
                    oscillator: { type: "fmsine", modulationIndex: 3, detune: 0 }, envelope: { attack: 0.01, decay: 0.5, sustain: 0, release: 1 },
                    volume: -5
                }).toDestination();

                this.audio.loseSynth = new Tone.PolySynth(Tone.Synth, {
                    oscillator: { type: "sawtooth" }, envelope: { attack: 0.05, decay: 0.3, sustain: 0, release: 0.5 },
                    volume: -5
                }).toDestination();

                // New synth for gaining an extra life
                this.audio.lifeGainSynth = new Tone.PolySynth(Tone.Synth, {
                    oscillator: { type: "fmsquare", modulationIndex: 2 }, envelope: { attack: 0.005, decay: 0.1, sustain: 0, release: 0.2 },
                    volume: -7
                }).toDestination();
            },

            /**
             * Adds event listeners for keyboard, mouse, and touch inputs.
             */
            addEventListeners: function() {
                // Keyboard listeners
                document.addEventListener('keydown', (e) => this.keyDownHandler(e), false);
                document.addEventListener('keyup', (e) => this.keyUpHandler(e), false);

                // Mouse listeners for paddle control
                this.canvas.addEventListener('mousemove', (e) => this.mouseMoveHandler(e), false);
                this.canvas.addEventListener('mousedown', (e) => this.mouseDownHandler(e), false); // Initialize lastMouseX on mouse down

                // Touch listeners for paddle control on mobile devices
                this.canvas.addEventListener('touchstart', (e) => this.touchStartHandler(e), false);
                this.canvas.addEventListener('touchmove', (e) => this.touchMoveHandler(e), false);
            },

            /** Event Handlers for Input **/

            keyDownHandler: function(e) {
                if (e.key === 'Right' || e.key === 'ArrowRight') {
                    this.rightPressed = true;
                } else if (e.key === 'Left' || e.key === 'ArrowLeft') {
                    this.leftPressed = true;
                }
            },

            keyUpHandler: function(e) {
                if (e.key === 'Right' || e.key === 'ArrowRight') {
                    this.rightPressed = false;
                } else if (e.key === 'Left' || e.key === 'ArrowLeft') {
                    this.leftPressed = false;
                }
            },

            mouseDownHandler: function(e) {
                // Initialize lastMouseX on mouse down to prevent a jump on the first move
                this.lastMouseX = e.clientX;
            },

            mouseMoveHandler: function(e) {
                // Only update paddle position if the game is active (not paused for ads/messages)
                if (!this.gameActive) return;

                if (this.lastMouseX === -1) { // Initialize if mouse starts moving without a prior down
                    this.lastMouseX = e.clientX;
                }
                const deltaX = e.clientX - this.lastMouseX;
                this.paddleX += deltaX;
                this.lastMouseX = e.clientX; // Update lastMouseX for the next frame

                // Clamp paddleX to canvas boundaries immediately after movement
                this.clampPaddlePosition();
            },

            touchStartHandler: function(e) {
                // Prevent default browser touch actions (like scrolling/zooming)
                e.preventDefault();
                // Only capture initial touch position if the game is active
                if (!this.gameActive) return;

                if (e.touches.length > 0) {
                    // Initialize lastTouchX on touchstart to prevent a jump on the first move
                    this.lastTouchX = e.touches[0].clientX;
                }
                // Ensure Tone.js audio context starts upon user interaction (especially on iOS)
                if (Tone.context.state !== 'running') {
                    Tone.start();
                }
            },

            touchMoveHandler: function(e) {
                e.preventDefault();
                // Only update paddle position if the game is active
                if (!this.gameActive) return;

                if (e.touches.length > 0) {
                    if (this.lastTouchX === -1) { // Fallback if touchstart didn't initialize for some reason
                        this.lastTouchX = e.touches[0].clientX;
                    }
                    const touchX = e.touches[0].clientX;
                    const deltaX = touchX - this.lastTouchX;
                    this.paddleX += deltaX;
                    this.lastTouchX = touchX; // Update lastTouchX for the next frame

                    // Clamp paddleX to canvas boundaries immediately after movement
                    this.clampPaddlePosition();
                }
            },

            /**
             * Clamps the paddle's X position to stay within canvas boundaries.
             */
            clampPaddlePosition: function() {
                if (this.paddleX < 0) this.paddleX = 0;
                if (this.paddleX + GameConfig.paddle.width > this.canvas.width) {
                    this.paddleX = this.canvas.width - GameConfig.paddle.width;
                }
            },

            /**
             * Handles canvas resizing and updates game element positions accordingly.
             * This ensures the game adapts to different screen sizes and orientations.
             */
            resizeCanvas: function() {
                // Get the actual computed style width and height of the canvas DOM element.
                // This relies on the CSS rules (width: 100%, aspect-ratio) to define its displayed size.
                const computedStyle = getComputedStyle(this.canvas);
                const displayWidth = parseFloat(computedStyle.width);
                const displayHeight = parseFloat(computedStyle.height);

                // Only update canvas's internal drawing buffer size if it's significantly different.
                // This prevents unnecessary redraws and state resets for minor pixel changes.
                if (this.canvas.width !== displayWidth || this.canvas.height !== displayHeight) {
                    this.canvas.width = displayWidth;
                    this.canvas.height = displayHeight;

                    console.log(`Canvas resized to: ${this.canvas.width}x${this.canvas.height}`);

                    // Recalculate positions and properties of game elements relative to the new canvas size.
                    // This is crucial for maintaining correct scaling and positioning.
                    // Only reset if the game is not active, or if it's the initial load (ballX/Y undefined/null).
                    // If the game is active, the ball/paddle positions will be updated by the game loop.
                    if (!this.gameActive || this.ballX === undefined || this.ballX === null) {
                        this.resetBallAndPaddlePosition(); // Updates ball and paddle positions
                        this.initBricks(); // Re-initializes bricks to fit the new dimensions
                    }
                    this.drawScoreAndLivesAndLevel(); // Updates UI display
                }
            },

            /**
             * Pauses the game loop and associated timers.
             * @param {boolean} [sdkInitiated=false] - True if the pause is initiated by the SDK (e.g., for ads).
             */
            pauseGame: function(sdkInitiated = false) {
                if (!this.gameActive) return; // Already paused

                cancelAnimationFrame(this.animationFrameId);
                this.gameActive = false;
                if (this.levelTransitionTimeout) {
                    clearTimeout(this.levelTransitionTimeout);
                    this.levelTransitionTimeout = null;
                }
                console.log("GameManager: Game paused. SDK initiated:", sdkInitiated);
            },

            /**
             * Resumes the game loop.
             */
            resumeGame: function() {
                if (this.gameActive) return; // Already active

                this.gameActive = true;
                console.log("GameManager: Game resumed.");
                this.draw(); // Restart the animation loop
            },

            /**
             * Displays a custom message box to the user.
             * @param {string} title - The main title of the message.
             * @param {string} message - The body message.
             * @param {string} buttonText - Text for the button.
             * @param {function} buttonCallback - Function to execute when the button is clicked.
             */
            showMessageBox: function(title, message, buttonText = "PLAY AGAIN", buttonCallback = () => this.resetGame()) {
                this.ui.messageText.innerHTML = `<strong>${title}</strong><br><br>${message}`;
                this.ui.messageBox.style.display = 'block';
                this.ui.messageButton.textContent = buttonText;
                this.ui.messageButton.onclick = buttonCallback;
            },

            /**
             * Hides the custom message box.
             */
            hideMessageBox: function() {
                this.ui.messageBox.style.display = 'none';
            },

            /**
             * Resets all game-related variables to their initial state for a new game.
             * This ensures a clean slate, fixing issues with lingering states after a win/loss.
             */
            resetGame: function() {
                this.hideMessageBox();
                this.score = 0;
                this.lives = GameConfig.initialLives;
                this.currentLevel = 1;
                this.bricksHitSinceLastLifeBonus = 0; // Reset bonus counter

                // Reset input states for a clean start, preventing phantom movements
                this.rightPressed = false;
                this.leftPressed = false;
                this.lastMouseX = -1;
                this.lastTouchX = -1;
                this.pendingGameState = null; // Clear any pending ad-related state

                this.drawScoreAndLivesAndLevel(); // Update UI
                this.startLevel(); // Begin the first level
                console.log("GameManager: Game has been fully reset.");
            },

            /**
             * Sets up a new level: initializes bricks, resets ball/paddle, and updates UI.
             */
            startLevel: function() {
                this.hideMessageBox(); // Ensure any previous message is hidden
                this.resizeCanvas(); // Re-evaluate canvas size and adjust game elements
                this.initBricks(); // (Re)initialize bricks for the new level
                this.resetBallAndPaddlePosition(); // Reset ball and paddle positions/speeds
                this.drawScoreAndLivesAndLevel(); // Update UI display
                this.bricksHitSinceLastLifeBonus = 0; // Reset bonus counter for new level
                this.gameActive = true;
                
                // Clear any previous animation frame and start a new one to prevent multiple loops
                if (this.animationFrameId) {
                    cancelAnimationFrame(this.animationFrameId);
                }
                this.draw(); // Start the main game loop
                console.log(`GameManager: Starting Level ${this.currentLevel}.`);
            },

            /**
             * Initializes the bricks array based on the current level.
             */
            initBricks: function() {
                this.bricks = []; // Clear any existing bricks
                // Calculate brick rows based on current level (2x bigger scaling)
                this.brickRowCount = GameConfig.bricks.initialRowCount + (this.currentLevel - 1) * GameConfig.bricks.rowsIncreasePerLevel;

                // Ensure brickRowCount doesn't exceed available canvas height to prevent overlap
                // Bricks should occupy no more than ~45% of the canvas height to leave space for paddle and play area.
                const maxBrickHeightOccupancy = this.canvas.height * 0.45;
                const calculatedMaxRows = Math.floor(maxBrickHeightOccupancy / (GameConfig.bricks.height + GameConfig.bricks.padding));

                if (this.brickRowCount > calculatedMaxRows) {
                    this.brickRowCount = calculatedMaxRows;
                    // Ensure at least 1 row is always there if space allows
                    if (this.brickRowCount < 1 && calculatedMaxRows >= 1) this.brickRowCount = 1;
                }

                // Populate the 2D bricks array
                for (let c = 0; c < GameConfig.bricks.columnCount; c++) {
                    this.bricks[c] = [];
                    for (let r = 0; r < this.brickRowCount; r++) {
                        this.bricks[c][r] = { x: 0, y: 0, status: 1 }; // Status 1 = alive, 0 = broken
                    }
                }
                console.log(`GameManager: Bricks initialized for level ${this.currentLevel} with ${this.brickRowCount} rows.`);
            },

            /**
             * Resets ball and paddle position to their starting points and sets ball speed
             * according to the current level's base speed.
             */
            resetBallAndPaddlePosition: function() {
                this.ballX = this.canvas.width / 2;
                // Position ball clearly above the paddle, ensuring it's visible on smaller screens
                this.ballY = this.canvas.height - (GameConfig.paddle.height + GameConfig.ball.radius + 15);

                // Calculate current level's base ball speed
                GameConfig.ball.currentSpeedMagnitude = GameConfig.ball.initialSpeed + (this.currentLevel - 1) * GameConfig.ball.speedIncreasePerLevel;

                // Randomize initial horizontal direction for the ball
                this.ballDx = GameConfig.ball.currentSpeedMagnitude * (Math.random() > 0.5 ? 1 : -1);
                this.ballDy = -GameConfig.ball.currentSpeedMagnitude; // Always start moving upwards

                this.paddleX = (this.canvas.width - GameConfig.paddle.width) / 2;
                console.log(`GameManager: Ball and paddle reset. Ball speed: ${GameConfig.ball.currentSpeedMagnitude.toFixed(2)}`);
            },

            /** Drawing Functions **/

            /**
             * Draws the ball on the canvas.
             */
            drawBall: function() {
                this.ctx.beginPath();
                this.ctx.arc(this.ballX, this.ballY, GameConfig.ball.radius, 0, Math.PI * 2);
                this.ctx.fillStyle = "#FFD700"; // Gold color
                this.ctx.shadowColor = "#FFD700"; // Matching glow
                this.ctx.shadowBlur = 15;
                this.ctx.fill();
                this.ctx.closePath();
                this.ctx.shadowBlur = 0; // Reset shadow for other elements
            },

            /**
             * Draws the paddle on the canvas.
             */
            drawPaddle: function() {
                this.ctx.beginPath();
                this.ctx.rect(this.paddleX, this.canvas.height - GameConfig.paddle.height, GameConfig.paddle.width, GameConfig.paddle.height);
                this.ctx.fillStyle = "#FF00FF"; // Neon pink color
                this.ctx.shadowColor = "#FF00FF"; // Matching glow
                this.ctx.shadowBlur = 15;
                this.ctx.fill();
                this.ctx.closePath();
                this.ctx.shadowBlur = 0; // Reset shadow
            },

            /**
             * Draws all active bricks on the canvas.
             */
            drawBricks: function() {
                for (let c = 0; c < GameConfig.bricks.columnCount; c++) {
                    for (let r = 0; r < this.brickRowCount; r++) {
                        // Only draw if brick exists and is active (status === 1)
                        if (this.bricks[c][r] && this.bricks[c][r].status === 1) {
                            // Calculate brick position based on current canvas size
                            const brickX = (c * (GameConfig.bricks.width + GameConfig.bricks.padding)) + GameConfig.bricks.offsetLeft;
                            const brickY = (r * (GameConfig.bricks.height + GameConfig.bricks.padding)) + GameConfig.bricks.offsetTop;
                            this.bricks[c][r].x = brickX;
                            this.bricks[c][r].y = brickY;
                            this.ctx.beginPath();
                            this.ctx.rect(brickX, brickY, GameConfig.bricks.width, GameConfig.bricks.height);

                            // Assign dynamic brick colors based on row for visual variety
                            let color;
                            switch (r) {
                                case 0: color = "#ff4d4d"; break; // Red
                                case 1: color = "#ffd14d"; break; // Orange
                                case 2: color = "#99ff66"; break; // Light Green
                                case 3: color = "#66ccff"; break; // Light Blue
                                case 4: color = "#cc66ff"; break; // Purple
                                case 5: color = "#ff99e6"; break; // Light Pink
                                case 6: color = "#aaff80"; break; // Yellow-Green
                                case 7: color = "#b366ff"; break; // Darker Purple
                                default: color = "#ffffff";
                            }
                            this.ctx.fillStyle = color;
                            this.ctx.shadowColor = color; // Matching glow
                            this.ctx.shadowBlur = 10;
                            this.ctx.fill();
                            this.ctx.closePath();
                            this.ctx.shadowBlur = 0; // Reset shadow
                        }
                    }
                }
            },

            /**
             * Updates the displayed score, lives, and level in the UI.
             */
            drawScoreAndLivesAndLevel: function() {
                this.ui.scoreDisplay.textContent = this.score;
                this.ui.livesDisplay.textContent = this.lives;
                this.ui.levelDisplay.textContent = this.currentLevel;
            },

            /** Game Logic Functions **/

            /**
             * Increases the ball's speed after a collision (brick, wall, or paddle).
             * Applies a speed increase factor but caps at maxGameSpeed.
             */
            applySpeedIncrease: function() {
                const currentSpeed = Math.sqrt(this.ballDx * this.ballDx + this.ballDy * this.ballDy);
                let newSpeed = currentSpeed * GameConfig.ball.speedIncreaseFactorPerHit;

                // Clamp new speed to the defined maximum game speed
                if (newSpeed > GameConfig.ball.maxSpeed) {
                    newSpeed = GameConfig.ball.maxSpeed;
                }

                // Only update if speed has actually increased to avoid floating point issues or reducing speed
                if (newSpeed > currentSpeed) {
                    const ratio = newSpeed / currentSpeed;
                    this.ballDx *= ratio;
                    this.ballDy *= ratio;
                    // console.log(`Ball speed increased to: ${newSpeed.toFixed(2)}`);
                }
            },

            /**
             * Detects collisions between the ball and bricks, handling brick destruction, scoring,
             * and checking for level completion.
             * Also handles the extra life bonus.
             */
            collisionDetection: function() {
                let allBricksBroken = true;
                for (let c = 0; c < GameConfig.bricks.columnCount; c++) {
                    for (let r = 0; r < this.brickRowCount; r++) {
                        const b = this.bricks[c][r];
                        if (b && b.status === 1) { // Check only active bricks that exist
                            allBricksBroken = false; // Not all bricks broken yet

                            // Check for collision with the current brick
                            if (this.ballX + GameConfig.ball.radius > b.x &&
                                this.ballX - GameConfig.ball.radius < b.x + GameConfig.bricks.width &&
                                this.ballY + GameConfig.ball.radius > b.y &&
                                this.ballY - GameConfig.ball.radius < b.y + GameConfig.bricks.height) {

                                this.audio.brickSynth.triggerAttackRelease("C5", "8n"); // Play sound on brick hit
                                this.ballDy = -this.ballDy; // Reverse ball vertical direction
                                this.applySpeedIncrease(); // Increase ball speed after hitting a brick
                                b.status = 0; // Mark brick as broken
                                this.score++; // Increase score

                                this.bricksHitSinceLastLifeBonus++; // Increment counter for life bonus
                                // Check if player earns an extra life
                                if (this.bricksHitSinceLastLifeBonus >= GameConfig.bonuses.extraLifeBrickCount && this.lives < GameConfig.initialLives) {
                                    this.lives++;
                                    this.audio.lifeGainSynth.triggerAttackRelease("G6", "16n"); // Play life gain sound
                                    this.bricksHitSinceLastLifeBonus = 0; // Reset counter after granting life
                                    console.log("GameManager: Extra life granted!");
                                }
                            }
                        }
                    }
                }

                // Check if all bricks are broken (level complete)
                if (allBricksBroken) {
                    // Stop game loop before showing ad/transition
                    this.pauseGame(false); // Pause, not SDK initiated

                    if (this.currentLevel < GameConfig.maxLevels) {
                        // Level complete, prepare for next level
                        this.pendingGameState = 'next_level';
                        console.log(`GameManager: Level ${this.currentLevel} complete.`);
                        // Check if SDK is available to show an ad
                        if (typeof sdk !== 'undefined' && sdk.showBanner !== 'undefined') {
                            console.log("Calling sdk.showBanner() for level complete.");
                            sdk.showBanner(); // STEP 2: Invoke advertisement
                        } else {
                            // Fallback if SDK not ready or ad not shown (simulate SDK_GAME_START)
                            console.warn("SDK not ready or showBanner not available. Skipping ad for level complete.");
                            window.SDK_OPTIONS.onEvent({name: "SDK_GAME_START"});
                        }

                    } else {
                        // Game win scenario (all levels cleared)
                        this.pendingGameState = 'game_win';
                        console.log("GameManager: All levels cleared - Game Win!");
                        // Check if SDK is available to show an ad
                        if (typeof sdk !== 'undefined' && sdk.showBanner !== 'undefined') {
                            console.log("Calling sdk.showBanner() for game win.");
                            sdk.showBanner(); // STEP 2: Invoke advertisement
                        } else {
                            // Fallback if SDK not ready or ad not shown (simulate SDK_GAME_START)
                            console.warn("SDK not ready or showBanner not available. Skipping ad for game win.");
                            window.SDK_OPTIONS.onEvent({name: "SDK_GAME_START"});
                        }
                    }
                }
            },

            /** Main Game Loop **/

            /**
             * The main game loop, called repeatedly via requestAnimationFrame.
             * Handles drawing, movement, and collision detection.
             */
            draw: function() {
                // If game is not active (paused), simply return and do not process updates
                if (!this.gameActive) {
                    this.animationFrameId = null; // Clear ID as loop is not active
                    return;
                }

                // Clear the entire canvas for the next frame
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

                // Draw all game elements
                this.drawBricks();
                this.drawBall();
                this.drawPaddle();
                this.drawScoreAndLivesAndLevel(); // Update UI display

                // Perform collision detection for ball with bricks
                this.collisionDetection();

                // Update ball position based on its velocity
                this.ballX += this.ballDx;
                this.ballY += this.ballDy;

                // Wall collision detection (left, right, top)
                // Reverse horizontal direction if hitting left or right wall
                if (this.ballX + this.ballDx > this.canvas.width - GameConfig.ball.radius || this.ballX + this.ballDx < GameConfig.ball.radius) {
                    this.audio.wallSynth.triggerAttackRelease("C4", "16n"); // Play wall hit sound
                    this.ballDx = -this.ballDx;
                    this.applySpeedIncrease(); // Increase speed after hitting a wall
                }
                // Reverse vertical direction if hitting top wall
                if (this.ballY + this.ballDy < GameConfig.ball.radius) {
                    this.audio.wallSynth.triggerAttackRelease("C4", "16n"); // Play wall hit sound
                    this.ballDy = -this.ballDy;
                    this.applySpeedIncrease(); // Increase speed after hitting the top wall
                }
                // Check for ball hitting bottom edge (either paddle or out of bounds)
                else if (this.ballY + this.ballDy > this.canvas.height - GameConfig.ball.radius - GameConfig.paddle.height) {
                    // Check if ball hits the paddle
                    if (this.ballX > this.paddleX && this.ballX < this.paddleX + GameConfig.paddle.width) {
                        this.audio.paddleSynth.triggerAttackRelease("F5", "16n"); // Play paddle hit sound
                        this.ballDy = -this.ballDy; // Reverse vertical direction

                        // Adjust horizontal speed based on where the ball hits the paddle (angle of reflection)
                        // Hits center: no change to dx. Hits edges: more horizontal speed.
                        const hitPoint = this.ballX - (this.paddleX + GameConfig.paddle.width / 2);
                        this.ballDx = hitPoint * (GameConfig.ball.currentSpeedMagnitude * 0.05); // Scale factor, proportional to current speed
                        this.applySpeedIncrease(); // Increase speed after hitting the paddle
                    }
                    // Ball hits the very bottom of the canvas (missed paddle)
                    else if (this.ballY + this.ballDy > this.canvas.height - GameConfig.ball.radius) {
                        this.lives--; // Lose a life
                        this.audio.loseSynth.triggerAttackRelease("C3", "0.2"); // Play short descending tone on losing life
                        this.drawScoreAndLivesAndLevel(); // Update UI

                        // CRITICAL FIX: Stop game loop immediately when a life is lost
                        this.pauseGame(false); // Pause game, not SDK initiated

                        if (this.lives === 0) {
                            // Game over scenario - no more lives
                            this.pendingGameState = 'game_over';
                            console.log("GameManager: Game Over.");
                            // Check if SDK is available to show an ad
                            if (typeof sdk !== 'undefined' && sdk.showBanner !== 'undefined') {
                                console.log("Calling sdk.showBanner() for game over.");
                                sdk.showBanner(); // STEP 2: Invoke advertisement
                            } else {
                                // Fallback if SDK not ready or ad not shown (simulate SDK_GAME_START)
                                console.warn("SDK not ready or showBanner not available. Skipping ad for game over.");
                                window.SDK_OPTIONS.onEvent({name: "SDK_GAME_START"});
                            }
                        } else {
                            // Not game over, reset ball and paddle for the next life
                            this.resetBallAndPaddlePosition();
                            this.resumeGame(); // Manually restart the draw loop after resetting for the next life
                        }
                    }
                }

                // Paddle movement for keyboard input (continues even with mouse/touch delta)
                // This ensures keyboard input is also responsive.
                if (this.rightPressed) {
                    this.paddleX += GameConfig.paddle.speed;
                } else if (this.leftPressed) {
                    this.paddleX -= GameConfig.paddle.speed;
                }
                // Re-clamp paddleX after keyboard movement in case it went out of bounds
                this.clampPaddlePosition();

                // Request the next animation frame, continuing the game loop
                this.animationFrameId = requestAnimationFrame(() => this.draw());
            }
        };

        // Initialize the GameManager when the window has fully loaded.
        // This ensures all DOM elements are available.
        window.onload = function() {
            GameManager.init();
        };
    </script>
</body>
