<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Stretch The Cat</title>

  <style>
    /* 1. FORCE THE WHOLE PAGE PURPLE */
    html, body {
      background: #2a1b3d !important; /* Fallback color */
      background: radial-gradient(circle, #382150 0%, #150d1c 100%) !important;
      width: 100% !important;
      height: 100% !important;
      margin: 0 !important;
      padding: 0 !important;
      overflow: hidden !important;
    }

    /* 2. FORCE SPLASH TO COVER EVERYTHING */
    #splash {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      background: radial-gradient(circle, #382150 0%, #150d1c 100%) !important;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99999 !important; /* Maximum priority */
    }

    #splash img {
      max-width: 260px;
      height: auto;
      margin-bottom: 30px;
      animation: logoBounce 2s ease-in-out infinite;
    }

    /* 3. THE "GLASS" BOX (Made more purple) */
    .loading-container {
      width: 380px;
      /* Changed from white-transparent to purple-transparent to blend better */
      background-color: rgba(90, 50, 120, 0.25); 
      border: 1px solid rgba(255, 255, 255, 0.08); /* Subtle highlight border */
      border-radius: 15px;
      padding: 20px 25px;
      display: flex;
      flex-direction: column;
      align-items: center;
      backdrop-filter: blur(5px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.4); /* Shadow to separate from bg */
    }

    .loading-header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      color: #ffffff;
      font-family: 'Arial Black', Gadget, sans-serif;
      font-size: 12px;
      letter-spacing: 1.5px;
    }

    .progress-track {
      width: 100%;
      height: 14px;
      background: #140d1b; /* Almost black-purple */
      border-radius: 10px;
      overflow: hidden;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.6);
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #5b367e, #7c4dff); /* Brighter purple gradient */
      transition: width 0.2s ease-out;
      box-shadow: 0 0 10px rgba(124, 77, 255, 0.3);
    }

    #splash.fade-out {
      animation: fadeOut 500ms ease forwards;
    }

    @keyframes logoBounce {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-15px); }
    }

    @keyframes fadeOut {
      to { opacity: 0; visibility: hidden; }
    }

    #gameContainer {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>

<body>
  <script>
    document.body.style.background = "radial-gradient(circle, #382150 0%, #150d1c 100%)";
    document.body.style.backgroundColor = "#2a1b3d";
  </script>

  <div id="splash">
    <img src="logo.png" alt="Logo">
    
    <div class="loading-container">
      <div class="loading-header">
        <span>LOADING</span>
        <span id="progress-text">0%</span>
      </div>
      <div class="progress-track">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
    </div>
  </div>

  <div id="gameContainer"></div>

  <script src="Build/UnityLoader.js"></script>
  <script>
    var gameInstance = UnityLoader.instantiate("gameContainer", "Build/ma.json", {
      onProgress: function(instance, progress) {
        var fill = document.getElementById("progress-fill");
        var text = document.getElementById("progress-text");

        if (fill) fill.style.width = (progress * 100) + "%";
        if (text) text.innerHTML = Math.round(progress * 100) + "%";

        if (progress === 1) {
          var splash = document.getElementById("splash");
          splash.classList.add("fade-out");
          setTimeout(function() {
             if (splash.parentNode) splash.parentNode.removeChild(splash);
          }, 450);
        }
      }
    });
  </script>
</body>
</html>
