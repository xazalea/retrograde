<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Space Bike</title>

<!-- GAME MONETIZE SDK -->
<script type="text/javascript">
  window.SDK_OPTIONS = {
    gameId: "cehwgcoqlllp9jgmciqz443abg7k3f8b",
    onEvent: function (a) {
      switch (a.name) {
        case "SDK_GAME_PAUSE":
          if (window.currentScene) {
            try {
              window.currentScene.scene.pause();
              window.currentScene.sound.mute = true;
            } catch (e) {}
          }
          break;

        case "SDK_GAME_START":
          if (window.currentScene) {
            try {
              window.currentScene.scene.resume();
              window.currentScene.sound.mute = false;
            } catch (e) {}
          }
          break;

        case "SDK_READY":
          console.log("SDK READY");
          break;
      }
    }
  };

  (function (a, b, c) {
    var d = a.getElementsByTagName(b)[0];
    if (!a.getElementById(c)) {
      var s = a.createElement(b);
      s.id = c;
      s.src = "https://api.gamemonetize.com/sdk.js";
      d.parentNode.insertBefore(s, d);
    }
  })(document, "script", "gamemonetize-sdk");

  // 👉 DIPANGGIL OLEH USER
  function showGameBanner() {
    if (typeof sdk !== "undefined" && typeof sdk.showBanner !== "undefined") {
      sdk.showBanner();
    }
  }
</script>

<style>
/* MENU OVERLAY */
#menuOverlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}
#menuOverlay button {
  font-size: 26px;
  padding: 20px 40px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- MENU HTML (OVERLAY, AMAN) -->
<div id="menuOverlay">
  <button onclick="startGame()">▶ PLAY</button>
</div>

<script>
function startGame() {
  // IKLAN DARI AKSI USER
  showGameBanner();

  // HILANGKAN MENU
  document.getElementById("menuOverlay").style.display = "none";
}
</script>

</body>
</html>
