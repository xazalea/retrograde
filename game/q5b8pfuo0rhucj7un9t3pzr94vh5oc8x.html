	<script>
		var gmodule = {
			get exports() {
				return this._exports;
			},
			set exports(v) {
				if (!this._exports) {
					this._exports = {}
				}
				this._exports[v.name] = v;
			}
		};
		function arequire(path) {
			var a = path.split("/").pop();
			return gmodule.exports["_" + a];
		}
	</script>


	<!-- 修复google错误 -->
	<style type="text/css">
		html {
			touch-action: none
		}

		body {
			cursor: default
		}
	</style>
</head>

<body>
	<script>
		// —— 焦点工具：把键盘焦点抢回到 Laya 的 canvas ——
		function __focusCanvas() {
			try {
				var canvas = document.querySelector('#layaCanvas') || document.querySelector('canvas');
				if (canvas) {
					if (!canvas.hasAttribute('tabindex')) canvas.setAttribute('tabindex', '0');
					canvas.focus({ preventScroll: true });
				}
			} catch (e) { }
			try { window.focus(); } catch (e) { }
		}

		// 连续几帧尝试，规避广告遮罩尚未移除的瞬间
		function __restoreAfterAd() {
			let i = 0, N = 8;
			(function tick() { __focusCanvas(); if (++i < N) requestAnimationFrame(tick); })();
		}

		// 只装一次：防止方向键/空格滚动页面 + 任意点击时自动抢焦点
		if (!window.__adFocusFixInstalled) {
			window.addEventListener('keydown', function (e) {
				if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) e.preventDefault();
			}, { passive: false });
			document.addEventListener('pointerdown', __focusCanvas, true);
			document.addEventListener('visibilitychange', function () {
				if (!document.hidden) __restoreAfterAd(); // 回到标签页时也拉回焦点
			});
			window.__adFocusFixInstalled = true;
		}
	</script>
	<script type="text/javascript">
		window.SDK_OPTIONS = {
			gameId: "q5b8pfuo0rhucj7un9t3pzr94vh5oc8x",
			onEvent: function (a) {
				switch (a.name) {
					case "SDK_GAME_PAUSE":
						// pause game logic / mute audio
						Laya.timer.scale = 0;     // 暂停所有定时器
						Laya.SoundManager.stopAll();
						break;
					case "SDK_GAME_START":
						Laya.timer.scale = 1;
						Laya.SoundManager.playMusic("new/bgm.mp3")
						// 恢复定时器
						__restoreAfterAd();
						// advertisement done, resume game logic and unmute audio
						break;
					case "SDK_READY":
						// when sdk is ready
						StartGame();

						console.error("SDK_READY");
						break;
				}
			}
		};
		(function (a, b, c) {
			var d = a.getElementsByTagName(b)[0];
			a.getElementById(c) || (a = a.createElement(b), a.id = c, a.src = "https://api.gamemonetize.com/sdk.js", d.parentNode.insertBefore(a, d))
		})(document, "script", "gamemonetize-sdk"); 
	</script>
	<script type="text/javascript">
		function StartGame(url) {
			var s = document.createElement('script');
			s.src = 'index.js';  // ← 如果你的入口不是 index.js，这里改掉
			s.async = false;
			document.body.appendChild(s);
		}
		function loadLib(url) {
			var script = document.createElement("script");
			script.async = false;
			script.src = url;
			document.body.appendChild(script);
		}
	</script>
	<!-- <script type="text/javascript" src="index.js"></script> -->
</body>

</html>
