<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tec Tak Toe Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background: #222;
      color: white;
      font-family: sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
    }
    h1 {
      margin-top: 20px;
      color: violet;
    }
    #board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-gap: 5px;
      margin: 30px auto;
      width: max-content;
    }
    .cell {
      width: 100px;
      height: 100px;
      font-size: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #444;
      color: white;
      cursor: pointer;
      transition: transform 0.3s ease;
    }
    .cell.green { color: lime; }
    .cell.red { color: red; }
    .cell.purple { color: violet; }

    .cell.winner {
      animation: winAnim 1s infinite;
    }

    @keyframes winAnim {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    .message {
      font-size: 24px;
      margin: 20px 0;
    }

    .restart {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      background: violet;
      border: none;
      color: white;
      border-radius: 5px;
      margin: 10px;
    }
  </style>
</head>
<body>

<h1>Tec Tak Toe Pro</h1>
<div class="message" id="message">Your Turn</div>
<div id="board"></div>

<button class="restart" onclick="resetGame()">🔄 Restart</button>
<button class="restart" onclick="showRewardAd()">🎁 Watch Ad for Reward</button>

<!-- GameMonetize SDK -->
<script type="text/javascript">
  window.SDK_OPTIONS = {
    gameId: "8rmp9fpj8vfuqnuc8xw30evhokiwu4cc", // استبدله بـ ID الحقيقي للعبة
    onEvent: function (a) {
      switch (a.name) {
        case "SDK_GAME_PAUSE":
          break;
        case "SDK_GAME_START":
          break;
        case "SDK_READY":
          break;
      }
    }
  };
  (function (a, b, c) {
    var d = a.getElementsByTagName(b)[0];
    a.getElementById(c) || (a = a.createElement(b), a.id = c, a.src = "https://api.gamemonetize.com/sdk.js", d.parentNode.insertBefore(a, d))
  })(document, "script", "gamemonetize-sdk");
</script>

<script>
  const board = document.getElementById("board");
  const message = document.getElementById("message");
  let cells = [];
  let gameOver = false;
  let rewardMode = false;

  const winCombos = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  function createBoard() {
    board.innerHTML = "";
    cells = [];
    for (let i = 0; i < 9; i++) {
      const cell = document.createElement("div");
      cell.classList.add("cell");
      cell.dataset.index = i;
      cell.addEventListener("click", () => handleClick(i));
      board.appendChild(cell);
      cells.push(cell);
    }
  }

  function handleClick(index) {
    const cell = cells[index];
    if (gameOver) return;

    if (rewardMode && cell.textContent === "O") {
      // استخدم المكافأة: استبدال O بـ X
      cell.textContent = "X";
      cell.classList.remove("red");
      cell.classList.add("green");
      rewardMode = false;
      message.textContent = "✔️ You used your reward. Now it's computer's turn.";
      checkWin("X");
      if (!gameOver) {
        setTimeout(computerMove, 500);
      }
      return;
    }

    if (rewardMode && cell.textContent !== "O") {
      message.textContent = "⚠️ You must choose a cell with O";
      return;
    }

    if (cell.textContent === "") {
      cell.textContent = "X";
      cell.classList.add("green");
      checkWin("X");
      if (!gameOver) {
        message.textContent = "Computer's Turn";
        setTimeout(computerMove, 500);
      }
    }
  }

  function computerMove() {
    const empty = cells.map((c, i) => c.textContent === "" ? i : null).filter(i => i !== null);
    if (empty.length === 0) return;
    const move = empty[Math.floor(Math.random() * empty.length)];
    cells[move].textContent = "O";
    cells[move].classList.add("red");
    checkWin("O");
    if (!gameOver) message.textContent = "Your Turn";
  }

  function checkWin(player) {
    for (let combo of winCombos) {
      const [a,b,c] = combo;
      if (
        cells[a].textContent === player &&
        cells[b].textContent === player &&
        cells[c].textContent === player
      ) {
        cells[a].classList.add("winner");
        cells[b].classList.add("winner");
        cells[c].classList.add("winner");
        message.textContent = player === "X" ? "🎉 You Win!" : "💀 You Lose!";
        gameOver = true;
        return;
      }
    }
    if (cells.every(cell => cell.textContent)) {
      message.textContent = "🤝 Draw!";
      gameOver = true;
    }
  }

  function resetGame() {
    gameOver = false;
    rewardMode = false;
    message.textContent = "Your Turn";
    createBoard();
    if (typeof sdk !== 'undefined' && sdk.showBanner !== 'undefined') {
      sdk.showBanner();
    }
  }

  function showRewardAd() {
    if (typeof sdk !== "undefined" && typeof sdk.showRewarded === "function") {
      sdk.showRewarded({
        callback: function (response) {
          if (response && response.completed) {
            alert("✅ Reward unlocked: You can replace one O with X!");
            rewardMode = true;
            message.textContent = "🎯 Tap on an O to replace it";
          } else {
            alert("❌ Ad not completed. No reward.");
          }
        }
      });
    } else {
      alert("⚠️ Reward ad not available.");
    }
  }

  createBoard();
</script>

</body>
</html>
