      <div class="start-message">
    <p>Fly 2048</p>
    <div class="lower">
      <a class="start-button">Tap to Start</a>
    </div>
  </div>
      <div class="game-message">
        <p></p>
        <div class="lower">
	        <a class="keep-playing-button">Keep going</a>
          <a class="retry-button">Restart</a>
        </div>

      <div class="grid-container">
        <div class="grid-row">

          <div class="grid-cell"></div>
          <div class="grid-cell"></div>
        </div>
        <div class="grid-row">
          <div class="grid-cell"></div>
          <div class="grid-cell"></div>
          <div class="grid-cell"></div>
          <div class="grid-cell"></div>
        </div>
        <div class="tile tile-block-a"><div class="tile-inner"></div></div>
        <div class="tile tile-block-b"><div class="tile-inner"></div></div>
        <div class="tile tile-block-c"><div class="tile-inner"></div></div>
        <div class="tile tile-block-d"><div class="tile-inner"></div></div>
        <div class="tile tile-bird"><div class="tile-inner"></div></div>
      </div>
    </div>

<script type="text/javascript">
   window.SDK_OPTIONS = {
      gameId: "cvejhwrjd65k00r262dtlpyinbg2fd1c", // Replace with your actual ID from GameMonetize
      onEvent: function (a) {
         switch (a.name) {
            case "SDK_GAME_PAUSE":
               // Pause game logic if necessary
               if (window.gameManager) window.gameManager.paused = true;
               break;
            case "SDK_GAME_START":
               // Resume game logic
               if (window.gameManager) window.gameManager.paused = false;
               break;
            case "SDK_READY":
               console.log("SDK is ready");
               break;
         }
      }
   };
   (function (a, b, c) {
      var d = a.getElementsByTagName(b)[0];
      if (a.getElementById(c)) return;
      a = a.createElement(b);
      a.id = c;
      a.src = "https://api.gamemonetize.com/sdk.js";
      d.parentNode.insertBefore(a, d);
   })(document, "script", "gamemonetize-sdk"); 
</script>
