<script>
  (function patchFocus() {
    if (!window.Laya || !Laya.stage) {

      setTimeout(patchFocus, 0);
      return;
    }
    if (window.__focusPatched) return; 
    window.__focusPatched = true;
    const canvas = Laya.Browser.document.getElementById('layaCanvas')
                  || Laya.Browser.document.querySelector('canvas');

    if (canvas) {
      canvas.setAttribute('tabindex', '0');
      canvas.style.outline = 'none';
    }
    function focusGame() {
      try {
        Laya.Browser.window.focus && Laya.Browser.window.focus();
        canvas && canvas.focus && canvas.focus();
      } catch (e) {}
    }
    Laya.stage.on(Laya.Event.MOUSE_DOWN, null, focusGame);
    Laya.Browser.window.addEventListener('keydown', focusGame, { capture: true });

    ['fullscreenchange','webkitfullscreenchange','msfullscreenchange']
      .forEach(evt => Laya.Browser.document.addEventListener(evt, () => setTimeout(focusGame, 0)));
    Laya.Browser.document.addEventListener('visibilitychange', () => {
      if (!Laya.Browser.document.hidden) setTimeout(focusGame, 0);
    });
    Laya.Browser.window.addEventListener('focus', () => setTimeout(focusGame, 0));
  })();
</script>
