		const rawLang = (navigator.language || navigator.userLanguage || "en").toLowerCase();

		// оставляем только первые две буквы (кроме случаев с "tw")
		let browserLang = rawLang.startsWith("zh-tw") ? "tw" : rawLang.substring(0, 2);

		loadScript = function (moduleName) {
			const domScript = document.createElement('script');
			domScript.async = true;
			domScript.src = moduleName;
			document.body.appendChild(domScript);
		}
		
		insertLineBreaks = function (text, maxLength = 20) {
			return text
				.split(' ') // Разделяем текст на слова
				.reduce((lines, word) => {
					let currentLine = lines[lines.length - 1];
					if ((currentLine + word).length <= maxLength) {
						// Добавляем слово в текущую строку, если длина позволяет
						lines[lines.length - 1] += (currentLine ? ' ' : '') + word;
					} else {
						// Начинаем новую строку с текущего слова
						lines.push(word);
					}
					return lines;
				}, [''])
				.join('<br>'); // Объединяем строки с переносами
		}
		
		i18n = function (fileName) {
			const language = __GameLanguage;
			return `i18n/${language}/${fileName}`;
		}
		
		i18nText = function (_text, ...args) {
			const language = __GameLanguage;
			const translationEntry = translations[_text];

			if (translationEntry && translationEntry[language]) {
				const translatedTemplate = translationEntry[language];
				// Подставляем значения в шаблон
				return translatedTemplate.replace(/\{(\d+)\}/g, (_, index) => args[index] ?? '');
			}

			// Если перевод не найден, возвращаем исходный текст с подстановкой значений
			return _text.replace(/\{(\d+)\}/g, (_, index) => args[index] ?? '');
