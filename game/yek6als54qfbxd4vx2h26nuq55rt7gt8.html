</head>

<body>
    <!-- Preloader -->
    <div class="preloader" id="preloader">
        <div class="loader">
            <div class="loader-ring"></div>
            <div class="loader-ring"></div>
            <div class="loader-ring"></div>
            <div class="loader-center">🎮</div>
        </div>
        <div class="preloader-text">LOADING GAME...</div>
    </div>

    <!-- Win Celebration Container -->
    <div class="win-celebration" id="winCelebration"></div>

    <main>


        <div class="game-mode-selector">
            <h2>SELECT BATTLE MODE</h2>
            <div class="mode-buttons">
                <button id="humanMode" class="mode-button active">👥 HUMAN VS HUMAN</button>
                <button id="aiMode" class="mode-button">🤖 HUMAN VS AI</button>
            </div>
        </div>
        <!-- Sound Control -->
        <div class="sound-control" id="soundControl" title="Toggle Sound">
            <span id="soundIcon">🔊</span>
        </div>

        <form id="tic-tac-form">
            <table>
                <caption>
                    <h1>NEON TIC-TAC-TOE</h1>
                </caption>
                <tbody>
                    <tr>
                        <td class="empty square" data-row="0" data-col="0">
                            <label for="r1c1" class="visually-hidden">Row 1 Column 1</label>
                            <input type="checkbox" id="r1c1" />
                            <span></span>
                        </td>
                        <td class="empty square" data-row="0" data-col="1">
                            <label for="r1c2" class="visually-hidden">Row 1 Column 2</label>
                            <input type="checkbox" id="r1c2" />
                            <span></span>
                        </td>
                        <td class="empty square" data-row="0" data-col="2">
                            <label for="r1c3" class="visually-hidden">Row 1 Column 3</label>
                            <input type="checkbox" id="r1c3" />
                            <span></span>
                        </td>
                    </tr>
                    <tr>
                        <td class="empty square" data-row="1" data-col="0">
                            <label for="r2c1" class="visually-hidden">Row 2 Column 1</label>
                            <input type="checkbox" id="r2c1" />
                            <span></span>
                        </td>
                        <td class="empty square" data-row="1" data-col="1">
                            <label for="r2c2" class="visually-hidden">Row 2 Column 2</label>
                            <input type="checkbox" id="r2c2" />
                            <span></span>
                        </td>
                        <td class="empty square" data-row="1" data-col="2">
                            <label for="r2c3" class="visually-hidden">Row 2 Column 3</label>
                            <input type="checkbox" id="r2c3" />
                            <span></span>
                        </td>
                    </tr>
                    <tr>
                        <td class="empty square" data-row="2" data-col="0">
                            <label for="r3c1" class="visually-hidden">Row 3 Column 1</label>
                            <input type="checkbox" id="r3c1" />
                            <span></span>
                        </td>
                        <td class="empty square" data-row="2" data-col="1">
                            <label for="r3c2" class="visually-hidden">Row 3 Column 2</label>
                            <input type="checkbox" id="r3c2" />
                            <span></span>
                        </td>
                        <td class="empty square" data-row="2" data-col="2">
                            <label for="r3c3" class="visually-hidden">Row 3 Column 3</label>
                            <input type="checkbox" id="r3c3" />
                            <span></span>
                        </td>
                    </tr>
                </tbody>
            </table>

            <footer id="console">
                <div class="messages" role="alert" aria-atomic="true">
                    <p id="gameStatus">Player 1's Turn ⚡</p>
                </div>
                <button type="reset">🎮 NEW GAME</button>
            </footer>
        </form>
    </main>
    <script type="text/javascript" src="assets/script.js"></script>
    <script type="text/javascript">
        window.SDK_OPTIONS = {
            gameId: "yek6als54qfbxd4vx2h26nuq55rt7gt8",
            onEvent: function (a) {
                switch (a.name) {
                    case "SDK_GAME_PAUSE":
                        // pause game logic / mute audio
                        break;
                    case "SDK_GAME_START":
                        // advertisement done, resume game logic and unmute audio
                        break;
                    case "SDK_READY":
                        // when sdk is ready
                        break;
                }
            }
        };
        (function (a, b, c) {
            var d = a.getElementsByTagName(b)[0];
            a.getElementById(c) || (a = a.createElement(b), a.id = c, a.src = "https://api.gamemonetize.com/sdk.js", d.parentNode.insertBefore(a, d))
        })(document, "script", "gamemonetize-sdk"); 
    </script>
