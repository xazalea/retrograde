<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neon Abyss Defender</title>
  <style>
    :root{
      --w: 800px;
      --h: 570px;
      --panel: #151a2e;
      --accent: #7dd3fc;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --chip-bg: rgba(21,26,46,.9);
      --chip-brd: rgba(125, 211, 252, .18);
    }
    html, body { height:100%; margin:0; background:#000; font-family: system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,Arial; color:var(--text); }
    .wrap { min-height:100%; display:grid; place-items:center; padding:24px; }
    .game-shell { width:var(--w); height:var(--h); position:relative; background:#000; border-radius:16px; box-shadow:0 10px 30px rgba(0,0,0,.45), inset 0 0 0 1px rgba(255,255,255,.06); overflow:hidden; user-select:none; }
    .topbar { position:absolute; top:6px; left:6px; right:6px; display:flex; align-items:center; gap:8px; white-space:nowrap; z-index:5; background:linear-gradient(180deg, rgba(6,8,16,.35), rgba(6,8,16,.0)); padding:4px 4px; }
    .btn { background:var(--panel); border:1px solid var(--chip-brd); border-radius:10px; color:var(--text); font-weight:700; padding:6px 10px; cursor:pointer; box-shadow:0 4px 10px rgba(0,0,0,.25); font-size:13px; line-height:1; display:inline-flex; align-items:center; gap:6px; }
    .chip { background:var(--chip-bg); border:1px solid var(--chip-brd); border-radius:10px; padding:6px 10px; font-weight:600; font-size:13px; display:inline-flex; align-items:center; gap:8px; box-shadow: inset 0 0 18px rgba(125,211,252,.06); }
    .chip span { color:var(--muted); font-weight:500; }
    .spacer { flex:1 1 auto; }
    canvas { position:absolute; inset:0; cursor: crosshair; }
    .centerOverlay { position:absolute; inset:0; background:rgba(6,8,16,.86); display:grid; place-items:center; z-index:6; backdrop-filter:blur(2px); text-align:center; }
    .card { background:#151a2e; border:1px solid rgba(125,211,252,.25); border-radius:16px; padding:18px 20px; text-align:center; max-width:520px; box-shadow:0 20px 40px rgba(0,0,0,.45); }
    .card h2 { margin:0 0 8px 0; font-size:20px; }
    .card p { margin:4px 0 12px 0; color:var(--muted); }
    .playBig { background:linear-gradient(180deg,#1e293b,#0b1022); border:1px solid rgba(125,211,252,.45); border-radius:14px; color:#e2f3ff; font-weight:800; font-size:18px; padding:12px 22px; cursor:pointer; box-shadow:0 8px 24px rgba(0,0,0,.35); display:inline-flex; align-items:center; gap:10px; }
    .countdown { font-size:56px; font-weight:900; letter-spacing:2px; color:#e2f3ff; margin-top:8px; opacity:0; transform:scale(0.9); transition:opacity .2s ease, transform .2s ease; }
    .countdown.show { opacity:1; transform:scale(1); }
    .hidden { display:none !important; }
    .hint { font-size:12px; color:#cbd5e1; opacity:.9; margin-top:8px; }
    .debugHud { position:absolute; left:8px; bottom:8px; background:rgba(0,0,0,.55); border:1px solid rgba(125,211,252,.25); padding:6px 8px; border-radius:8px; font:12px/1.3 system-ui,Segoe UI,Roboto; color:#cbd5e1; pointer-events:none; }
    .debugHud.hidden { display:none; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="game-shell" id="game">
      <div class="topbar">
        <button id="btnStart" class="btn" onclick="sdk.showBanner()">▶ Start / Resume</button>
        <button id="btnPause" class="btn">⏸️ Pause</button>
        <div class="spacer"></div>
        <div class="chip"><span>Lives</span><b id="livesVal">3</b></div>
        <div class="chip"><span>Level</span><b id="levelVal">1</b></div>
        <div class="chip"><span>Score</span><b id="scoreVal">0</b></div>
        <div class="chip"><span>Kills</span><b id="killsVal">0</b><span>/</span><b id="targetVal">25</b></div>
        <div class="chip"><span>Best</span><b id="bestVal">0</b></div>
      </div>

      <canvas id="view" width="800" height="570"></canvas>

      <div id="centerPlay" class="centerOverlay">
        <div class="card">
          <h2 id="playTitle">Level 1</h2>
          <p id="playSub">Click Play to begin.</p>
          <button id="btnPlayCenter" class="playBig" onclick="sdk.showBanner()">▶ Play</button>
          <div id="countdown" class="countdown hidden">3</div>
          <div class="hint">Controls: Move with mouse • Hold click to fire • Pause/Resume from top buttons</div>
        </div>
      </div>

      <div id="gameOver" class="centerOverlay hidden">
        <div class="card">
          <h2>Game Over</h2>
          <p>Final score: <b id="finalScore">0</b></p>
          <button id="btnTryAgain" class="playBig">↻ Play Again</button>
        </div>
      </div>

      <div id="winOverlay" class="centerOverlay hidden">
        <div class="card">
          <h2>Victory!</h2>
          <p>Total score: <b id="winScore">0</b></p>
          <button id="btnPlayAgainWin" class="playBig">↻ Play Again</button>
        </div>
      </div>

      <div id="pausedOverlay" class="centerOverlay hidden">
        <div class="card">
          <h2>Paused</h2>
          <p>Press Resume to continue.</p>
          <button id="btnResume" class="playBig">▶ Resume</button>
        </div>
      </div>

      <div id="debugHud" class="debugHud hidden"></div>
    </div>
  </div>

  <script>
    const WIDTH = 800, HEIGHT = 570;
    const BOTTOM_ZONE_H = 160;
    const MARGIN_X = 10, MARGIN_Y = 10;
    const STORAGE_BEST_KEY = 'neon_abyss_defender_best_v1';
    const MAX_LEVEL = 6;

    const KILL_BASE = 25;
    const KILL_INC = 10;

    const RESPAWN_SHIELD_TIME = 1.5;

    const cvs = document.getElementById('view');
    const ctx = cvs.getContext('2d');

    // roundRect polyfill (for older browsers)
    if (!CanvasRenderingContext2D.prototype.roundRect){
      CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
        r = Math.min(r, w/2, h/2);
        this.beginPath();
        this.moveTo(x+r, y);
        this.arcTo(x+w, y, x+w, y+h, r);
        this.arcTo(x+w, y+h, x, y+h, r);
        this.arcTo(x, y+h, x, y, r);
        this.arcTo(x, y, x+w, y, r);
        this.closePath();
        return this;
      };
    }

    const btnStart = document.getElementById('btnStart');
    const btnPause = document.getElementById('btnPause');
    const btnResume = document.getElementById('btnResume');

    const scoreVal = document.getElementById('scoreVal');
    const levelVal = document.getElementById('levelVal');
    const livesVal = document.getElementById('livesVal');
    const killsVal = document.getElementById('killsVal');
    const targetVal = document.getElementById('targetVal');
    const bestVal = document.getElementById('bestVal');

    const centerPlay = document.getElementById('centerPlay');
    const btnPlayCenter = document.getElementById('btnPlayCenter');
    const playTitle = document.getElementById('playTitle');
    const playSub   = document.getElementById('playSub');
    const countdownEl = document.getElementById('countdown');

    const gameOverOverlay = document.getElementById('gameOver');
    const finalScoreEl = document.getElementById('finalScore');
    const btnTryAgain = document.getElementById('btnTryAgain');

    const winOverlay = document.getElementById('winOverlay');
    const winScoreEl = document.getElementById('winScore');
    const btnPlayAgainWin = document.getElementById('btnPlayAgainWin');

    const pausedOverlay = document.getElementById('pausedOverlay');

    let bestScore = 0;
    try { bestScore = parseInt(localStorage.getItem(STORAGE_BEST_KEY) || '0', 10) || 0; } catch(e){}
    bestVal.textContent = bestScore;

    const FX = {
      parts: [],
      spawn(x,y, power=1){
        const count = Math.floor(14 + 10*power);
        for (let i=0;i<count;i++){
          const a = Math.random()*Math.PI*2;
          const spd = (80 + Math.random()*150)*(0.8 + 0.6*power);
          FX.parts.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:0,max:0.55+Math.random()*0.35});
        }
      },
      update(dt){
        for (let i=FX.parts.length-1;i>=0;i--){
          const p=FX.parts[i];
          p.life+=dt; p.x+=p.vx*dt; p.y+=p.vy*dt;
          p.vx*= (1-0.9*dt); p.vy*= (1-0.9*dt);
          if (p.life>=p.max) FX.parts.splice(i,1);
        }
      },
      draw(ctx){
        ctx.save();
        ctx.fillStyle="#e2f3ff";
        for (const p of FX.parts){
          const a = Math.max(0,1-p.life/p.max);
          ctx.globalAlpha=a;
          ctx.fillRect(p.x,p.y,2,2);
        }
        ctx.restore();
      }
    };

    // ====== SFX (WebAudio - no external files)
    // Audio starts after the first user gesture (click/tap).
    const SFX = {
      ctx: null,
      enabled: true,
      _lastShotT: 0,
      init(){
        if (this.ctx) return;
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) { this.enabled=false; return; }
        this.ctx = new AC();
      },
      resume(){
        if (!this.enabled) return;
        if (!this.ctx) this.init();
        if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume().catch(()=>{});
      },
      _tone(freq, dur, type='sine', gain=0.06, bend=0){
        if (!this.enabled || !this.ctx) return;
        const t0 = this.ctx.currentTime;
        const o = this.ctx.createOscillator();
        const g = this.ctx.createGain();
        o.type = type;
        o.frequency.setValueAtTime(freq, t0);
        if (bend !== 0){
          o.frequency.exponentialRampToValueAtTime(Math.max(40, freq + bend), t0 + dur);
        }
        g.gain.setValueAtTime(0.0001, t0);
        g.gain.exponentialRampToValueAtTime(gain, t0 + 0.01);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
        o.connect(g); g.connect(this.ctx.destination);
        o.start(t0);
        o.stop(t0 + dur + 0.02);
      },
      _noise(dur, gain=0.08, hp=700){
        if (!this.enabled || !this.ctx) return;
        const t0 = this.ctx.currentTime;
        const len = Math.floor(this.ctx.sampleRate * dur);
        const buf = this.ctx.createBuffer(1, len, this.ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i=0;i<len;i++){
          data[i] = (Math.random()*2-1) * (1 - i/len);
        }
        const src = this.ctx.createBufferSource();
        src.buffer = buf;

        const filter = this.ctx.createBiquadFilter();
        filter.type = 'highpass';
        filter.frequency.value = hp;

        const g = this.ctx.createGain();
        g.gain.setValueAtTime(0.0001, t0);
        g.gain.exponentialRampToValueAtTime(gain, t0 + 0.01);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);

        src.connect(filter);
        filter.connect(g);
        g.connect(this.ctx.destination);

        src.start(t0);
        src.stop(t0 + dur + 0.02);
      },
      shot(){
        if (!this.enabled || !this.ctx) return;
        const t = this.ctx.currentTime;
        if (t - this._lastShotT < 0.04) return;
        this._lastShotT = t;

        this._tone(820, 0.06, 'square', 0.045, -420);
        this._tone(1200, 0.04, 'sine', 0.020, -500);
      },
      hit(){
        if (!this.enabled || !this.ctx) return;
        this._noise(0.10, 0.11, 800);
        this._tone(140, 0.10, 'sawtooth', 0.06, -60);
      },
      bigHit(){
        if (!this.enabled || !this.ctx) return;
        this._noise(0.18, 0.14, 500);
        this._tone(90, 0.18, 'sawtooth', 0.08, -40);
        this._tone(220, 0.12, 'square', 0.04, -90);
      }
    };


    const BG = {
      t:0,
      stars:[],
      init(){
        this.stars.length=0;
        for (let i=0;i<650;i++){
          this.stars.push({x:Math.random()*WIDTH,y:Math.random()*HEIGHT,s:Math.random()<0.9?1:2,a:0.1+Math.random()*0.5,tw:Math.random()*Math.PI*2,sp:0.6+Math.random()*1.6});
        }
      },
      draw(ctx,dt){
        this.t += dt;
        ctx.fillStyle="#03040a"; ctx.fillRect(0,0,WIDTH,HEIGHT);

        for (const s of this.stars){
          s.tw += dt*s.sp;
          const tw = 0.75 + 0.25*Math.sin(s.tw);
          ctx.globalAlpha = s.a*tw;
          ctx.fillStyle="#e6f0ff";
          ctx.fillRect(s.x,s.y,s.s,s.s);
        }
        ctx.globalAlpha=1;

        const cx=WIDTH*0.5, cy=HEIGHT*0.35;
        const R = Math.max(WIDTH,HEIGHT)*0.42;
        const g = ctx.createRadialGradient(cx,cy,0,cx,cy,R);
        g.addColorStop(0, "rgba(120,90,255,0.22)");
        g.addColorStop(0.35,"rgba(0,255,220,0.10)");
        g.addColorStop(0.72,"rgba(255,60,180,0.06)");
        g.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle=g;
        ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.fill();

        const ringA = 0.45 + 0.25*Math.sin(this.t*0.9);
        ctx.save();
        ctx.translate(cx,cy);
        ctx.rotate(this.t*0.35);
        ctx.globalAlpha=0.55;
        ctx.strokeStyle="rgba(120,210,255,0.55)";
        ctx.lineWidth=2;
        ctx.beginPath(); ctx.ellipse(0,0,220,150,0,0,Math.PI*2); ctx.stroke();
        ctx.globalAlpha=ringA*0.45;
        ctx.strokeStyle="rgba(255,80,200,0.55)";
        ctx.beginPath(); ctx.ellipse(0,0,260,180,0,0,Math.PI*2); ctx.stroke();
        ctx.restore();

        const vg = ctx.createRadialGradient(WIDTH/2,HEIGHT/2,120,WIDTH/2,HEIGHT/2,520);
        vg.addColorStop(0,"rgba(0,0,0,0)");
        vg.addColorStop(1,"rgba(0,0,0,0.55)");
        ctx.fillStyle=vg;
        ctx.fillRect(0,0,WIDTH,HEIGHT);
      }
    };

    const Game = {
      running:false, paused:false, lastFrame:performance.now(),
      score:0,
      bullets:[], enemyBullets:[], enemies:[], boss:null,
      hazards:{ meteors:[], mines:[], storms:[] },
      firing:false, _fireCD:0,

      player:{ x: WIDTH/2, y: HEIGHT - (BOTTOM_ZONE_H/2), speed: 1200 },
      mousePos:{ x: WIDTH/2, y: HEIGHT - (BOTTOM_ZONE_H/2) },

      lives:3, level:1, kills:0, targetKills:KILL_BASE,
      phase:'init', awaitingCountdown:false,
      respawnShieldT:0,
      _handlingImpact:false,

      spawnT:0
    };

    function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
    function rectsOverlap(a,b){ return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y; }

    cvs.addEventListener('mousemove', (e)=>{
      const rect = cvs.getBoundingClientRect();
      const mx = (e.clientX - rect.left) * (cvs.width / rect.width);
      const my = (e.clientY - rect.top) * (cvs.height / rect.height);
      Game.mousePos.x = clamp(mx, MARGIN_X, WIDTH - MARGIN_X);
      const top = HEIGHT - BOTTOM_ZONE_H + MARGIN_Y, bottom = HEIGHT - MARGIN_Y;
      Game.mousePos.y = clamp(my, top, bottom);
    });
    cvs.addEventListener('pointerdown', ()=>{ SFX.resume(); Game.firing = true; shoot(); });
    window.addEventListener('pointerup', ()=> Game.firing = false);

    btnStart.addEventListener('click', startOrResume);
    btnPlayCenter.addEventListener('click', startOrResume);
    btnTryAgain.addEventListener('click', resetAndShowIntro);
    btnPlayAgainWin.addEventListener('click', resetAndShowIntro);
    btnPause.addEventListener('click', ()=> togglePause(true));
    btnResume.addEventListener('click', ()=> togglePause(false));

    function runCountdown(done){
      if (Game.awaitingCountdown) return;
      Game.awaitingCountdown = true;
      let n=3;
      countdownEl.textContent=String(n);
      countdownEl.classList.remove('hidden');
      setTimeout(()=>countdownEl.classList.add('show'),0);

      const tick=()=>{
        n--;
        if (n>0){
          countdownEl.classList.remove('show');
          setTimeout(()=>{ countdownEl.textContent=String(n); countdownEl.classList.add('show'); },180);
          setTimeout(tick,800);
        } else {
          countdownEl.classList.remove('show');
          setTimeout(()=>{ countdownEl.classList.add('hidden'); Game.awaitingCountdown=false; done&&done(); },200);
        }
      };
      setTimeout(tick,800);
    }

    function startOrResume(){
      SFX.resume();
      gameOverOverlay.classList.add('hidden');
      winOverlay.classList.add('hidden');
      pausedOverlay.classList.add('hidden');

      runCountdown(()=>{
        centerPlay.classList.add('hidden');
        if (!Game.running) startGame();
        Game.paused = false;
        Game.lastFrame = performance.now();
        Game.phase = 'playing';
      });
    }

    function togglePause(forcePause){
      if (!Game.running) return;
      const newPaused = typeof forcePause === 'boolean' ? forcePause : !Game.paused;
      Game.paused = newPaused;
      if (!newPaused){
        Game.lastFrame = performance.now();
        pausedOverlay.classList.add('hidden');
      } else {
        pausedOverlay.classList.remove('hidden');
      }
    }

    function enemySpawnEvery(){
      // easier level 1, gradual ramp
      // L1 ~1.25s, L2 ~1.05s, L3 ~0.90s, L4 ~0.78s, L5 ~0.68s, L6 ~0.60s
      return Math.max(0.60, 1.25 - (Game.level-1)*0.13);
    }
    function enemyCap(){
      // fewer enemies early
      return Math.min(16, 4 + Game.level*2);
    }
    function enemySpeed(){
      // slower at start, ramps up
      return 55 + Game.level*10;
    }
    function enemyFireEvery(){
      // slower fire early
      // L1 ~2.7s, L2 ~2.4s, L3 ~2.1s, L4 ~1.85s, L5 ~1.6s, L6 ~1.35s
      return Math.max(1.15, 2.7 - (Game.level-1)*0.32);
    }

    // ====== Enemy ship variants (5-6 silhouettes)
    const ENEMY_TYPES = [
      { kind:'drone',      w:65, h:37, hp:20,  vxBase:18, vyBase:1.00 },
      { kind:'scout',      w:51, h:31, hp:15,  vxBase:26, vyBase:1.10 },
      { kind:'heavy',      w:78, h:44, hp:35,  vxBase:14, vyBase:0.90 },
      { kind:'zigzag',     w:58, h:34, hp:22,  vxBase:34, vyBase:1.00 },
      { kind:'saucer',     w:75, h:34, hp:28,  vxBase:20, vyBase:0.95 },
      { kind:'interceptor',w:61, h:41, hp:24,  vxBase:30, vyBase:1.05 }
    ];

    function pickEnemyKind(){
      // Slight weighting: simpler ships early, more variety later
      const lv = Game.level;
      const pool = (lv <= 1)
        ? ['drone','scout','drone','saucer']
        : (lv <= 3)
          ? ['drone','scout','heavy','saucer','zigzag']
          : ['drone','scout','heavy','saucer','zigzag','interceptor'];
      return pool[(Math.random()*pool.length)|0];
    }


    function spawnEnemy(kind='drone', x=null, y=null){
      // If caller passes a special kind (splitlet / splitter), keep it.
      // Otherwise pick from our variant pool.
      if (kind === 'drone') kind = pickEnemyKind();

      // Splitlet keeps its own lighter stats.
      if (kind === 'splitlet'){
        const w=48, h=31;
        const ex = x===null ? Math.random()*(WIDTH - w) : x;
        const ey = y===null ? -h - 12 : y;
        Game.enemies.push({
          kind, x:ex, y:ey, w, h,
          vx: (Math.random()<0.5?-1:1) * (16 + Game.level*5),
          vy: enemySpeed()*1.05 + Math.random()*28,
          hp: 10,
          fireCD: 0.55 + Math.random()*enemyFireEvery()
        });
        return;
      }

      const spec = ENEMY_TYPES.find(t => t.kind === kind) || ENEMY_TYPES[0];
      const w = spec.w, h = spec.h;

      const ex = x===null ? Math.random()*(WIDTH - w) : x;
      const ey = y===null ? -h - 12 : y;

      const hpBase = spec.hp + Math.max(0, (Game.level-1))*2; // gentle scaling
      const vxBase = spec.vxBase + Game.level*4;
      const vy = enemySpeed()*spec.vyBase + Math.random()*30;

      Game.enemies.push({
        kind, x:ex, y:ey, w, h,
        vx: (Math.random()<0.5?-1:1) * (vxBase + Math.random()*6),
        vy,
        hp: hpBase,
        fireCD: 0.45 + Math.random()*enemyFireEvery()
      });
    }

    function spawnBoss(){
      const w=160, h=100;
      const baseHp = 220 + (Game.level-1)*80;
      Game.boss = { x: WIDTH/2-w/2, y: HEIGHT*0.22-h/2, w,h, vx: 120 + Game.level*12, vy: 75 + Game.level*8, hp: baseHp, maxHp: baseHp, fireCD: 1.0, t:0 };
      Game.enemies.length=0;
      Game.phase='boss';
    }

    function shoot(){
      if (!Game.running || Game.paused) return;
      if (Game.phase!=='playing' && Game.phase!=='boss') return;
      Game.bullets.push({x:Game.player.x-2, y:Game.player.y-14, w:4, h:10, vy:-520});
      SFX.shot();
    }

    function enemyShootFrom(x,y, aimPlayer=true, spread=0){
      const p = Game.player;
      const dx = (p.x - x), dy = (p.y - y);
      const L = Math.hypot(dx,dy) || 1;
      const spd = 260 + Game.level*10;
      const vx = aimPlayer ? (dx/L)*spd : 0;
      const vy = aimPlayer ? (dy/L)*spd : spd;
      const a = spread;
      const c = Math.cos(a), s = Math.sin(a);
      const rvx = vx*c - vy*s;
      const rvy = vx*s + vy*c;
      Game.enemyBullets.push({x:x-3,y:y+6,w:6,h:10,vx:rvx,vy:rvy});
    }

    function meteorRate(){
      if (Game.level < 2) return 0;
      // keep meteors rare early, slightly more later
      return Math.min(0.55, 0.10 + (Game.level-2)*0.07);
    }
    function spawnMeteor(){
      const w=18, h=22;
      const x=Math.random()*(WIDTH-w);
      const vy=240 + Game.level*18;
      Game.hazards.meteors.push({x,y:-h-10,w,h,vy,rot:Math.random()*Math.PI*2,rs:(Math.random()<0.5?-1:1)*(1.5+Math.random()*2.2)});
    }

    function mineEvery(){
      if (Game.level < 3) return Infinity;
      // mines less frequent early
      return Math.max(3.0, 4.6 - (Game.level-3)*0.40);
    }
    function dropMine(x,y){
      const w=14, h=14;
      Game.hazards.mines.push({x:x-w/2,y:y,w,h,vy:80 + Game.level*6, armedT:0.25});
    }

    function ensureStorms(){
      if (Game.level < 4) { Game.hazards.storms.length=0; return; }
      if (Game.hazards.storms.length>0) return;
      Game.hazards.storms.push({x:140,y:160,w:180,h:120, t:0});
      Game.hazards.storms.push({x:480,y:120,w:200,h:140, t:0});
    }
    function bulletSlowFactor(b){
      if (Game.level < 4) return 1;
      for (const z of Game.hazards.storms){
        if (rectsOverlap({x:b.x,y:b.y,w:b.w,h:b.h}, z)) return 0.55;
      }
      return 1;
    }

    function isSplitLevel(){ return Game.level >= 5; }

    function registerImpact(){
      if (Game._handlingImpact) return;
      if (Game.respawnShieldT > 0) return;

      Game._handlingImpact = true;
      try{
        if (typeof Game.lives !== 'number' || !Number.isFinite(Game.lives)) Game.lives = 1;

        if (Game.lives <= 1){
          SFX.bigHit();
          Game.lives = 0;
          updateHUD();
          endGame();
          return;
        }
        SFX.bigHit();
        Game.lives -= 1;
        Game.player.x = WIDTH/2; Game.player.y = HEIGHT - (BOTTOM_ZONE_H/2);
        Game.mousePos.x = Game.player.x; Game.mousePos.y = Game.player.y;
        Game.bullets.length = 0;
        Game.enemyBullets.length = 0;
        Game.hazards.mines.length = 0;
        Game.respawnShieldT = RESPAWN_SHIELD_TIME;
        updateHUD();
      } finally {
        Game._handlingImpact = false;
      }
    }

    function endGame(){
      Game.running=false; Game.paused=false; Game.phase='over';
      finalScoreEl.textContent = String(Game.score);
      if (Game.score > bestScore){
        bestScore = Game.score;
        bestVal.textContent = bestScore;
        try { localStorage.setItem(STORAGE_BEST_KEY, String(bestScore)); } catch(e){}
      }
      gameOverOverlay.classList.remove('hidden');
    }

    function victory(){
      Game.running=false; Game.paused=false; Game.phase='win';
      winScoreEl.textContent = String(Game.score);
      if (Game.score > bestScore){
        bestScore = Game.score;
        bestVal.textContent = bestScore;
        try { localStorage.setItem(STORAGE_BEST_KEY, String(bestScore)); } catch(e){}
      }
      winOverlay.classList.remove('hidden');
    }

    function onLevelComplete(){
      Game.phase='between';
      Game.boss=null;
      Game.enemies.length=0;
      Game.enemyBullets.length=0;
      Game.bullets.length=0;
      Game.hazards.meteors.length=0;
      Game.hazards.mines.length=0;
      Game.hazards.storms.length=0;

      if (Game.level >= MAX_LEVEL){
        victory();
        return;
      }

      Game.level += 1;
      Game.kills = 0;
      Game.targetKills = KILL_BASE + KILL_INC*(Game.level-1);
      Game.lives += 1;

      playTitle.textContent = `Level ${Game.level}`;
      playSub.textContent = levelDescription(Game.level);
      centerPlay.classList.remove('hidden');
      updateHUD();
    }

    function levelDescription(lv){
      if (lv===1) return "Click Play to begin.";
      if (lv===2) return "Meteors enter the battlefield. Stay alert!";
      if (lv===3) return "Enemies drop mines. Dodge and survive!";
      if (lv===4) return "Electric storms slow your shots. Aim carefully!";
      if (lv===5) return "Split enemies appear. Keep pressure!";
      return "Final level. The Abyss Gate awakens!";
    }

    function resetGame(){
      Game.running=false; Game.paused=false;
      Game.score=0;
      Game.bullets.length=0; Game.enemyBullets.length=0; Game.enemies.length=0; Game.boss=null;
      Game.hazards.meteors.length=0; Game.hazards.mines.length=0; Game.hazards.storms.length=0;
      Game.firing=false; Game._fireCD=0;
      Game.player.x=WIDTH/2; Game.player.y=HEIGHT - (BOTTOM_ZONE_H/2);
      Game.mousePos.x=Game.player.x; Game.mousePos.y=Game.player.y;
      Game.lives=3; Game.level=1; Game.kills=0; Game.targetKills=KILL_BASE;
      Game.phase='init'; Game.awaitingCountdown=false;
      Game.respawnShieldT=0; Game._handlingImpact=false;
      Game.spawnT=0;
      playTitle.textContent="Level 1";
      playSub.textContent="Click Play to begin.";
      updateHUD();
      centerPlay.classList.remove('hidden');
    }

    function resetAndShowIntro(){
      gameOverOverlay.classList.add('hidden');
      winOverlay.classList.add('hidden');
      pausedOverlay.classList.add('hidden');
      resetGame();
    }

    function startGame(){
      Game.running=true;
      Game.paused=false;
      Game.phase='playing';
      Game.lastFrame=performance.now();
      Game.spawnT = 0.05;
      spawnEnemy('drone');
      spawnEnemy('drone');
    }

    function drawPlayer(){
      const p=Game.player;

      // subtle shadow
      ctx.save();
      ctx.globalAlpha = 0.20;
      ctx.fillStyle = "rgba(0,0,0,0.9)";
      ctx.beginPath();
      ctx.ellipse(p.x+2, p.y+3, 18, 12, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();

      ctx.save();
      ctx.translate(p.x,p.y);

      // shield
      if (Game.respawnShieldT>0){
        const t = performance.now()/1000;
        const pulse = 0.55 + 0.35*Math.sin(t*5.0);
        ctx.globalAlpha=0.70;
        ctx.strokeStyle=`rgba(147,197,253,${0.65*pulse})`;
        ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(0,2,20,0,Math.PI*2); ctx.stroke();
        ctx.globalAlpha=0.22;
        ctx.fillStyle=`rgba(96,165,250,${0.25*pulse})`;
        ctx.beginPath(); ctx.arc(0,2,20,0,Math.PI*2); ctx.fill();
        ctx.globalAlpha=1;
      }

      // Hull gradients (metal + neon accents)
      const hull = ctx.createLinearGradient(0,-20,0,22);
      hull.addColorStop(0.00, "rgba(245,250,255,0.95)");
      hull.addColorStop(0.25, "rgba(120,220,255,0.85)");
      hull.addColorStop(0.60, "rgba(80,120,255,0.78)");
      hull.addColorStop(1.00, "rgba(255,90,220,0.80)");

      const dark = "rgba(0,0,0,0.35)";

      // Main fuselage (sleek)
      ctx.fillStyle = hull;
      ctx.beginPath();
      ctx.moveTo(0,-18);
      ctx.lineTo(14,-4);
      ctx.lineTo(10,18);
      ctx.lineTo(0,12);
      ctx.lineTo(-10,18);
      ctx.lineTo(-14,-4);
      ctx.closePath();
      ctx.fill();

      // Wing plates
      ctx.fillStyle = hull;
      ctx.globalAlpha = 0.92;
      ctx.beginPath();
      ctx.moveTo(-22,-2);
      ctx.lineTo(-6,2);
      ctx.lineTo(-12,18);
      ctx.lineTo(-28,14);
      ctx.closePath();
      ctx.fill();

      ctx.beginPath();
      ctx.moveTo(22,-2);
      ctx.lineTo(6,2);
      ctx.lineTo(12,18);
      ctx.lineTo(28,14);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 1;

      // Nose highlight
      ctx.globalAlpha=0.35;
      ctx.fillStyle="rgba(255,255,255,0.55)";
      ctx.beginPath();
      ctx.moveTo(0,-16);
      ctx.lineTo(6,-6);
      ctx.lineTo(0,-2);
      ctx.lineTo(-6,-6);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha=1;

      // Cockpit glass
      const cg = ctx.createRadialGradient(0,-6,2, 0,-6, 14);
      cg.addColorStop(0,"rgba(255,255,255,0.85)");
      cg.addColorStop(0.30,"rgba(125,211,252,0.55)");
      cg.addColorStop(1,"rgba(0,0,0,0.15)");
      ctx.fillStyle=cg;
      ctx.beginPath();
      ctx.ellipse(0,-6,8,10,0,0,Math.PI*2);
      ctx.fill();
      ctx.globalAlpha=0.55;
      ctx.strokeStyle="rgba(255,255,255,0.30)";
      ctx.lineWidth=1;
      ctx.stroke();
      ctx.globalAlpha=1;

      // Panel lines
      ctx.globalAlpha=0.22;
      ctx.strokeStyle=dark;
      ctx.lineWidth=1;
      ctx.beginPath();
      ctx.moveTo(0,-14); ctx.lineTo(0,10);
      ctx.moveTo(-8,4); ctx.lineTo(8,4);
      ctx.stroke();
      ctx.globalAlpha=1;

      // Engines / thrusters (twin)
      function thruster(x,y,r){
        const g = ctx.createRadialGradient(x,y,0, x,y, r);
        g.addColorStop(0,"rgba(90,255,230,0.95)");
        g.addColorStop(0.30,"rgba(120,210,255,0.55)");
        g.addColorStop(0.60,"rgba(255,80,200,0.20)");
        g.addColorStop(1,"rgba(0,0,0,0)");
        ctx.fillStyle=g;
        ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
      }
      thruster(-8, 16, 10);
      thruster( 8, 16, 10);

      // Small center core light
      ctx.globalAlpha=0.85;
      ctx.fillStyle="rgba(255,255,255,0.85)";
      ctx.fillRect(-2, -2, 4, 6);
      ctx.globalAlpha=1;

      ctx.restore();
    }


    

    function drawEnemy(e){
      const cx = e.x + e.w/2;
      const cy = e.y + e.h/2;

      // subtle shadow
      ctx.save();
      ctx.globalAlpha = 0.22;
      ctx.fillStyle = "rgba(0,0,0,0.85)";
      ctx.beginPath();
      ctx.ellipse(cx+2, cy+3, e.w*0.42, e.h*0.38, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();

      ctx.save();
      ctx.translate(cx, cy);

      // master hull gradient (metallic)
      const hull = ctx.createLinearGradient(-e.w/2, -e.h/2, e.w/2, e.h/2);
      hull.addColorStop(0.00, "rgba(235,245,255,0.95)");
      hull.addColorStop(0.18, "rgba(120,220,255,0.88)");
      hull.addColorStop(0.55, "rgba(88,140,255,0.78)");
      hull.addColorStop(1.00, "rgba(255,90,220,0.82)");

      const rim = ctx.createLinearGradient(0, -e.h/2, 0, e.h/2);
      rim.addColorStop(0, "rgba(255,255,255,0.35)");
      rim.addColorStop(0.45, "rgba(255,255,255,0.05)");
      rim.addColorStop(1, "rgba(0,0,0,0.22)");

      // helper: thruster glow
      function thruster(x,y, r, a){
        ctx.save();
        ctx.globalAlpha = a;
        const g = ctx.createRadialGradient(x,y,0, x,y, r);
        g.addColorStop(0,"rgba(90,255,230,0.95)");
        g.addColorStop(0.35,"rgba(120,210,255,0.55)");
        g.addColorStop(1,"rgba(0,0,0,0)");
        ctx.fillStyle=g;
        ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
        ctx.restore();
      }

      // helper: window/cockpit
      function cockpit(x,y, rx, ry){
        const g = ctx.createRadialGradient(x-2,y-2,2, x,y, Math.max(rx,ry)*1.2);
        g.addColorStop(0,"rgba(255,255,255,0.85)");
        g.addColorStop(0.35,"rgba(120,220,255,0.55)");
        g.addColorStop(1,"rgba(0,0,0,0.10)");
        ctx.fillStyle=g;
        ctx.beginPath(); ctx.ellipse(x,y,rx,ry,0,0,Math.PI*2); ctx.fill();

        ctx.globalAlpha=0.55;
        ctx.strokeStyle="rgba(255,255,255,0.35)";
        ctx.lineWidth=1;
        ctx.beginPath(); ctx.ellipse(x,y,rx,ry,0,0,Math.PI*2); ctx.stroke();
        ctx.globalAlpha=1;
      }

      // Different silhouettes but with consistent "realistic" detailing
      switch(e.kind){
        case 'heavy': {
          // Main hull
          ctx.fillStyle=hull;
          ctx.beginPath();
          ctx.moveTo(-e.w*0.48, -e.h*0.10);
          ctx.lineTo(-e.w*0.32, -e.h*0.40);
          ctx.lineTo(e.w*0.32, -e.h*0.40);
          ctx.lineTo(e.w*0.48, -e.h*0.10);
          ctx.lineTo(e.w*0.36,  e.h*0.44);
          ctx.lineTo(-e.w*0.36, e.h*0.44);
          ctx.closePath();
          ctx.fill();

          // Rim light
          ctx.globalAlpha=0.45;
          ctx.strokeStyle="rgba(255,255,255,0.25)";
          ctx.lineWidth=2;
          ctx.stroke();
          ctx.globalAlpha=1;

          // Side armor plates
          ctx.globalAlpha=0.22;
          ctx.fillStyle="rgba(0,0,0,0.55)";
          ctx.fillRect(-e.w*0.30, -e.h*0.10, e.w*0.60, e.h*0.12);
          ctx.globalAlpha=1;

          // Cockpit
          cockpit(0,-e.h*0.12, e.w*0.14, e.h*0.14);

          // Twin engines
          thruster(-e.w*0.18, e.h*0.36, 10, 0.9);
          thruster( e.w*0.18, e.h*0.36, 10, 0.9);

          break;
        }
        case 'scout': {
          // Sleek spear
          ctx.fillStyle=hull;
          ctx.beginPath();
          ctx.moveTo(0, -e.h*0.52);
          ctx.lineTo(e.w*0.46, e.h*0.44);
          ctx.lineTo(e.w*0.06, e.h*0.22);
          ctx.lineTo(0, e.h*0.44);
          ctx.lineTo(-e.w*0.06, e.h*0.22);
          ctx.lineTo(-e.w*0.46, e.h*0.44);
          ctx.closePath();
          ctx.fill();

          ctx.globalAlpha=0.35;
          ctx.fillStyle=rim;
          ctx.beginPath();
          ctx.moveTo(0,-e.h*0.36);
          ctx.lineTo(e.w*0.22, e.h*0.22);
          ctx.lineTo(-e.w*0.22, e.h*0.22);
          ctx.closePath();
          ctx.fill();
          ctx.globalAlpha=1;

          cockpit(0,-e.h*0.12, e.w*0.10, e.h*0.12);
          thruster(0, e.h*0.34, 11, 0.95);
          break;
        }
        case 'zigzag': {
          // Aggressive angular fighter
          ctx.fillStyle=hull;
          ctx.beginPath();
          ctx.moveTo(0, -e.h*0.52);
          ctx.lineTo(e.w*0.44, -e.h*0.12);
          ctx.lineTo(e.w*0.18,  0);
          ctx.lineTo(e.w*0.46,  e.h*0.44);
          ctx.lineTo(0,  e.h*0.18);
          ctx.lineTo(-e.w*0.46, e.h*0.44);
          ctx.lineTo(-e.w*0.18, 0);
          ctx.lineTo(-e.w*0.44,-e.h*0.12);
          ctx.closePath();
          ctx.fill();

          // Panel lines
          ctx.globalAlpha=0.22;
          ctx.strokeStyle="rgba(0,0,0,0.65)";
          ctx.lineWidth=1;
          ctx.beginPath();
          ctx.moveTo(0, -e.h*0.44); ctx.lineTo(0, e.h*0.20);
          ctx.moveTo(-e.w*0.18, -e.h*0.10); ctx.lineTo(e.w*0.18, -e.h*0.10);
          ctx.stroke();
          ctx.globalAlpha=1;

          cockpit(0,-e.h*0.18, e.w*0.12, e.h*0.12);
          thruster(-e.w*0.18, e.h*0.34, 9, 0.85);
          thruster( e.w*0.18, e.h*0.34, 9, 0.85);
          break;
        }
        case 'saucer': {
          // UFO-like cruiser
          ctx.fillStyle=hull;
          ctx.beginPath();
          ctx.ellipse(0, e.h*0.08, e.w*0.50, e.h*0.32, 0, 0, Math.PI*2);
          ctx.fill();

          ctx.globalAlpha=0.42;
          ctx.fillStyle=rim;
          ctx.beginPath();
          ctx.ellipse(0, -e.h*0.10, e.w*0.26, e.h*0.22, 0, 0, Math.PI*2);
          ctx.fill();
          ctx.globalAlpha=1;

          // Lights around rim
          ctx.globalAlpha=0.75;
          ctx.fillStyle="rgba(255,255,255,0.65)";
          for (let i=0;i<7;i++){
            const a=i*(Math.PI*2/7);
            ctx.beginPath();
            ctx.arc(Math.cos(a)*e.w*0.34, e.h*0.16 + Math.sin(a)*e.h*0.12, 1.5, 0, Math.PI*2);
            ctx.fill();
          }
          ctx.globalAlpha=1;

          cockpit(0, -e.h*0.12, e.w*0.16, e.h*0.12);
          thruster(0, e.h*0.36, 12, 0.9);
          break;
        }
        case 'interceptor': {
          // Twin-wing interceptor
          ctx.fillStyle=hull;
          ctx.beginPath();
          ctx.moveTo(0, -e.h*0.54);
          ctx.lineTo(e.w*0.18, e.h*0.40);
          ctx.lineTo(0, e.h*0.18);
          ctx.lineTo(-e.w*0.18, e.h*0.40);
          ctx.closePath();
          ctx.fill();

          // Wings
          ctx.beginPath();
          ctx.moveTo(-e.w*0.52, -e.h*0.10);
          ctx.lineTo(-e.w*0.10,  e.h*0.10);
          ctx.lineTo(-e.w*0.40,  e.h*0.44);
          ctx.closePath();
          ctx.fill();

          ctx.beginPath();
          ctx.moveTo(e.w*0.52, -e.h*0.10);
          ctx.lineTo(e.w*0.10,  e.h*0.10);
          ctx.lineTo(e.w*0.40,  e.h*0.44);
          ctx.closePath();
          ctx.fill();

          // highlights
          ctx.globalAlpha=0.22;
          ctx.strokeStyle="rgba(255,255,255,0.25)";
          ctx.lineWidth=2;
          ctx.beginPath();
          ctx.moveTo(0,-e.h*0.48); ctx.lineTo(0, e.h*0.12);
          ctx.stroke();
          ctx.globalAlpha=1;

          cockpit(0,-e.h*0.18, e.w*0.11, e.h*0.12);
          thruster(-e.w*0.18, e.h*0.34, 10, 0.95);
          thruster( e.w*0.18, e.h*0.34, 10, 0.95);
          break;
        }
        case 'splitter': {
          // crystalline diamond with tech lines
          ctx.fillStyle=hull;
          ctx.beginPath();
          ctx.moveTo(0,-e.h*0.55);
          ctx.lineTo(e.w*0.48,0);
          ctx.lineTo(0,e.h*0.50);
          ctx.lineTo(-e.w*0.48,0);
          ctx.closePath();
          ctx.fill();

          ctx.globalAlpha=0.25;
          ctx.strokeStyle="rgba(0,0,0,0.65)";
          ctx.lineWidth=1;
          ctx.beginPath();
          ctx.moveTo(0,-e.h*0.48); ctx.lineTo(0,e.h*0.40);
          ctx.moveTo(-e.w*0.26,0); ctx.lineTo(e.w*0.26,0);
          ctx.stroke();
          ctx.globalAlpha=1;

          cockpit(0,-e.h*0.10, e.w*0.10, e.h*0.10);
          thruster(0, e.h*0.36, 11, 0.9);
          break;
        }
        case 'splitlet': {
          // small dart
          ctx.fillStyle=hull;
          ctx.beginPath();
          ctx.moveTo(0,-e.h*0.50);
          ctx.lineTo(e.w*0.44, e.h*0.44);
          ctx.lineTo(-e.w*0.44, e.h*0.44);
          ctx.closePath();
          ctx.fill();
          cockpit(0,-e.h*0.12, e.w*0.10, e.h*0.10);
          thruster(0, e.h*0.34, 9, 0.85);
          break;
        }
        default: {
          // drone fallback
          ctx.fillStyle=hull;
          ctx.beginPath();
          ctx.roundRect(-e.w*0.46,-e.h*0.30,e.w*0.92,e.h*0.64, 6);
          ctx.fill();
          ctx.globalAlpha=0.25;
          ctx.fillStyle=rim;
          ctx.fillRect(-e.w*0.30,-e.h*0.10,e.w*0.60,e.h*0.16);
          ctx.globalAlpha=1;
          cockpit(0,-e.h*0.08, e.w*0.12, e.h*0.12);
          thruster(-e.w*0.16, e.h*0.28, 9, 0.8);
          thruster( e.w*0.16, e.h*0.28, 9, 0.8);
        }
      }

      ctx.restore();
    }

    function drawBoss(b){
      const cx = b.x + b.w/2;
      const cy = b.y + b.h/2;

      // Deep shadow for menace
      ctx.save();
      ctx.globalAlpha = 0.28;
      ctx.fillStyle = "rgba(0,0,0,0.95)";
      ctx.beginPath();
      ctx.ellipse(cx+6, cy+8, b.w*0.52, b.h*0.46, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();

      ctx.save();
      ctx.translate(cx, cy);

      // Pulsing "rage" glow
      const t = (performance.now()/1000);
      const pulse = 0.65 + 0.35*Math.sin(t*3.0);
      const glow = ctx.createRadialGradient(0,0,10, 0,0, Math.max(b.w,b.h)*0.85);
      glow.addColorStop(0, `rgba(255,60,120,${0.22*pulse})`);
      glow.addColorStop(0.35, `rgba(170,80,255,${0.14*pulse})`);
      glow.addColorStop(0.75, "rgba(0,0,0,0)");
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(0, 0, Math.max(b.w,b.h)*0.85, 0, Math.PI*2);
      ctx.fill();

      // Metallic hull gradient
      const hull = ctx.createLinearGradient(-b.w/2, -b.h/2, b.w/2, b.h/2);
      hull.addColorStop(0.00, "rgba(255,200,240,0.95)");
      hull.addColorStop(0.22, "rgba(180,120,255,0.92)");
      hull.addColorStop(0.55, "rgba(90,170,255,0.86)");
      hull.addColorStop(1.00, "rgba(40,255,210,0.82)");

      // Spiked silhouette (aggressive)
      ctx.fillStyle = hull;
      ctx.beginPath();
      // top crown
      ctx.moveTo(0, -b.h*0.52);
      ctx.lineTo(b.w*0.10, -b.h*0.40);
      ctx.lineTo(b.w*0.22, -b.h*0.46);
      ctx.lineTo(b.w*0.30, -b.h*0.30);
      // right horn
      ctx.lineTo(b.w*0.54, -b.h*0.14);
      ctx.lineTo(b.w*0.38,  0);
      ctx.lineTo(b.w*0.56,  b.h*0.12);
      // right lower spike
      ctx.lineTo(b.w*0.30,  b.h*0.22);
      ctx.lineTo(b.w*0.40,  b.h*0.46);
      ctx.lineTo(b.w*0.16,  b.h*0.34);
      // bottom keel
      ctx.lineTo(0, b.h*0.52);
      // left lower spike
      ctx.lineTo(-b.w*0.16,  b.h*0.34);
      ctx.lineTo(-b.w*0.40,  b.h*0.46);
      ctx.lineTo(-b.w*0.30,  b.h*0.22);
      // left horn
      ctx.lineTo(-b.w*0.56,  b.h*0.12);
      ctx.lineTo(-b.w*0.38,  0);
      ctx.lineTo(-b.w*0.54, -b.h*0.14);
      // back to crown
      ctx.lineTo(-b.w*0.30, -b.h*0.30);
      ctx.lineTo(-b.w*0.22, -b.h*0.46);
      ctx.lineTo(-b.w*0.10, -b.h*0.40);
      ctx.closePath();
      ctx.fill();

      // Inner armor plating
      ctx.globalAlpha = 0.18;
      ctx.fillStyle = "rgba(0,0,0,0.85)";
      ctx.beginPath();
      ctx.moveTo(0, -b.h*0.34);
      ctx.lineTo(b.w*0.20, -b.h*0.16);
      ctx.lineTo(b.w*0.12,  b.h*0.24);
      ctx.lineTo(0, b.h*0.34);
      ctx.lineTo(-b.w*0.12, b.h*0.24);
      ctx.lineTo(-b.w*0.20,-b.h*0.16);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 1;

      // Edge highlights
      ctx.strokeStyle = "rgba(255,255,255,0.30)";
      ctx.lineWidth = 2;
      ctx.stroke();

      // "Angry" core eye
      const eyeY = -b.h*0.08;
      const eye = ctx.createRadialGradient(0, eyeY, 2, 0, eyeY, 28);
      eye.addColorStop(0, "rgba(255,255,255,0.95)");
      eye.addColorStop(0.20, "rgba(255,90,90,0.85)");
      eye.addColorStop(0.55, "rgba(170,80,255,0.35)");
      eye.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = eye;
      ctx.beginPath();
      ctx.ellipse(0, eyeY, 26, 18, 0, 0, Math.PI*2);
      ctx.fill();

      // Slit pupil
      ctx.globalAlpha = 0.85;
      ctx.fillStyle = "rgba(0,0,0,0.65)";
      ctx.beginPath();
      ctx.roundRect(-3, eyeY-12, 6, 24, 3);
      ctx.fill();
      ctx.globalAlpha = 1;

      // Jaw vents (adds aggression)
      ctx.globalAlpha = 0.35;
      ctx.fillStyle = "rgba(0,0,0,0.85)";
      ctx.beginPath();
      ctx.moveTo(-b.w*0.24, b.h*0.10);
      ctx.lineTo(-b.w*0.06, b.h*0.22);
      ctx.lineTo(-b.w*0.12, b.h*0.32);
      ctx.lineTo(-b.w*0.30, b.h*0.20);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(b.w*0.24, b.h*0.10);
      ctx.lineTo(b.w*0.06, b.h*0.22);
      ctx.lineTo(b.w*0.12, b.h*0.32);
      ctx.lineTo(b.w*0.30, b.h*0.20);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 1;

      // Engine flames
      function flame(x,y, r){
        const g = ctx.createRadialGradient(x,y,0, x,y, r);
        g.addColorStop(0, "rgba(90,255,230,0.95)");
        g.addColorStop(0.25, "rgba(120,210,255,0.60)");
        g.addColorStop(0.55, "rgba(255,80,200,0.25)");
        g.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle=g;
        ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
      }
      flame(-b.w*0.22, b.h*0.40, 18);
      flame( b.w*0.22, b.h*0.40, 18);

      ctx.restore();

      // Boss HP bar (unchanged behavior; visuals only)
      const hpw = Math.max(0,(b.hp/b.maxHp)*b.w);
      ctx.fillStyle="rgba(0,0,0,0.55)"; ctx.fillRect(b.x, b.y-10, b.w, 7);
      ctx.fillStyle="rgba(255,90,120,0.95)"; ctx.fillRect(b.x, b.y-10, hpw, 7);
      ctx.strokeStyle="rgba(255,255,255,0.22)"; ctx.lineWidth=1;
      ctx.strokeRect(b.x, b.y-10, b.w, 7);
    }


    function drawHazards(){
      for (const m of Game.hazards.meteors){
        ctx.save();
        ctx.translate(m.x+m.w/2, m.y+m.h/2);
        ctx.rotate(m.rot);
        ctx.fillStyle="rgba(255,200,120,0.95)";
        ctx.fillRect(-m.w/2,-m.h/2,m.w,m.h);
        ctx.globalAlpha=0.35;
        ctx.fillStyle="#ffffff";
        ctx.fillRect(-m.w/2,-2,m.w,4);
        ctx.restore();
        ctx.globalAlpha=1;
      }

      for (const mn of Game.hazards.mines){
        const pulse = 0.55 + 0.45*Math.sin(performance.now()/150);
        ctx.globalAlpha = pulse;
        ctx.fillStyle="rgba(255,70,70,0.95)";
        ctx.beginPath();
        ctx.arc(mn.x+mn.w/2, mn.y+mn.h/2, 9, 0, Math.PI*2);
        ctx.fill();
        ctx.globalAlpha=1;
      }

      for (const z of Game.hazards.storms){
        z.t += 0.016;
        const p = 0.35 + 0.15*Math.sin(z.t*2.2);
        ctx.globalAlpha=p;
        ctx.fillStyle="rgba(120,210,255,0.25)";
        ctx.fillRect(z.x,z.y,z.w,z.h);
        ctx.globalAlpha=0.9*p;
        ctx.strokeStyle="rgba(255,80,200,0.45)";
        ctx.strokeRect(z.x,z.y,z.w,z.h);
        ctx.globalAlpha=1;
      }
    }

    function update(dt){
      const p=Game.player, m=Game.mousePos;
      const dx=m.x-p.x, dy=m.y-p.y;
      const maxStep=p.speed*dt;
      const dist=Math.hypot(dx,dy);
      if (dist<=maxStep){ p.x=m.x; p.y=m.y; } else { p.x += dx/dist*maxStep; p.y += dy/dist*maxStep; }
      p.x = clamp(p.x, MARGIN_X, WIDTH - MARGIN_X);
      const top = HEIGHT - BOTTOM_ZONE_H + MARGIN_Y, bottom = HEIGHT - MARGIN_Y;
      p.y = clamp(p.y, top, bottom);

      if (Game.firing){
        Game._fireCD -= dt;
        if (Game._fireCD <= 0){ shoot(); Game._fireCD = 0.15; }
      } else {
        Game._fireCD = 0;
      }

      if (Game.respawnShieldT>0) Game.respawnShieldT = Math.max(0, Game.respawnShieldT - dt);

      ensureStorms();

      if (Game.phase==='playing'){
        Game.spawnT += dt;
        const every = enemySpawnEvery();
        while (Game.spawnT >= every){
          Game.spawnT -= every;
          if (Game.enemies.length < enemyCap()){
            const kind = (isSplitLevel() && Math.random()<0.22) ? 'splitter' : 'drone';
            spawnEnemy(kind);
          }
        }
      }

      if (Game.phase==='playing' && Game.level >= 2){
        if (Math.random() < meteorRate()*dt){
          spawnMeteor();
        }
      }

      for (let i=Game.bullets.length-1;i>=0;i--){
        const b=Game.bullets[i];
        const slow = bulletSlowFactor(b);
        b.y += b.vy*dt*slow;
        if (b.y + b.h < 0) Game.bullets.splice(i,1);
      }

      for (let i=Game.enemyBullets.length-1;i>=0;i--){
        const eb=Game.enemyBullets[i];
        eb.x += eb.vx*dt; eb.y += eb.vy*dt;
        if (eb.y > HEIGHT+30 || eb.y < -40 || eb.x < -40 || eb.x > WIDTH+40){
          Game.enemyBullets.splice(i,1); continue;
        }
      }

      if (Game.phase==='playing'){
        for (let i=Game.enemies.length-1;i>=0;i--){
          const e=Game.enemies[i];
          e.y += e.vy*dt;
          const seek = clamp((Game.player.x - (e.x+e.w/2))*0.9, -160, 160);
          e.x += (e.vx + seek*0.03)*dt;
          e.x = clamp(e.x, 0, WIDTH - e.w);

          e.fireCD -= dt;
          if (e.fireCD <= 0){
            enemyShootFrom(e.x+e.w/2, e.y+e.h/2, true, 0);
            if (Game.level >= 4 && Math.random() < 0.16 + Game.level*0.02){
              enemyShootFrom(e.x+e.w/2, e.y+e.h/2, true, 0.18);
              enemyShootFrom(e.x+e.w/2, e.y+e.h/2, true, -0.18);
            }
            e.fireCD = enemyFireEvery() * (0.85 + Math.random()*0.35);
          }

          if (Game.level >= 3){
            e._mineCD = (e._mineCD || (0.6 + Math.random()*mineEvery()));
            e._mineCD -= dt;
            if (e._mineCD <= 0){
              dropMine(e.x+e.w/2, e.y+e.h);
              e._mineCD = mineEvery() * (0.85 + Math.random()*0.5);
            }
          }

          if (e.y > HEIGHT+20) Game.enemies.splice(i,1);
        }
      }

      if (Game.phase==='boss' && Game.boss){
        const b=Game.boss;
        b.t += dt;
        b.x += b.vx*dt; b.y += b.vy*dt;
        if (b.x < MARGIN_X){ b.x=MARGIN_X; b.vx*=-1; }
        if (b.x + b.w > WIDTH - MARGIN_X){ b.x = WIDTH - MARGIN_X - b.w; b.vx*=-1; }
        if (b.y < MARGIN_Y){ b.y=MARGIN_Y; b.vy*=-1; }
        if (b.y + b.h > HEIGHT - BOTTOM_ZONE_H - 20){ b.y = HEIGHT - BOTTOM_ZONE_H - 20 - b.h; b.vy*=-1; }

        b.fireCD -= dt;
        const baseCD = Math.max(0.35, 1.05 - Game.level*0.1);
        if (b.fireCD <= 0){
          const cx=b.x+b.w/2, cy=b.y+b.h/2;
          if (Game.level <= 2){
            enemyShootFrom(cx,cy,false,0);
            Game.enemyBullets[Game.enemyBullets.length-1].vy = 290 + Game.level*12;
            Game.enemyBullets[Game.enemyBullets.length-1].vx = 0;
          } else if (Game.level === 3){
            enemyShootFrom(cx,cy,true,0);
            enemyShootFrom(cx,cy,true,0.22);
            enemyShootFrom(cx,cy,true,-0.22);
          } else if (Game.level === 4){
            for (let i=0;i<6;i++){
              const a = (Math.PI*2/6)*i;
              const spd = 235;
              Game.enemyBullets.push({x:cx-3,y:cy+6,w:6,h:10,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd});
            }
          } else {
            b._spiral = (b._spiral||0)+0.5;
            for (let i=0;i<5;i++){
              const a=b._spiral+i*0.65;
              const spd=245;
              Game.enemyBullets.push({x:cx-3,y:cy+6,w:6,h:10,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd});
            }
          }
          b.fireCD = baseCD;
        }
      }

      for (let i=Game.hazards.meteors.length-1;i>=0;i--){
        const m=Game.hazards.meteors[i];
        m.y += m.vy*dt;
        m.rot += m.rs*dt;
        if (m.y > HEIGHT+40) Game.hazards.meteors.splice(i,1);
      }

      for (let i=Game.hazards.mines.length-1;i>=0;i--){
        const mn=Game.hazards.mines[i];
        mn.y += mn.vy*dt;
        mn.armedT = Math.max(0, mn.armedT - dt);
        if (mn.y > HEIGHT+40) Game.hazards.mines.splice(i,1);
      }

      const pr = {x:Game.player.x-15,y:Game.player.y-7,w:30,h:14};

      if (Game.respawnShieldT<=0){
        for (let i=Game.enemyBullets.length-1;i>=0;i--){
          const eb=Game.enemyBullets[i];
          if (rectsOverlap(pr, eb)){
            Game.enemyBullets.splice(i,1);
            registerImpact();
            break;
          }
        }
      }

      if (Game.respawnShieldT<=0){
        for (let i=Game.hazards.meteors.length-1;i>=0;i--){
          const m=Game.hazards.meteors[i];
          if (rectsOverlap(pr, m)){
            Game.hazards.meteors.splice(i,1);
            FX.spawn(m.x+m.w/2, m.y+m.h/2, 1.2);
            registerImpact();
            break;
          }
        }
        for (let i=Game.hazards.mines.length-1;i>=0;i--){
          const mn=Game.hazards.mines[i];
          if (mn.armedT<=0 && rectsOverlap(pr, mn)){
            Game.hazards.mines.splice(i,1);
            FX.spawn(mn.x+mn.w/2, mn.y+mn.h/2, 1.3);
            registerImpact();
            break;
          }
        }
      }

      if (Game.respawnShieldT<=0){
        for (let i=Game.enemies.length-1;i>=0;i--){
          const e=Game.enemies[i];
          if (rectsOverlap(pr, e)){
            Game.enemies.splice(i,1);
            registerImpact();
            break;
          }
        }
      }

      for (let i=Game.bullets.length-1;i>=0;i--){
        const b=Game.bullets[i];

        if (Game.boss && rectsOverlap({x:Game.boss.x,y:Game.boss.y,w:Game.boss.w,h:Game.boss.h}, b)){
          Game.bullets.splice(i,1);
          Game.boss.hp -= 10;
          FX.spawn(b.x,b.y,0.35);
          SFX.hit();
          Game.score += 2;
          if (Game.boss.hp <= 0){
            FX.spawn(Game.boss.x+Game.boss.w/2, Game.boss.y+Game.boss.h/2, 2.0);
            SFX.bigHit();
            Game.score += 150;
            Game.boss = null;
            onLevelComplete();
          }
          continue;
        }

        for (let j=Game.enemies.length-1;j>=0;j--){
          const e=Game.enemies[j];
          if (rectsOverlap(e, b)){
            Game.bullets.splice(i,1);
            e.hp -= 10;
            FX.spawn(b.x,b.y,0.35);
            SFX.hit();
            if (e.hp <= 0){
              Game.enemies.splice(j,1);
              SFX.bigHit();
              Game.score += 10;
              Game.kills += 1;

              if (isSplitLevel() && e.kind==='splitter'){
                spawnEnemy('splitlet', e.x-10, e.y);
                spawnEnemy('splitlet', e.x+10, e.y);
              }

              Game.score += 2;

              if (Game.kills >= Game.targetKills && Game.phase==='playing'){
                spawnBoss();
              }
            }
            break;
          }
        }
      }

      FX.update(dt);
      updateHUD();
    }

    function updateHUD(){
      scoreVal.textContent = Game.score;
      levelVal.textContent = Game.level;
      livesVal.textContent = Game.lives;
      killsVal.textContent = Game.kills;
      targetVal.textContent = Game.targetKills;
      bestVal.textContent = bestScore;
    }

    const debugHud = document.getElementById('debugHud');
    let debugOn = false;
    window.addEventListener('keydown', (e)=>{
      if (e.key === 'd' || e.key === 'D'){
        debugOn = !debugOn;
        debugHud.classList.toggle('hidden', !debugOn);
      }
    });
    function renderDebug(){
      if (!debugOn) return;
      debugHud.textContent = [
        `phase: ${Game.phase}`,
        `level: ${Game.level}`,
        `kills: ${Game.kills}/${Game.targetKills}`,
        `enemies: ${Game.enemies.length}`,
        `bullets: ${Game.bullets.length} / ${Game.enemyBullets.length}`,
        `meteors: ${Game.hazards.meteors.length}`,
        `mines: ${Game.hazards.mines.length}`,
        `boss: ${!!Game.boss}`
      ].join(' | ');
    }

    function drawAll(){
      drawHazards();
      ctx.fillStyle="#e5e7eb";
      for (const b of Game.bullets) ctx.fillRect(b.x,b.y,b.w,b.h);
      ctx.fillStyle="#fca5a5";
      for (const eb of Game.enemyBullets) ctx.fillRect(eb.x,eb.y,eb.w,eb.h);
      for (const e of Game.enemies) drawEnemy(e);
      if (Game.boss) drawBoss(Game.boss);
      drawPlayer();
      FX.draw(ctx);
      renderDebug();
    }

    let _rafLast = performance.now();
    function raf(){
      const now = performance.now();
      const dt = Math.min(0.033, (now - _rafLast)/1000);
      _rafLast = now;

      BG.draw(ctx, dt);
      drawAll();

      if (Game.running && !Game.paused && !Game.awaitingCountdown){
        update(dt);
      }
      requestAnimationFrame(raf);
    }

    BG.init();
    resetGame();
    requestAnimationFrame(raf);
  </script>
