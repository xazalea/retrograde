<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Bubble Popper</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: manipulation; /* Prevents zoom on double-tap */
        }

        #gameContainer {
            position: relative;
            width: 640px;
            height: 480px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        #gameCanvas {
            border-radius: 20px;
            cursor: crosshair;
            width: 640px;
            height: 480px;
            touch-action: none; /* Prevents scrolling when touching canvas */
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 20px;
            z-index: 10;
        }

        .hidden {
            display: none !important;
        }

        h1 {
            color: white;
            font-size: 3em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .button {
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            border: none;
            color: white;
            padding: 15px 30px;
            font-size: 1.2em;
            border-radius: 50px;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .stats {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 1.2em;
            z-index: 5;
            pointer-events: none;
        }

        .level-complete {
            color: #4ecdc4;
            font-size: 2em;
            margin-bottom: 20px;
        }

        .paused-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: yellow;
            font-size: 2em;
            z-index: 15;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        h1 {
            color: white;
            font-size: 3em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .button {
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            border: none;
            color: white;
            padding: 15px 30px;
            font-size: 1.2em;
            border-radius: 50px;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            min-height: 44px; /* iOS recommended touch target */
            min-width: 44px;
        }

        /* Mobile viewport adjustments - game size stays 640x480 */
        @media (max-width: 690px) {
            body {
                overflow: auto; /* Allow scrolling on small screens */
            }
        }
    </style>
</head>
<body>
    <!-- GameMonetize SDK Integration -->
    <script type="text/javascript">
        window.SDK_OPTIONS = {
            gameId: "myz6019w82b5q1121jomhtfm0dyhut5r", // Replace with your actual game ID
            onEvent: function (a) {
                switch (a.name) {
                    case "SDK_GAME_PAUSE":
                        // pause game logic / mute audio
                        if (window.game) {
                            window.game.pauseForAd();
                        }
                        break;
                    case "SDK_GAME_START":
                        // advertisement done, resume game logic and unmute audio
                        if (window.game) {
                            window.game.resumeFromAd();
                        }
                        break;
                    case "SDK_READY":
                        // when sdk is ready
                        console.log("GameMonetize SDK Ready");
                        break;
                    case "SDK_ERROR":
                        // when sdk get error
                        console.error("GameMonetize SDK Error");
                        break;
                }
            }
        };
        (function (a, b, c) {
            var d = a.getElementsByTagName(b)[0];
            a.getElementById(c) || (a = a.createElement(b), a.id = c, 
            a.src = "https://api.gamemonetize.com/sdk.js", d.parentNode.insertBefore(a, d))
        })(document, "script", "gamemonetize-sdk");
    </script>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="640" height="480"></canvas>
        
        <div class="stats">
            <div>Score: <span id="score">0</span></div>
            <div>Level: <span id="level">1</span></div>
            <div>Bubbles Left: <span id="bubblesLeft">0</span></div>
        </div>

        <div id="startScreen" class="overlay">
            <h1>🫧 Bubble Popper 🫧</h1>
            <p style="color: white; text-align: center; margin-bottom: 30px;">
                Pop all the bubbles to advance to the next level!<br>
                Smaller bubbles give more points!
            </p>
            <button class="button" onclick="startGame()">Start Game</button>
        </div>

        <div id="levelCompleteScreen" class="overlay hidden">
            <div class="level-complete">Level Complete! 🎉</div>
            <p style="color: white; text-align: center;">
                Great job! Ready for the next challenge?
            </p>
            <button class="button" onclick="nextLevel()">Next Level</button>
        </div>

        <div id="gameOverScreen" class="overlay hidden">
            <h1>Game Over</h1>
            <p style="color: white; text-align: center;">
                Final Score: <span id="finalScore">0</span>
            </p>
            <button class="button" onclick="restartGame()">Play Again</button>
        </div>

        <div id="pausedIndicator" class="paused-indicator hidden">
            ⏸️ GAME PAUSED FOR AD
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
