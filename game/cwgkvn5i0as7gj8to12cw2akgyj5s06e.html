      #root {

      canvas {
        display: block;
        touch-action: none;
      }
      
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in-up {
        animation: fadeInUp 0.6s ease-out forwards;
      }
      
      @keyframes popIn {
        0% { opacity: 0; transform: scale(0.8); }
        60% { transform: scale(1.05); }
        100% { opacity: 1; transform: scale(1); }
      }
      .animate-pop-in {
        animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      }
      
      @keyframes float {
        0%, 100% { transform: translateY(0) rotate(-2deg); }
        50% { transform: translateY(-10px) rotate(-2deg); }
      }
      .animate-float {
        animation: float 3s ease-in-out infinite;
      }

   window.SDK_OPTIONS = {
      gameId: "cwgkvn5i0as7gj8to12cw2akgyj5s06e",
      onEvent: function (a) {
         switch (a.name) {
            case "SDK_GAME_PAUSE":
               // Pause game and mute audio
               if (window.gamePause) window.gamePause();
               break;
            case "SDK_GAME_START":
               // Resume game and unmute audio
               if (window.gameResume) window.gameResume();
               break;
            case "SDK_READY":
               console.log("GameMonetize SDK Ready");
               break;
         }
      }

   })(document, "script", "gamemonetize-sdk");

   // Cooldown and Ad logic
   let lastAdTime = 0;
   const COOLDOWN_TIME = 100000; // 100 seconds in milliseconds

   window.showAd = function() {
      const currentTime = Date.now();
      
      // Check if 100 seconds have passed
      if (currentTime - lastAdTime >= COOLDOWN_TIME) {
         if (typeof sdk !== 'undefined' && sdk.showBanner !== 'undefined') {
            console.log("Ad Triggered on GameOver");
            sdk.showBanner();
            lastAdTime = currentTime; // Reset cooldown timer
         }
      } else {
         console.log("Ad skipped: Cooldown in progress (" + Math.ceil((COOLDOWN_TIME - (currentTime - lastAdTime))/1000) + "s remaining)");
      }
   };
