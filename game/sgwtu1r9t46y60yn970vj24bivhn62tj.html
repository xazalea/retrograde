    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: "Arial", sans-serif;
        position: fixed;
        -webkit-overflow-scrolling: touch;
        margin: 0;
        padding: 0;
        /* Mobile fullscreen support */
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        -khtml-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
      }

      /* Enhanced fullscreen support for mobile - fixes gaps */
      html:fullscreen,
      html:-webkit-full-screen,
      html:-moz-full-screen,
      html:-ms-fullscreen {
        width: 100vw !important;
        height: 100vh !important;
        margin: 0 !important;
        padding: 0 !important;
        overflow: hidden !important;
      }

      body:fullscreen,
      body:-webkit-full-screen,
      body:-moz-full-screen,
      body:-ms-fullscreen {
        width: 100vw !important;
        height: 100vh !important;
        margin: 0 !important;
        padding: 0 !important;
        overflow: hidden !important;
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
      }

      /* Mobile-specific fullscreen fixes */
      @media screen and (max-width: 768px) {
        html:fullscreen,
        html:-webkit-full-screen {
          width: 100vw !important;
          height: 100vh !important;
          margin: 0 !important;
          padding: 0 !important;
          overflow: hidden !important;
        }

        body:fullscreen,
        body:-webkit-full-screen {
          width: 100vw !important;
          height: 100vh !important;
          margin: 0 !important;
          padding: 0 !important;
          overflow: hidden !important;
          position: fixed !important;
          top: 0 !important;
          left: 0 !important;
        }
      }

      /* Force everything to landscape - hide all content in portrait */
      @media screen and (orientation: portrait) {
        body {
          overflow: hidden;
        }

        #loadingScreen,
        #menuOverlay,
        #gameSection {
          display: none !important;
        }

        body::before {
          content: "🔄";
          position: fixed;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          font-size: 80px;
          animation: rotate360 2s linear infinite;
        }

        body::after {
          content: "Please rotate your device";
          position: fixed;
          top: 60%;
          left: 50%;
          transform: translateX(-50%);
          color: #fff;
          font-size: 18px;
          text-align: center;
          width: 80%;
        }
      }

      @keyframes rotate360 {
        from {
          transform: translate(-50%, -50%) rotate(0deg);
        }
        to {
          transform: translate(-50%, -50%) rotate(360deg);
        }
      }

      /* Loading Screen */
      /* Loading Screen */
      #loadingScreen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        background: radial-gradient(
          circle at 50% 50%,
          #16213e 0%,
          #0f3460 30%,
          #1a1a2e 70%,
          #0a0a0f 100%
        );
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        transition: opacity 0.5s ease;
        overflow: hidden;
      }

      #loadingScreen.loaded {
        opacity: 0;
        pointer-events: none;
      }

      .loading-logo {
        font-family: "Orbitron", sans-serif;
        font-size: 3rem;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 4px;
        margin-bottom: 5px;

        /* Gradient Text */
        background: linear-gradient(
          180deg,
          #ffffff 0%,
          #00ffaa 50%,
          #006644 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        color: transparent;

        /* Glow */
        filter: drop-shadow(0 0 10px rgba(0, 255, 170, 0.4));
        animation: pulseTitle 2s ease-in-out infinite;
      }

      .loading-text {
        font-family: "Rajdhani", sans-serif;
        color: #00ccff;
        font-size: 1.2rem;
        letter-spacing: 3px;
        margin-bottom: 2rem;
        text-transform: uppercase;
        font-weight: 600;
        text-shadow: 0 0 10px rgba(0, 204, 255, 0.5);
      }

      .loading-progress {
        width: 60%;
        max-width: 300px;
        height: 6px;
        background: rgba(0, 40, 60, 0.8);
        border: 1px solid rgba(0, 204, 255, 0.3);
        border-radius: 10px;
        overflow: hidden;
        margin-bottom: 0.8rem;
        position: relative;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
      }

      .loading-progress-bar {
        height: 100%;
        background: linear-gradient(90deg, #00ffaa, #00ccff);
        width: 0%;
        transition: width 0.3s ease;
        box-shadow: 0 0 10px rgba(0, 255, 170, 0.6);
        position: relative;
      }

      .loading-progress-bar::after {
        content: "";
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        width: 5px;
        background: #fff;
        box-shadow: 0 0 10px #fff;
        opacity: 0.7;
      }

      .loading-percentage {
        font-family: "Rajdhani", sans-serif;
        color: #00ffaa;
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: 2px;
      }

      @keyframes pulseTitle {
        0%,
        100% {
          transform: scale(1);
          filter: drop-shadow(0 0 10px rgba(0, 255, 170, 0.4));
        }
        50% {
          transform: scale(1.02);
          filter: drop-shadow(0 0 20px rgba(0, 255, 170, 0.7));
        }
      }

      /* Menu Overlay */
      #menuOverlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(
          circle at 50% 50%,
          #16213e 0%,
          #0f3460 30%,
          #1a1a2e 70%,
          #0a0a0f 100%
        );
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 100;
      }

      .menu-content {
        text-align: center;
        color: #fff;
        max-width: 600px;
        width: 90%;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .game-title {
        font-family: "Orbitron", sans-serif;
        font-size: 4rem; /* Massive Title */
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 6px;
        margin-bottom: 0px;

        /* Gradient Text */
        background: linear-gradient(
          180deg,
          #ffffff 0%,
          #00ffaa 50%,
          #006644 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        color: transparent;

        /* Glow / Shadow */
        filter: drop-shadow(0 0 15px rgba(0, 255, 170, 0.5));
        animation: titlePulse 3s ease-in-out infinite;
      }

      @keyframes titlePulse {
        0%,
        100% {
          filter: drop-shadow(0 0 15px rgba(0, 255, 170, 0.5));
          transform: scale(1);
        }
        50% {
          filter: drop-shadow(0 0 25px rgba(0, 255, 170, 0.8));
          transform: scale(1.02);
        }
      }

      .menu-subtitle {
        font-family: "Rajdhani", sans-serif;
        color: #00ccff; /* Tech Blue */
        font-size: 1.5rem;
        letter-spacing: 8px;
        margin-bottom: 3rem;
        text-transform: uppercase;
        font-weight: 600;
        text-shadow: 0 0 10px rgba(0, 204, 255, 0.6);
        opacity: 0.9;
      }

      .menu-buttons {
        display: flex;
        flex-direction: column;
        gap: 1.2rem;
        width: 100%;
        max-width: 320px;
      }

      .menu-btn {
        position: relative;
        font-family: "Rajdhani", sans-serif;
        font-size: 1.4rem;
        font-weight: 700;
        color: #e0f7ff;
        background: rgba(0, 40, 60, 0.6); /* Glassy Dark Blue */
        border: 1px solid rgba(0, 255, 170, 0.5);
        padding: 14px 0;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 3px;
        transition: all 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        backdrop-filter: blur(4px);

        /* Sci-fi shape: Clipped corners */
        clip-path: polygon(
          15px 0,
          100% 0,
          100% calc(100% - 15px),
          calc(100% - 15px) 100%,
          0 100%,
          0 15px
        );

        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        width: 100%;
      }

      .menu-btn::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 4px;
        height: 100%;
        background: #00ffaa;
        transition: width 0.3s ease;
        z-index: -1;
      }

      .menu-btn:hover {
        color: #000;
        background: rgba(0, 255, 170, 0.1);
        border-color: #00ffaa;
        transform: translateX(5px);
        box-shadow: 0 0 20px rgba(0, 255, 170, 0.4);
        text-shadow: none;
      }

      .menu-btn:hover::before {
        width: 100%; /* Swipe fill effect */
        background: #00ffaa;
      }

      .menu-btn:active {
        transform: scale(0.98) translateX(5px);
      }

      /* Game Section */
      #gameSection {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: #000;
        display: none;
        z-index: 5;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

      #gameSection.active {
        display: block;
      }

      #gameCanvas {
        width: 100vw;
        height: 100vh;
        display: block;
        background: linear-gradient(
          135deg,
          #0a0a0a 0%,
          #1a1a2e 50%,
          #16213e 100%
        );
        max-width: 100%;
        max-height: 100%;
        position: fixed;
        top: 0;
        left: 0;
        z-index: 1;
        margin: 0;
        padding: 0;
      }

      #gameSection {
        width: 100%;
        height: 100%;
        position: relative;
        overflow: hidden;
      }

      #gameCanvas {
        display: block; /* Removes bottom spacing of inline elements */
        width: 100%;
        height: 100%;
      }

      /* Game UI */
      #gameUI {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 10;
      }

      .game-hud {
        position: absolute;
        top: 20px;
        left: 20px;
        color: #00ff88;
        font-size: 1.2rem;
        font-weight: bold;
        text-shadow: 0 0 10px #00ff88;
      }

      .game-hud.right {
        left: auto;
        right: 20px;
      }

      .health-bar {
        position: absolute;
        top: 12px;
        left: 12px;
        width: clamp(140px, 30vw, 200px);
        height: 14px;
        background: rgba(255, 0, 0, 0.3);
        border: 2px solid #ff0000;
        border-radius: 6px;
        overflow: hidden;
        box-shadow: 0 0 12px rgba(255, 0, 0, 0.4);
      }

      .health-fill {
        height: 100%;
        background: linear-gradient(90deg, #ff0000, #00ff00);
        transition: width 0.3s ease;
      }

      .score {
        position: absolute;
        top: 12px;
        right: 12px;
        color: #00ff88;
        font-size: 0.85rem;
        font-weight: bold;
        text-shadow: 0 0 10px #00ff88;
      }

      .level {
        position: absolute;
        top: 42px;
        left: 12px;
        color: #ffaa00;
        font-size: 0.8rem;
        font-weight: bold;
        text-shadow: 0 0 10px #ffaa00;
      }

      .enemies-left {
        position: absolute;
        top: 40px;
        right: 12px;
        color: #ff00ff;
        font-size: 0.7rem;
        font-weight: bold;
        text-shadow: 0 0 10px #ff00ff;
      }

      /* Control Buttons */
      .control-btn {
        position: fixed;
        bottom: 20px;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        border: 2px solid rgba(0, 255, 136, 0.4);
        background: rgba(0, 255, 136, 0.82);
        color: #000;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.4rem;
        cursor: pointer;
        z-index: 1000;
        transition: all 0.3s ease;
        margin: 0;
        padding: 0;
        line-height: 1;
      }

      .fullscreen-btn {
        left: 20px;
      }

      .close-btn {
        right: 20px;
      }

      /* Fullscreen button stays within fullscreen area */
      #gameSection:fullscreen .control-btn,
      #gameSection:-webkit-full-screen .control-btn,
      #gameSection:-moz-full-screen .control-btn,
      #gameSection:-ms-fullscreen .control-btn {
        position: fixed !important;
        z-index: 1000 !important;
      }

      /* Ensure buttons are visible in fullscreen */
      html:fullscreen .control-btn,
      html:-webkit-full-screen .control-btn,
      html:-moz-full-screen .control-btn,
      html:-ms-fullscreen .control-btn {
        position: fixed !important;
        z-index: 1000 !important;
      }

      .control-btn:hover {
        background: rgba(0, 255, 136, 1);
        transform: scale(1.1);
      }

      .btn-icon {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        font-family: Arial, sans-serif;
      }

      /* Responsive Design */
      @media screen and (max-width: 768px) {
        .menu-content {
          padding-left: 5%;
          padding-right: 5%;
        }

        .game-title {
          font-size: 1.5rem;
        }

        .menu-subtitle {
          font-size: 0.8rem;
          margin-bottom: 1.5rem;
          letter-spacing: 4px;
        }

        .menu-buttons {
          gap: 0.8rem;
          max-width: 280px;
        }

        .menu-btn {
          padding: 10px 0;
          font-size: 0.9rem;
          clip-path: polygon(
            10px 0,
            100% 0,
            100% calc(100% - 10px),
            calc(100% - 10px) 100%,
            0 100%,
            0 10px
          );
        }
      }

      /* Landscape Mode Optimizations */
      @media screen and (orientation: landscape) {
        .loading-logo {
          font-size: 1.2rem;
          margin-bottom: 0.5rem;
        }

        .loading-text {
          font-size: 0.7rem;
          margin-bottom: 0.5rem;
        }

        .loading-progress {
          width: 40%;
          max-width: 150px;
          margin-bottom: 0.4rem;
        }

        .loading-percentage {
          font-size: 0.6rem;
        }
      }

      /* Extra Small Devices */
      @media screen and (max-width: 480px) {
        .game-title {
          font-size: 0.9rem;
        }

        .menu-btn {
          padding: 5px 10px;
          font-size: 0.6rem;
        }

        .score {
          font-size: 0.7rem;
        }

        .level {
          font-size: 0.6rem;
        }

        .enemies-left {
          font-size: 0.6rem;
        }
      }
      /* Fix for 800x450, 800x600 and other short landscape desktop screens */
      /* min-width: 769px ensures we don't mess up the existing mobile view */
      @media screen and (min-width: 769px) and (max-height: 600px) and (orientation: landscape) {
        .game-title {
          font-size: 2.5rem;
          margin-bottom: 0.2rem;
        }
        .menu-subtitle {
          font-size: 1rem;
          margin-bottom: 1rem;
          letter-spacing: 4px;
        }
        .menu-buttons {
          gap: 0.6rem;
          max-width: 250px;
        }
        .menu-btn {
          font-size: 1rem;
          padding: 8px 0;
          clip-path: polygon(
            10px 0,
            100% 0,
            100% calc(100% - 10px),
            calc(100% - 10px) 100%,
            0 100%,
            0 10px
          );
        }
        .menu-content {
          /* Slight offset to center visually in limited height */
          justify-content: center;
        }
      }
      /* Unified Modal Styles */
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(0, 0, 0, 0.85);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 900;
        backdrop-filter: blur(8px);
        animation: fadeIn 0.3s ease;
      }
      .modal-content {
        background: rgba(10, 15, 20, 0.95);
        padding: 2.5rem;
        border: 1px solid rgba(255, 50, 50, 0.2);
        text-align: center;
        color: #fff;
        max-width: 440px;
        width: 90%;
        box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        clip-path: polygon(
          20px 0,
          100% 0,
          100% calc(100% - 20px),
          calc(100% - 20px) 100%,
          0 100%,
          0 20px
        );
        position: relative;
        animation: slideIn 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
      }
      .modal-title {
        font-family: "Orbitron", sans-serif;
        font-size: 2.5rem;
        margin-bottom: 0.5rem;
        letter-spacing: 2px;
        text-transform: uppercase;
      }
      .modal-subtitle {
        font-family: "Rajdhani", sans-serif;
        font-size: 1.1rem;
        color: #aaa;
        margin-bottom: 1.5rem;
        letter-spacing: 1px;
        text-transform: uppercase;
      }
      .modal-stats {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 2rem;
      }
      .modal-stat-item {
        background: rgba(255, 255, 255, 0.05);
        padding: 10px 15px;
        border-radius: 4px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      /* Responsive Table Fix for Landscape Mobile */
      @media screen and (max-height: 480px) {
        .modal-content {
          padding: 1rem 1.5rem;
          max-width: 550px;
        }
        .modal-title {
          font-size: 1.6rem;
          margin-bottom: 0.1rem;
        }
        .modal-subtitle {
          font-size: 0.9rem;
          margin-bottom: 10px;
        }
        .modal-stats {
          flex-direction: row;
          flex-wrap: wrap;
          gap: 6px;
          margin-bottom: 12px;
        }
        .modal-stat-item {
          flex: 1;
          min-width: 120px;
          padding: 6px 10px;
        }
        .modal-stat-item span:first-child {
          font-size: 0.75rem !important;
        }
        .modal-stat-item span:last-child {
          font-size: 1rem !important;
        }
        .modal-btn-container {
          flex-direction: row !important;
          max-width: none !important;
          gap: 8px !important;
        }
        .modal-btn-container button {
          flex: 1;
          font-size: 0.9rem !important;
          padding: 10px 0 !important;
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes slideIn {
        from {
          transform: translateY(30px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      /* Portrait Mode Warning */
      #portraitWarning {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
        z-index: 2000;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        color: white;
      }

      .rotate-icon {
        width: 60px;
        height: 100px;
        border: 4px solid #00ffaa;
        border-radius: 10px;
        margin-bottom: 30px;
        position: relative;
        animation: rotateDevice 2s infinite ease-in-out;
      }

      .rotate-icon::before {
        content: "";
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        width: 40px;
        height: 60px;
        background: rgba(0, 255, 170, 0.2);
        border-radius: 4px;
      }

      @keyframes rotateDevice {
        0% {
          transform: rotate(0deg);
        }
        50% {
          transform: rotate(90deg);
        }
        100% {
          transform: rotate(90deg);
        }
      }

      /* Show warning only in portrait mode */
      @media screen and (orientation: portrait) {
        #portraitWarning {
          display: flex;
        }
      }
      /* Hide UI Overlays when ad is playing to ensure ad visibility */
      body.ad-playing #menuOverlay,
      body.ad-playing .modal-overlay,
      body.ad-playing .game-hud,
      body.ad-playing .control-btn {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <!-- Portrait Mode Warning Overlay -->
    <div id="portraitWarning">
      <div class="rotate-icon"></div>
      <h2
        style="
          font-family: &quot;Orbitron&quot;, sans-serif;
          font-size: 1.8rem;
          color: #00ffaa;
          margin-bottom: 1rem;
          text-transform: uppercase;
          letter-spacing: 2px;
        "
      >
        Rotate Your Device
      </h2>
      <p
        style="
          font-family: &quot;Rajdhani&quot;, sans-serif;
          font-size: 1.2rem;
          color: #aaddff;
          max-width: 80%;
          line-height: 1.5;
        "
      >
        For the best experience, please play in landscape mode.
      </p>
    </div>
    <!-- Loading Screen -->
    <div id="loadingScreen">
      <div class="loading-logo">SPACE ARENA</div>
      <div class="loading-text">INITIALIZING SYSTEMS...</div>
      <div class="loading-progress">
        <div class="loading-progress-bar" id="loadingBar"></div>
      </div>

    </div>

    <!-- Menu Overlay -->
    <div id="menuOverlay">
      <div class="menu-content" id="menuContainer">
        <!-- Menu content will be loaded here -->
      </div>
    </div>

    <!-- Game Section -->
    <section id="gameSection">
      <canvas id="gameCanvas"></canvas>

      <!-- Game UI -->
      <div id="gameUI">
        <div class="health-bar">
          <div class="health-fill" id="healthFill"></div>
        </div>
        <div class="score" id="score">Score: 0</div>
        <div class="level" id="level">Level: 1</div>
        <div class="enemies-left" id="enemiesLeft">Enemies: 0</div>
      </div>

      <!-- Control Buttons -->
      <!-- FIXED: Removed resize/fullscreen button as it's not working and not needed -->
      <button
        id="closeBtn"
        class="control-btn close-btn"
        onclick="closeGame()"
        title="Home"
      >
        <span class="btn-icon">✕</span>
      </button>
    </section>

    <script>
      console.log(
        "Space Arena Smartphone - Modern Game VERSION 2.1 - DYNAMIC SDK LOADING ACTIVE",
      );
      console.log("Level Progression System Active - Enemy Ships");

      // === GLOBAL AD INTERFACE STUBS ===
      // Define these EARLY so they are available immediately.
      // The GameMonetize SDK script at the bottom will handle specific implementation details.

      window.isRVReady = true;
      window.isAdPlaying = false;
      window.gmSdkReady = false;

      // Safe fallback functions
      window.showBanner = function () {
        if (typeof sdk !== "undefined" && sdk.showBanner) {
          sdk.showBanner();
        }
      };
      window.hideBanner = function () {
        console.log("Ad Stub: hideBanner");
      };
      window.loadBanner = function () {
        console.log("Ad Stub: loadBanner");
      };
      window.setBottomBanner = function () {
        console.log("Ad Stub: bottomBanner");
      };

      window.cacheAd = function () {
        window.isRVReady = true;
      };

      window.setGamePaused = function (paused) {
        if (paused) {
          if (window.isAdPlaying) return;
          console.log("Game pausing via SDK (Ad Started)");
          window.isAdPlaying = true;
          document.body.classList.add("ad-playing");

          if (window.game) {
            window.game.previousState = window.game.gameRunning;
            window.game.gameRunning = false;
            if (window.game.stopMusic) window.game.stopMusic();
          }
        } else {
          if (!window.isAdPlaying) return;
          console.log("Game resuming via SDK (Ad Finished)");
          window.isAdPlaying = false;
          document.body.classList.remove("ad-playing");

          if (window.game) {
            if (window.game.previousState !== false) {
              window.game.gameRunning = true;

              // RESTART GAME LOOP: If the loop returned because gameRunning was false, we must restart it
              if (typeof window.game.gameLoop === "function") {
                window.game.lastTime = performance.now();
                window.game.gameLoop(window.game.lastTime);
                console.log("Space Arena: Game loop restarted after ad");
              }

              if (window.game.playMusic && !window.game.muteMusic)
                window.game.playMusic();
            }
          }
        }
      };

      window.showAd = function () {
        if (!window.gmAdsEnabled) {
          console.log("Space Arena: Ads blocked because game hasn't started yet");
          return;
        }
        console.log("Ad logic: showAd (Interstitial)");
        if (window.isAdPlaying) {
          console.log("Ad already playing, skipping showAd request");
          return;
        }
        if (typeof sdk !== "undefined" && sdk.showBanner) {
          sdk.showBanner();
        } else {
          console.log("GameMonetize SDK not ready, skipping ad");
        }
      };

      window.showAdRewarded = function () {
        console.log("Ad logic: showAdRewarded");
        if (window.isAdPlaying) {
          console.log("Ad already playing, skipping rewarded request");
          return;
        }
        if (typeof sdk !== "undefined" && sdk.showBanner) {
          window.onRewardedAdWatched = function () {
            console.log("Ad Success! Granting Reward.");
            if (window.game && window.game.grantRewardExtraHealth) {
              window.game.grantRewardExtraHealth();
            } else {
              console.log(
                "Error: grantRewardExtraHealth function not found in window.game",
              );
            }
          };
          sdk.showBanner("rewarded");
        } else {
          console.log("GameMonetize SDK not ready - Skipping rewarded ad");
        }
      };

      // Alias used in game code
      window.gameCacheAd = window.cacheAd;

      // Force landscape orientation
      function lockOrientation() {
        try {
          // Check if screen.orientation exists and has lock method
          if (
            screen.orientation &&
            typeof screen.orientation.lock === "function"
          ) {
            // Some browsers return a promise, others might not. Handle safely.
            var lockPromise = screen.orientation.lock("landscape");
            if (lockPromise && typeof lockPromise.then === "function") {
              lockPromise
                .then(
                  function () {
                    console.log("Space Arena: Orientation locked to landscape");
                  },
                  function (error) {
                    console.log("Space Arena: Orientation lock failed:", error);
                  },
                )
                .catch(function (e) {
                  // double catch for safety
                  console.log("Space Arena: Orientation lock error:", e);
                });
            }
          } else if (screen.lockOrientation) {
            screen.lockOrientation("landscape");
            console.log("Space Arena: Orientation locked (legacy API)");
          }
        } catch (error) {
          console.log("Space Arena: Error locking orientation:", error);
        }
      }

      // Global function to lock orientation
      window.lockGameOrientation = lockOrientation;

      window.addEventListener("load", function () {
        console.log("Space Arena - Page Loaded");

        // Lock orientation immediately on page load
        lockOrientation();

        // Progressive loading with percentage
        let loadingProgress = 0;
        const loadingBar = document.getElementById("loadingBar");
        const loadingPercentage = document.getElementById("loadingPercentage");

        const loadingInterval = setInterval(function () {
          loadingProgress += Math.random() * 15;
          if (loadingProgress > 100) loadingProgress = 100;

          if (loadingBar && loadingPercentage) {
            loadingBar.style.width = loadingProgress + "%";
            loadingPercentage.textContent = Math.floor(loadingProgress) + "%";
          }

          if (loadingProgress >= 100) {
            clearInterval(loadingInterval);
            setTimeout(function () {
              const loadingScreen = document.getElementById("loadingScreen");
              if (loadingScreen) {
                loadingScreen.classList.add("loaded");
                console.log("Space Arena: Loading complete - 100%");
                
                // Show ad after loading finishes
                console.log("Space Arena: Showing ad after loading complete");
                setTimeout(function() {
                  if (typeof showAd === "function") {
                    window.gmAdsEnabled = true; // Enable ads for this one-time show
                    showAd();
                  }
                }, 500);
              }
            }, 500);
          }
        }, 100);

        // Initialize menu after loading
        setTimeout(function () {
          MenuUI.init();
        }, 1000);
      });

      // Modern HTML/CSS UI - Complete Menu System
      window.MenuUI = {
        overlay: null,
        container: null,
        currentScreen: "main",
        _confirmEl: null,

        init: function () {
          console.log("Space Arena: Initializing Modern Menu System");
          this.overlay = document.getElementById("menuOverlay");
          this.container = document.getElementById("menuContainer");
          if (this.overlay && this.container) {
            this.showMainMenu();
            console.log("Space Arena: Menu system initialized successfully");
          } else {
            console.log("Space Arena: Menu elements not found");
          }
        },

        showMainMenu: function () {
          console.log("Space Arena: Showing main menu");
          this.currentScreen = "main";
          // return to main menu logic
          if (this.container) {
            this.container.innerHTML = `
                        <h1 class="game-title">SPACE ARENA</h1>
                        <p class="menu-subtitle">GALACTIC DEFENDER</p>

                        <div class="menu-buttons">
                            <button type="button" class="menu-btn start" onclick="event.preventDefault(); window.MenuUI.startGame(); return false;">
                                <span>▶ START MISSION</span>
                            </button>
                            <button type="button" class="menu-btn options" onclick="event.preventDefault(); window.MenuUI.showOptions(); return false;">
                                <span>⚙ OPTIONS</span>
                            </button>
                            <button type="button" class="menu-btn stats" onclick="event.preventDefault(); window.MenuUI.showStats(); return false;">
                                <span>★ STATISTICS</span>
                            </button>
                            <button type="button" class="menu-btn help" onclick="event.preventDefault(); window.MenuUI.showHelp(); return false;">
                                <span>? HELP / INFO</span>
                            </button>
                        </div>
                    `;

            // Force buttons to be clickable in fullscreen
            setTimeout(() => {
              const menuButtons = this.container.querySelectorAll(".menu-btn");
              menuButtons.forEach((btn) => {
                btn.style.zIndex = "1000001";
                btn.style.position = "relative";
                btn.style.pointerEvents = "auto";
                btn.style.cursor = "pointer";
              });
            }, 100);
          }
        },

        showInGameMenu: function () {
          console.log("Space Arena: Showing in-game menu");
          this.currentScreen = "ingame";
          if (this.container) {
            this.container.innerHTML = `
                        <h1 class="game-title">SPACE ARENA</h1>

                            <button type="button" class="menu-btn help" onclick="event.preventDefault(); window.MenuUI.showHelp(); return false;">Help</button>
                        </div>
                        <button onclick="window.MenuUI.hideInGameMenu()" style="position: fixed; bottom: 20px; left: 20px; background: rgba(255, 100, 100, 0.9); border: none; color: #fff; border-radius: 50%; cursor: pointer; font-size: 1.5rem; width: 50px; height: 50px; z-index: 1000002; display: flex; align-items: center; justify-content: center; padding: 0;">✕</button>
                    `;

            // Force buttons to be clickable in fullscreen
            setTimeout(() => {
              const menuButtons = this.container.querySelectorAll(".menu-btn");
              menuButtons.forEach((btn) => {
                btn.style.zIndex = "1000001";
                btn.style.position = "relative";
                btn.style.pointerEvents = "auto";
                btn.style.cursor = "pointer";
              });
            }, 100);
          }
        },

        hideInGameMenu: function () {
          console.log("Space Arena: Hiding in-game menu");
          const menuOverlay = document.getElementById("menuOverlay");
          const gameSection = document.getElementById("gameSection");

          // If the menu was opened from gameplay, resume gameplay
          if (window.wasGameRunningBeforeMenu) {
            if (menuOverlay) {
              menuOverlay.style.display = "none";
            }
            if (gameSection) {
              gameSection.style.display = "block";
              // Re-enter fullscreen if it was exited
              setTimeout(() => {
                const isFullscreen = !!(
                  document.fullscreenElement ||
                  document.webkitFullscreenElement ||
                  document.mozFullScreenElement ||
                  document.msFullscreenElement
                );
                if (!isFullscreen) {
                  if (gameSection.requestFullscreen) {
                    gameSection.requestFullscreen().catch((err) => {});
                  } else if (gameSection.webkitRequestFullscreen) {
                    gameSection.webkitRequestFullscreen().catch((err) => {});
                  } else if (gameSection.mozRequestFullScreen) {
                    gameSection.mozRequestFullScreen().catch((err) => {});
                  } else if (gameSection.msRequestFullscreen) {
                    gameSection.msRequestFullscreen().catch((err) => {});
                  }
                }
              }, 100);
              // Resume game
              if (window.game) {
                window.game.gameRunning = true;
                window.game.gameLoop();
              }
            }
            // Reset flag
            window.wasGameRunningBeforeMenu = false;
            return;
          }

          // If game hasn't started, return to main menu (keep overlay visible)
          if (menuOverlay) {
            menuOverlay.style.display = "flex";
          }
          if (gameSection) {
            gameSection.style.display = "none";

          this.showMainMenu();

        showOptions: function () {
          console.log("Space Arena: Showing options");
          this.currentScreen = "options";
          if (this.container) {
            // Music removed for smartphone version - only SFX toggle remains

            this.container.innerHTML = `
                        <h1 class="game-title" style="color: #ffaa00;">OPTIONS</h1>
                        <div class="menu-buttons" style="display: flex; justify-content: center; align-items: center; margin-top: 1rem;">

                                <label class="check-input" for="sfxToggle">
                                    <input class="input" id="sfxToggle" type="checkbox" ${checkedAttr} onchange="window.MenuUI.toggleSFX(this);">
                                    <div class="circle">

                        <button onclick="window.MenuUI.hideInGameMenu()" style="position: fixed; bottom: 20px; left: 20px; background: rgba(255, 100, 100, 0.9); border: none; color: #fff; border-radius: 50%; cursor: pointer; font-size: 1.5rem; width: 50px; height: 50px; z-index: 1000002; display: flex; align-items: center; justify-content: center; padding: 0;">✕</button>
                    `;

            // Set initial visual state of toggle based on checkbox

                  if (border) {
                    border.style.borderColor = "#41ffb4";

                    circle.style.left = "2px";

                  if (border) {
                    border.style.borderColor = "red";
                  }
                }
              }
            }, 10);
          }

            console.log("=== END SHOWING STATISTICS ===");

            this.container.innerHTML = `
                <h1 class="game-title" style="font-size: 2rem; margin-bottom: 1.5rem;">STATISTICS</h1>

                <div style="width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 1.5rem;">
                    <!-- Stat Card: High Score -->
                    <div style="background: rgba(0, 40, 60, 0.4); border: 1px solid rgba(0, 255, 170, 0.2); padding: 10px 15px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(5px);">
                        <span style="font-family: 'Rajdhani', sans-serif; font-size: 1rem; color: #aaddff; letter-spacing: 1px; text-transform: uppercase;">High Score</span>
                        <span style="font-family: 'Orbitron', sans-serif; font-size: 1.2rem; color: #ffaa00; text-shadow: 0 0 10px rgba(255, 170, 0, 0.5);">${highScore}</span>
                    </div>

                    <!-- Stat Card: Enemies Killed -->
                    <div style="background: rgba(0, 40, 60, 0.4); border: 1px solid rgba(0, 255, 170, 0.2); padding: 10px 15px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(5px);">
                        <span style="font-family: 'Rajdhani', sans-serif; font-size: 1rem; color: #aaddff; letter-spacing: 1px; text-transform: uppercase;">Enemies Killed</span>
                        <span style="font-family: 'Orbitron', sans-serif; font-size: 1.2rem; color: #ff00ff; text-shadow: 0 0 10px rgba(255, 0, 255, 0.5);">${totalEnemiesKilled}</span>
                    </div>

                    <!-- Stat Card: Best Level -->
                    <div style="background: rgba(0, 40, 60, 0.4); border: 1px solid rgba(0, 255, 170, 0.2); padding: 10px 15px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(5px);">
                        <span style="font-family: 'Rajdhani', sans-serif; font-size: 1rem; color: #aaddff; letter-spacing: 1px; text-transform: uppercase;">Best Level</span>
                        <span style="font-family: 'Orbitron', sans-serif; font-size: 1.2rem; color: #00ffaa; text-shadow: 0 0 10px rgba(0, 255, 170, 0.5);">${bestLevel}</span>
                    </div>
                </div>

                <div class="menu-buttons" style="display: flex; flex-direction: row; justify-content: space-between; align-items: center; width: 100%; gap: 10px;">
                    <button
                        type="button"

      // Complete Space Shooter Game with Level System
      class SpaceShooterGame {
        constructor() {
          this.canvas = document.getElementById("gameCanvas");
          this.ctx = this.canvas.getContext("2d");

          // Initialize canvas with proper responsive sizing
          this.initializeCanvas();

          // Game state
          this.gameRunning = false;
          this.score = 0;
          this.level = 1;
          this.health = 100;
          this.enemiesKilled = 0;
          this.totalEnemiesInLevel = 0;
          this.gameSpeed = 1.0; // Base speed multiplier

          // Game objects
          this.player = null;
          this.bullets = [];
          this.enemies = [];
          this.particles = [];
          this.powerups = [];

          // Input handling
          this.keys = {};
          this.mouseX = 0;
          this.mouseY = 0;
          this.mousePressed = false;

          // Game loop
          this.lastTime = 0;
          this.enemySpawnTimer = 0;
          this.powerupSpawnTimer = 0;

          // Performance Caching
          this.bgCanvas = document.createElement("canvas");
          this.bgCtx = this.bgCanvas.getContext("2d");
          this.starLayer1 = document.createElement("canvas");
          this.starLayer2 = document.createElement("canvas");
          this.cacheReady = false;

          // Sound settings
          // FIXED: Completely disable background music for smartphone version
          this.muteMusic = true;
          this.muteSFX = localStorage.getItem("sfx") === "false";

          // Audio system
          this.audio = {
            music: null,
            sfx: {
              shoot: null,
              explosion: null,
              levelUp: null,
              death: null,
              select: null,
              pause: null,
            },
          };
          this.initializeAudio();

          this.setupEventListeners();
        }

        initializeCanvas() {
          // Set canvas size to fill the viewport reliably across rotations
          const rect = this.canvas.getBoundingClientRect();
          const dpr = window.devicePixelRatio || 1;

          // Prefer window inner size; rect can be 0 during orientation/visibility transitions
          let cssW = Math.max(
            rect.width || 0,
            window.innerWidth || 0,
            document.documentElement.clientWidth || 0,
          );
          let cssH = Math.max(
            rect.height || 0,
            window.innerHeight || 0,
            document.documentElement.clientHeight || 0,
          );

          // Fallback minimums to avoid zero-sized canvas on some devices mid-rotation
          if (cssW < 10 || cssH < 10) {
            cssW = window.innerWidth || 360;
            cssH = window.innerHeight || 640;
          }

          // Reset transforms to avoid cumulative scaling after rotations/resumes
          if (this.ctx && this.ctx.setTransform) {
            this.ctx.setTransform(1, 0, 0, 1, 0, 0);
          }

          // Apply CSS size first to let layout settle
          this.canvas.style.width = cssW + "px";
          this.canvas.style.height = cssH + "px";

          // Backing store size (device pixels)
          this.canvas.width = Math.round(cssW * dpr);
          this.canvas.height = Math.round(cssH * dpr);

          // Scale the drawing context so everything draws at the correct size
          this.ctx.scale(dpr, dpr);

          this.width = cssW;
          this.height = cssH;

          // Clear to black to avoid artifacts after orientation changes
          this.ctx.fillStyle = "#000";
          this.ctx.fillRect(0, 0, this.width, this.height);

          // Force re-cache on resize/init
          this.cacheReady = false;

          // If the browser is still reporting tiny dims shortly after rotation, retry once
          if (this.width < 50 || this.height < 50) {
            setTimeout(() => {
              const rect2 = this.canvas.getBoundingClientRect();
              if (rect2.width > this.width || rect2.height > this.height) {
                this.initializeCanvas();
                this.render();
              }
            }, 150);
          }
        }

        prepareCache() {
          if (this.cacheReady) return;

          // 1. Prepare Background (Nebulae)
          this.bgCanvas.width = this.width;
          this.bgCanvas.height = this.height;
          this.drawStaticSpace(this.bgCtx);

          // 2. Prepare Star Layers
          this.starLayer1.width = this.width;
          this.starLayer1.height = this.height;
          this.generateStarLayer(this.starLayer1, 100, 1, 0.8);

          this.starLayer2.width = this.width;
          this.starLayer2.height = this.height;
          this.generateStarLayer(this.starLayer2, 50, 2, 0.5);

          this.cacheReady = true;
        }

        generateStarLayer(canvas, count, size, alpha) {
          const ctx = canvas.getContext("2d");
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          for (let i = 0; i < count; i++) {
            const x = Math.random() * canvas.width;
            const y = Math.random() * canvas.height;
            const s = (Math.random() + 0.5) * size;
            ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
            ctx.beginPath();
            ctx.arc(x, y, s, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        drawStaticSpace(ctx) {
          // Base cosmic black
          const bgGradient = ctx.createLinearGradient(
            0,
            0,
            this.width,
            this.height,
          );
          bgGradient.addColorStop(0, "#010103");
          bgGradient.addColorStop(0.5, "#04040a");
          bgGradient.addColorStop(1, "#010103");
          ctx.fillStyle = bgGradient;
          ctx.fillRect(0, 0, this.width, this.height);

          // nebulae
          ctx.save();
          ctx.globalCompositeOperation = "screen";
          this.drawStaticCloud(ctx, 0.3, 0.4, 0.6, [
            { rx: 0, ry: 0, r: 0.5, c: "rgba(0, 20, 100, 0.08)" },
            { rx: 0.1, ry: -0.05, r: 0.3, c: "rgba(40, 0, 80, 0.1)" },
          ]);
          this.drawStaticCloud(ctx, 0.7, 0.6, 0.5, [
            { rx: 0, ry: 0, r: 0.5, c: "rgba(60, 0, 40, 0.08)" },
            { rx: -0.1, ry: -0.1, r: 0.35, c: "rgba(20, 0, 60, 0.06)" },
          ]);
          ctx.restore();
        }

        drawStaticCloud(ctx, cx, cy, scale, blobs) {
          const x = this.width * cx;
          const y = this.height * cy;
          const s = this.width * scale;

          blobs.forEach((b) => {
            const bx = x + b.rx * s;
            const by = y + b.ry * s;
            const br = b.r * s;
            const g = ctx.createRadialGradient(bx, by, 0, bx, by, br);
            g.addColorStop(0, b.c);
            g.addColorStop(1, "transparent");
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, this.width, this.height);
          });
        }

        initializeAudio() {
          // Initialize background music
          this.audio.music = new Audio("sound/music/DST-DasElectron.mp3");
          this.audio.music.loop = true;
          this.audio.music.volume = 0.3;

          // Initialize sound effects
          this.audio.sfx.shoot = new Audio("sound/sfx/sfx_laser1.mp3");
          this.audio.sfx.shoot.volume = 0.5;

          this.audio.sfx.explosion = new Audio("sound/sfx/explosion.mp3");
          this.audio.sfx.explosion.volume = 0.6;

          this.audio.sfx.levelUp = new Audio("sound/sfx/levelUp.mp3");
          this.audio.sfx.levelUp.volume = 0.7;

          this.audio.sfx.death = new Audio("sound/sfx/death.mp3");
          this.audio.sfx.death.volume = 0.8;

          this.audio.sfx.select = new Audio("sound/sfx/select.mp3");
          this.audio.sfx.select.volume = 0.4;

          this.audio.sfx.pause = new Audio("sound/sfx/pause.mp3");
          this.audio.sfx.pause.volume = 0.5;

          // Start background music if not muted
          if (!this.muteMusic) {
            this.playMusic();
          }
        }

        playMusic() {
          console.log(
            "playMusic called - muteMusic:",
            this.muteMusic,
            "audio exists:",
            !!this.audio.music,
          );
          if (!this.muteMusic && this.audio.music) {
            console.log("Attempting to play music");
            const audio = this.audio.music;

            // Force play by resetting and playing
            audio.pause(); // Ensure we're paused
            audio.currentTime = 0;

            const playPromise = audio.play();
            if (playPromise !== undefined) {
              playPromise
                .then(() => {
                  console.log("Music started successfully");
                })
                .catch((error) => {
                  console.log("Music play failed:", error);
                  // Try to reload and play again after a small delay
                  setTimeout(() => {
                    audio.load();
                    audio
                      .play()
                      .catch((e) => console.log("Retry play failed:", e));
                  }, 100);
                });
            }
          } else {
            console.log("Music muted or no audio object");
          }
        }

        stopMusic() {
          if (this.audio.music) {
            this.audio.music.pause();
            this.audio.music.currentTime = 0;
            // Don't call load() as it might cause issues
          }
        }

        // FIXED: Add pause/resume music functions for when game is minimized or ads are shown
        pauseMusic() {
          if (this.audio.music && !this.audio.music.paused) {
            this.audio.music.pause();
            console.log(
              "Space Arena: Music paused (game minimized or ad shown)",
            );
          }
        }

        resumeMusic() {
          if (this.audio.music && this.audio.music.paused && !this.muteMusic) {
            this.audio.music
              .play()
              .catch((e) => console.log("Resume music failed:", e));
            console.log("Space Arena: Music resumed (game active)");
          }
        }

        playSFX(soundName) {
          if (!this.muteSFX && this.audio.sfx[soundName]) {
            // Reset to beginning and play
            this.audio.sfx[soundName].currentTime = 0;
            this.audio.sfx[soundName]
              .play()
              .catch((e) => console.log("SFX play failed:", e));
          }
        }

        setupEventListeners() {
          // Keyboard events
          document.addEventListener("keydown", (e) => {
            this.keys[e.code] = true;
            if (e.code === "Escape") {
              this.pauseGame();
            }
            // Test level completion with 'L' key
            if (e.code === "KeyL") {
              console.log("Force completing level for testing...");
              this.enemiesKilled = this.totalEnemiesInLevel;
              this.checkLevelCompletion();
            }
          });

          document.addEventListener("keyup", (e) => {
            this.keys[e.code] = false;
          });

          // Mouse events
          this.canvas.addEventListener("mousemove", (e) => {
            const rect = this.canvas.getBoundingClientRect();
            this.mouseX = e.clientX - rect.left;
            this.mouseY = e.clientY - rect.top;
          });

          this.canvas.addEventListener("mousedown", (e) => {
            this.mousePressed = true;
          });

          this.canvas.addEventListener("mouseup", (e) => {
            this.mousePressed = false;
          });

          // Touch events
          this.canvas.addEventListener("touchmove", (e) => {
            e.preventDefault();
            const rect = this.canvas.getBoundingClientRect();
            const touch = e.touches[0];
            this.mouseX = touch.clientX - rect.left;
            this.mouseY = touch.clientY - rect.top;
          });

          this.canvas.addEventListener("touchstart", (e) => {
            e.preventDefault();
            this.mousePressed = true;
          });

          this.canvas.addEventListener("touchend", (e) => {
            e.preventDefault();
            this.mousePressed = false;
          });

          // Window resize
          window.addEventListener("resize", () => {
            this.initializeCanvas();
            // Redraw current frame to prevent temporary black frame
            this.render();
          });

          // Handle device orientation changes explicitly
          window.addEventListener("orientationchange", () => {
            // Give layout time to settle, then re-init; do a second pass as safety
            setTimeout(() => {
              this.initializeCanvas();
              this.render();
            }, 250);
            setTimeout(() => {
              this.initializeCanvas();
              this.render();
            }, 700);
          });

          // Handle tab/app visibility changes (calls, notifications)
          document.addEventListener("visibilitychange", () => {
            if (document.hidden) {
              // FIXED: Pause music when game is minimized
              this.pauseMusic();
            } else {
              // Reinitialize canvas when returning to app
              this.initializeCanvas();
              this.render();
              // FIXED: Resume music when game becomes visible again
              this.resumeMusic();
            }
          });

          // Some mobile browsers fire pageshow after interruption
          window.addEventListener("pageshow", () => {
            this.initializeCanvas();
            this.render();
          });
        }

        // Canvas initialization is now handled in initializeCanvas()

        start() {
          console.log(`Space Arena: Starting Level ${this.level}`);

          // FIXED: Reset mouse/shooting state to prevent auto-shooting
          this.mousePressed = false;

          // Don't cache ads here - will be cached after next level button click
          if (this.level === 1) {
            // Level 1 - ads already cached in startGame()
            console.log(
              "Space Arena: New Game Start - Ads already cached in startGame()",
            );
          } else {
            // Next levels - ads will be cached after startNextLevel() completes
            console.log(
              "Space Arena: New Level Start - Ads will be cached after level starts",
            );
          }

          this.gameRunning = true;
          // FIXED: Only reset score when starting a completely new game (level 1)
          // Score should persist between levels
          if (this.level === 1) {
            this.score = 0;
            this.health = 100;
            this.enemiesKilled = 0;
            this.totalEnemiesKilled = 0; // Track total enemies killed for mid-roll ad
          } else {
            // For level transitions, only reset level-specific counters
            this.enemiesKilled = 0;
            this.totalEnemiesKilled = 0; // Reset for new level
          }

          // FIXED: Reset timers when starting a new level to prevent timing issues
          // This ensures clean state transitions and prevents game stuck issues
          this.lastTime = performance.now();
          this.enemySpawnTimer = 0;
          this.powerupSpawnTimer = 0;

          // Random planet color on every new game start (Level 1)
          if (this.level === 1) {
            this.planetHue = Math.floor(Math.random() * 360);
          }

          // Expose reward function globally for SDK
          window.grantRewardExtraHealth = () => {
            try {
              if (this && typeof this.health !== "undefined") {
                // FIXED: Remove all popups to prevent game stuck
                const gameOverPopup = document.getElementById("gameOverPopup");
                if (gameOverPopup) {
                  gameOverPopup.remove();
                }
                const rewardedPopup = document.getElementById("rewardedPopup");
                if (rewardedPopup) {
                  rewardedPopup.remove();
                }

                // Restore game state and continue
                this.health = Math.min(this.health + 50, 100); // Add 50 health, cap at 100
                this.gameRunning = true;
                console.log(
                  "Space Arena: Reward granted - +50 health (total: " +
                    this.health +
                    ")",
                );
                this.updateUI();

                // FIXED: Properly resume the main game loop after rewarded ad
                // Reset timing and restart gameLoop so the game does not stay stuck on Game Over
                this.lastTime = performance.now();
                this.gameLoop(this.lastTime);

                console.log(
                  "Space Arena: Game continued with extra health - game loop restarted",
                );
              }
            } catch (e) {
              console.error("Error in grantRewardExtraHealth:", e);
              // FIXED: Ensure game doesn't get stuck even if there's an error
              if (this) {
                this.gameRunning = true;
              }
            }
          };

          // Clear arrays
          this.bullets = [];
          this.enemies = [];
          this.particles = [];
          this.powerups = [];

          // Calculate enemies for this level
          this.totalEnemiesInLevel = this.calculateEnemiesForLevel(this.level);
          console.log(
            `Level ${this.level}: Spawning ${this.totalEnemiesInLevel} enemies`,
          );

          // Calculate speed multiplier
          this.gameSpeed = this.calculateSpeedMultiplier(this.level);
          console.log(
            `Level ${this.level}: Speed multiplier ${this.gameSpeed}x`,
          );

          // Create player (on left side, centered vertically)
          this.player = new Player(50, this.height / 2, this.height);

          // FIXED: Reset player shooting state to prevent auto-shooting
          if (this.player) {
            this.player.shooting = false;
            this.player.shootCooldown = 0;
          }

          // Update UI
          this.updateUI();

          // Start game loop
          this.gameLoop();

          console.log("Space Arena: Game started successfully");
        }

        gameLoop(currentTime = 0) {
          if (!this.gameRunning) return;

          const deltaTime = currentTime - this.lastTime;
          this.lastTime = currentTime;

          this.update(deltaTime);
          this.render();

          requestAnimationFrame((time) => this.gameLoop(time));
        }

        update(deltaTime) {
          // Update player
          if (this.player) {
            this.player.update(
              this.mouseX,
              this.mouseY,
              this.mousePressed,
              deltaTime,
            );

            // Create bullets (shoot from exact nose tip of rocket)
            if (this.player.shooting) {
              this.bullets.push(
                new Bullet(this.player.x + 55, this.player.y + 15),
              );
              this.playSFX("shoot");
            }
          }

          // Update bullets
          this.bullets = this.bullets.filter((bullet) => {
            bullet.update(deltaTime);
            return bullet.x < this.width + 10; // Remove bullets that go off right side
          });

          // Spawn enemies based on level requirements
          if (this.enemies.length < this.totalEnemiesInLevel) {
            this.enemySpawnTimer += deltaTime;
            const spawnInterval = 1000 / this.gameSpeed; // Faster spawning at higher levels

            if (this.enemySpawnTimer > spawnInterval) {
              this.spawnEnemy();
              this.enemySpawnTimer = 0;
            }
          }

          // Update enemies and track escaped ones
          this.enemies = this.enemies.filter((enemy) => {
            enemy.update(deltaTime);
            const escaped = enemy.x < -50; // Escaped off left side

            if (escaped) {
              // Escaped enemies don't count for level progression or kills
              console.log(`Enemy escaped: ${enemy.type} - not counted`);
            }

            return !escaped;
          });

          // Spawn powerups occasionally
          this.powerupSpawnTimer += deltaTime;
          if (this.powerupSpawnTimer > 8000) {
            this.spawnPowerup();
            this.powerupSpawnTimer = 0;
          }

          // Update powerups
          this.powerups = this.powerups.filter((powerup) => {
            powerup.update(deltaTime);
            return powerup.x > -50; // Remove powerups that go off left side
          });

          // Update particles
          this.particles = this.particles.filter((particle) => {
            particle.update(deltaTime);
            return particle.life > 0;
          });

          // Check collisions
          this.checkCollisions();

          // Update UI
          this.updateUI();

          // Check level completion
          this.checkLevelCompletion();
        }

        calculateEnemiesForLevel(level) {
          // Level progression: 6, 12, 24, 48, 96... (doubling each level)
          if (level === 1) return 6;
          return 6 * Math.pow(2, level - 1);
        }

        calculateSpeedMultiplier(level) {
          // Progressive speed increase with each level
          if (level >= 10) return 3.0; // 300% faster
          if (level >= 8) return 2.5; // 250% faster
          if (level >= 6) return 2.0; // 200% faster
          if (level >= 4) return 1.5; // 150% faster
          if (level >= 2) return 1.25; // 125% faster
          return 1.0; // Base speed
        }

        spawnEnemy() {
          const types = [
            "scout",
            "fighter",
            "interceptor",
            "tank",
            "transport",
          ];
          const type = types[Math.floor(Math.random() * types.length)];
          const x = this.width + 50; // Spawn from right side
          // Spawn enemies lower on screen - avoid top 80px to prevent enemies at very top
          const minY = 80; // Minimum Y position from top
          const maxY = this.height - 20; // Maximum Y position
          const y = minY + Math.random() * (maxY - minY); // Random vertical position between minY and maxY

          this.enemies.push(new Enemy(x, y, type, this.gameSpeed));
        }

        spawnPowerup() {
          const types = ["health", "weapon", "shield"];
          const type = types[Math.floor(Math.random() * types.length)];
          const x = this.width + 30; // Spawn from right side
          // Spawn powerups lower on screen - avoid top 80px (same as enemies)
          const minY = 80; // Minimum Y position from top
          const maxY = this.height - 20; // Maximum Y position
          const y = minY + Math.random() * (maxY - minY); // Random vertical position between minY and maxY

          this.powerups.push(new Powerup(x, y, type));
        }

        checkCollisions() {
          // Bullet vs Enemy (20% margin for enemies)
          for (let i = this.bullets.length - 1; i >= 0; i--) {
            for (let j = this.enemies.length - 1; j >= 0; j--) {
              if (this.bullets[i].collidesWith(this.enemies[j], 0.2)) {
                // 20% margin
                this.bullets.splice(i, 1);
                this.enemies[j].takeDamage(25);

                if (this.enemies[j].health <= 0) {
                  this.score += this.enemies[j].points;
                  this.enemiesKilled++;
                  this.totalEnemiesKilled++; // Track total for mid-roll ad
                  this.createExplosion(this.enemies[j].x, this.enemies[j].y);
                  this.playSFX("explosion");
                  this.enemies.splice(j, 1);

                  // Mid-roll interstitial removed
                }
                break;
              }
            }
          }

          // Player vs Enemy (40% margin for player)
          if (this.player) {
            for (let i = this.enemies.length - 1; i >= 0; i--) {
              if (this.player.collidesWith(this.enemies[i], 0.4)) {
                // 40% margin
                this.health -= 20;
                // FIXED: Kill count should only increase when enemy is actually shot/killed, not on collision
                // Collision just damages player, doesn't count as a kill
                this.createExplosion(this.enemies[i].x, this.enemies[i].y);
                this.playSFX("explosion");
                this.enemies.splice(i, 1);

                if (this.health <= 0) {
                  this.playSFX("death");
                  this.gameOver();
                }
              }
            }
          }

          // Player vs Powerup
          if (this.player) {
            for (let i = this.powerups.length - 1; i >= 0; i--) {
              if (this.player.collidesWith(this.powerups[i], 0.4)) {
                this.powerups[i].apply(this);
                this.powerups.splice(i, 1);
              }
            }
          }
        }

        createExplosion(x, y) {
          for (let i = 0; i < 8; i++) {
            this.particles.push(new Particle(x, y));
          }
        }

        checkLevelCompletion() {
          console.log(

          if (this.enemiesKilled >= this.totalEnemiesInLevel) {

          );

          const gamesPlayedIncrement = isGameEnd ? 1 : 0;

          this.prepareCache();

          this.ctx.drawImage(this.bgCanvas, 0, 0);

          this.enemies.forEach((enemy) => enemy.render(this.ctx));
