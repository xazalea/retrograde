      function parseAspectRatio(aspectRatio) {
        var parts = aspectRatio.split("/");
        if (parts.length === 2) {
          var width = parseFloat(parts[0]);
          var height = parseFloat(parts[1]);
          if (!isNaN(width) && !isNaN(height)) {
            return width / height;
          }
        }
        throw new Error("Invalid aspect ratio format");
      }

      function setCanvasSize() {
        var w = window.innerWidth;
        var h = window.innerHeight;

        var orientation = aspectRatioMin > 1 ? "landscape" : "portrait";

        var aspectRatioMin = aspectRatioMinMobile;
        var aspectRatioMax = aspectRatioMaxMobile;

        if (isMobile2 == false) {
          aspectRatioMin = aspectRatioMinDesktop;
          aspectRatioMax = aspectRatioMaxDesktop;
        }

        if (orientation === "landscape") {
          if (w / h > aspectRatioMax) {
            w = aspectRatioMax * h;
          } else if (w / h < aspectRatioMin) {
            h = w / aspectRatioMin;
          }
        } else {
          if (w / h > aspectRatioMax) {
            w = aspectRatioMax * h;
          } else if (w / h < aspectRatioMin) {
            h = w / aspectRatioMin;
          }
        }

        c.style.width = w + "px";
        c.style.height = h + "px";
        container.style.display = "flex";
        container.style.alignItems = "center";
        container.style.justifyContent = "center";

      function InitPlayer(photoSize, _scopes) {
        console.log("initPlayerStart");
        try {
          return ysdk
            .getPlayer({ scopes: _scopes })
            .then((_player) => {
              player = _player;

              let playerName = player.getName();
              let playerPhoto = player.getPhoto(photoSize);

              if (!_scopes) {
                playerName = "anonymous";
                playerPhoto = "null";
              }

              if (player.getMode() === "lite") {
                console.log("Not Authorized");
                NotAuthorized();
              } else {
                let authJson = {
                  playerAuth: "resolved",
                  playerName: playerName,
                  playerId: player.getUniqueID(),
                  playerPhoto: playerPhoto,
                };
                console.log("InitPlayer SetInitializationSDK");
                myGameInstance.SendMessage(
                  "YandexGame",
                  "SetInitializationSDK",
                  JSON.stringify(authJson)
                );
                window.focus();
              }
            })
            .catch((e) => {
              console.error("Authorized err: ", e.message);
              NotAuthorized();
            });
        } catch (e) {
          console.error("CRASH init Player: ", e.message);
          window.focus();
        }
      }

      function GetLeaderboardScores(
        nameLB,
        maxPlayers,
        quantityTop,
        quantityAround,
        photoSize,
        auth
      ) {
        try {
          var jsonEntries = {
            technoName: "",
            isDefault: false,
            isInvertSortOrder: false,
            decimalOffset: 0,
            type: "", // , title: ''
          };

          ysdk
            .getLeaderboards()
            .then((leaderboard) =>
              leaderboard.getLeaderboardDescription(nameLB)
            )
            .then((res) => {
              jsonEntries.technoName = nameLB;
              jsonEntries.isDefault = res.default;
              jsonEntries.isInvertSortOrder = res.description.invert_sort_order;
              jsonEntries.decimalOffset =
                res.description.score_format.options.decimal_offset;
              jsonEntries.type = res.description.type; // Не определяется на момент 18.07.23
              //jsonEntries.title = res.title; // Реализуйте по предпочтениям

              return leaderboard.getLeaderboardEntries(nameLB, {
                quantityTop: quantityTop,
                includeUser: auth,
                quantityAround: quantityAround,
              });
            })
            .then((res) => {
              let jsonPlayers = EntriesLB(res, maxPlayers, photoSize);
              let combinedJson = { ...jsonEntries, ...jsonPlayers };

              myGameInstance.SendMessage(
                "YandexGame",
                "LeaderboardEntries",
                JSON.stringify(combinedJson)
              );
            })
            .catch((error) => {
              console.error(error);
            });
        } catch (e) {
          console.error("CRASH Get Leaderboard: ", e.message);
        }
      }

      function EntriesLB(res, maxPlayers, photoSize) {
        let LeaderboardEntriesText = "";
        let playersCount;

        if (res.entries.length < maxPlayers) {
          playersCount = res.entries.length;
        } else {
          playersCount = maxPlayers;
        }

        let ranks = new Array(playersCount);
        let photos = new Array(playersCount);
        let mames = new Array(playersCount);
        let scores = new Array(playersCount);
        let uniqueIDs = new Array(playersCount);

        for (i = 0; i < playersCount; i++) {
          ranks[i] = res.entries[i].rank;
          scores[i] = res.entries[i].score;
          uniqueIDs[i] = res.entries[i].player.uniqueID;

          if (
            photoSize === "nonePhoto" ||
            res.entries[i].player.scopePermissions.avatar !== "allow"
          ) {
            photos[i] = "nonePhoto";
          } else {
            photos[i] = res.entries[i].player.getAvatarSrc(photoSize);
          }

          if (res.entries[i].player.scopePermissions.public_name !== "allow") {
            mames[i] = "anonymous";
          } else {
            mames[i] = res.entries[i].player.publicName;
          }

          LeaderboardEntriesText +=
            ranks[i] + ". " + mames[i] + ": " + scores[i] + "\n";
        }

        if (playersCount === 0) {
          LeaderboardEntriesText = "no data";
        }

        let jsonPlayers = {
          entries: LeaderboardEntriesText,
          ranks: ranks,
          photos: photos,
          names: mames,
          scores: scores,
          uniqueIDs: uniqueIDs,
        };

        return jsonPlayers;
      }

      function IsSafariOrIPhoneBrowser() {
        const ua = navigator.userAgent.toLowerCase();
        const isSafari =
          ua.indexOf("safari") !== -1 && ua.indexOf("chrome") === -1;
        const isIPhoneBrowser = /iphone|ipad|ipod/i.test(ua);

        return isSafari || isIPhoneBrowser;

		XMLHttpRequest.prototype.open = function(method, url) {
		  if (url.includes('storage.yandexcloud.net')) {
			//console.error('Yandex Cloud Storage is blocked!');
			throw new Error('Yandex Cloud Storage access is restricted.');
		  }
		  return originalXHROpen.apply(this, arguments);

		// Fetch API'yi override et
		const originalFetch = window.fetch;
		window.fetch = function(url, options) {
		  if (typeof url === 'string' && url.includes('storage.yandexcloud.net')) {
			//console.error('Yandex Cloud Storage is blocked!');
			return Promise.reject(new Error('Yandex Cloud Storage access is restricted.'));
		  }
		  return originalFetch(url, options);
		};
