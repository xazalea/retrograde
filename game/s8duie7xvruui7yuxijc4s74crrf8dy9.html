<!DOCTYPE html>
<html lang="en-us">

<head>
    <meta charset="utf-8">
    <title>Jungle Girl: Coloring Pages</title>
    <script>
        var Module = {
            // TOTAL_MEMORY: 734003200,
            // errorhandler: null, // arguments: err, url, line. This function must return 'true' if the error is handled, otherwise 'false'
            // compatibilitycheck: null,
            // dataUrl: "Build/Webgl.data",
            // codeUrl: "Build/Webgl.js",
            // memUrl: "Build/Webgl.mem",
        };
    </script>
    <script src="Build/UnityLoader.js"></script>
    <script src="TemplateData/jquery-3.5.0.min.js"></script>
    <script src="TemplateData/progress.js"></script>
    <link rel="stylesheet" href="TemplateData/animate.css">

    <script>
        var gameInstance = UnityLoader.instantiate("gameContainer", "Build/Dora2.json", {
            onProgress: UnityProgress
        });
        var scaleToFit;
        try {
            scaleToFit = !!JSON.parse("");
        } catch (e) {
            scaleToFit = true;
        }

        window.onresize = function() {
            var canvas = gameInstance.Module.canvas;
            var container = gameInstance.container;
            var w, h;

            // تحديد النسبة الأفقية (Landscape)
            w = window.innerWidth;
            h = window.innerHeight;

            var r = 1080 / 1920; // تحديد النسبة بشكل مناسب للوضع الأفقي

            if (window.innerWidth > window.innerHeight) {  // إذا كان الوضع أفقيًا
                w = Math.min(w, Math.ceil(h / r));
                h = Math.floor(w * r);
            } else {  // إذا كان الوضع عموديًا
                r = 1920 / 1080;
                h = Math.min(h, Math.ceil(w / r));
                w = Math.floor(h * r);
            }

            container.style.width = canvas.style.width = w + "px";
            container.style.height = canvas.style.height = h + "px";
            container.style.top = Math.floor((window.innerHeight - h) / 2) + "px";
            container.style.left = Math.floor((window.innerWidth - w) / 2) + "px";
        };

        window.FFFF = function() {
            var gameInstance = UnityLoader.instantiate("gameContainer", "Build/Dora2.json", {
                onProgress: UnityProgress
            });
        };
    </script>

    <style>
        html, body {
            background: #000;
            width: 100%;
            height: 100%;
            overflow: visible;
            padding: 0;
            margin: 0;
        }

        #orientation {
            display: none;
        }

        div#gameContainer {
            background: transparent !important;
            position: absolute;
        }

        div#gameContainer canvas {
            position: absolute;
            image-rendering: optimizeSpeed;
            image-rendering: -webkit-crisp-edges;
            image-rendering: -moz-crisp-edges;
            image-rendering: -o-crisp-edges;
            image-rendering: crisp-edges;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: pixelated;
            -ms-interpolation-mode: nearest-neighbor;
        }

        /* دعم الوضع الأفقي فقط */
        @media only screen and (orientation: landscape) {
            html, body {
                width: 100%;
                height: 100%;
                margin: 0;
                padding: 0;
                background-color: #000;
            }

            div#gameContainer {
                width: 100%;
                height: 100%;
            }

            div#gameContainer canvas {
                width: 100%;
                height: 100%;
                object-fit: contain;
            }

            #orientation {
                display: none;
            }
        }

        /* إخفاء الوضع الرأسي */
        @media only screen and (orientation: portrait) {
            html, body {
                overflow: hidden;  /* منع التمرير في الوضع الرأسي */
            }

            #orientation {
                display: none;  /* إخفاء التوجيه */
            }
        }

        /* باقي الأنماط كما هي */
        a {
            text-decoration: none;
        }

        .noselect {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        div#loadingBox {
            width: 100%;
            height: 80%;
            bottom: 10px;
            position: absolute;
            margin-top: -10px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
        }

        #blurBackground {
            background: url(TemplateData/images/gamelogo.png);
            filter: blur(20px);
            -webkit-filter: blur(20px);
            width: 100vw;
            height: 100vh;
            position: absolute;
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
        }

        div#bgBar {
            width: 200px;
            height: 22px;
            display: block;
            background-color: #2f2f2f;
            overflow: hidden;
            border-radius: 10px;
        }

        div#progressBar {
            width: 0px;
            height: 22px;
            background-color: #62ff00;
            border-radius: 10px;
            background: linear-gradient(to right, #ff7400 0%, #ffc700 100%);
            filter: progid:DXImageTransform.Microsoft.gradient( startColorstr='#ff7400', endColorstr='#ffc700', GradientType=1);
            transition: all 1s;
        }

        p#loadingInfo {
            color: #666;
            letter-spacing: 1px;
            width: 100%;
            font-family: "arial", sans-serif;
            text-transform: uppercase;
            text-align: center;
            font-size: 14px;
            margin-top: 10px;
            color: #fff;
        }

        #gameLogo {
            overflow: hidden;
        }

        #gameLogo img {
            width: 25vh;
            border-radius: 20px;
        }

        #gameTitle {
            font-family: "arial";
            font-size: 20px;
            font-weight: bold;
            color: #ffffff;
            text-transform: uppercase;
            text-shadow: 0 0 10px #ffffff, 2px 2px 2px rgb(27, 99, 245);
        }

        #siteInfo {
            position: absolute;
            visibility: hidden;
            bottom: 0;
            height: 5.2%;
            max-height: 30px;
            width: 100%;
            transition: all 2.0s;
        }

        #siteInfo.show {
            visibility: visible;
        }

        #siteInfo .siteInfoContainer {
            height: 100%;
            width: 100%;
        }

        #siteInfo .siteInfoContainer img {
            height: 100%;
        }

        #gameContainer {
            display: block;
        }

        #gameContainer.hide {
            display: none;
        }
    </style>
</head>

<body onload="window.onresize();">
    <div id="blurBackground"></div>

    <div id="loadingBox">
        <a id="gameLogo" class="animated zoomIn noselect" target="_blank">
            <img src="TemplateData/images/gamelogo.png" alt="Logo">
            <p id="gameTitle"></p>
        </a>

        <div id="loadingSection">
            <div id="bgBar">
                <div id="progressBar"></div>
            </div>

            <p id="loadingInfo">Loading...</p>
        </div>

        <a id="studioLogo" class="animated fadeIn noselect" target="_blank">
            <img src="TemplateData/images/studiologo.png" alt="6woo.com">
        </a>
    </div>

    <div id="gameContainer" style="width: 432px; height: 768px;">
    </div>
</body>

</html>
