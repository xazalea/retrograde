<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Shape Merge Run</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000011;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
            touch-action: none;
        }
        
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 500px;
            max-height: 900px;
            background: #000011;
        }
        
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        #topBar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 15px 20px;
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .stat {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        
        .stat-label {
            font-size: 11px;
            opacity: 0.6;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 15px currentColor;
            margin-top: 2px;
        }
        
        #score .stat-value {
            color: #00ffff;
        }
        
        #combo .stat-value {
            color: #ff00ff;
            transition: transform 0.2s;
        }
        
        #combo.active .stat-value {
            transform: scale(1.3);
            color: #ffff00;
        }
        
        #levelDisplay .stat-value {
            color: #00ff00;
        }
        
        #comboDisplay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 72px;
            font-weight: bold;
            text-shadow: 0 0 30px currentColor;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s, transform 0.3s;
            z-index: 100;
        }
        
        #comboDisplay.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.2);
        }
        
        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 17, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            pointer-events: all;
            backdrop-filter: blur(10px);
        }
        
        #gameOverScreen {
            display: none;
        }
        
        h1 {
            font-size: 42px;
            margin-bottom: 10px;
            text-align: center;
            background: linear-gradient(90deg, #00ffff, #ff00ff, #ffff00, #00ffff);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 3s linear infinite;
            text-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }
        
        .subtitle {
            font-size: 16px;
            opacity: 0.7;
            margin-bottom: 30px;
            text-align: center;
        }
        
        button {
            padding: 16px 50px;
            font-size: 18px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 35px;
            color: white;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.6), 0 5px 15px rgba(0,0,0,0.3);
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 40px rgba(102, 126, 234, 0.8), 0 8px 20px rgba(0,0,0,0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        #instructions {
            margin-top: 40px;
            text-align: center;
            font-size: 14px;
            opacity: 0.6;
            max-width: 85%;
            line-height: 1.8;
        }
        
        #finalScore {
            font-size: 32px;
            margin: 20px 0;
            text-shadow: 0 0 20px rgba(255, 255, 0, 0.8);
            color: #ffff00;
        }
        
        #stats {
            margin-top: 20px;
            font-size: 14px;
            opacity: 0.7;
            text-align: center;
        }
        
        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            pointer-events: all;
        }
        
        .control-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            transition: all 0.2s;
            user-select: none;
        }
        
        .control-btn:active {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(0.9);
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="ui">
            <div id="topBar">
                <div id="score" class="stat">
                    <div class="stat-label">Score</div>
                    <div class="stat-value" id="scoreValue">0</div>
                </div>
                <div id="combo" class="stat">
                    <div class="stat-label">Combo</div>
                    <div class="stat-value" id="comboValue">x1</div>
                </div>
                <div id="levelDisplay" class="stat">
                    <div class="stat-label">Level</div>
                    <div class="stat-value" id="levelValue">1</div>
                </div>
            </div>
            <div id="comboDisplay"></div>
            <div id="controls">
                <div class="control-btn" id="leftBtn">←</div>
                <div class="control-btn" id="rightBtn">→</div>
            </div>
            <div id="startScreen">
                <h1>SHAPE MERGE RUN</h1>
                <div class="subtitle">Merge shapes to level up!</div>
                <button id="startBtn">START GAME</button>
                <div id="instructions">
                    ← → Move left/right<br>
                    Merge same level shapes<br>
                    Build combos for bonus points<br>
                    Avoid obstacles!
                </div>
            </div>
            <div id="gameOverScreen">
                <h1>GAME OVER</h1>
                <div id="finalScore">Score: <span id="finalScoreValue">0</span></div>
                <div id="stats">
                    Best: <span id="bestScoreValue">0</span> | 
                    Max Combo: <span id="maxComboValue">0</span>
                </div>
                <button id="restartBtn">PLAY AGAIN</button>
            </div>
        </div>
    </div>

    <script type="text/javascript">
        window.SDK_OPTIONS = {
            gameId: "4ebqrdphibx8wi5amsf9p1xhjfy92rke",
            onEvent: function (a) {
                switch (a.name) {
                    case "SDK_GAME_PAUSE":
                        if (typeof gamePaused !== 'undefined') gamePaused = true;
                        if (typeof muteAudio === 'function') muteAudio();
                        break;
                    case "SDK_GAME_START":
                        if (typeof gamePaused !== 'undefined') gamePaused = false;
                        if (typeof unmuteAudio === 'function') unmuteAudio();
                        break;
                    case "SDK_READY":
                        console.log("SDK Ready");
                        break;
                }
            }
        };
        (function (a, b, c) {
            var d = a.getElementsByTagName(b)[0];
            a.getElementById(c) || (a = a.createElement(b), a.id = c, a.src = "https://api.gamemonetize.com/sdk.js", d.parentNode.insertBefore(a, d))
        })(document, "script", "gamemonetize-sdk");
    </script>

    <script>
        function showAd() {
            if (typeof sdk !== 'undefined' && sdk.showBanner !== 'undefined') {
                sdk.showBanner();
            }
        }

        // Canvas setup
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Game state
        let gameState = 'menu';
        let gamePaused = false;
        let score = 0;
        let bestScore = parseInt(localStorage.getItem('shapeMergeBestScore') || '0');
        let maxCombo = parseInt(localStorage.getItem('shapeMergeMaxCombo') || '0');
        let currentCombo = 1;
        let comboTimeLeft = 0;
        let comboDisplayTime = 0;
        let playerLevel = 1;
        let gameSpeed = 1.5;
        let baseSpeed = 1.5;
        let lastTime = 0;
        let lastAdTime = 0;
        let adInterval = 60000 + Math.random() * 30000;
        let spawnTimer = 0;
        let frameCount = 0;
        
        // Audio
        let audioContext;
        let bgMusicGain;
        let sfxGain;
        let audioMuted = false;
        let tabVisible = true;
        let bgMusicInterval;
        
        // Player
        const player = {
            x: 0,
            y: 0,
            size: 35,
            level: 1,
            color: '#00ffff',
            vx: 0,
            targetX: 0,
            invulnerable: 0
        };
        
        // Game objects
        let shapes = [];
        let obstacles = [];
        let particles = [];
        let powerUps = [];
        
        // Input
        let keys = {};
        let touchStartX = 0;
        let touchActive = false;
        let moveDirection = 0;
        
        // Initialize
        function initCanvas() {
            const container = document.getElementById('gameContainer');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            player.x = canvas.width / 2;
            player.y = canvas.height - 120;
            player.targetX = player.x;
        }
        
        // Audio system
        function initAudio() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                bgMusicGain = audioContext.createGain();
                sfxGain = audioContext.createGain();
                bgMusicGain.connect(audioContext.destination);
                sfxGain.connect(audioContext.destination);
                bgMusicGain.gain.value = 0.08;
                sfxGain.gain.value = 0.4;
            } catch (e) {
                console.log('Audio not supported');
            }
        }
        
        function playTone(freq, duration, type = 'sine', volume = 0.2) {
            if (!audioContext || audioMuted) return;
            try {
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.type = type;
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(volume, audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
                osc.connect(gain);
                gain.connect(sfxGain);
                osc.start();
                osc.stop(audioContext.currentTime + duration);
            } catch (e) {}
        }
        
        function playMergeSound(combo) {
            const baseFreq = 300 + combo * 50;
            playTone(baseFreq, 0.15, 'sine', 0.3);
            playTone(baseFreq * 1.5, 0.2, 'sine', 0.2);
            if (combo > 2) {
                playTone(baseFreq * 2, 0.25, 'sine', 0.15);
            }
        }
        
        function playComboSound(combo) {
            for (let i = 0; i < Math.min(combo, 5); i++) {
                setTimeout(() => {
                    playTone(400 + i * 100, 0.1, 'square', 0.25);
                }, i * 50);
            }
        }
        
        function playGameOverSound() {
            playTone(200, 0.3, 'sawtooth', 0.4);
            setTimeout(() => playTone(150, 0.4, 'sawtooth', 0.3), 200);
            setTimeout(() => playTone(100, 0.5, 'sawtooth', 0.2), 400);
        }
        
        function startBackgroundMusic() {
            if (!audioContext || audioMuted) return;
            let noteIndex = 0;
            const notes = [220, 247, 262, 294, 330, 349, 392];
            bgMusicInterval = setInterval(() => {
                if (gameState === 'playing' && !audioMuted) {
                    playTone(notes[noteIndex % notes.length], 0.3, 'sine', 0.05);
                    noteIndex++;
                }
            }, 400);
        }
        
        function stopBackgroundMusic() {
            if (bgMusicInterval) {
                clearInterval(bgMusicInterval);
                bgMusicInterval = null;
            }
        }
        
        function muteAudio() {
            audioMuted = true;
            if (bgMusicGain) bgMusicGain.gain.value = 0;
            if (sfxGain) sfxGain.gain.value = 0;
            stopBackgroundMusic();
        }
        
        function unmuteAudio() {
            audioMuted = false;
            if (bgMusicGain) bgMusicGain.gain.value = 0.08;
            if (sfxGain) sfxGain.gain.value = 0.4;
            if (gameState === 'playing') {
                startBackgroundMusic();
            }
        }
        
        // Visibility handling
        document.addEventListener('visibilitychange', () => {
            tabVisible = !document.hidden;
            if (!tabVisible) {
                gamePaused = true;
                muteAudio();
            } else if (gameState === 'playing') {
                gamePaused = false;
                unmuteAudio();
            }
        });
        
        window.addEventListener('blur', () => {
            if (gameState === 'playing') {
                gamePaused = true;
                muteAudio();
            }
        });
        
        window.addEventListener('focus', () => {
            if (gameState === 'playing' && tabVisible) {
                gamePaused = false;
                unmuteAudio();
            }
        });
        
        // Shape class
        class Shape {
            constructor(x, y, level, type = 'same') {
                this.x = x;
                this.y = y;
                this.level = level;
                this.type = type;
                this.size = 25 + level * 6;
                this.vx = (Math.random() - 0.5) * 1.5;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.08;
                this.color = this.getColor();
                this.pulse = 0;
            }
            
            getColor() {
                if (this.type === 'obstacle') {
                    return '#ff3333';
                } else if (this.type === 'different') {
                    return '#ff8800';
                } else {
                    const colors = ['#00ffff', '#00ff88', '#0088ff', '#ff00ff', '#ffff00', '#ff8800'];
                    return colors[(this.level - 1) % colors.length];
                }
            }
            
            update() {
                this.y += gameSpeed;
                this.x += this.vx;
                this.rotation += this.rotationSpeed;
                this.pulse += 0.1;
                
                if (this.x < this.size || this.x > canvas.width - this.size) {
                    this.vx *= -1;
                    this.x = Math.max(this.size, Math.min(canvas.width - this.size, this.x));
                }
            }
            
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                const pulseSize = this.size * (1 + Math.sin(this.pulse) * 0.1);
                
                // Outer glow
                ctx.shadowBlur = 20;
                ctx.shadowColor = this.color;
                
                if (this.type === 'obstacle') {
                    // Triangle obstacle
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.moveTo(0, -pulseSize);
                    ctx.lineTo(-pulseSize * 0.866, pulseSize * 0.5);
                    ctx.lineTo(pulseSize * 0.866, pulseSize * 0.5);
                    ctx.closePath();
                    ctx.fill();
                } else {
                    // Rounded square
                    const cornerRadius = pulseSize * 0.2;
                    const w = pulseSize;
                    const h = pulseSize;
                    const x = -w / 2;
                    const y = -h / 2;
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.moveTo(x + cornerRadius, y);
                    ctx.lineTo(x + w - cornerRadius, y);
                    ctx.quadraticCurveTo(x + w, y, x + w, y + cornerRadius);
                    ctx.lineTo(x + w, y + h - cornerRadius);
                    ctx.quadraticCurveTo(x + w, y + h, x + w - cornerRadius, y + h);
                    ctx.lineTo(x + cornerRadius, y + h);
                    ctx.quadraticCurveTo(x, y + h, x, y + h - cornerRadius);
                    ctx.lineTo(x, y + cornerRadius);
                    ctx.quadraticCurveTo(x, y, x + cornerRadius, y);
                    ctx.closePath();
                    ctx.fill();
                    
                    // Level number
                    if (this.type === 'same') {
                        ctx.fillStyle = '#ffffff';
                        ctx.font = `bold ${pulseSize * 0.35}px Arial`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.shadowBlur = 5;
                        ctx.shadowColor = '#000000';
                        ctx.fillText(this.level, 0, 0);
                    }
                }
                
                ctx.restore();
            }
        }
        
        // Particle class
        class Particle {
            constructor(x, y, color, vx = 0, vy = 0) {
                this.x = x;
                this.y = y;
                this.vx = vx || (Math.random() - 0.5) * 8;
                this.vy = vy || (Math.random() - 0.5) * 8;
                this.life = 1;
                this.maxLife = 1;
                this.color = color;
                this.size = Math.random() * 6 + 3;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= 0.03;
                this.vx *= 0.96;
                this.vy *= 0.96;
            }
            
            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }
        
        // Input handling
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                moveDirection = -1;
            }
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                moveDirection = 1;
            }
        });
        
        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
            if ((e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') && !keys['ArrowRight'] && !keys['d'] && !keys['D']) {
                moveDirection = 0;
            }
            if ((e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') && !keys['ArrowLeft'] && !keys['a'] && !keys['A']) {
                moveDirection = 0;
            }
        });
        
        // Touch controls
        let touchMoveX = 0;
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            touchStartX = touch.clientX - rect.left;
            touchMoveX = touchStartX;
            touchActive = true;
        }, { passive: false });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (touchActive) {
                const touch = e.touches[0];
                const rect = canvas.getBoundingClientRect();
                touchMoveX = touch.clientX - rect.left;
                const delta = touchMoveX - touchStartX;
                if (Math.abs(delta) > 10) {
                    moveDirection = delta > 0 ? 1 : -1;
                }
            }
        }, { passive: false });
        
        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            touchActive = false;
            moveDirection = 0;
        }, { passive: false });
        
        // Button controls
        let leftPressed = false;
        let rightPressed = false;
        
        document.getElementById('leftBtn').addEventListener('mousedown', () => { leftPressed = true; moveDirection = -1; });
        document.getElementById('leftBtn').addEventListener('mouseup', () => { leftPressed = false; if (!rightPressed) moveDirection = 0; });
        document.getElementById('leftBtn').addEventListener('mouseleave', () => { leftPressed = false; if (!rightPressed) moveDirection = 0; });
        document.getElementById('rightBtn').addEventListener('mousedown', () => { rightPressed = true; moveDirection = 1; });
        document.getElementById('rightBtn').addEventListener('mouseup', () => { rightPressed = false; if (!leftPressed) moveDirection = 0; });
        document.getElementById('rightBtn').addEventListener('mouseleave', () => { rightPressed = false; if (!leftPressed) moveDirection = 0; });
        
        // Game functions
        function spawnShape() {
            const x = Math.random() * (canvas.width - 100) + 50;
            const y = -50;
            const level = Math.floor(Math.random() * Math.min(playerLevel + 1, 6)) + 1;
            let type = 'same';
            
            const rand = Math.random();
            if (rand < 0.25) {
                type = 'different';
            } else if (rand < 0.35) {
                type = 'obstacle';
            }
            
            shapes.push(new Shape(x, y, level, type));
        }
        
        function checkCollisions() {
            // Player movement
            const moveSpeed = 5 + player.level * 0.5;
            player.x += moveDirection * moveSpeed;
            player.x = Math.max(player.size, Math.min(canvas.width - player.size, player.x));
            
            if (player.invulnerable > 0) {
                player.invulnerable--;
            }
            
            // Check collisions
            for (let i = shapes.length - 1; i >= 0; i--) {
                const shape = shapes[i];
                const dx = player.x - shape.x;
                const dy = player.y - shape.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                const minDist = (player.size + shape.size) / 2;
                
                if (distance < minDist && player.invulnerable === 0) {
                    if (shape.type === 'same' && shape.level === player.level) {
                        // Merge!
                        player.level++;
                        player.size = 35 + player.level * 6;
                        playerLevel = player.level;
                        
                        // Combo system
                        comboTimeLeft = 180; // 3 seconds at 60fps
                        currentCombo++;
                        const comboBonus = currentCombo * player.level * 100;
                        score += comboBonus;
                        
                        // Show combo display
                        showComboDisplay(currentCombo);
                        
                        // Particles
                        for (let j = 0; j < 30; j++) {
                            const angle = (Math.PI * 2 * j) / 30;
                            particles.push(new Particle(
                                shape.x, shape.y, 
                                player.color,
                                Math.cos(angle) * 8,
                                Math.sin(angle) * 8
                            ));
                        }
                        
                        playMergeSound(currentCombo);
                        if (currentCombo > 2) {
                            playComboSound(currentCombo);
                        }
                        
                        shapes.splice(i, 1);
                    } else if (shape.type === 'different') {
                        // Reduce level
                        if (player.level > 1) {
                            player.level--;
                            player.size = 35 + player.level * 6;
                            playerLevel = player.level;
                            currentCombo = 1;
                            comboTimeLeft = 0;
                        }
                        player.invulnerable = 30;
                        
                        for (let j = 0; j < 15; j++) {
                            particles.push(new Particle(shape.x, shape.y, '#ff8800'));
                        }
                        
                        playTone(150, 0.2, 'sawtooth', 0.2);
                        shapes.splice(i, 1);
                    } else if (shape.type === 'obstacle') {
                        // Game over
                        gameOver();
                        return;
                    }
                }
            }
        }
        
        function showComboDisplay(combo) {
            const comboDisplay = document.getElementById('comboDisplay');
            comboDisplay.textContent = `${combo}x COMBO!`;
            comboDisplay.style.color = combo > 5 ? '#ffff00' : '#ff00ff';
            comboDisplay.classList.add('show');
            comboDisplayTime = 60;
        }
        
        function update() {
            if (gameState !== 'playing' || gamePaused) return;
            
            frameCount++;
            
            // Update score
            score += player.level * 0.15;
            document.getElementById('scoreValue').textContent = Math.floor(score);
            document.getElementById('levelValue').textContent = player.level;
            
            // Combo system
            if (comboTimeLeft > 0) {
                comboTimeLeft--;
                document.getElementById('combo').classList.add('active');
            } else {
                if (currentCombo > 1) {
                    currentCombo = 1;
                }
                document.getElementById('combo').classList.remove('active');
            }
            document.getElementById('comboValue').textContent = `x${currentCombo}`;
            
            // Combo display
            if (comboDisplayTime > 0) {
                comboDisplayTime--;
                if (comboDisplayTime === 0) {
                    document.getElementById('comboDisplay').classList.remove('show');
                }
            }
            
            // Difficulty scaling
            gameSpeed = baseSpeed + (score * 0.00005);
            baseSpeed = Math.min(baseSpeed + 0.00005, 3);
            
            // Spawn shapes
            spawnTimer++;
            const spawnRate = Math.max(30 - (score * 0.001), 15);
            if (spawnTimer >= spawnRate) {
                spawnShape();
                spawnTimer = 0;
            }
            
            // Update shapes
            for (let i = shapes.length - 1; i >= 0; i--) {
                shapes[i].update();
                if (shapes[i].y > canvas.height + 100) {
                    shapes.splice(i, 1);
                }
            }
            
            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }
            
            checkCollisions();
            
            // Ad timer
            const now = Date.now();
            if (now - lastAdTime > adInterval) {
                gamePaused = true;
                showAd();
                setTimeout(() => {
                    gamePaused = false;
                    lastAdTime = now;
                    adInterval = 60000 + Math.random() * 30000;
                }, 1000);
            }
        }
        
        function draw() {
            // Clear with gradient background
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#000022');
            gradient.addColorStop(1, '#000011');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw moving grid
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.08)';
            ctx.lineWidth = 1;
            const gridOffset = (frameCount * gameSpeed * 0.5) % 50;
            for (let i = -50; i < canvas.width + 50; i += 50) {
                ctx.beginPath();
                ctx.moveTo(i + gridOffset, 0);
                ctx.lineTo(i + gridOffset, canvas.height);
                ctx.stroke();
            }
            for (let i = -50; i < canvas.height + 50; i += 50) {
                ctx.beginPath();
                ctx.moveTo(0, i + gridOffset);
                ctx.lineTo(canvas.width, i + gridOffset);
                ctx.stroke();
            }
            
            if (gameState === 'playing') {
                // Draw shapes
                shapes.forEach(shape => shape.draw());
                
                // Draw particles
                particles.forEach(particle => particle.draw());
                
                // Draw player
                ctx.save();
                ctx.translate(player.x, player.y);
                
                // Player glow
                ctx.shadowBlur = 30;
                ctx.shadowColor = player.color;
                
                // Outer glow ring
                ctx.strokeStyle = player.color;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(0, 0, player.size * 0.7, 0, Math.PI * 2);
                ctx.stroke();
                
                // Player shape
                const cornerRadius = player.size * 0.15;
                const w = player.size;
                const h = player.size;
                const x = -w / 2;
                const y = -h / 2;
                ctx.fillStyle = player.color;
                ctx.beginPath();
                ctx.moveTo(x + cornerRadius, y);
                ctx.lineTo(x + w - cornerRadius, y);
                ctx.quadraticCurveTo(x + w, y, x + w, y + cornerRadius);
                ctx.lineTo(x + w, y + h - cornerRadius);
                ctx.quadraticCurveTo(x + w, y + h, x + w - cornerRadius, y + h);
                ctx.lineTo(x + cornerRadius, y + h);
                ctx.quadraticCurveTo(x, y + h, x, y + h - cornerRadius);
                ctx.lineTo(x, y + cornerRadius);
                ctx.quadraticCurveTo(x, y, x + cornerRadius, y);
                ctx.closePath();
                ctx.fill();
                
                // Level number
                ctx.fillStyle = '#ffffff';
                ctx.font = `bold ${player.size * 0.4}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowBlur = 8;
                ctx.shadowColor = '#000000';
                ctx.fillText(player.level, 0, 0);
                
                // Invulnerable flash
                if (player.invulnerable > 0 && Math.floor(player.invulnerable / 3) % 2) {
                    ctx.globalAlpha = 0.5;
                    ctx.fillStyle = '#ffffff';
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }
                
                ctx.restore();
            }
        }
        
        function gameLoop(currentTime) {
            if (!lastTime) lastTime = currentTime;
            const deltaTime = currentTime - lastTime;
            lastTime = currentTime;
            
            update();
            draw();
            
            requestAnimationFrame(gameLoop);
        }
        
        function startGame() {
            showAd();
            gameState = 'playing';
            gamePaused = false;
            score = 0;
            playerLevel = 1;
            player.level = 1;
            player.size = 35;
            player.x = canvas.width / 2;
            player.y = canvas.height - 120;
            player.targetX = player.x;
            player.color = '#00ffff';
            player.invulnerable = 0;
            gameSpeed = 1.5;
            baseSpeed = 1.5;
            currentCombo = 1;
            comboTimeLeft = 0;
            comboDisplayTime = 0;
            shapes = [];
            particles = [];
            spawnTimer = 0;
            frameCount = 0;
            moveDirection = 0;
            lastAdTime = Date.now();
            adInterval = 60000 + Math.random() * 30000;
            
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('comboDisplay').classList.remove('show');
            
            if (audioContext && !audioMuted) {
                startBackgroundMusic();
            }
        }
        
        function gameOver() {
            gameState = 'gameover';
            gamePaused = true;
            muteAudio();
            playGameOverSound();
            
            const finalCombo = currentCombo - 1;
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('shapeMergeBestScore', Math.floor(bestScore).toString());
            }
            if (finalCombo > maxCombo) {
                maxCombo = finalCombo;
                localStorage.setItem('shapeMergeMaxCombo', maxCombo.toString());
            }
            
            document.getElementById('finalScoreValue').textContent = Math.floor(score);
            document.getElementById('bestScoreValue').textContent = Math.floor(bestScore);
            document.getElementById('maxComboValue').textContent = maxCombo;
            document.getElementById('gameOverScreen').style.display = 'flex';
            
            setTimeout(() => {
                showAd();
            }, 500);
        }
        
        // Event listeners
        document.getElementById('startBtn').addEventListener('click', () => {
            if (audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
            }
            startGame();
        });
        
        document.getElementById('restartBtn').addEventListener('click', () => {
            startGame();
        });
        
        // Initialize
        window.addEventListener('resize', () => {
            initCanvas();
        });
        
        initCanvas();
        initAudio();
        document.getElementById('bestScoreValue').textContent = Math.floor(bestScore);
        
        // Start game loop
        requestAnimationFrame(gameLoop);
        
        // Resume audio on first interaction
        document.addEventListener('click', () => {
            if (audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
            }
        }, { once: true });
    </script>
</body>
