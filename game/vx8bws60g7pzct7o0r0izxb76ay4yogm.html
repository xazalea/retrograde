    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000; 
        }
        #root { 
            width: 100vw; height: 100vh; 
            background: #000; display: flex; 
            align-items: center; justify-content: center;
        }

        /* Fixed Button Positioning to avoid overlap with Pause Button */
        .fs-button {
            position: fixed;
            top: 15px;      /* Same height as HUD buttons */
            right: 80px;    /* Moved further left (Pause button is usually at 15-20px) */
            z-index: 9999;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%; /* Circle look for premium feel */
            width: 45px;
            height: 45px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .fs-button:active {
            transform: scale(0.9);
            background: rgba(255, 255, 255, 0.2);
        }
        .fs-button svg {
            width: 20px;
            height: 20px;
            fill: rgba(255, 255, 255, 0.8);
        }
    </style>

    <div id="root"></div>

    <script>
        let lastAdTime = 0;
        const cooldownMs = 65000; 

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.error(`Error: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        window.triggerAd = function() {
            const now = Date.now();
            if (now - lastAdTime > cooldownMs) {
                if (typeof sdk !== 'undefined' && typeof sdk.showBanner !== 'undefined') {
                    sdk.showBanner();
                    lastAdTime = now;
                }
            } else {
                console.log("Ad skipped. Cooldown active.");
            }
        };

        window.dispatchGameEvent = function(name) {
            window.dispatchEvent(new CustomEvent(name));
        };

        const setAppHeight = () => {
            document.documentElement.style.setProperty('--app-height', `${window.innerHeight}px`);
        }
        window.addEventListener('resize', setAppHeight);
        setAppHeight();
    </script>
