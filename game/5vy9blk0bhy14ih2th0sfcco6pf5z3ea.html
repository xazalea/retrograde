                switch (a.name) {
                    case "SDK_GAME_PAUSE":
                        // Pause game logic and mute audio
                        isPaused = true;
                        pauseOverlay.style.display = 'flex';
                        if (Tone && Tone.Master) {
                            Tone.Master.mute = true;
                        }
                        break;
                    case "SDK_GAME_START":
                        // Resume game logic and unmute audio
                        isPaused = false;
                        pauseOverlay.style.display = 'none';
                        if (Tone && Tone.Master) {
                            Tone.Master.mute = false;
                        }
                        break;
                    case "SDK_READY":
                        // SDK is ready
                        console.log("GameMonetize SDK is ready.");
                        break;
                    case "SDK_ERROR":
                        // SDK error
                         console.error("GameMonetize SDK error.");
                        break;
                }
            }

                console.log("Vibration failed", e);

        }

        }

        gameHeight = 600;

        gameContainer.style.height = `${gameHeight}px`;
        canvas.width = gameWidth;
        canvas.height = gameHeight;

            // Re-initialize to adjust elements to the new fixed size, but don't restart the level
            loadLevel(level);
        }
    }

    class Player {
        constructor() {
            this.width = 40;
            this.height = 39;
            this.x = 100;
            this.y = gameHeight - this.height - 100;
            this.velocityX = 0;
            this.velocityY = 0;
            this.maxSpeed = 3;
            this.acceleration = 0.24;
            this.friction = 0.9;
            this.jumpPower = -12;
            this.onGround = false;
            this.shootCooldown = 0;
            this.invincible = 0;
            this.direction = 1; 
        }

        draw() {
            // This function is completely replaced to draw the PNG image
            if (!isImageLoaded) { // Simple fallback rectangle if image is slow to load
                ctx.fillStyle = 'rgba(252, 163, 17, 0.5)';
                ctx.fillRect(this.x, this.y, this.width, this.height);
                return;
            }

            // Define visual dimensions, can be different from collision hitbox
            const visualWidth = 80; 
            const visualHeight = 78;

            ctx.save();
            
            // Apply flashing effect when invincible
            if (this.invincible > 0 && Math.floor(this.invincible / 5) % 2 === 0) {
                ctx.globalAlpha = 0.5;
            }

            // Translate context to the center of the player for scaling (flipping direction)
            ctx.translate(this.x + this.width / 2, this.y + this.height / 2);
            
            if (this.direction === -1) {
                ctx.scale(-1, 1); // Flip horizontally
            }

            // Draw the image centered on the player's hitbox
            ctx.drawImage(
                playerImage,
                -visualWidth / 2, 
                -visualHeight / 2,
                visualWidth,
                visualHeight
            );

            ctx.restore();
        }

        update() {
            // Horizontal Movement with Acceleration and Friction
            if (keys.right) {
                this.velocityX += this.acceleration;
                this.direction = 1;
            } else if (keys.left) {
                this.velocityX -= this.acceleration;
                this.direction = -1;
            } else {
                this.velocityX *= this.friction;
            }

            // Clamp speed to maxSpeed
            if (this.velocityX > this.maxSpeed) {
                this.velocityX = this.maxSpeed;
            }
            if (this.velocityX < -this.maxSpeed) {
                this.velocityX = -this.maxSpeed;
            }

            // Stop movement if velocity is very low
            if (Math.abs(this.velocityX) < 0.1) {
                this.velocityX = 0;
            }

            if (keys.shift && this.shootCooldown <= 0) {
                this.shoot();
                this.shootCooldown = 30; // 0.5 second cooldown
            }
            if (this.shootCooldown > 0) this.shootCooldown--;

            this.x += this.velocityX;
            this.velocityY += gravity;
            this.y += this.velocityY;
            this.onGround = false;

            if (this.x < 0) this.x = 0;
            if (this.x + this.width > worldWidth) this.x = worldWidth - this.width;

            if(this.invincible > 0) this.invincible--;
            if (this.y > gameHeight) {
                this.takeDamage(true); // Treat falling off map as water damage
            }
        }
        
        shoot() {
            if (!spitSynth) {
                spitSynth = new Tone.NoiseSynth({
                    noise: { type: 'white' },
                    envelope: { attack: 0.001, decay: 0.05, sustain: 0 }
                }).toDestination();
            }
            if (Tone.context.state !== 'running') Tone.context.resume();
            spitSynth.triggerAttackRelease("8n");

            const spitX = this.direction === 1 ? this.x + this.width : this.x;
            const spitY = this.y + (this.height / 2) - 5;
            spitballs.push(new Spit(spitX, spitY, this.direction));
        }

        jump() {
            if (this.onGround) {
                vibrate(50);
                if (!jumpSynth) {
                    jumpSynth = new Tone.Synth({
                        oscillator: { type: 'sine' },
                        envelope: { attack: 0.01, decay: 0.2, sustain: 0.1, release: 0.4 },
                        volume: -10
                    }).toDestination();
                }
                if (Tone.context.state !== 'running') Tone.context.resume();
                jumpSynth.triggerAttack("C4");
                jumpSynth.frequency.rampTo("A4", 0.2);
                jumpSynth.triggerRelease("+0.2");
                this.velocityY = this.jumpPower;
            }
        }

        takeDamage(isWaterDamage = false) {
             if (this.invincible > 0) return;

             if (!isWaterDamage) {
                vibrate([200, 50, 200]);
                if (!damageSynth) {
                    damageSynth = new Tone.Synth({
                        oscillator: { type: 'square' },
                        envelope: { attack: 0.01, decay: 0.2, sustain: 0.1, release: 0.5 }
                    }).toDestination();
                }
                if (Tone.context.state !== 'running') Tone.context.resume();
                damageSynth.triggerAttackRelease("G2", "8n");
             }

             this.x = 100;
             this.y = gameHeight - 200;
             this.velocityY = 0;
             this.invincible = 120;
        }
    }

    class Platform {
        constructor(x, y, width, height) {
            this.x = x;
            this.y = y;
            this.width = width;
            this.height = height;
        }

        draw() {
            const groundGreen = '#76c76b';
            const groundBrown = '#8c5a3e';
            const groundDarkGreen = '#5a9b51';

            if (this.width >= worldWidth) {
                var ground = ctx.createLinearGradient(this.x, this.y, this.x, this.y + this.height);
                ground.addColorStop(0, groundGreen);
                ground.addColorStop(1, groundDarkGreen);
                ctx.fillStyle = ground;
                ctx.fillRect(this.x, this.y, this.width, this.height);
            } else {
                ctx.fillStyle = groundBrown;
                ctx.fillRect(this.x, this.y, this.width, this.height);
                ctx.fillStyle = groundGreen;
                ctx.fillRect(this.x, this.y, this.width, 10);
            }
        }
    }

    class MovingPlatform {
        constructor(x, y, width, height, { endX, endY, speed = 1 }) {
            this.x = x;
            this.y = y;
            this.width = width;
            this.height = height;
            this.startX = x;
            this.startY = y;
            this.endX = endX ?? x;
            this.endY = endY ?? y;
            this.speed = speed;
            
            this.isVertical = this.startY !== this.endY;
        }

        update() {
            if (this.isVertical) {
                this.y += this.speed;
                const top_boundary = Math.min(this.startY, this.endY);
                const bottom_boundary = Math.max(this.startY, this.endY);
                if (this.y >= bottom_boundary) {
                    this.y = bottom_boundary;
                    this.speed *= -1;
                } else if (this.y <= top_boundary) {
                    this.y = top_boundary;
                    this.speed *= -1;
                }
            } else { // Horizontal
                this.x += this.speed;
                const left_boundary = Math.min(this.startX, this.endX);
                const right_boundary = Math.max(this.startX, this.endX);
                if (this.x >= right_boundary) {
                    this.x = right_boundary;
                    this.speed *= -1;
                } else if (this.x <= left_boundary) {
                    this.x = left_boundary;
                    this.speed *= -1;
                }
            }
        }

        draw() {
            // Slightly different color for moving platforms
            ctx.fillStyle = '#a56a48'; // Lighter brown
            ctx.fillRect(this.x, this.y, this.width, this.height);
            ctx.fillStyle = '#8bd182'; // Lighter green
            ctx.fillRect(this.x, this.y, this.width, 10);
        }
    }

    // --- NEW: BOAT CLASS ---
    class Boat {
        constructor(x, y, width, height, { endX, speed = 1 }) {

            this.width = width;
            this.height = height;

            this.x += this.speed;
            const left_boundary = Math.min(this.startX, this.endX);
            const right_boundary = Math.max(this.startX, this.endX);
            if (this.x >= right_boundary) {
                this.x = right_boundary;
                this.speed *= -1;
            } else if (this.x <= left_boundary) {
                this.x = left_boundary;
                this.speed *= -1;
            }
        }

        draw() {
            if (isBoatImageLoaded) {
                ctx.save();
                ctx.translate(this.x + this.width / 2, this.y + this.height / 2);
                if (this.speed < 0) { // Moving left
                    ctx.scale(-1, 1); // Flip horizontally
                }
                ctx.drawImage(boatImage, -this.width / 2, -this.height / 2, this.width, this.height);
                ctx.restore();
            } else {
                // Fallback
                ctx.fillStyle = '#A0522D'; // Sienna
                ctx.fillRect(this.x, this.y, this.width, this.height);
            }
        }

    class Enemy {
        constructor(x, y, platform, type = 'fogpolice') {
            this.type = type;
            this.platform = platform;
            
            if (this.type === 'staticCrow') {
                this.width = 60;
                this.height = 40;
                this.speed = 0;
            } else { // fogpolice
                this.width = 30;
                this.height = 60;
                this.speed = 0.55;
            }

            this.x = x;
            this.y = y - this.height;
            this.relativeX = this.platform ? x - this.platform.x : 0; // Position relative to platform
            this.defeatState = 'none'; // 'none', 'stunned', 'falling'
            this.defeatTimer = 0;
            this.velocityY = 0;
        }

        draw() {
             if (this.type === 'staticCrow') {
                let currentImage;
                if (this.defeatState === 'falling' && isCrowDeadImageLoaded) {
                    currentImage = crowDeadImage;
                } else {
                    currentImage = crowWingsDownImage;
                }

                if (currentImage) {
                    ctx.drawImage(currentImage, this.x, this.y, this.width, this.height);
                } else {
                    // Fallback
                    ctx.fillStyle = '#333333';
                    ctx.fillRect(this.x, this.y, this.width, this.height);
                }
                return; 
            }

            // --- Fogpolice drawing logic ---
            if (this.defeatState === 'falling' && isFogpoliceFallImageLoaded) {
                ctx.drawImage(fogpoliceFallImage, this.x, this.y, this.width, this.height);
            } else if (this.defeatState === 'stunned' && isFogpoliceFrontImageLoaded) {
                ctx.drawImage(fogpoliceFrontImage, this.x, this.y, this.width, this.height);
            } else if (isFogpoliceImageLoaded && isFogpoliceFrontImageLoaded) {
                if (this.speed === 0 && this.defeatState === 'none') {
                    ctx.drawImage(fogpoliceFrontImage, this.x, this.y, this.width, this.height);
                } else {
                    ctx.save();
                    ctx.translate(this.x + this.width / 2, this.y + this.height / 2);
                    if (this.speed > 0) {
                        ctx.scale(-1, 1);
                    }
                    ctx.drawImage(fogpoliceImage, -this.width / 2, -this.height / 2, this.width, this.height);
                    ctx.restore();
                }
            } else {
                // Fallback drawing for fogpolice
                ctx.fillStyle = '#8B0000';
                ctx.beginPath();
                ctx.ellipse(this.x + this.width / 2, this.y + this.height / 2, this.width / 2, this.height / 2, 0, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(this.x + 8, this.y + 10, 4, 0, Math.PI * 2);
                ctx.arc(this.x + this.width - 8, this.y + 10, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'black';
                 ctx.beginPath();
                ctx.arc(this.x + 8, this.y + 11, 2, 0, Math.PI * 2);
                ctx.arc(this.x + this.width - 8, this.y + 11, 2, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        update() {
            if (this.defeatState === 'stunned') {
                this.defeatTimer--;
                if (this.defeatTimer <= 0) {
                    this.defeatState = 'falling';
                    this.velocityY = -4; // Pop up
                    // Pump up animation
                    this.x -= 5; 
                    this.y -= 5;
                    this.width *= 1.2;
                    this.height *= 1.2;
                }
            } else if (this.defeatState === 'falling') {
                this.velocityY += gravity;
                this.y += this.velocityY;
            } else {
                if(this.platform) {
                    // Patrol logic is now based on a position relative to the platform
                    this.relativeX += this.speed;

                    // Boundary checks are now against the platform's width, not world coordinates
                    if (this.relativeX < 0) {
                        this.relativeX = 0;
                        this.speed *= -1;
                    } else if (this.relativeX + this.width > this.platform.width) {
                        this.relativeX = this.platform.width - this.width;
                        this.speed *= -1;
                    }

                    // The enemy's final world position is calculated from the platform's current position
                    this.x = this.platform.x + this.relativeX;
                    this.y = this.platform.y - this.height;
                }
            }
        }
    }

    class Crow {
        constructor(x, y, range) {
            this.width = 60;
            this.height = 40;
            this.x = x;
            this.y = y;
            this.startX = x;
            this.startY = y;
            this.range = range;
            this.speed = -0.6; // Start moving left
            this.defeatState = 'none'; // 'none', 'stunned', 'falling'
            this.defeatTimer = 0;
            this.velocityY = 0;

            // Animation properties
            this.animationTimer = 0;
            this.animationSpeed = 15; // Flap every 15 frames
            this.currentFrame = 0; // 0 for wings down, 1 for wings up

            // Vertical movement properties
            this.verticalAngle = Math.random() * Math.PI * 2;
            this.verticalRange = Math.random() * 40 + 20; // Fly up/down by 20-60 pixels

            // Poo dropping properties
            this.pooCooldown = Math.random() * 120 + 60; // Random initial cooldown
        }

        draw() {
            let currentImage;

            if (this.defeatState === 'falling' && isCrowDeadImageLoaded) {
                currentImage = crowDeadImage;
            } else if (this.defeatState === 'stunned' && isCrowWingsDownImageLoaded) {
                currentImage = crowWingsDownImage;
            } else {
                if (this.currentFrame === 0 && isCrowWingsDownImageLoaded) {
                    currentImage = crowWingsDownImage;
                } else if (this.currentFrame === 1 && isCrowWingsUpImageLoaded) {
                    currentImage = crowWingsUpImage;
                }
            }
            
            if (currentImage) {
                ctx.save();
                ctx.translate(this.x + this.width / 2, this.y + this.height / 2);
                if (this.speed > 0) { // Moving right, flip the image
                    ctx.scale(-1, 1);
                }
                ctx.drawImage(currentImage, -this.width / 2, -this.height / 2, this.width, this.height);
                ctx.restore();
            } else {
                // Fallback drawing
                ctx.fillStyle = '#222222';
                ctx.fillRect(this.x, this.y, this.width, this.height);
            }
        }

        update() {
            if (this.defeatState === 'stunned') {
                this.defeatTimer--;
                if (this.defeatTimer <= 0) {
                    this.defeatState = 'falling';
                    this.velocityY = -4; // Pop up
                    this.x -= 5;
                    this.y -= 5;
                    this.width *= 1.2;
                    this.height *= 1.2;
                }
            } else if (this.defeatState === 'falling') {
                this.velocityY += gravity;
                this.y += this.velocityY;
            } else {
                // --- Flying logic ---
                // Horizontal movement
                this.x += this.speed;
                if (this.x < this.startX || this.x > this.startX + this.range) {
                    this.speed *= -1;
                }
                
                // Vertical bobbing motion
                this.verticalAngle += 0.04;
                this.y = this.startY + Math.sin(this.verticalAngle) * this.verticalRange;

                // --- Poo Dropping Logic ---
                this.pooCooldown--;
                if (this.pooCooldown <= 0 && 
                    player.x + player.width > this.x && 
                    player.x < this.x + this.width) { // Check if player is below
                    
                    pooProjectiles.push(new Poo(this.x + this.width / 2, this.y + this.height));
                    this.pooCooldown = 120; // 2-second cooldown
                }


                // --- Animation logic ---
                this.animationTimer++;
                if (this.animationTimer >= this.animationSpeed) {
                    this.animationTimer = 0;
                    this.currentFrame = (this.currentFrame + 1) % 2; // alternate between 0 and 1
                }
            }
        }
    }

     class Poo {
        constructor(x, y) {
            this.x = x - 5; // Center it
            this.y = y;
            this.width = 10;
            this.height = 15;
            this.velocityY = 2; // Starts moving down
        }

        draw() {
            ctx.fillStyle = 'white';
            ctx.beginPath();
            // Simple teardrop shape for the poo
            ctx.moveTo(this.x + this.width / 2, this.y);
            ctx.quadraticCurveTo(this.x, this.y + this.height / 2, this.x + this.width / 2, this.y + this.height);
            ctx.quadraticCurveTo(this.x + this.width, this.y + this.height / 2, this.x + this.width / 2, this.y);
            ctx.fill();
        }

        update() {
            this.velocityY += gravity * 0.2; // Less affected by gravity than the player
            this.y += this.velocityY;
        }
    }

    class Star {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.width = 44;
            this.height = 44;
            this.initialY = y;
            this.angle = Math.random() * Math.PI * 2;
            this.shineAngle = Math.random() * Math.PI * 2; // For shine animation
        }
        
        draw() {
            const centerX = this.x + this.width / 2;
            const centerY = this.y + this.height / 2;
            const radius = this.width / 2;

            ctx.save();
            ctx.translate(centerX, centerY);

            // --- Draw the dynamic shine ---
            const shineSize = radius * (1.2 + Math.sin(this.shineAngle) * 0.3); // Made shine a bit bigger
            const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, shineSize);
            gradient.addColorStop(0, 'rgba(255, 255, 150, 0.8)');
            gradient.addColorStop(1, 'rgba(255, 215, 0, 0)');
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(0, 0, shineSize, 0, Math.PI * 2);
            ctx.fill();
            
            // Rotate the star
            ctx.rotate(this.angle);

            // --- Draw the emoji star ---
            // We set the font size to match the star's dimensions
            ctx.font = `${this.width}px 'Fredoka One'`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('⭐', 0, 0);
            
            ctx.restore();
        }

        update(){
            this.angle += 0.02;
            this.y = this.initialY + Math.sin(this.angle * 2) * 4;
            this.shineAngle += 0.05; // Animate the shine
        }
    }
    
    class Cloud {
        constructor(x, y, size) {
            this.x = x;
            this.y = y;
            this.size = size;
        }
        draw() {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size * 0.6, 0, Math.PI * 2);
            ctx.arc(this.x + this.size, this.y, this.size, 0, Math.PI * 2);
            ctx.arc(this.x + this.size * 2, this.y, this.size * 0.8, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    class Spit {
        constructor(x, y, direction) {
            this.x = x;
            this.y = y;
            this.width = 10;
            this.height = 10;
            this.velocityX = 10 * direction;
            this.velocityY = -2; // Give it a slight upward arc initially
        }

        draw() {
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(this.x + this.width / 2, this.y + this.height / 2, this.width / 2, 0, Math.PI * 2);
            ctx.fill();
        }

        update() {
            this.x += this.velocityX;
            this.velocityY += gravity * 0.5; // Apply some gravity
            this.y += this.velocityY;
        }
    }

    class Water {
        constructor(x, y, width, height) {
            this.x = x;
            this.y = y;
            this.width = width;
            this.height = height;
            this.waveOffset = Math.random() * Math.PI * 2;
        }

        draw() {
            const waterBlue = 'rgba(64, 164, 224, 0.7)';
            const waterHighlight = 'rgba(255, 255, 255, 0.5)';
            ctx.fillStyle = waterBlue;
            ctx.fillRect(this.x, this.y, this.width, this.height);

            // Wavy top
            ctx.beginPath();
            ctx.moveTo(this.x, this.y);
            for (let i = 0; i < this.width; i++) {
                const waveY = this.y + Math.sin((i + this.waveOffset) * 0.05) * 2;
                ctx.lineTo(this.x + i, waveY);
            }
            ctx.lineTo(this.x + this.width, this.y);
            ctx.lineTo(this.x + this.width, this.y + 5); 
            ctx.lineTo(this.x, this.y + 5);
            ctx.closePath();

            ctx.fillStyle = waterHighlight;
            ctx.fill();
        }

        update() {
            this.waveOffset += 0.05;
        }
    }

    // --- GAME LOGIC ---

    function loadLevel(levelNum) {
        const currentLevelData = levelData[levelNum];
        if (!currentLevelData) {
            console.error("Level data not found for level:", levelNum);
            return;
        }
        worldWidth = currentLevelData.worldWidth;

        const rawPlatforms = currentLevelData.platforms(gameHeight);
        platforms = rawPlatforms.map(p => new Platform(p.x, p.y, p.width, p.height));
        
        if (currentLevelData.movingPlatforms) {
            const rawMoving = currentLevelData.movingPlatforms(gameHeight);
            rawMoving.forEach(p => {
                platforms.push(new MovingPlatform(p.x, p.y, p.width, p.height, { endX: p.endX, endY: p.endY, speed: p.speed }));
            });
        }
        
        const rawEnemies = currentLevelData.enemies(gameHeight);
        enemies = rawEnemies.map(e => {
            if (e.type === 'crow') {
                return new Crow(e.x, e.y, e.range);
            } else { // Handles 'fogpolice' and 'staticCrow'
                return new Enemy(e.x, e.y, platforms[e.platformIndex], e.type);
            }
        });
        
        const rawStars = currentLevelData.stars(gameHeight);
        stars = rawStars.map(s => new Star(s.x, s.y));

        clouds = currentLevelData.clouds.map(c => new Cloud(c.x, c.y, c.size));

        const rawScenery = currentLevelData.scenery(gameHeight);
        scenery = rawScenery.map(s => new Scenery(s.x, s.y, s.width, s.height, s.type));
        
        water = []; // Reset water
        if (currentLevelData.water) {
            // Create a single body of water that spans the entire level width
            // This prevents visual gaps on the sides of the screen. The ground platforms
            // will be drawn over this layer, creating the appearance of land.
            water.push(new Water(0, gameHeight - 45, worldWidth, 45));
        }

        if (currentLevelData.boats) {
            const rawBoats = currentLevelData.boats(gameHeight);
            boats = rawBoats.map(b => new Boat(b.x, b.y, b.width, b.height, { endX: b.endX, speed: b.speed }));
        } else {
            boats = [];
        }
        
        spitballs = [];
        pooProjectiles = [];
        player.x = 100;
        player.y = gameHeight - 200;
        player.velocityY = 0;
        camera.x = 0;
    }

    function startGame(levelNum) {
        // --- NEW: Centralized Ad Call ---
        // Show an ad at the start of any level load.
        if (window.sdk && typeof sdk.showBanner === 'function') {
            sdk.showBanner();
        }
        
        level = levelNum;
        score = 0;
        isGameOver = false;
        if (!player) player = new Player();
        
        // Hide all modals
        welcomeModal.style.display = 'none';
        settingsModal.style.display = 'none';
        modal.style.display = 'none';

        loadLevel(level);
        updateUI();
        showLevelStartMessage(level);

        isPaused = false;
        // The game loop is already running, so we don't need to start a new one.
    }

    function firstTimeInit() {
        resizeCanvas();
        
        isPaused = true;
        // Populate and show the welcome modal instead of starting the game
        setupLevelSelector(levelSelectorSettings);
        
        const controlsText = 
`Keyboard:
  • Left Arrow (◀): Move Left
  • Right Arrow (▶): Move Right
  • Up Arrow (▲): Jump
  • Spacebar: Spit

Touchscreen:
  • Use on-screen buttons`;
        introControls.textContent = controlsText;
        welcomeModal.style.display = 'block';

        // --- Event Listeners ---
        menuButton.addEventListener('click', () => {
            isPaused = true;
            settingsModal.style.display = 'flex';
        });

        closeSettingsButton.addEventListener('click', () => {
            settingsModal.style.display = 'none';
            if(!isGameOver) {
                isPaused = false;
            }
        });

        playButton.addEventListener('click', () => {
            startGame(1); // Always start level 1
        });

        pauseButton.addEventListener('click', () => {
            // Request an ad. The SDK will handle pausing and resuming via events.
            if (window.sdk && typeof sdk.showBanner === 'function') {
                sdk.showBanner();
            }
        });

        // Start the single, master game loop.
        requestAnimationFrame(gameLoop);
    }
    
    function drawBackground() {
        var sky = ctx.createLinearGradient(0, 0, 0, gameHeight);
        sky.addColorStop(0, '#65bfff');
        sky.addColorStop(1, '#a1dffb'); 
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, gameWidth, gameHeight);
    }

    function checkCollisions() {
        // --- Spitball Collision ---
        for (let i = spitballs.length - 1; i >= 0; i--) {
            const spitball = spitballs[i];
            
            if (spitball.x > camera.x + gameWidth || spitball.x + spitball.width < camera.x || spitball.y > gameHeight) {
                spitballs.splice(i, 1);
                continue;
            }

            let hitPlatform = false;
            for (const platform of platforms) {
                if (spitball.x < platform.x + platform.width &&
                    spitball.x + spitball.width > platform.x &&
                    spitball.y < platform.y + platform.height &&
                    spitball.y + spitball.height > platform.y) {
                    
                    spitballs.splice(i, 1);
                    hitPlatform = true;
                    break; 
                }
            }
            if(hitPlatform) continue;

            for (let j = enemies.length - 1; j >= 0; j--) {
                const enemy = enemies[j];
                if (enemy.defeatState === 'none' &&
                    spitball.x < enemy.x + enemy.width &&
                    spitball.x + spitball.width > enemy.x &&
                    spitball.y < enemy.y + enemy.height &&
                    spitball.y + spitball.height > enemy.y) {
                    
                    vibrate(100);
                    if (!enemyDefeatSynth) {
                       enemyDefeatSynth = new Tone.NoiseSynth({ noise: { type: 'white' }, envelope: { attack: 0.005, decay: 0.15, sustain: 0 } }).toDestination();
                    }
                    if (Tone.context.state !== 'running') Tone.context.resume();
                    enemyDefeatSynth.triggerAttackRelease("16n");
                    
                    enemy.defeatState = 'stunned';
                    enemy.defeatTimer = 20;
                    enemy.speed = 0;
                    
                    spitballs.splice(i, 1);
                    break;
                }
            }
        }

        // --- Poo Collision ---
        for (let i = pooProjectiles.length - 1; i >= 0; i--) {
            const poo = pooProjectiles[i];

            if (player.x < poo.x + poo.width &&
                player.x + player.width > poo.x &&
                player.y < poo.y + poo.height &&
                player.y + player.height > poo.y) {
                
                player.takeDamage();
                pooProjectiles.splice(i, 1);
                continue;
            }

            let hitPlatform = false;
            for (const platform of platforms) {
                if (poo.x < platform.x + poo.width &&
                    poo.x + poo.width > platform.x &&
                    poo.y < platform.y + platform.height &&
                    poo.y + poo.height > platform.y) {
                    
                    pooProjectiles.splice(i, 1);
                    hitPlatform = true;
                    break; 
                }
            }
            if(hitPlatform) continue;

            if (poo.y > gameHeight + 100) {
                 pooProjectiles.splice(i, 1);
            }
        }

        // --- Player and Environment Collision ---
        player.onGround = false;
        platforms.forEach(platform => {
            if (player.x < platform.x + platform.width &&
                player.x + player.width > platform.x &&
                player.y + player.height > platform.y &&
                player.y + player.height < platform.y + platform.height + player.velocityY) {
                
                player.velocityY = 0;
                player.y = platform.y - player.height;
                player.onGround = true;

                if (platform.update) {
                    if (!platform.isVertical) {
                        player.x += platform.speed;
                    }
                }
            }
        });

        boats.forEach(boat => {
            // Simplified collision: If the player touches any part of the boat while moving downwards,
            // they will be placed safely on the deck. This is more forgiving for the player.
            if (player.x < boat.x + boat.width &&
                player.x + player.width > boat.x &&
                player.y < boat.y + boat.height &&
                player.y + player.height > boat.y &&
                player.velocityY >= 0) {

                // Snap player to the deck position
                const deckY = boat.y + 45; 
                player.velocityY = 0;
                player.y = deckY - player.height;
                player.onGround = true;

                // Move player with the boat
                player.x += boat.speed;
            }
        });

        enemies.forEach((enemy, index) => {
            if (enemy.defeatState !== 'none') return;

            if (player.x < enemy.x + enemy.width &&
                player.x + player.width > enemy.x &&
                player.y < enemy.y + enemy.height &&
                player.y + player.height > enemy.y) {
                
                const isStomping = player.velocityY > 0 && player.y + player.height < enemy.y + 20;

                if (isStomping) {
                     vibrate(100);
                     if (!enemyDefeatSynth) {
                        enemyDefeatSynth = new Tone.NoiseSynth({ noise: { type: 'white' }, envelope: { attack: 0.005, decay: 0.15, sustain: 0 } }).toDestination();
                     }
                     if (Tone.context.state !== 'running') Tone.context.resume();
                     enemyDefeatSynth.triggerAttackRelease("16n");

                     enemy.defeatState = 'stunned';
                     enemy.defeatTimer = 20;
                     enemy.speed = 0;

                     player.velocityY = -8;
                } else {
                    player.takeDamage();
                }
            }
        });

        stars.forEach((star, index) => {
            if (player.x < star.x + star.width &&
                player.x + player.width > star.x &&
                player.y < star.y + star.height &&
                player.y + player.height > star.y) {
                
                vibrate(75);
                stars.splice(index, 1);
                score++;

                if (!rewardSynth) {
                    rewardSynth = new Tone.Synth({
                        oscillator: { type: 'triangle8' },
                        envelope: { attack: 0.01, decay: 0.2, sustain: 0.2, release: 0.2 },
                        volume: -8
                    }).toDestination();
                }
                 if (Tone.context.state !== 'running') Tone.context.resume();
                const now = Tone.now();
                rewardSynth.triggerAttackRelease("C5", "16n", now);
                rewardSynth.triggerAttackRelease("E5", "16n", now + 0.1);
                rewardSynth.triggerAttackRelease("G5", "16n", now + 0.2);
                
                updateUI();
            }
        });

        water.forEach(w => {
            if (player.x + player.width > w.x &&
                player.x < w.x + w.width &&
                player.y + player.height > w.y) {
                
                if (!splashSynth) {
                    splashSynth = new Tone.NoiseSynth({
                        noise: { type: 'white' },
                        envelope: { attack: 0.005, decay: 0.2, sustain: 0 }
                    }).toDestination();
                }
                if (Tone.context.state !== 'running') Tone.context.resume();
                splashSynth.triggerAttackRelease("8n");
                
                player.takeDamage(true);
            }
        });
        
        scenery.forEach(s => {
            if (s.type === 'selfieSpot') {
                if (player.x < s.x + s.width &&
                    player.x + player.width > s.x &&
                    player.y < s.y + s.height &&
                    player.y + player.height > s.y) {
                    winGame();
                }
            }
        });
    }
    
    function updateCamera() {
        let targetX = player.x - gameWidth / 3;
        camera.x += (targetX - camera.x) * 0.1;

        // --- NEW: Vertical Camera Movement ---
        let targetY = player.y - gameHeight / 2;
        camera.y += (targetY - camera.y) * 0.1;
        // --- END NEW ---

        if (camera.x < 0) camera.x = 0;
        if (camera.x > worldWidth - gameWidth) camera.x = worldWidth - gameWidth;
        
        // --- NEW: Clamp Vertical Camera ---
        // Prevent camera from moving down past the starting ground level
        if (camera.y > 0) camera.y = 0;
        // --- END NEW ---
    }

    function updateUI() {
        document.querySelector('#dewdrops-ui span').textContent = score;
        document.querySelector('#level-ui span').textContent = level;
    }
    
    function showModal(title, message, showNextLevel, showRestart, selfieSrc) {
        modalTitle.textContent = title;
        modalMessage.textContent = message;
        nextLevelButton.style.display = showNextLevel ? 'inline-block' : 'none';
        restartButton.style.display = showRestart ? 'inline-block' : 'none';
        
        if (selfieSrc && selfieImages[level] && selfieImages[level].loaded) {
            modalSelfieImage.src = selfieSrc;
            modalSelfieImage.classList.remove('hidden');
        } else {
            modalSelfieImage.classList.add('hidden');
            modalSelfieImage.src = '';
        }

        modal.style.display = 'block';
    }

    function showLevelStartMessage(levelNum) {
        const levelInfo = levelData[levelNum];
        if (!levelInfo) return;
        
        levelStartDisplay.textContent = `Level ${levelNum}: ${levelInfo.name}`;
        
        levelStartDisplay.classList.remove('level-start-animate');
        void levelStartDisplay.offsetWidth; 
        levelStartDisplay.classList.add('level-start-animate');
    }

    function setupLevelSelector(container) {
        container.innerHTML = '';
        Object.keys(levelData).forEach(levelNum => {
            const button = document.createElement('button');
            button.textContent = levelData[levelNum].name;
            button.className = 'bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition-colors px-4 py-2';
            button.addEventListener('click', () => {
                startGame(parseInt(levelNum));
            });
            container.appendChild(button);
        });
    }
    
    function winGame() {
        if(isGameOver) return; // Prevent multiple calls
        
        if (!winSynth) {
             const feedbackDelay = new Tone.FeedbackDelay("8n", 0.5).toDestination();
             winSynth = new Tone.FMSynth({
                harmonicity: 2,
                modulationIndex: 10,
                envelope: { attack: 0.01, decay: 0.3, sustain: 0.1, release: 0.4 },
                volume: -10
            }).connect(feedbackDelay);
        }
        if (Tone.context.state !== 'running') Tone.context.resume();
        const now = Tone.now();
        winSynth.triggerAttackRelease("C5", "16n", now);
        winSynth.triggerAttackRelease("E5", "16n", now + 0.1);
        winSynth.triggerAttackRelease("G5", "16n", now + 0.2);
        winSynth.triggerAttackRelease("C6", "8n", now + 0.3);

        vibrate([100, 100, 100, 100, 100]);
        isGameOver = true;
        const totalLevels = Object.keys(levelData).length;
        const currentLevelInfo = levelData[level];

        if (level < totalLevels) {
            showModal(`Level Complete!`, `You've conquered ${currentLevelInfo.name}!`, true, true, currentLevelInfo.selfieSrc);
        } else {
            showModal('You Win!', `You finished the adventure with ${score} stars!`, false, true, currentLevelInfo.selfieSrc);
        }
    }

    function gameLoop() {
        // Always request the next frame to keep the loop alive.
        requestAnimationFrame(gameLoop);

        // But only run the game logic if not paused or game over.
        if (isPaused || isGameOver) {
            return;
        }
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawBackground();
        
        player.update();
        updateCamera();
        
        ctx.save();
        ctx.translate(-camera.x * 0.5, -camera.y * 0.5); 
        clouds.forEach(c => c.draw());
        ctx.restore();
        
        ctx.save();
        ctx.translate(-camera.x, -camera.y);

        scenery.forEach(s => s.draw());

        water.forEach(w => w.update());
        water.forEach(w => w.draw());

        boats.forEach(b => b.update());
        boats.forEach(b => b.draw());

        platforms.forEach(p => {
            if (p.update) {
                p.update();
            }
        });
        platforms.forEach(p => p.draw());
        stars.forEach(d => d.update());
        stars.forEach(d => d.draw());

        spitballs.forEach(s => s.update());
        spitballs.forEach(s => s.draw());

        pooProjectiles.forEach(p => p.update());
        pooProjectiles.forEach(p => p.draw());

        for (let i = enemies.length - 1; i >= 0; i--) {
            const enemy = enemies[i];
            enemy.update();
            if (enemy.y > gameHeight + 50) { // Add a buffer
                enemies.splice(i, 1);
            }
        }
        enemies.forEach(e => e.draw());
        player.draw();

        ctx.restore();

        checkCollisions();
    }

    window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
        if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
        if (e.key === 'ArrowUp') {
            e.preventDefault();
            player.jump();
        };
        if (e.key === ' ') {
            e.preventDefault();
            keys.shift = true;
        }
    });

    window.addEventListener('keyup', (e) => {
        if (e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
        if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = false;
        if (e.key === ' ') keys.shift = false;
    });
    
    // --- REFACTORED TOUCH CONTROLS ---
    const touchLeft = document.getElementById('touch-left');
    const touchRight = document.getElementById('touch-right');
    const touchJump = document.getElementById('touch-jump');
    const touchDash = document.getElementById('touch-dash');

    // Left Button
    touchLeft.addEventListener('touchstart', e => { e.preventDefault(); keys.left = true; }, { passive: false });
    touchLeft.addEventListener('touchend', e => { e.preventDefault(); keys.left = false; }, { passive: false });
    touchLeft.addEventListener('touchcancel', e => { e.preventDefault(); keys.left = false; }, { passive: false });

    // Right Button
    touchRight.addEventListener('touchstart', e => { e.preventDefault(); keys.right = true; }, { passive: false });
    touchRight.addEventListener('touchend', e => { e.preventDefault(); keys.right = false; }, { passive: false });
    touchRight.addEventListener('touchcancel', e => { e.preventDefault(); keys.right = false; }, { passive: false });

    // Dash Button
    touchDash.addEventListener('touchstart', e => { e.preventDefault(); keys.shift = true; }, { passive: false });
    touchDash.addEventListener('touchend', e => { e.preventDefault(); keys.shift = false; }, { passive: false });
    touchDash.addEventListener('touchcancel', e => { e.preventDefault(); keys.shift = false; }, { passive: false });

    // Jump Button (only needs touchstart as it's a single action)
    touchJump.addEventListener('touchstart', e => { e.preventDefault(); player.jump(); }, { passive: false });
    
    // --- END REFACTORED CONTROLS ---

    nextLevelButton.addEventListener('click', () => {
        level++;
        startGame(level);
    });

    restartButton.addEventListener('click', () => {
        score = 0;
        startGame(level);
    });
    window.addEventListener('resize', resizeCanvas);
    
    firstTimeInit();

</script>
