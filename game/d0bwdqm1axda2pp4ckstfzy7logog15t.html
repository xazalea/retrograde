    font-size: 1.8rem;
    font-weight: 900;
    color: #0080ff;
    text-shadow: 0 0 20px #0080ff, 0 0 40px #0080ff;
    margin-bottom: 25px;
    animation: winnerPulse 2s ease-in-out infinite;

    0%, 100% { 
        transform: scale(1);
        text-shadow: 0 0 20px #0080ff, 0 0 40px #0080ff;
    }
    50% { 
        transform: scale(1.05);

    }

.score-breakdown {
    display: flex;
    flex-direction: column;
    gap: 15px;
    width: 100%;
}

.player-score {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
    border-radius: 8px;
    border: 2px solid;
    background: rgba(0, 17, 34, 0.6);
    transition: all 0.3s ease;
}

.player-1-score {
    border-color: #0080ff;
    box-shadow: 0 0 15px rgba(0, 128, 255, 0.4);
}

.player-2-score {
    border-color: #8000ff;
    box-shadow: 0 0 15px rgba(128, 0, 255, 0.4);
}

.player-score:hover {
    transform: translateY(-2px);
}

.player-1-score:hover {
    box-shadow: 0 0 25px rgba(0, 128, 255, 0.6);
}

.player-2-score:hover {
    box-shadow: 0 0 25px rgba(128, 0, 255, 0.6);
}

.player-label {
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 1px;
}

.player-1-score .player-label {
    color: #0080ff;
    text-shadow: 0 0 10px rgba(0, 128, 255, 0.5);
}

.player-2-score .player-label {
    color: #8000ff;
    text-shadow: 0 0 10px rgba(128, 0, 255, 0.5);
}

.score-value {
    font-size: 1.2rem;
    font-weight: 900;
}

.player-1-score .score-value {
    color: #00a0ff;
    text-shadow: 0 0 15px rgba(0, 160, 255, 0.6);
}

.player-2-score .score-value {
    color: #a080ff;
    text-shadow: 0 0 15px rgba(160, 128, 255, 0.6);
}

    <script>
        
        const allSymbols = ['👽', '🛸', '🌌', '⭐', '🛰️', '💫', '🌠', '🚀', '🌙', '🪐', '☄️', '🌕', '👨‍🚀', '🔥', '💎'];
        const symbols = ['👽', '🛸', '🌌', '⭐', '👨‍🚀', '💫', '🌠', '🚀'];
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let totalPairs = 8;
        let moves = 0;
        let gameStarted = false;
        let timer = null;
        let seconds = 0;
        let canFlip = true;
        let isPaused = false;
        let gamePausedTime = 0;
        let pauseStartTime = 0;
        let currentDifficulty = 'easy';
        let isGameActive = false;
        let currentGameMode = 'single'; // 'single' or 'multiplayer'
        let currentPlayer = 1; // 1 or 2
        let player1Score = 0;
        let player2Score = 0;
        
        function isMobileDevice() {
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            const width = window.innerWidth;
            const height = window.innerHeight;
            
            const isTablet = /ipad|tablet|playbook|silk|android(?!.*mobile)/i.test(userAgent.toLowerCase());
            
            if (isTablet) {
                return false;
            }
            
            const isMobile = /android|webos|iphone|ipod|blackberry|iemobile|opera mini/i.test(userAgent.toLowerCase());
            
            const isSmallScreen = width <= 768 || (width <= 1024 && height <= 768);
            
            return isMobile && isSmallScreen;
        }
        
        function checkOrientation() {
            if (!isGameActive) {
                const orientationPopup = document.getElementById('orientationPopup');
                if (orientationPopup) {
                    orientationPopup.classList.remove('show');
                }
                return;
            }
            
            const orientationPopup = document.getElementById('orientationPopup');
            const orientationStars = document.getElementById('orientationStars');
            const isLandscape = window.innerWidth > window.innerHeight;
            const isMobile = isMobileDevice();
            
            if (isLandscape && isMobile) {
                if (orientationPopup) {
                    orientationPopup.classList.add('show');
                    
                    if (orientationStars) {
                        orientationStars.innerHTML = '';
                        for (let i = 0; i < 80; i++) {
                            const star = document.createElement('div');
                            star.className = 'orientation-star';
                            star.style.left = Math.random() * 100 + '%';
                            star.style.top = Math.random() * 100 + '%';
                            star.style.animationDelay = Math.random() * 2 + 's';
                            star.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
                            orientationStars.appendChild(star);
                        }
                    }
                }
            } else {
                if (orientationPopup) {
                    orientationPopup.classList.remove('show');
                }
            }
        }
        
        window.addEventListener('orientationchange', checkOrientation);
        window.addEventListener('resize', checkOrientation);
        
        
        function showMenu() {
            const menuScreen = document.getElementById('menuScreen');
            menuScreen.classList.remove('hidden');
            
            const menuStars = document.getElementById('menuStars');
            if (menuStars) {
                menuStars.innerHTML = '';
                menuStars.style.animation = 'none';
                setTimeout(() => {
                    menuStars.style.animation = 'starsExpand 1.2s ease-out';
                }, 10);
                for (let i = 0; i < 60; i++) {
                    const star = document.createElement('div');
                    star.className = 'menu-star';
                    star.style.left = Math.random() * 100 + '%';
                    star.style.top = Math.random() * 100 + '%';
                    star.style.animationDelay = Math.random() * 2 + 's';
                    star.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
                    menuStars.appendChild(star);
                }
            }
            
            const menuLogo = document.querySelector('.menu-logo');
            if (menuLogo) {
                menuLogo.classList.remove('neon-flicker', 'neon-flicker-strong');
                
                const flickerCount = 4;
                const flickerTimes = [];
                for (let i = 0; i < flickerCount; i++) {
                    const randomTime = Math.random() * 10000 + 2000; //  2s , 10s
                    flickerTimes.push(randomTime);
                }
                flickerTimes.sort((a, b) => a - b);
                
                flickerTimes.forEach((time) => {
                    setTimeout(() => {
                        menuLogo.classList.add('neon-flicker');
                        setTimeout(() => {
                            menuLogo.classList.remove('neon-flicker');
                            menuLogo.classList.add('neon-flicker-strong');
                            setTimeout(() => {
                                menuLogo.classList.remove('neon-flicker-strong');
                            }, 200 + Math.random() * 300);
                        }, 100 + Math.random() * 200);
                    }, time);
                });
                
                setInterval(() => {
                    if (Math.random() > 0.95) {
                        menuLogo.style.transform = `translateX(${Math.random() * 4 - 2}px)`;
                        setTimeout(() => {
                            menuLogo.style.transform = 'translateX(0)';
                        }, 50);
                    }
                }, 100);
            }
        }
        
        function selectMode(mode) {
            currentGameMode = mode;
            currentPlayer = 1;
            player1Score = 0;
            player2Score = 0;
            
            const menuScreen = document.getElementById('menuScreen');
            const difficultyScreen = document.getElementById('difficultyScreen');
            
            menuScreen.classList.add('hidden');
            difficultyScreen.classList.add('show');
            
            window.adsEnabled = true;
            
            if (typeof sdk !== 'undefined' && sdk.showBanner !== 'undefined') {
                sdk.showBanner();
            } else {
                setTimeout(() => {
                    if (window.adsEnabled && typeof sdk !== 'undefined' && sdk.showBanner !== 'undefined') {
                        sdk.showBanner();
                    }
                }, 200);
            }
            
            const difficultyStars = document.getElementById('difficultyStars');
            if (difficultyStars) {
                difficultyStars.innerHTML = '';
                for (let i = 0; i < 60; i++) {
                    const star = document.createElement('div');
                    star.className = 'menu-star';
                    star.style.left = Math.random() * 100 + '%';
                    star.style.top = Math.random() * 100 + '%';
                    star.style.animationDelay = Math.random() * 2 + 's';
                    star.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
                    difficultyStars.appendChild(star);
                }
            }
        }
        
        function returnToMenuFromDifficulty() {
            const menuScreen = document.getElementById('menuScreen');
            const difficultyScreen = document.getElementById('difficultyScreen');
            
            window.adsEnabled = false;
            isGameActive = false;
            checkOrientation();
            
            difficultyScreen.classList.remove('show');
            menuScreen.classList.remove('hidden');
        }
        
        function selectDifficulty(difficulty) {
            currentDifficulty = difficulty;
            
            const difficultyScreen = document.getElementById('difficultyScreen');
            const gameContainer = document.getElementById('gameContainer');
            
            difficultyScreen.classList.remove('show');
            gameContainer.classList.add('show');
            
            isGameActive = true;
            checkOrientation();
            
            const starsContainer = document.getElementById('stars');
            starsContainer.innerHTML = '';
            for (let i = 0; i < 80; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 1.5 + 's';
                starsContainer.appendChild(star);
            }
            
            initGame();
        }
        
        function returnToMenu() {
            const gameContainer = document.getElementById('gameContainer');
            const menuScreen = document.getElementById('menuScreen');
            const difficultyScreen = document.getElementById('difficultyScreen');
            
            window.adsEnabled = false;
            isGameActive = false;
            checkOrientation();
            
            if (timer) {
                clearInterval(timer);
                timer = null;
            }
            
            gameContainer.classList.remove('show');
            if (difficultyScreen) difficultyScreen.classList.remove('show');
            menuScreen.classList.remove('hidden');
            
            initGame();
        }
        
        
        function pauseGame() {
            if (isPaused) return;
            isPaused = true;
            pauseStartTime = Date.now();
            
            if (timer) {
                clearInterval(timer);
                gamePausedTime += seconds;
            }
            
            canFlip = false;
        }
        
        function resumeGame() {
            if (!isPaused) return;
            isPaused = false;
            
            if (gameStarted) {
                timer = setInterval(updateTimer, 1000);
            }
            
            canFlip = true;
        }
        
        function updatePlayerIndicator() {
            if (currentGameMode !== 'multiplayer') return;
            
            const currentPlayerLabel = document.getElementById('currentPlayerLabel');
            const currentPlayerValue = document.getElementById('currentPlayerValue');
            const playerIndicator = document.getElementById('playerIndicator');
            const gameRight = document.getElementById('gameRight');
            
            if (currentPlayerLabel) {
                currentPlayerLabel.textContent = `Player ${currentPlayer}`;
            }
            
            if (currentPlayerValue) {
                currentPlayerValue.textContent = 'Turn';
                currentPlayerValue.style.color = currentPlayer === 1 ? '#0080ff' : '#8000ff';
            }
            
            if (playerIndicator) {
                if (currentPlayer === 2) {
                    playerIndicator.style.background = 'rgba(128, 0, 255, 0.1)';
                    playerIndicator.style.border = '1px solid rgba(128, 0, 255, 0.3)';
                } else {
                    playerIndicator.style.background = 'rgba(0, 128, 255, 0.1)';
                    playerIndicator.style.border = '1px solid rgba(0, 128, 255, 0.3)';
                }
            }
            
            if (gameRight) {
                if (currentPlayer === 2) {
                    gameRight.classList.add('player-2-turn');
                } else {
                    gameRight.classList.remove('player-2-turn');
                }
            }
            
            updatePlanetColor();
            
            updateCardsColor();
        }
        
        function updateCardsColor() {
            if (currentGameMode !== 'multiplayer') {
                const allCards = document.querySelectorAll('.card');
                allCards.forEach(card => {
                    if (!card.classList.contains('matched') && !card.id) {
                        card.classList.remove('player-1-turn', 'player-2-turn');
                    }
                });
                return;
            }
            
            const allCards = document.querySelectorAll('.card');
            allCards.forEach(card => {
                if (card.classList.contains('matched') || card.id === 'holographicPlanet') {
                    return;
                }
                
                card.classList.remove('player-1-turn', 'player-2-turn');
                
                if (currentPlayer === 2) {
                    card.classList.add('player-2-turn');
                } else {
                    card.classList.add('player-1-turn');
                }
            });
        }
        
        function updatePlanetColor() {
            const planet = document.getElementById('holographicPlanet');
            if (!planet) return;
            
            const isMobile = window.innerWidth <= 600;
            const isHardMobile = currentDifficulty === 'hard' && isMobile;
            
            const planetInner = document.getElementById('planetInner');
            const planetDetail1 = document.getElementById('planetDetail1');
            const planetDetail2 = document.getElementById('planetDetail2');
            
            if (!planetInner) return;
            
            if (!isHardMobile || currentGameMode !== 'multiplayer') {
                planetInner.style.background = 'radial-gradient(circle at 30% 30%, rgba(0, 191, 255, 0.8) 0%, rgba(0, 128, 255, 0.6) 40%, rgba(0, 64, 128, 0.4) 100%)';
                planetInner.style.boxShadow = '0 0 30px rgba(0, 191, 255, 0.9), 0 0 60px rgba(0, 128, 255, 0.6), inset -20px -20px 40px rgba(0, 64, 128, 0.5), inset 20px 20px 40px rgba(0, 191, 255, 0.3)';
                if (planetDetail1) {
                    planetDetail1.style.background = 'rgba(0, 191, 255, 0.4)';
                    planetDetail1.style.boxShadow = '0 0 10px rgba(0, 191, 255, 0.6)';
                }
                if (planetDetail2) {
                    planetDetail2.style.background = 'rgba(0, 128, 255, 0.3)';
                    planetDetail2.style.boxShadow = '0 0 8px rgba(0, 128, 255, 0.5)';
                }
                return;
            }
            
            if (currentPlayer === 2) {
                planetInner.style.background = 'radial-gradient(circle at 30% 30%, rgba(128, 0, 255, 0.8) 0%, rgba(96, 0, 204, 0.6) 40%, rgba(64, 0, 128, 0.4) 100%)';
                planetInner.style.boxShadow = '0 0 30px rgba(128, 0, 255, 0.9), 0 0 60px rgba(96, 0, 204, 0.6), inset -20px -20px 40px rgba(64, 0, 128, 0.5), inset 20px 20px 40px rgba(128, 0, 255, 0.3)';
                if (planetDetail1) {
                    planetDetail1.style.background = 'rgba(128, 0, 255, 0.4)';
                    planetDetail1.style.boxShadow = '0 0 10px rgba(128, 0, 255, 0.6)';
                }
                if (planetDetail2) {
                    planetDetail2.style.background = 'rgba(96, 0, 204, 0.3)';
                    planetDetail2.style.boxShadow = '0 0 8px rgba(96, 0, 204, 0.5)';
                }
            } else {
                planetInner.style.background = 'radial-gradient(circle at 30% 30%, rgba(0, 191, 255, 0.8) 0%, rgba(0, 128, 255, 0.6) 40%, rgba(0, 64, 128, 0.4) 100%)';
                planetInner.style.boxShadow = '0 0 30px rgba(0, 191, 255, 0.9), 0 0 60px rgba(0, 128, 255, 0.6), inset -20px -20px 40px rgba(0, 64, 128, 0.5), inset 20px 20px 40px rgba(0, 191, 255, 0.3)';
                if (planetDetail1) {
                    planetDetail1.style.background = 'rgba(0, 191, 255, 0.4)';
                    planetDetail1.style.boxShadow = '0 0 10px rgba(0, 191, 255, 0.6)';
                }
                if (planetDetail2) {
                    planetDetail2.style.background = 'rgba(0, 128, 255, 0.3)';
                    planetDetail2.style.boxShadow = '0 0 8px rgba(0, 128, 255, 0.5)';
                }
            }
        }
        
        function updateStats() {
            const movesDisplay = document.getElementById('movesDisplay');
            const pairsDisplay = document.getElementById('pairsDisplay');
            const timeDisplay = document.getElementById('timeDisplay');
            
            if (movesDisplay) movesDisplay.textContent = moves;
            if (pairsDisplay) {
                if (currentGameMode === 'multiplayer') {
                    pairsDisplay.textContent = `${player1Score + player2Score}/${totalPairs}`;
                } else {
                    pairsDisplay.textContent = `${matchedPairs}/${totalPairs}`;
                }
            }
            
            if (timeDisplay) {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                timeDisplay.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
            }
            
            if (currentGameMode === 'multiplayer') {
                const player1ScoreDisplay = document.getElementById('player1ScoreDisplay');
                const player2ScoreDisplay = document.getElementById('player2ScoreDisplay');
                if (player1ScoreDisplay) player1ScoreDisplay.textContent = player1Score;
                if (player2ScoreDisplay) player2ScoreDisplay.textContent = player2Score;
                updatePlayerIndicator();
            }
        }
        
        function initGame() {
            const board = document.getElementById('gameBoard');
            const gameRight = document.getElementById('gameRight');
            board.innerHTML = '';
            
            if (gameRight) {
                gameRight.classList.remove('player-2-turn');
            }
            
            board.classList.remove('difficulty-easy', 'difficulty-medium', 'difficulty-hard');
            
            let gameSymbols = [];
            let cols = 4;
            
            if (currentDifficulty === 'easy') {
                gameSymbols = symbols.slice(0, 8);
                totalPairs = 8;
                cols = 4;
                board.classList.add('difficulty-easy');
            } else if (currentDifficulty === 'medium') {
                gameSymbols = allSymbols.slice(0, 10);
                totalPairs = 10;
                cols = 4;
                board.classList.add('difficulty-medium');
            } else if (currentDifficulty === 'hard') {
                gameSymbols = allSymbols.slice(0, 12);
                totalPairs = 12;
                cols = 6;
                board.classList.add('difficulty-hard');
            }
            
            cards = [...gameSymbols, ...gameSymbols];
            cards.sort(() => Math.random() - 0.5);
            
            flippedCards = [];
            matchedPairs = 0;
            moves = 0;
            seconds = 0;
            gameStarted = false;
            canFlip = true;
            isPaused = false;
            gamePausedTime = 0;
            pauseStartTime = 0;
            
            if (currentGameMode === 'multiplayer') {
                currentPlayer = 1;
                player1Score = 0;
                player2Score = 0;
            }
            
            if (timer) clearInterval(timer);
            
            document.getElementById('message').classList.remove('show');
            
            const playerIndicator = document.getElementById('playerIndicator');
            const multiplayerScores = document.getElementById('multiplayerScores');
            const movesStatItem = document.getElementById('movesStatItem');
            const pairsStatItem = document.getElementById('pairsStatItem');
            const timeStatItem = document.getElementById('timeStatItem');
            
            if (currentGameMode === 'multiplayer') {
                if (playerIndicator) playerIndicator.style.display = 'flex';
                if (multiplayerScores) multiplayerScores.style.display = 'block';
                if (movesStatItem) movesStatItem.style.display = 'none';
                if (pairsStatItem) pairsStatItem.style.display = 'none';
                if (timeStatItem) timeStatItem.style.display = 'none';
                updatePlayerIndicator();
            } else {
                if (playerIndicator) playerIndicator.style.display = 'none';
                if (multiplayerScores) multiplayerScores.style.display = 'none';
                if (movesStatItem) movesStatItem.style.display = 'flex';
                if (pairsStatItem) pairsStatItem.style.display = 'flex';
                if (timeStatItem) timeStatItem.style.display = 'flex';
            }
            
            updateStats();
            
            const isMobile = window.innerWidth <= 600;
            const isHardMobile = currentDifficulty === 'hard' && isMobile;
            
            if (isHardMobile) {
                const totalSlots = 25; 
                const centerIndex = 12; 
                const cornerIndex = 24; 
                
                const cardElements = [];
                cards.forEach((symbol, index) => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="card-front"></div>
                        <div class="card-back">${symbol}</div>
                    `;
                    const cardIndex = index;
                    card.addEventListener('click', () => flipCard(card, cardIndex));
                    card.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        flipCard(card, cardIndex);
                    }, { passive: false });
                    cardElements.push(card);
                });
                
                for (let i = 0; i < totalSlots; i++) {
                    if (i === centerIndex) {
                        const holographicPlanet = document.createElement('div');
                        holographicPlanet.id = 'holographicPlanet';
                        holographicPlanet.style.cssText = 'position: relative; pointer-events: none; background: transparent; border: none; box-shadow: none; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;';
                        holographicPlanet.innerHTML = `
                            <div id="planetInner" style="width: 70%; height: 70%; position: relative; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(0, 191, 255, 0.8) 0%, rgba(0, 128, 255, 0.6) 40%, rgba(0, 64, 128, 0.4) 100%); box-shadow: 0 0 30px rgba(0, 191, 255, 0.9), 0 0 60px rgba(0, 128, 255, 0.6), inset -20px -20px 40px rgba(0, 64, 128, 0.5), inset 20px 20px 40px rgba(0, 191, 255, 0.3); animation: holographicGlow 3s ease-in-out infinite;">
                                <div id="planetDetail1" style="position: absolute; top: 20%; left: 30%; width: 15%; height: 15%; background: rgba(0, 191, 255, 0.4); border-radius: 50%; box-shadow: 0 0 10px rgba(0, 191, 255, 0.6);"></div>
                                <div id="planetDetail2" style="position: absolute; bottom: 25%; right: 20%; width: 20%; height: 20%; background: rgba(0, 128, 255, 0.3); border-radius: 50%; box-shadow: 0 0 8px rgba(0, 128, 255, 0.5);"></div>
                            </div>
                            <style>
                                @keyframes holographicGlow {
                                    0%, 100% { 
                                        box-shadow: 0 0 30px rgba(0, 191, 255, 0.9), 0 0 60px rgba(0, 128, 255, 0.6), inset -20px -20px 40px rgba(0, 64, 128, 0.5), inset 20px 20px 40px rgba(0, 191, 255, 0.3);
                                        opacity: 0.9;
                                    }
                                    50% { 
                                        box-shadow: 0 0 40px rgba(0, 191, 255, 1), 0 0 80px rgba(0, 128, 255, 0.8), inset -20px -20px 40px rgba(0, 64, 128, 0.5), inset 20px 20px 40px rgba(0, 191, 255, 0.5);
                                        opacity: 1;
                                    }
                                }
                            </style>
                        `;
                        board.appendChild(holographicPlanet);
                    } else if (i === cornerIndex) {
                        board.appendChild(cardElements[centerIndex]);
                    } else {
                        let cardArrayIndex;
                        if (i < centerIndex) {
                            cardArrayIndex = i;
                        } else {
                            cardArrayIndex = i;
                        }
                        board.appendChild(cardElements[cardArrayIndex]);
                    }
                }
            } else {
            cards.forEach((symbol, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-front"></div>
                    <div class="card-back">${symbol}</div>
                `;
                card.addEventListener('click', () => flipCard(card, index));
                card.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    flipCard(card, index);
                }, { passive: false });
                board.appendChild(card);
            });
            }
            
            setTimeout(() => {
                updatePlanetColor();
                updateCardsColor();
            }, 100);
        }
        
        function flipCard(card, index) {
            if (!canFlip || card.classList.contains('flipped') || card.classList.contains('matched')) return;
            
            if (!gameStarted) {
                gameStarted = true;
                timer = setInterval(updateTimer, 1000);
            }
            
            card.classList.add('flipped');
            flippedCards.push({ card, index, symbol: cards[index], player: currentPlayer });
            
            if (flippedCards.length === 2) {
                moves++;
                updateStats();
                canFlip = false;
                
                const [first, second] = flippedCards;
                const playerWhoFound = currentGameMode === 'multiplayer' ? currentPlayer : null;
                
                if (first.symbol === second.symbol) {
                    if (currentGameMode === 'multiplayer') {
                        if (playerWhoFound === 1) {
                            player1Score++;
                        } else if (playerWhoFound === 2) {
                            player2Score++;
                        }
                    matchedPairs++;
                    } else {
                        matchedPairs++;
                    }
                    updateStats();
                    
                    setTimeout(() => {
                        first.card.classList.add('matched');
                        second.card.classList.add('matched');
                        
                        if (currentGameMode === 'multiplayer' && playerWhoFound) {
                            if (playerWhoFound === 2) {
                                const purpleColor = '#8000ff';
                                const defaultBgGradient = 'linear-gradient(145deg, #012 0, #000 100%)';
                                
                                first.card.classList.add(`player-${playerWhoFound}-match`);
                                second.card.classList.add(`player-${playerWhoFound}-match`);
                                
                                first.card.style.borderColor = purpleColor;
                                second.card.style.borderColor = purpleColor;
                                first.card.style.boxShadow = `0 0 25px ${purpleColor}, inset 0 0 20px rgba(128, 0, 255, 0.3)`;
                                second.card.style.boxShadow = `0 0 25px ${purpleColor}, inset 0 0 20px rgba(128, 0, 255, 0.3)`;
                                
                                const firstCardBack = first.card.querySelector('.card-back');
                                const secondCardBack = second.card.querySelector('.card-back');
                                if (firstCardBack) {
                                    firstCardBack.style.background = defaultBgGradient;
                                    firstCardBack.style.borderColor = purpleColor;
                                    firstCardBack.style.boxShadow = `0 0 20px ${purpleColor}, inset 0 0 15px rgba(128, 0, 255, 0.4)`;
                                }
                                if (secondCardBack) {
                                    secondCardBack.style.background = defaultBgGradient;
                                    secondCardBack.style.borderColor = purpleColor;
                                    secondCardBack.style.boxShadow = `0 0 20px ${purpleColor}, inset 0 0 15px rgba(128, 0, 255, 0.4)`;
                                }
                            } else {
                                first.card.classList.add(`player-${playerWhoFound}-match`);
                                second.card.classList.add(`player-${playerWhoFound}-match`);
                            }
                            
                            first.card.setAttribute('data-player', playerWhoFound);
                            second.card.setAttribute('data-player', playerWhoFound);
                        }
                        
                        flippedCards = [];
                        canFlip = true;
                        
                        const totalMatched = currentGameMode === 'multiplayer' ? (player1Score + player2Score) : matchedPairs;
                        if (totalMatched === totalPairs) {
                            endGame();
                        } else if (currentGameMode === 'multiplayer') {
                            updatePlayerIndicator();
                        }
                    }, 300);
                } else {
                    setTimeout(() => {
                        first.card.classList.remove('flipped');
                        second.card.classList.remove('flipped');
                        flippedCards = [];
                        canFlip = true;
                        
                        if (currentGameMode === 'multiplayer') {
                            currentPlayer = currentPlayer === 1 ? 2 : 1;
                            updatePlayerIndicator();
                        }
                    }, 1000);
                }
            }
        }
        
        function updateTimer() {
            if (!isPaused) {
                seconds++;
                updateStats();
            }
        }
        
        function endGame() {
            clearInterval(timer);
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            
            const finalStats = document.getElementById('finalStats');
            if (currentGameMode === 'multiplayer') {
                let winnerText = '';
                if (player1Score > player2Score) {
                    winnerText = `
                        <div class="winner-announcement">🏆 Player 1 Wins! 🏆</div>
                        <div class="score-breakdown">
                            <div class="player-score player-1-score">
                                <span class="player-label">Player 1</span>
                                <span class="score-value">${player1Score} pairs</span>
                            </div>
                            <div class="player-score player-2-score">
                                <span class="player-label">Player 2</span>
                                <span class="score-value">${player2Score} pairs</span>
                            </div>
                        </div>
                    `;
                } else if (player2Score > player1Score) {
                    winnerText = `
                        <div class="winner-announcement">🏆 Player 2 Wins! 🏆</div>
                        <div class="score-breakdown">
                            <div class="player-score player-1-score">
                                <span class="player-label">Player 1</span>
                                <span class="score-value">${player1Score} pairs</span>
                            </div>
                            <div class="player-score player-2-score">
                                <span class="player-label">Player 2</span>
                                <span class="score-value">${player2Score} pairs</span>
                            </div>
                        </div>
                    `;
                } else {
                    winnerText = `
                        <div class="winner-announcement">🤝 It's a Tie! 🤝</div>
                        <div class="score-breakdown">
                            <div class="player-score player-1-score">
                                <span class="player-label">Player 1</span>
                                <span class="score-value">${player1Score} pairs</span>
                            </div>
                            <div class="player-score player-2-score">
                                <span class="player-label">Player 2</span>
                                <span class="score-value">${player2Score} pairs</span>
                            </div>
                        </div>
                    `;
                }
                if (finalStats) finalStats.innerHTML = winnerText;
            } else {
                if (finalStats) finalStats.textContent = `You completed the game!`;
            }
            
            document.getElementById('message').classList.add('show');
        }
            document.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                return false;
            });

            document.addEventListener('selectstart', function(e) {
                e.preventDefault();
                return false;
            });

            document.addEventListener('dragstart', function(e) {
                e.preventDefault();
                return false;
            });
    </script>
    <script src="scripts/scripts.js"></script>
</body>
</html>
