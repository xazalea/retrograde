      <canvas id="unity-canvas" width="800" height="600" tabindex="-1"></canvas>

    <script>
      (function () {
        const canvas = document.getElementById('unity-canvas');
        const container = document.getElementById('unity-container');
        const loading = document.getElementById('unity-loading-bar');
  const designWidth = canvas.width || 960;
  const designHeight = canvas.height || 600;
  // Scale behavior: 'contain' (letterbox), 'cover' (fill & crop), 'stretch' (fill & distort)
  const SCALE_MODE = (new URLSearchParams(location.search).get('scale') || 'contain').toLowerCase();

        // Unity instance handle so we can update back-buffer size (prevents blurriness)
        let unityInstance = null;

        function resize() {
          const w = container.clientWidth || window.innerWidth;
          const h = container.clientHeight || window.innerHeight;

          let cssW = w;
          let cssH = h;
          if (SCALE_MODE === 'contain' || SCALE_MODE === 'cover') {
            const scale = (SCALE_MODE === 'contain')
              ? Math.min(w / designWidth, h / designHeight)
              : Math.max(w / designWidth, h / designHeight);
            cssW = Math.max(1, Math.floor(designWidth * scale));
            cssH = Math.max(1, Math.floor(designHeight * scale));
          }

          // Size the canvas; flexbox centers it within the container
          canvas.style.width = cssW + 'px';
          canvas.style.height = cssH + 'px';
          canvas.style.position = 'relative';

          if (loading) { loading.style.left = '50%'; loading.style.top = '50%'; }

          // If Unity is running, resize the back buffer to match CSS size.
          // Clamp DPR to 1 for performance when embedded; adjust if you prefer sharper rendering.
          if (unityInstance && unityInstance.Module && typeof unityInstance.Module.setCanvasSize === 'function') {
            const dpr = Math.min(1, window.devicePixelRatio || 1);
            const bufferW = Math.max(1, Math.floor(cssW * dpr));
            const bufferH = Math.max(1, Math.floor(cssH * dpr));
            try { unityInstance.Module.setCanvasSize(bufferW, bufferH, false); } catch(e) {}
          }
        }

        // Respond to iframe viewport changes (some hosts don't forward window resize reliably)
        if (typeof ResizeObserver !== 'undefined') {
          const ro = new ResizeObserver(() => resize());
          ro.observe(container);
        }
        window.addEventListener('resize', resize);
        setTimeout(resize, 0);

        createUnityInstance(canvas, {
          arguments: [],
          dataUrl: "Build/a9203706bc8e90bd81e65b1a0ca3ecbc.data.unityweb",
          frameworkUrl: "Build/02a79725eaa13db5ced41aa541e1fc19.framework.js.unityweb",
          codeUrl: "Build/8d8685a92cbfdf40d9bc86487513b4e8.wasm.unityweb",
          streamingAssetsUrl: "StreamingAssets",
          companyName: "QamGames",
          productName: "HotHighway",
          productVersion: "1",
          // Decouple WebGL buffer size from CSS size; we'll set it in resize()
          matchWebGLToCanvasSize: false,
          devicePixelRatio: 1,
          decompressionFallback: true,
        }).then((instance) => {
          if (loading) loading.style.display = 'none';
          // store the instance so resize() can adjust back-buffer size
          unityInstance = instance;
          window.dispatchEvent(new Event('resize'));
        }).catch((message) => {
          alert(message);
        });
      })();
    </script>
