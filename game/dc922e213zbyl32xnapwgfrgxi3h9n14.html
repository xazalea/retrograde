<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>New Mahjong 2026</title>
    <link rel="stylesheet" href="style.css">
    
<script type="text/javascript">
    // --- SETTINGS ---
    const GAME_ID = "dc922e213zbyl32xnapwgfrgxi3h9n14"; 
    const AD_INTERVAL = 90000; // 90 sec

    window.AdManager = {
        lastAdTime: 0,
        adCallback: null,
        isAdPlaying: false,

        // Callbacks to be linked in game.js
        onPause: function() { console.log("Game Paused"); },
        onResume: function() { console.log("Game Resumed"); },

        // Interstitial Ad
        showInterstitial: function(callback) {
            this.adCallback = callback;
            const currentTime = Date.now();

            if (currentTime - this.lastAdTime >= AD_INTERVAL) {
                console.log("Showing Interstitial Ad...");
                if (typeof sdk !== 'undefined' && sdk.showBanner !== 'undefined') {
                    this.lastAdTime = currentTime;
                    sdk.showBanner();
                } else {
                    console.log("SDK not loaded yet");
                    this.completeAd();
                }
            } else {
                console.log("Ad on cooldown.");
                this.completeAd();
            }
        },

        // Rewarded Ad
        showRewarded: function(callback) {
            this.adCallback = callback;
            console.log("Showing Rewarded Ad...");
            if (typeof sdk !== 'undefined' && sdk.showBanner !== 'undefined') {
                sdk.showBanner(); 
            } else {
                console.log("SDK not loaded");
                this.completeAd();
            }
        },

        completeAd: function() {
            if (this.adCallback) {
                this.adCallback();
                this.adCallback = null;
            }
        }
    };

    window.SDK_OPTIONS = {
        gameId: GAME_ID,
        onEvent: function (a) {
            switch (a.name) {
                case "SDK_GAME_PAUSE":
                    window.AdManager.isAdPlaying = true;
                    window.AdManager.onPause(); 
                    break;
                case "SDK_GAME_START":
                    window.AdManager.isAdPlaying = false;
                    window.AdManager.onResume(); 
                    window.AdManager.completeAd(); 
                    break;
                case "SDK_READY":
                    console.log("Game SDK Ready");
                    break;
            }
        }
    };

    (function (a, b, c) {
        var d = a.getElementsByTagName(b)[0];
        a.getElementById(c) || (a = a.createElement(b), a.id = c, a.src = "https://api.gamemonetize.com/sdk.js", d.parentNode.insertBefore(a, d))
    })(document, "script", "gamemonetize-sdk");
</script>
</head>
<body>

<div id="stage">
    <!-- Start Screen -->
    <div id="menu-screen" class="overlay">
        <h1 id="main-title" style="font-size: 110px; color: var(--gold); margin:0; line-height: 1.2;">NEW MAHJONG 2026</h1>
        <p id="save-info" style="font-size: 50px; margin: 50px 0;">LEVEL: 1</p>
        <button id="play-btn" class="big-btn" onclick="handlePlayClick()">PLAY</button>
    </div>

    <!-- Pause Screen -->
    <div id="pause-screen" class="overlay modal-bg" style="display:none">
        <h1 id="pause-title" style="font-size: 130px; color: var(--gold);">PAUSE</h1>
        <button id="resume-btn" class="big-btn" onclick="resumeGame()">RESUME</button>
    </div>

    <!-- Achievements Screen -->
    <div id="achievements-screen" class="overlay modal-bg" style="display:none">
        <h1 id="ach-title" style="font-size: 80px; color: var(--gold); margin-bottom: 20px;">ACHIEVEMENTS</h1>
        <p id="ach-rank" style="font-size: 45px; margin-bottom: 50px;"></p>
        <div class="gift-grid" id="gift-grid"></div>
        <button id="ach-close-btn" class="big-btn" style="margin-top:50px" onclick="closeAch()">CLOSE</button>
    </div>

    <!-- Reward Modal -->
    <div id="reward-modal" class="overlay modal-bg" style="display:none">
        <h1 id="reward-title" style="font-size: 70px; color: var(--gold); margin-bottom: 50px;">NEED HINTS?</h1>
        <div style="display: flex; flex-direction: column; gap: 40px;">
            <button id="reward-ad-btn" class="big-btn" onclick="watchRewardAd()">
                <span id="reward-btn-text">GET +3</span> <span style="font-size: 50px;">📺</span>
            </button>
            <button id="reward-cancel-btn" class="big-btn" style="background: #7f8c8d; border-color: #bdc3c7;" onclick="closeRewardModal()">CANCEL</button>
        </div>
    </div>

    <!-- Tutorial Hint -->
    <div id="tutorial-hint" class="tutorial-text" style="display:none"></div>

    <!-- Top Bar -->
    <div id="header">
        <div id="rank-txt">STUDENT</div>
        <div id="top-row">
            <div id="ui-lvl">LVL 1</div>
            <div id="ui-score">0</div>
        </div>
    </div>

    <div id="play-area"></div>

    <!-- Bottom Tray -->
    <div id="tray-ui">
        <div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div>
        <div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div>
    </div>

    <!-- Control Buttons -->
    <div id="controls">
        <div class="btn" onclick="shuffleBoard()">🔄<div class="badge" id="b-shuf">3</div></div>
        <div class="btn" onclick="getHint()">💡<div class="badge" id="b-hint">3</div></div>
        <div class="btn" onclick="openAch()">🏆</div>
        <div class="btn" onclick="toggleAudio()"><span id="vol-ico">🔊</span></div>
    </div>

    <!-- Win/Lose Screens -->
    <div id="win-screen" class="overlay modal-bg" style="display:none">
        <h1 id="win-title-txt" style="font-size: 80px; color: var(--gold);">VICTORY!</h1>
        <div id="gift-icon">🎁</div>
        <div id="gift-name">Reward</div>
        <button id="next-lvl-btn" class="big-btn" onclick="handleLevelTransition('next')">NEXT</button>
    </div>

    <div id="lose-screen" class="overlay modal-bg" style="display:none">
        <h1 id="lose-title" style="font-size: 100px;">STUCK</h1>
        <button id="retry-btn" class="big-btn" onclick="handleLevelTransition('retry')">RETRY</button>
    </div>
</div>

<script src="game.js"></script>
</body>
</html>
