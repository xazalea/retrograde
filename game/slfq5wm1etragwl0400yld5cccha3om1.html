<style>
:root{ --primary:#3b82f6; --danger:#ef4444; --accent:#f59e0b; --surface:rgba(255,255,255,0.9); }
body{ margin:0; overflow:hidden; font-family:'Inter',sans-serif; background:#000; user-select:none; touch-action:none; }

.wave{ position:absolute; bottom:30vh; width:200%; height:60px; background:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="rgba(255,255,255,0.3)" d="M0,192L48,197.3C96,203,192,213,288,192C384,171,480,117,576,112C672,107,768,149,864,154.7C960,160,1056,128,1152,112C1248,96,1344,96,1392,96L1440,96L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>'); background-repeat: repeat-x; animation: waveFlow 15s linear infinite; z-index:3; }
@keyframes waveFlow{ from{transform:translateX(0);} to{transform:translateX(-50%);} }
.bottle{ position:absolute; cursor:none; z-index:5; filter:drop-shadow(0 15px 12px rgba(0,0,0,0.4)); transition:transform 0.1s ease-out; }
.shard{ position:absolute; pointer-events:none; z-index:6; }
.glass-ui{ background:rgba(255,255,255,0.1); backdrop-filter:blur(16px) saturate(180%); border:1px solid rgba(255,255,255,0.2); box-shadow:0 8px 32px rgba(0,0,0,0.1); border-radius:1.5rem; }
.crosshair-container{ position:fixed; width:80px; height:80px; pointer-events:none; transform:translate(-50%,-50%); z-index:1000; }
@keyframes recoil{ 0%{transform:scale(1);} 50%{transform:scale(0.85);} 100%{transform:scale(1);} }

<div id="modal-container" class="fixed inset-0 bg-slate-950/90 backdrop-blur-xl z-[200] flex items-center justify-center p-6">
    <div id="menu-modal" class="max-w-md w-full text-center">
        <h1 class="text-5xl text-white bungee tracking-wider mb-2">BOTTLE STORM</h1>
        <p class="text-blue-200/50 uppercase tracking-[0.3em] text-xs font-bold mb-12">Tactical Range Simulator</p>
        <button onclick="startGame()" class="w-full bg-white text-slate-950 bungee py-5 rounded-2xl hover:scale-105 active:scale-95">INITIALIZE MISSION</button>

        <div class="flex justify-between items-center mb-6">
            <h2 class="text-3xl text-white bungee">ARSENAL</h2>
            <button onclick="toggleShop(false)" class="text-white/40 hover:text-white">✕</button>
        </div>
        <div id="shop-items" class="flex-1 overflow-y-auto space-y-4 pr-2 custom-scroll"></div>
    </div>

    <div id="over-modal" class="hidden max-w-sm w-full text-center">
        <h1 class="text-4xl text-white bungee mb-2 text-red-500">MISSION FAILED</h1>
        <p id="fail-msg" class="text-slate-400 mb-10">Perimeter security compromised.</p>
        <button onclick="triggerAdAndReload()" class="w-full bg-red-500 text-white bungee py-5 rounded-2xl hover:bg-red-600">RETRY MISSION</button>
    </div>
</div>

<script>
const audioManager=(()=>{
    let ctx=null, masterGain=null, isMuted=false;
    const init=()=>{ if(ctx) return; ctx=new(window.AudioContext||window.webkitAudioContext)(); masterGain=ctx.createGain(); masterGain.connect(ctx.destination); };
    const playSfx=(type)=>{
        if(!ctx||isMuted) return;
        if(ctx.state==='suspended') ctx.resume();
        const osc=ctx.createOscillator();
        const g=ctx.createGain(); g.connect(masterGain); osc.connect(g);
        const now=ctx.currentTime;
        switch(type){
            case 'shoot': osc.type='square'; osc.frequency.setValueAtTime(150,now); osc.frequency.exponentialRampToValueAtTime(40,now+0.1); g.gain.setValueAtTime(0.3,now); g.gain.exponentialRampToValueAtTime(0.01,now+0.1); osc.start(); osc.stop(now+0.1); break;
            case 'break': osc.type='sine'; osc.frequency.setValueAtTime(1200+Math.random()*500,now); osc.frequency.exponentialRampToValueAtTime(100,now+0.2); g.gain.setValueAtTime(0.2,now); g.gain.exponentialRampToValueAtTime(0.01,now+0.2); const bufferSize=ctx.sampleRate*0.1; const buffer=ctx.createBuffer(1,bufferSize,ctx.sampleRate); const data=buffer.getChannelData(0); for(let i=0;i<bufferSize;i++) data[i]=Math.random()*2-1; const noise=ctx.createBufferSource(); noise.buffer=buffer; const noiseGain=ctx.createGain(); noiseGain.gain.setValueAtTime(0.1,now); noiseGain.gain.exponentialRampToValueAtTime(0.01,now+0.15); noise.connect(noiseGain); noiseGain.connect(masterGain); noise.start(); osc.start(); osc.stop(now+0.2); break;
            case 'ui': osc.type='sine'; osc.frequency.setValueAtTime(800,now); g.gain.setValueAtTime(0.1,now); g.gain.exponentialRampToValueAtTime(0.01,now+0.05); osc.start(); osc.stop(now+0.05); break;
        }
    };
    return {init, play:playSfx, mute:(val)=>{isMuted=val; if(masterGain) masterGain.gain.value=val?0:1;}};
})();

const viewport=document.getElementById('game-viewport');
const cursor=document.getElementById('custom-cursor');
const flash=document.getElementById('flash');
const lvlDisplay=document.getElementById('lvl-display');
const lvlProgress=document.getElementById('lvl-progress-circle');
const weapDisplay=document.getElementById('weap-display');
const missText=document.getElementById('miss-text-indicator');

let config={
    level:1, score:0, target:10, missed:0, maxMisses:20,
    gameState:'MENU', isPausedByAd:false, activeBottles:[],
    lastFire:0, screenShake:0, debrisPool:[]
};

const BOTTLE_COLORS=['#22c55e','#ef4444','#3b82f6','#f97316','#a855f7'];
const weapons={
    pistol:{id:'pistol',name:'Pistol Mk1',fireRate:350,recoil:5,unlocked:true,minLevel:1,color:'#60a5fa'},
    smg:{id:'smg',name:'Vector SMG',fireRate:120,recoil:3,unlocked:false,minLevel:3,color:'#f87171'},
    shotgun:{id:'shotgun',name:'Breech-12',fireRate:850,recoil:20,unlocked:false,minLevel:6,color:'#fbbf24'},
    railgun:{id:'railgun',name:'Phase Rail',fireRate:60,recoil:1,unlocked:false,minLevel:12,color:'#a78bfa'},
    nuclear:{id:'nuclear',name:'Atom-Core',fireRate:300,recoil:35,unlocked:false,minLevel:18,color:'#4ade80'}
};
let currentWeapon=weapons.pistol;

window.addEventListener('mousemove',e=>{ cursor.style.left=e.clientX+'px'; cursor.style.top=e.clientY+'px'; });
window.addEventListener('touchmove',e=>{ e.preventDefault(); const t=e.touches[0]; cursor.style.left=t.clientX+'px'; cursor.style.top=t.clientY+'px';},{passive:false});

// --- AD PLACEMENT OPTIMIZED FUNCTIONS ---

function startGame(){ 
    // Impression 1: Mission Initialize par ad
    if(typeof sdk!=='undefined' && sdk.showBanner!=='undefined') sdk.showBanner(); 
    audioManager.init(); audioManager.play('ui'); initGame(); 
}

function triggerAdAndReload(){ 
    // Impression 2: Retry button par ad
    if(typeof sdk!=='undefined' && sdk.showBanner!=='undefined') sdk.showBanner(); 
    setTimeout(()=>location.reload(), 500); 
}

function endGame(msg){
    config.gameState='OVER'; config.activeBottles.forEach(b=>b.el.remove()); config.activeBottles=[];
    
    // Impression 3: Mission fail hote hi background ad
    if(typeof sdk!=='undefined' && sdk.showBanner!=='undefined') sdk.showBanner();

    document.getElementById('fail-msg').innerText=msg;
    document.getElementById('modal-container').classList.remove('hidden'); 
    document.getElementById('over-modal').classList.remove('hidden'); 
    document.getElementById('menu-modal').classList.add('hidden');
}

function nextLevel(){
    config.gameState='WIN'; config.level++;
    config.activeBottles.forEach(b=>b.el.remove()); config.activeBottles=[];
    
    // Impression 4: Level complete hone par ad
    if(typeof sdk!=='undefined' && sdk.showBanner!=='undefined') sdk.showBanner();

    document.getElementById('modal-container').classList.remove('hidden'); 
    document.getElementById('menu-modal').classList.remove('hidden'); 
    document.getElementById('over-modal').classList.add('hidden');
}

// --- GAME LOGIC ---

function toggleShop(show){ 
    audioManager.play('ui'); 
    if(show){ 
        renderShop(); 
        document.getElementById('modal-container').classList.remove('hidden'); 
        document.getElementById('shop-modal').classList.remove('hidden'); 
        document.getElementById('menu-modal').classList.add('hidden'); 
        document.getElementById('over-modal').classList.add('hidden'); 
        config.gameState='PAUSED'; 
    } else{ 
        document.getElementById('modal-container').classList.add('hidden'); 
        document.getElementById('shop-modal').classList.add('hidden'); 
        if(config.activeBottles.length>0) config.gameState='PLAYING'; 
    } 
}

function renderShop(){ 
    const container=document.getElementById('shop-items'); 
    container.innerHTML=''; 
    Object.values(weapons).forEach(w=>{ 
        const isUnlocked=config.level>=w.minLevel; 
        const isEquipped=currentWeapon.id===w.id; 
        const card=document.createElement('div'); 
        card.className=`p-5 glass-ui flex justify-between items-center transition-all cursor-pointer ${isEquipped?'border-blue-400 bg-white/10':'border-white/5'}`; 
        card.onclick=()=>{ if(isUnlocked && !isEquipped){ audioManager.play('ui'); equip(w.id); } }; 
        card.innerHTML=`<div><h3 class="bungee text-white text-lg" style="color:${w.color}">${w.name}</h3><span class="text-[10px] text-white/50 uppercase">${isUnlocked?'Unlocked':'Locked: Lvl '+w.minLevel}</span></div><span class="text-white/40 bungee text-sm">${isEquipped?'EQUIPPED':(isUnlocked?'SELECT':'LOCKED')}</span>`; 
        container.appendChild(card); 
    }); 
}

function equip(id){ currentWeapon=weapons[id]; weapDisplay.innerText=currentWeapon.name; weapDisplay.style.color=currentWeapon.color; renderShop(); }
function initGame(){ document.getElementById('modal-container').classList.add('hidden'); config.gameState='PLAYING'; config.score=0; config.missed=0; config.target=10+(config.level*5); lvlDisplay.innerText=config.level; updateProgress(); updateMissedUI(); spawnLoop(); }
function updateProgress(){ const offset=175.9-((config.score/config.target)*175.9); lvlProgress.style.strokeDashoffset=offset; }
function updateMissedUI(){ missText.innerText=`${config.missed} / ${config.maxMisses}`; if(config.missed>15) missText.className="text-red-500 bungee text-lg animate-pulse"; else missText.className="text-white bungee text-lg"; }
function spawnLoop(){ if(config.gameState!=='PLAYING'||config.isPausedByAd){ setTimeout(spawnLoop,500); return; } createBottle(); setTimeout(spawnLoop, Math.max(300,1500-(config.level*100))); }

function createBottle(){
    if(config.gameState!=='PLAYING') return;
    const isDanger=config.level>2 && Math.random()<(0.12+(config.level*0.01));
    const bottle=document.createElement('div'); bottle.className='bottle';
    const bottleColor=isDanger?'#ff0000':BOTTLE_COLORS[Math.floor(Math.random()*BOTTLE_COLORS.length)];
    bottle.innerHTML=`<svg width="50" height="110" viewBox="0 0 50 110"><rect x="18" y="0" width="14" height="25" fill="${bottleColor}" opacity="0.8" rx="2"/><path d="M5 25 L45 25 Q50 35 50 55 L50 100 Q50 110 40 110 L10 110 Q0 110 0 100 L0 55 Q0 35 5 25 Z" fill="${bottleColor}" opacity="0.8"/></svg>`;
    const startX=60+Math.random()*(window.innerWidth-120); bottle.style.left=startX+'px'; bottle.style.top=window.innerHeight+'px';
    viewport.appendChild(bottle);
    const bObj={el:bottle,x:startX,y:window.innerHeight,speed:2.5+(config.level*0.4)+(Math.random()*2),isDanger,id:Math.random(),color:bottleColor};
    const click=(e)=>{ e.preventDefault(); handleShoot(e,bObj); };
    bottle.addEventListener('mousedown',click); bottle.addEventListener('touchstart',click,{passive:true});
    config.activeBottles.push(bObj);
}

function handleShoot(e,targetObj){
    if(config.gameState!=='PLAYING'||config.isPausedByAd) return;
    const now=Date.now();
    if(now-config.lastFire<currentWeapon.fireRate) return;
    config.lastFire=now;
    audioManager.play('shoot'); flash.style.opacity='0.4'; setTimeout(()=>flash.style.opacity='0',40);
    cursor.classList.add('recoil-anim'); setTimeout(()=>cursor.classList.remove('recoil-anim'),100);
    config.screenShake=currentWeapon.recoil;
    explode(targetObj);
}

function explode(b){
    if(!b||!b.el||!b.el.parentNode) return;
    if(b.isDanger){ endGame("COLLATERAL DAMAGE! Agent detected."); return; }
    audioManager.play('break'); spawnDebris(b.x+25,b.y+55,b.color); b.el.remove();
    config.activeBottles=config.activeBottles.filter(x=>x.id!==b.id);
    config.score++; updateProgress();
    if(config.score>=config.target) nextLevel();
}

function spawnDebris(x,y,color){
    for(let i=0;i<12;i++){
        let shard=config.debrisPool.length>0?config.debrisPool.pop():document.createElement('div');
        shard.className='shard'; shard.style.left=x+'px'; shard.style.top=y+'px';
        let size=3+Math.random()*5; shard.style.width=size+'px'; shard.style.height=size+'px';
        shard.style.background=color; shard.style.opacity='0.8';
        viewport.appendChild(shard);
        let vx=(Math.random()-0.5)*15, vy=(Math.random()-1)*15; let px=x, py=y;
        const step=()=>{ px+=vx; py+=vy; vy+=0.6; shard.style.transform=`translate(${px-x}px,${py-y}px)`; if(py<window.innerHeight) requestAnimationFrame(step); else{ shard.remove(); config.debrisPool.push(shard); } };
        requestAnimationFrame(step);
    }
}

function tick(){
    if(config.gameState==='PLAYING'&&!config.isPausedByAd){
        if(config.screenShake>0){ viewport.style.transform=`translate(${(Math.random()-0.5)*config.screenShake}px, ${(Math.random()-0.5)*config.screenShake}px)`; config.screenShake*=0.8; }
        config.activeBottles.forEach((b,index)=>{
            b.y-=b.speed; b.el.style.transform=`translateY(${b.y-window.innerHeight}px)`;
            if(b.y<-120){ if(!b.isDanger){ config.missed++; updateMissedUI(); if(config.missed>=config.maxMisses) endGame("PERIMETER BREACHED."); } b.el.remove(); config.activeBottles.splice(index,1); }
        });
    }
    requestAnimationFrame(tick);
}
requestAnimationFrame(tick);
</script>
</body>
