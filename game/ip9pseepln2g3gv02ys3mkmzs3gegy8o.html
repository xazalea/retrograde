<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <!-- PWA -->

  <meta name="theme-color" content="#00ffff">
  
  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Snake Remix">
  <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png">
  
  <!-- Favicons -->
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="./assets/favicon-16.png">
  
  <title>Snake Remix</title>
  <link rel="stylesheet" href="./style.css">

  <!-- Portal SDK - Loaded dynamically based on config.js -->
  <script type="module">
    import { CONFIG } from './js/config.js';
    
    if (CONFIG.portal === 'gamemonetize' && CONFIG.gameId) {
      window.SDK_OPTIONS = {
        gameId: CONFIG.gameId,
        onEvent: function(a) {
          switch (a.name) {
            case "SDK_GAME_PAUSE":
              window.dispatchEvent(new CustomEvent('adPause'));
              break;
            case "SDK_GAME_START":
              window.dispatchEvent(new CustomEvent('adResume'));
              break;
            case "SDK_READY":
              console.log("[AD] GameMonetize SDK ready");
              break;
          }
        }
      };
      const script = document.createElement('script');
      script.src = "https://api.gamemonetize.com/sdk.js";
      script.id = "gamemonetize-sdk";
      document.head.appendChild(script);
    }
  </script>
</head>
<body>
  <div id="bg"></div>
  <canvas id="gameCanvas"></canvas>

  <div id="menuScreen" class="menu hidden">
    <h1>SNAKE</h1>

    <button data-mode="neo">Neo Mode</button>
    <button data-mode="nokia">Nokia Mode</button>
  </div>

  <script type="module" src="./js/main.js?v=1.8"></script>
</body>
</html>
