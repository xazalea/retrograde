<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit 2048 - HTML 5 game</title>
    <script src="js/jquery.min.js"></script>
    <link rel="stylesheet" href="css/style.css" media="all" />
    <link rel="icon" type="image/x-icon" href="image/fav.png">
</head>

<body>
    <div id="preloader">🍎 Loading Fruit 2048... 🍌</div>

    <div class="game-container">
        <h1>🍎 Fruit 2048 🍌</h1>

        <div class="controls">
            <div class="score">
                Score: <span id="scorevalue">0</span>
            </div>
            <div>
                <button id="soundToggle">🔊 ON</button>
                <button id="restart">🔄 Restart</button>
            </div>
        </div>

        <div id="gameframe"></div>
        <div id="gameover"></div>

        <div class="instructions">
            Use arrow keys or swipe to move tiles!<br>
            Combine matching fruits to create new ones!
        </div>
        <script type="text/javascript">
            window.SDK_OPTIONS = {
               gameId: "nrae5bijahbi5m5nydila7xqw875n4ut",
               onEvent: function (a) {
                  switch (a.name) {
                     case "SDK_GAME_PAUSE":
                        // pause game logic / mute audio
                        break;
                     case "SDK_GAME_START":
                        // advertisement done, resume game logic and unmute audio
                        break;
                     case "SDK_READY":
                        // when sdk is ready
                        break;
                  }
               }
            };
         (function (a, b, c) {
            var d = a.getElementsByTagName(b)[0];
            a.getElementById(c) || (a = a.createElement(b), a.id = c, a.src = "https://api.gamemonetize.com/sdk.js", d.parentNode.insertBefore(a, d))
         })(document, "script", "gamemonetize-sdk"); 
         </script>
    </div>
    <script src="js/script.js"></script>

</body>

</html>
