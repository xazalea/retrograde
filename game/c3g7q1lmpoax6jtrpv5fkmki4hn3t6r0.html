<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8" />
<title>Wormhole Raiders — 800×570 Box</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root { color-scheme: dark; }
  html, body { margin:0; background:#000; overflow:hidden; font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif; }
  #ui { width:800px; margin:8px auto; display:flex; justify-content:space-between; align-items:center; color:#cfe7ff; font-size:14px; }
  button { background:#13355a; border:1px solid #2b4f7a; color:#eaf6ff; padding:6px 12px; border-radius:6px; font-weight:600; cursor:pointer; }
  button:hover { background:#1c4472; }
  .gamebox { width:800px; height:570px; margin:0 auto; border:1px solid #202020; background:#000; position:relative; }
  canvas { display:block; width:800px; height:570px; background:#000; cursor: crosshair; }
  #err { width:800px; margin:6px auto; color:#ffd2d2; background:#3a0a0a; border:1px solid #6a1a1a; padding:6px 8px; display:none; border-radius:6px; font-size:13px; white-space:pre-wrap; }
  #ui .stats { display:flex; gap:18px; flex-wrap:wrap; }
</style>
</head>
<body>
<div id="ui">
  <button id="playBtn">▶ Play</button>
  <div class="stats">
    <div>Level: <span id="level">1</span></div>
    <div>Score: <span id="score">0</span></div>
    <div>Best: <span id="best">0</span></div>
    <div>Lives: <span id="lives">3</span></div>
    <div>Next @: <span id="next">30</span> pts</div>
  </div>
</div>
<div id="err"></div>
<div class="gamebox">
  <canvas id="game" width="800" height="570"></canvas>
</div>
<script>
(() => {
  const errBox = document.getElementById('err');
  function showError(msg){
    errBox.style.display = 'block';
    errBox.textContent = 'Error: ' + msg;
    console.error('[Wormhole] ' + msg);
  }
  window.addEventListener('error', e => showError(e.message || 'Unknown runtime error'));

  const canvas = document.getElementById("game");
  if (!canvas) { showError('Canvas element not found'); return; }
  const ctx = canvas.getContext && canvas.getContext("2d");
  if (!ctx) { showError('2D canvas context is not available. Try Chrome/Firefox desktop.'); return; }

  const W = canvas.width, H = canvas.height;
  const playBtn = document.getElementById("playBtn");
  const scoreEl = document.getElementById("score");
  const bestEl  = document.getElementById("best");
  const levelEl = document.getElementById("level");
  const livesEl = document.getElementById("lives");
  const nextEl  = document.getElementById("next");

  const BEST_KEY = "wormhole_best_score_v1";

  let running = false;
  let gameOver = false;
  let score = 0;
  let best = 0;
  let level = 1;
  let lives = 3;
  let achievedBestThisRun = false;
  // GameMonetize: pending start flag + public start function
  window.gmPending = false;
  window.gmStartGame = function(){
    // fresh start state
    running = true; gameOver = false;
    score = 0; level = 1; lives = 3; achievedBestThisRun = false;
    scoreEl.textContent = score; levelEl.textContent = level; livesEl.textContent = lives;
    asteroids = []; explosions = []; player.bullets = [];
    enemyTimer = 0; infiniteTimer = 0; announceText = ""; announceUntil = 0; player.invUntil = 0;
    startedAt = performance.now(); nextEl.textContent = SCORE_THRESHOLDS[0];
    initAudio(); resumeAudio();
  };


  // Safe start
  let startedAt = 0;
  const SAFE_INV_MS = 1500;
  const SAFE_SPAWN_MS = 400;

  // Thresholds based on SCORE
  const SCORE_THRESHOLDS = [30, 60];

  // Spawn / difficulty
  let enemyTimer = 0;
  let spawnInterval = 60;
  let infiniteTimer = 0;
  const MAX_ASTEROIDS = 20;

  // Overlays
  let announceText = "";
  let announceUntil = 0;

  // Player
  const player = { x: W/2 - 20, y: H - 60, w: 40, h: 40, bullets: [], invUntil: 0 };

  // Pepeni (asteroids)
  let asteroids = [];
  let lastShot = 0;

  // Explosions (single declaration)
  let explosions = [];

  // Mouse
  let shooting = false;
  canvas.addEventListener("mousemove", e => {
    if (!running) return;
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    player.x = Math.max(0, Math.min(W - player.w, mx - player.w/2));
  });
  canvas.addEventListener("mousedown", e => { if (e.button === 0) shooting = true; });
  window.addEventListener("mouseup",   e => { if (e.button === 0) shooting = false; });

  // === Audio (Oink + Impact SFX) ===
  const AudioContextClass = window.AudioContext || window.webkitAudioContext;
  const audio = { ctx: null, master: null };
  function initAudio(){
    if (audio.ctx) return;
    try {
      audio.ctx = new AudioContextClass();
      audio.master = audio.ctx.createGain();
      audio.master.gain.value = 0.18;
      audio.master.connect(audio.ctx.destination);
    } catch(e) { console.warn("Audio init failed:", e); }
  }
  async function resumeAudio(){
    if (!audio.ctx) return;
    if (audio.ctx.state === "suspended") {
      try { await audio.ctx.resume(); } catch(e) {}
    }
  }
  function playPigShot(){
    if (!audio.ctx || !audio.master) return;
    const t = audio.ctx.currentTime;
    const dur = 0.18;
    const g = audio.ctx.createGain();
    g.gain.setValueAtTime(0.0, t);
    g.gain.linearRampToValueAtTime(0.9, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    g.connect(audio.master);
    const o1 = audio.ctx.createOscillator();
    o1.type = "sine"; o1.frequency.setValueAtTime(260, t); o1.frequency.linearRampToValueAtTime(180, t + dur); o1.connect(g);
    const o2 = audio.ctx.createOscillator();
    o2.type = "sine"; o2.frequency.setValueAtTime(520, t); o2.frequency.linearRampToValueAtTime(360, t + dur); o2.connect(g);
    const noiseBuf = audio.ctx.createBuffer(1, Math.floor(audio.ctx.sampleRate * dur), audio.ctx.sampleRate);
    const data = noiseBuf.getChannelData(0); for (let i=0;i<data.length;i++) data[i] = (Math.random()*2-1) * 0.5;
    const noise = audio.ctx.createBufferSource(); noise.buffer = noiseBuf;
    const lp = audio.ctx.createBiquadFilter(); lp.type = "lowpass"; lp.frequency.setValueAtTime(900, t); lp.Q.value = 0.6;
    const ng = audio.ctx.createGain(); ng.gain.setValueAtTime(0.0001, t); ng.gain.exponentialRampToValueAtTime(0.35, t + 0.012); ng.gain.exponentialRampToValueAtTime(0.001, t + dur);
    noise.connect(lp).connect(ng).connect(audio.master);
    o1.start(t); o2.start(t); noise.start(t); o1.stop(t + dur); o2.stop(t + dur); noise.stop(t + dur);
  }
  function playImpact(){
    if (!audio.ctx || !audio.master) return;
    const t = audio.ctx.currentTime;
    const dur = 0.16;
    const g = audio.ctx.createGain(); g.gain.setValueAtTime(0.0001, t); g.gain.exponentialRampToValueAtTime(0.5, t + 0.008); g.gain.exponentialRampToValueAtTime(0.001, t + dur); g.connect(audio.master);
    const o = audio.ctx.createOscillator(); o.type = "triangle"; o.frequency.setValueAtTime(220, t); o.frequency.exponentialRampToValueAtTime(140, t + dur); o.connect(g);
    const noiseBuf = audio.ctx.createBuffer(1, Math.floor(audio.ctx.sampleRate * dur), audio.ctx.sampleRate);
    const data = noiseBuf.getChannelData(0); for (let i=0;i<data.length;i++) data[i] = (Math.random()*2-1) * 0.6;
    const noise = audio.ctx.createBufferSource(); noise.buffer = noiseBuf;
    const bp = audio.ctx.createBiquadFilter(); bp.type = "bandpass"; bp.frequency.setValueAtTime(1100, t); bp.Q.value = 1.0;
    const ng = audio.ctx.createGain(); ng.gain.setValueAtTime(0.0001, t); ng.gain.exponentialRampToValueAtTime(0.25, t + 0.01); ng.gain.exponentialRampToValueAtTime(0.001, t + dur);
    noise.connect(bp).connect(ng).connect(audio.master);
    o.start(t); o.stop(t + dur); noise.start(t); noise.stop(t + dur);
  }

  // === Background: 9 Parcels, generated ONCE at load ===
  const bgCanvas = document.createElement('canvas');
  bgCanvas.width = W; bgCanvas.height = H;
  const bgCtx = bgCanvas.getContext('2d');

  function drawNineParcelGarden(g, width, height){
    const cols = 3, rows = 3;
    const pw = width / cols, ph = height / rows; // exact floats, no floor
    const greens = ["#3b5e2b", "#4c7035", "#365227"];
    g.fillStyle = "#0a0f0a"; g.fillRect(0,0,width,height);
    for (let r=0; r<rows; r++) {
      for (let c=0; c<cols; c++) {
        const x = c*pw, y = r*ph;
        g.fillStyle = greens[Math.floor(Math.random()*greens.length)];
        g.fillRect(x, y, pw, ph);
        const flowerCount = 4 + Math.floor(Math.random()*3);
        for (let i=0; i<flowerCount; i++) drawFlower(g, x + 20 + Math.random()*(pw-40), y + 20 + Math.random()*(ph-40));
        const grassCount = 6 + Math.floor(Math.random()*5);
        for (let i=0; i<grassCount; i++) drawGrass(g, x + 16 + Math.random()*(pw-32), y + 16 + Math.random()*(ph-20));
      }
    }
  }
  function drawFlower(g, cx, cy) {
    const petal = ["#ff4f6d", "#ffd93d", "#ff7f50", "#b36bff"][Math.floor(Math.random()*4)];
    g.fillStyle = petal;
    const petals = 5;
    for (let i=0;i<petals;i++){
      const a = (i * Math.PI*2/petals);
      g.beginPath();
      g.ellipse(cx + Math.cos(a)*6, cy + Math.sin(a)*6, 3.5, 6, a, 0, Math.PI*2);
      g.fill();
    }
    g.fillStyle = "#2a401f"; g.beginPath(); g.arc(cx, cy, 3, 0, Math.PI*2); g.fill();
  }
  function drawGrass(g, x, y) {
    g.strokeStyle = "#7fbf4d"; g.lineWidth = 1.5;
    const blades = 3 + Math.floor(Math.random()*2);
    for (let i=0;i<blades;i++){ g.beginPath(); g.moveTo(x, y); g.lineTo(x + (Math.random()*10 - 5), y - (8 + Math.random()*10)); g.stroke(); }
  }

  // Generate ONCE
  drawNineParcelGarden(bgCtx, W, H);

  // === Explosions (ring + glow particles + juice + rind) ===
  function spawnExplosion(x, y, size){
    const ring = { x, y, r0: Math.max(12, size * 0.6), r: Math.max(12, size * 0.6), max: Math.min(70, size * 1.6), alpha: 0.7 };
    const particles = [];
    const n = 18 + Math.floor(Math.random()*12);
    for (let i=0;i<n;i++){
      const ang = Math.random() * Math.PI * 2;
      const spd = size * (0.8 + Math.random()*1.2);
      particles.push({ x, y, vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd, life: 0.35 + Math.random()*0.35, radius: 2 + Math.random()*3, hue: 0 + Math.random()*15 });
    }
    const juice = [];
    const jn = 20 + Math.floor(Math.random()*15);
    for (let j=0;j<jn;j++){
      const ang = Math.random() * Math.PI * 2;
      const spd = size * (0.6 + Math.random()*1.0);
      juice.push({ x, y, vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd, life: 0.6 + Math.random()*0.5, radius: 2 + Math.random()*3, rot: Math.random()*Math.PI*2, spin: (Math.random()*2 - 1) * 6 });
    }
    const shards = [];
    const sn = 8 + Math.floor(Math.random()*8);
    for (let s=0;s<sn;s++){
      const ang = Math.random() * Math.PI * 2;
      const spd = size * (0.7 + Math.random()*1.3);
      shards.push({ x, y, vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd, w: 4 + Math.random()*6, h: 3 + Math.random()*5, ang: Math.random()*Math.PI*2, spin: (Math.random()*2 - 1) * 8, life: 0.7 + Math.random()*0.6, inner: "#3fa34d", outer: "#1e7a2e" });
    }
    explosions.push({ t:0, duration:0.25, ring, particles, juice, shards });
  }

  function drawExplosions(){
    for (const ex of explosions){
      const ring = ex.ring;
      ctx.save(); ctx.globalCompositeOperation = "lighter"; ctx.strokeStyle = `rgba(255,40,40,${ring.alpha})`; ctx.lineWidth = 6; ctx.beginPath(); ctx.arc(ring.x, ring.y, ring.r, 0, Math.PI*2); ctx.stroke(); ctx.restore();
      for (const p of ex.particles){
        const a = Math.max(0, Math.min(1, p.life / 0.4));
        ctx.save(); ctx.globalCompositeOperation = "lighter";
        const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.radius*3);
        grad.addColorStop(0, `rgba(255,${80 + p.hue|0},${80 - p.hue|0},${0.85*a})`);
        grad.addColorStop(1, `rgba(180,20,20,0)`);
        ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(p.x, p.y, p.radius*3, 0, Math.PI*2); ctx.fill(); ctx.restore();
      }
      for (const d of ex.juice){
        const a = Math.max(0, Math.min(1, d.life / 0.6));
        ctx.save(); ctx.globalCompositeOperation = "lighter";
        const r = d.radius * 2.2;
        const grad = ctx.createRadialGradient(d.x, d.y, 0, d.x, d.y, r);
        grad.addColorStop(0, `rgba(255,40,60,${0.9*a})`); grad.addColorStop(1, `rgba(120,10,20,0)`);
        ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(d.x, d.y, r, 0, Math.PI*2); ctx.fill();
        ctx.translate(d.x, d.y); ctx.rotate(d.rot); ctx.fillStyle = `rgba(255,50,60,${0.5*a})`; ctx.fillRect(-r*0.2, -r*0.6, r*0.4, r*1.2);
        ctx.restore();
      }
      for (const sh of ex.shards){
        const a = Math.max(0, Math.min(1, sh.life / 0.8));
        ctx.save(); ctx.translate(sh.x, sh.y); ctx.rotate(sh.ang); ctx.globalAlpha = a;
        ctx.fillStyle = sh.outer; ctx.fillRect(-sh.w/2, -sh.h/2, sh.w, sh.h);
        ctx.fillStyle = sh.inner; ctx.fillRect(-sh.w/2 + 0.6, -sh.h/2 + 0.6, sh.w - 1.2, sh.h - 1.2);
        ctx.restore();
      }
    }
  }

  // === Drawing & Loop ===
  function drawBackground(){ ctx.drawImage(bgCanvas, 0, 0); }

  const SPEED_L1 = 1.0, SPEED_L2 = 1.5, SPEED_L3 = 1.5;
  const OVAL_X = 1.4, STEM_LEN = 12;

  function spawnAsteroid(){
    const r = 16 + Math.random()*18, rx = r*OVAL_X, ry = r;
    const baseY = (level === 1 ? SPEED_L1 : level === 2 ? SPEED_L2 : SPEED_L3);
    const driftX = (Math.random()*1 - 0.5) * (level === 3 ? 1.2 : 0.6);
    const margin = STEM_LEN + 4, minX = rx + margin, maxX = W - rx - margin;
    const x = minX + Math.random() * Math.max(1, (maxX - minX));
    const y = -ry - 10, rot = Math.random() * Math.PI * 2, rotSpeed = (Math.random()*0.02 - 0.01);
    asteroids.push({ x, y, rx, ry, speedY: baseY, speedX: driftX, rot, rotSpeed });
  }
  function drawMelonOval(a){
    if (!a) return;
    ctx.save(); ctx.translate(a.x, a.y); ctx.rotate(a.rot);
    const grad = ctx.createRadialGradient(-a.rx*0.25, -a.ry*0.25, Math.min(a.rx,a.ry)*0.2, 0, 0, Math.max(a.rx,a.ry));
    grad.addColorStop(0, "#3fa34d"); grad.addColorStop(1, "#1e7a2e");
    ctx.fillStyle = grad; ctx.beginPath(); ctx.ellipse(0, 0, a.rx, a.ry, 0, 0, Math.PI*2); ctx.fill();
    ctx.save(); ctx.beginPath(); ctx.ellipse(0, 0, a.rx, a.ry, 0, 0, Math.PI*2); ctx.clip();
    ctx.globalAlpha = 0.35; ctx.fillStyle = "#0e5a1d";
    const stripeH = Math.max(3, a.ry * 0.22);
    for (let y=-a.ry; y<=a.ry; y+=stripeH*2) ctx.fillRect(-a.rx, y - stripeH/2, a.rx*2, stripeH);
    ctx.globalAlpha = 1;
    const hg = ctx.createRadialGradient(-a.rx*0.5, -a.ry*0.5, 2, -a.rx*0.5, -a.ry*0.5, Math.max(a.rx,a.ry)*0.9);
    hg.addColorStop(0, "rgba(255,255,255,0.35)"); hg.addColorStop(1, "rgba(255,255,255,0)");
    ctx.fillStyle = hg; ctx.beginPath(); ctx.ellipse(0, 0, a.rx, a.ry, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    ctx.save(); ctx.translate(a.rx, 0); ctx.rotate(-0.15); ctx.fillStyle = "#7f5f2b"; ctx.fillRect(0, -2, STEM_LEN, 4);
    ctx.fillStyle = "#2f6b2f"; ctx.beginPath(); ctx.ellipse(-2, 0, 4, 3, 0, 0, Math.PI*2); ctx.fill(); ctx.restore();
    ctx.restore();
  }
  function rectEllipseColliding(rx, ry, rw, rh, cx, cy, ex, ey) {
    const testX = Math.max(rx, Math.min(cx, rx + rw)), testY = Math.max(ry, Math.min(cy, ry + rh));
    const dx = (cx - testX) / ex, dy = (cy - testY) / ey; return (dx*dx + dy*dy) <= 1.0;
  }

  function draw(nowMs) {
    drawBackground();
    const safeBlink = nowMs < (startedAt + SAFE_INV_MS);
    const inv = nowMs < player.invUntil || safeBlink;
    const visible = (!inv || Math.floor(nowMs/100)%2===0);
    if (visible) drawPig(player, nowMs);
    ctx.fillStyle = "yellow"; for (const b of player.bullets) ctx.fillRect(b.x, b.y, b.w, b.h);
    for (const a of asteroids) drawMelonOval(a);
    drawExplosions();
    // Removed overlay "Press ▶ Play to Start"
    if (announceText && nowMs < announceUntil) {
      ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(W/2-200, 30, 400, 40);
      ctx.strokeStyle = "#4fa3ff"; ctx.strokeRect(W/2-200, 30, 400, 40);
      ctx.fillStyle = "#eaf6ff"; ctx.font = "18px system-ui"; ctx.textAlign = "center"; ctx.fillText(announceText, W/2, 56);
    }
  }

  function update(dt, nowMs) {
    if (shooting && nowMs - lastShot > 220) { player.bullets.push({ x: player.x + player.w/2 - 2, y: player.y, w: 4, h: 10, speed: 7 }); lastShot = nowMs; playPigShot(); }
    for (let i = player.bullets.length - 1; i >= 0; i--) { const b = player.bullets[i]; b.y -= b.speed; if (b.y < -12) player.bullets.splice(i, 1); }
    enemyTimer++;
    let baseInterval;
    if (level === 1) baseInterval = 60; else if (level === 2) baseInterval = 45; else { infiniteTimer += dt; const ramp = Math.min(25, Math.floor(infiniteTimer * 2)); baseInterval = Math.max(18, 45 - ramp); }
    spawnInterval = Math.floor(baseInterval * 2);
    if (enemyTimer > spawnInterval && (nowMs - startedAt) > SAFE_SPAWN_MS && asteroids.length < MAX_ASTEROIDS) { enemyTimer = 0; spawnAsteroid(); }
    for (let i = asteroids.length - 1; i >= 0; i--) { const a = asteroids[i]; if (!a) continue; a.y += a.speedY; a.x += a.speedX; a.rot += a.rotSpeed; if (a.y - a.ry > H + 40 || a.x + a.rx < -40 || a.x - a.rx > W + 40) asteroids.splice(i, 1); }
    outer: for (let i = asteroids.length - 1; i >= 0; i--) {
      const a = asteroids[i];
      for (let j = player.bullets.length - 1; j >= 0; j--) {
        const b = player.bullets[j];
        if (rectEllipseColliding(b.x, b.y, b.w, b.h, a.x, a.y, a.rx, a.ry)) {
          player.bullets.splice(j, 1); asteroids.splice(i, 1); playImpact(); spawnExplosion(a.x, a.y, Math.max(14, (a.rx + a.ry) * 0.6));
          score += 1; scoreEl.textContent = score;
          if (score > best) { best = score; bestEl.textContent = best; try { localStorage.setItem(BEST_KEY, String(best)); } catch(_) {} achievedBestThisRun = true; }
          ensureLevelProgress(nowMs); break outer;
        }
      }
    }
    for (let i = explosions.length - 1; i >= 0; i--) {
      const ex = explosions[i]; ex.t += dt;
      ex.ring.r = Math.min(ex.ring.max, ex.ring.r + 140 * dt); ex.ring.alpha = Math.max(0, ex.ring.alpha - 0.8 * dt);
      for (let p = ex.particles.length - 1; p >= 0; p--) { const part = ex.particles[p]; part.x += part.vx * dt; part.y += part.vy * dt; part.vx *= 0.98; part.vy = part.vy * 0.98 + 20 * dt * 0.2; part.life -= dt; if (part.life <= 0) ex.particles.splice(p, 1); }
      for (let j = ex.juice.length - 1; j >= 0; j--) { const d = ex.juice[j]; d.x += d.vx * dt; d.y += d.vy * dt; d.vx *= 0.985; d.vy = d.vy * 0.985 + 25 * dt; d.rot += d.spin * dt; d.life -= dt; if (d.life <= 0) ex.juice.splice(j, 1); }
      for (let s = ex.shards.length - 1; s >= 0; s--) { const sh = ex.shards[s]; sh.x += sh.vx * dt; sh.y += sh.vy * dt; sh.vx *= 0.985; sh.vy = sh.vy * 0.985 + 22 * dt; sh.ang += sh.spin * dt; sh.life -= dt; if (sh.life <= 0) ex.shards.splice(s, 1); }
      if (ex.t > ex.duration && ex.particles.length === 0 && ex.juice.length === 0 && ex.shards.length === 0) explosions.splice(i, 1);
    }
    const safeUntil = startedAt + SAFE_INV_MS;
    if (nowMs > player.invUntil && nowMs > safeUntil) {
      for (let i = asteroids.length - 1; i >= 0; i--) {
        const a = asteroids[i];
        if (rectEllipseColliding(player.x, player.y, player.w, player.h, a.x, a.y, a.rx, a.ry)) {
          asteroids.splice(i,1); lives = Math.max(0, lives - 1); livesEl.textContent = lives; player.invUntil = nowMs + 1200;
          if (lives === 0) { running = false; gameOver = true; if (achievedBestThisRun) announce("GAME OVER — New BEST!", nowMs, 2600); else announce("GAME OVER — Press Play", nowMs, 2600); }
          break;
        }
      }
    }
    ensureLevelProgress(nowMs);
  }

  function nextThreshold() { if (level === 1) return SCORE_THRESHOLDS[0]; if (level === 2) return SCORE_THRESHOLDS[1]; return Infinity; }
  function ensureLevelProgress(nowMs) { const nxt = nextThreshold(); nextEl.textContent = (nxt === Infinity) ? "—" : nxt; if (level === 1 && score >= 30) setLevel(2, nowMs); else if (level === 2 && score >= 60) setLevel(3, nowMs); }
  function setLevel(n, nowMs) { level = n; levelEl.textContent = level; enemyTimer = 0; lives += 1; livesEl.textContent = lives; if (level === 3) { infiniteTimer = 0; announce("Level 3 — Endless!  (+1 Life)", nowMs, 2200); } else { announce("Level " + level + "  (+1 Life)", nowMs, 1800); } const nxt = nextThreshold(); nextEl.textContent = (nxt === Infinity) ? "—" : nxt; }
  function announce(text, nowMs, durMs) { announceText = text; announceUntil = nowMs + durMs; }

  function drawPig(p, nowMs){
    const cx = p.x + p.w/2, cy = p.y + p.h/2, s = p.w / 40; ctx.save(); ctx.translate(cx, cy);
    const bob = Math.sin(nowMs/300) * 0.6 * s;
    ctx.fillStyle = "#ffb1c8"; ctx.strokeStyle = "#cc7b96"; ctx.lineWidth = 2*s;
    ctx.beginPath(); ctx.ellipse(0, 4*s + bob, 14*s, 12*s, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(0, -8*s + bob, 11*s, 9*s, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    ear(-7*s, -18*s + bob, -1); ear( 7*s, -18*s + bob,  1);
    ctx.fillStyle = "#ff93b6"; ctx.strokeStyle = "#cc7b96"; ctx.beginPath(); ctx.ellipse(0, -10*s + bob, 6*s, 4.5*s, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.fillStyle = "#7a4456"; ctx.beginPath(); ctx.arc(-2*s, -10*s + bob, 0.9*s, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc( 2*s, -10*s + bob, 0.9*s, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = "#1c1c1c"; ctx.beginPath(); ctx.arc(-3.5*s, -12*s + bob, 1.3*s, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc( 3.5*s, -12*s + bob, 1.3*s, 0, Math.PI*2); ctx.fill();
    leg(-7*s, 12*s + bob); leg( 7*s, 12*s + bob);
    ctx.strokeStyle = "#cc7b96"; ctx.lineWidth = 1.6*s; ctx.beginPath(); ctx.moveTo(12*s, 4*s + bob); ctx.quadraticCurveTo(15*s, 4*s + bob - 2*s, 12.5*s, 2*s + bob); ctx.quadraticCurveTo(10.5*s, 0 + bob, 13*s, 0 + bob); ctx.stroke();
    ctx.restore();
    function ear(x, y, dir){ ctx.fillStyle = "#ffb1c8"; ctx.strokeStyle = "#cc7b96"; ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + 4*s*dir, y - 6*s); ctx.lineTo(x + 7*s*dir, y + 1*s); ctx.closePath(); ctx.fill(); ctx.stroke(); }
    function leg(x, y){ ctx.fillStyle = "#ffb1c8"; ctx.strokeStyle = "#cc7b96"; ctx.beginPath(); if (ctx.roundRect) { ctx.roundRect(x - 2.2*s, y, 4.4*s, 5*s, 1*s); } else { ctx.rect(x - 2.2*s, y, 4.4*s, 5*s); } ctx.fill(); ctx.stroke(); ctx.strokeStyle = "#8a5467"; ctx.lineWidth = 1*s; ctx.beginPath(); ctx.moveTo(x - 2.2*s, y + 3.2*s); ctx.lineTo(x + 2.2*s, y + 3.2*s); ctx.stroke(); }
  }

  let lastTime = performance.now();
  function loop() {
    try { const now = performance.now(); const dt = Math.max(0, Math.min(0.1, (now - lastTime) / 1000)); lastTime = now; if (running) update(dt, now); draw(now); } 
    catch (e) { running = false; gameOver = true; showError(e && e.message ? e.message : String(e)); }
    requestAnimationFrame(loop);
  }

  const scoreInit = () => { try { const v = localStorage.getItem(BEST_KEY); best = v ? Math.max(0, parseInt(v, 10) || 0) : 0; } catch(_) { best = 0; } bestEl.textContent = best; };
  scoreInit();

  playBtn.addEventListener("click", async () => {
    window.gmPending = true;
    let safetyTimer = null;
    try {
      if (typeof sdk !== 'undefined' && typeof sdk.showBanner !== 'undefined') {
        // Safety: if SDK doesn't call back in 3s (blocked/ad error), start anyway
        window.__gmSafety = setTimeout(() => { console.log('[GM] Fallback start after timeout');
          if (window.gmPending && typeof window.gmStartGame === "function") {
            window.gmPending = false;
            window.gmStartGame();
          }
        }, 2000);
        sdk.showBanner();
      } else {
        // Fallback: SDK not ready
        window.gmPending = false;
        window.gmStartGame && window.gmStartGame();
      }
    } catch(e){
      console.warn("GameMonetize showBanner failed or not ready:", e);
      window.gmPending = false;
      window.gmStartGame && window.gmStartGame();
    }
  });

  // Start the render loop immediately so you see the background before Play
  requestAnimationFrame(loop);
})();
