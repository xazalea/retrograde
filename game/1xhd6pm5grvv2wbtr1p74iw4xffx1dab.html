    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        html,body{width:100%;height:100%;overflow:hidden;background:#00000f;touch-action:none;font-family:'Orbitron',monospace}
        #gameCanvas{position:fixed;inset:0;display:block}
        body::after{content:'';position:fixed;inset:0;
            background:repeating-linear-gradient(to bottom,transparent 0,transparent 2px,rgba(0,0,0,.055) 2px,rgba(0,0,0,.055) 4px);
            pointer-events:none;z-index:100}
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <!-- ══ GameMonetize SDK ══ -->
    <script type="text/javascript">
        window.SDK_OPTIONS = {
            gameId: "zq4bxz38g8randr622f3w4ffi3utsdtu",
            onEvent: function(a) {
                switch(a.name) {
                    case "SDK_GAME_PAUSE":
                        // Pubblicità in corso: pausa audio e gioco
                        if(window.__neonPauseForAd) window.__neonPauseForAd();
                        break;
                    case "SDK_GAME_START":
                        // Pubblicità finita: riprendi audio e gioco
                        if(window.__neonResumeAfterAd) window.__neonResumeAfterAd();
                        break;
                    case "SDK_READY":
                        window.__sdkReady = true;
                        break;
                    case "SDK_ERROR":
                        window.__sdkReady = false;
                        break;
                }
            }
        };
        (function(a,b,c){
            var d=a.getElementsByTagName(b)[0];
            a.getElementById(c)||(a=a.createElement(b),a.id=c,
            a.src="https://api.gamemonetize.com/sdk.js",d.parentNode.insertBefore(a,d))
        })(document,"script","gamemonetize-sdk");

        // Helper: mostra banner in sicurezza (solo se SDK pronto)
        window.__showAd = function(cb) {
            if(window.sdk && window.__sdkReady) {
                window.__adCallback = cb || null;
                sdk.showBanner();
            } else {
                if(cb) cb();
            }
        };
    </script>

    <script src="game.js"></script>
</body>
