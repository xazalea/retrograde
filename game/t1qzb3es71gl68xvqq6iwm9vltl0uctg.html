<style>
  :root {
    --primary: #06b6d4;
    --primary-dark: #0891b2;
    --accent: #f59e0b;
    --bg-dark: #0f172a;
  }

  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    height: 100%;
    width: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden; /* Prevent page scroll, internal containers handle it */
    background-color: #0c0a1a;
    font-family: 'Exo 2', sans-serif;
  }

  #root {
    height: 100%;
    width: 100%;
    overflow: hidden;
  }

  /* Scanline effect */
  body::after {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: repeating-linear-gradient(
      0deg,
      rgba(0, 0, 0, 0.1),
      rgba(0, 0, 0, 0.1) 1px,
      transparent 1px,
      transparent 2px
    );
    pointer-events: none;
    z-index: 9999;
    opacity: 0.3;
  }

  /* Animated Background */
  .stars-bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    background-image: 
      radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
      radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
      radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px),
      radial-gradient(rgba(255,255,255,.4), rgba(255,255,255,.1) 2px, transparent 30px);
    background-size: 550px 550px, 350px 350px, 250px 250px, 150px 150px; 
    background-position: 0 0, 40px 60px, 130px 270px, 70px 100px;
    animation: sf-move-background 180s linear infinite;
  }

  @keyframes sf-move-background {
    from { background-position: 0 0, 40px 60px, 130px 270px, 70px 100px; }
    to { background-position: 550px 550px, 390px 410px, 380px 520px, 220px 350px; }
  }

  /* Custom Scrollbar */
  ::-webkit-scrollbar {
    width: 8px;
    height: 8px;
  }
  ::-webkit-scrollbar-track {
    background: rgba(15, 23, 42, 0.6);
  }
  ::-webkit-scrollbar-thumb {
    background: rgba(6, 182, 212, 0.5);
    border-radius: 4px;
    border: 2px solid rgba(15, 23, 42, 0.6);
  }
  ::-webkit-scrollbar-thumb:hover {
    background: rgba(6, 182, 212, 0.8);
  }

  /* Utilities */
  .no-scrollbar::-webkit-scrollbar {
    display: none;
  }
  .no-scrollbar {
    -ms-overflow-style: none;
    scrollbar-width: none;
  }

  /* Game Font for Headers */
  .font-display {
    font-family: 'Black Ops One', cursive;
  }

  /* Animations */
  @keyframes screen-fade-in {
    from { opacity: 0; transform: scale(0.99); }
    to { opacity: 1; transform: scale(1); }
  }
  .screen-enter {
    animation: screen-fade-in 0.3s ease-out forwards;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  @keyframes pulse-gold {
    0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.7); }
    50% { transform: scale(1.05); box-shadow: 0 0 10px 10px rgba(251, 191, 36, 0); }
  }
  .animate-pulse-gold { animation: pulse-gold 2s infinite; }
  
  @keyframes pop-in {
    0% { transform: scale(0.85); opacity: 0; }
    60% { transform: scale(1.02); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  .animate-pop-in { animation: pop-in 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

  @keyframes pop-out {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(0.85); opacity: 0; }
  }
  .animate-pop-out {
      animation: pop-out 0.35s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }

  @keyframes holographic {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  .animate-holographic {
      background-size: 200% 200%;
      animation: holographic 3s ease infinite;
  }

  @keyframes shine {
      from { transform: translateX(-100%); }
      to { transform: translateX(100%); }
  }
  .animate-shine {
      animation: shine 2s infinite;
  }

  @keyframes pulse-slow {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }
  .animate-pulse-slow {
      animation: pulse-slow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
  }

  /* Premium Card Back Animations */
  @keyframes scan {
    0% { background-position: 0% 0%; }
    100% { background-position: 0% 200%; }
  }
  .animate-scan {
    animation: scan 4s linear infinite;
  }
  
  @keyframes shimmer {
    0% { transform: translateX(-150%); }
    100% { transform: translateX(150%); }
  }
  .animate-shimmer {
    animation: shimmer 2.5s infinite linear;
  }

  /* --- BOSS CARD EFFECTS --- */

  /* Foil Shine Overlay */
  .boss-foil {
    position: relative;
    /* Ensure no overflow from pseudo-elements */
    overflow: hidden !important; 
  }
  .boss-foil::after {
    content: "";
    position: absolute;
    top: -100%;
    left: -100%;
    width: 300%;
    height: 300%;
    background: linear-gradient(
      115deg,
      transparent 40%,
      rgba(255, 255, 255, 0.3) 45%,
      rgba(255, 255, 255, 0.6) 50%,
      rgba(255, 255, 255, 0.3) 55%,
      transparent 60%
    );
    transform: rotate(20deg);
    animation: foil-sweep 5s infinite linear;
    pointer-events: none;
    z-index: 2; /* Sits above background but below text/icon (usually z-10) */
    mix-blend-mode: overlay;
  }
  
  @keyframes foil-sweep {
    0% { transform: translate(-30%, -30%) rotate(20deg); }
    100% { transform: translate(20%, 20%) rotate(20deg); }
  }

  /* Glitch Effect */
  @keyframes glitch-skew {
    0% { transform: skew(0deg); clip-path: inset(0 0 0 0); }
    5% { transform: skew(-2deg); clip-path: inset(10% 0 80% 0); }
    10% { transform: skew(2deg); clip-path: inset(40% 0 10% 0); }
    15% { transform: skew(0deg); clip-path: inset(0 0 0 0); }
    100% { transform: skew(0deg); clip-path: inset(0 0 0 0); }
  }
  .animate-glitch {
    animation: glitch-skew 3s infinite;
  }

  /* Plasma/Goo */
  @keyframes plasma-shift {
    0% { background-position: 0% 50%; filter: hue-rotate(0deg); }
    50% { background-position: 100% 50%; filter: hue-rotate(45deg); }
    100% { background-position: 0% 50%; filter: hue-rotate(0deg); }
  }
  .animate-plasma {
    background-size: 200% 200%;
    animation: plasma-shift 4s ease infinite;
  }

  /* Slow Spin Reverse (for Magic/Portals) */
  @keyframes spin-slow-reverse {
    from { transform: rotate(360deg); }
    to { transform: rotate(0deg); }
  }
  .animate-spin-slow-reverse {
    animation: spin-slow-reverse 15s linear infinite;
  }

  /* Gradient XY (Nebula) */
  @keyframes gradient-xy {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
  }
  .animate-gradient-xy {
      background-size: 400% 400%;
      animation: gradient-xy 10s ease infinite;
  }

</style>
