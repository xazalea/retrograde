<!DOCTYPE html>
<html lang="en-us">
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<title>Zombie Survival  Last Stand</title>

<style>
html, body {
	background: #0c0f14;
	width: 100%;
	height: 100%;
	margin: 0;
	padding: 0;
	overflow: hidden;
	font-family: 'Segoe UI', Arial, sans-serif;
}

/* ===== Game Container ===== */
#gameContainer {
	position: absolute;
	background: #000;
	border-radius: 14px;
	overflow: hidden;
	box-shadow: 0 40px 80px rgba(0,0,0,0.8);
}

/* ===== Canvas ===== */
#unity-canvas {
	position: absolute;
	width: 100%;
	height: 100%;
}

/* ===== Loading Overlay ===== */
#loadingOverlay {
	position: absolute;
	width: 100%;
	height: 100%;
	background: radial-gradient(circle at center, #141922 0%, #000 100%);
	display: flex;
	justify-content: center;
	align-items: center;
	flex-direction: column;
	z-index: 20;
	transition: opacity 0.6s ease;
}

/* ===== Floating Animation ===== */
@keyframes float {
	0% { transform: translateY(0px); }
	50% { transform: translateY(-8px); }
	100% { transform: translateY(0px); }
}

/* ===== Logo ===== */
#gameLogo {
	width: 140px;
	height: 140px;
	object-fit: cover;
	border-radius: 32px;
	margin-bottom: 22px;
	box-shadow: 0 20px 40px rgba(0,0,0,0.6),
	            0 0 35px rgba(0,255,170,0.35);
	animation: float 3.5s ease-in-out infinite;
	transition: transform 0.3s ease;
}

/* ===== Title ===== */
#loadingTitle {
	color: #ffffff;
	font-size: 28px;
	font-weight: 600;
	letter-spacing: 1.5px;
	margin-bottom: 28px;
	text-align: center;
	text-shadow: 0 4px 12px rgba(0,0,0,0.7);
}

/* ===== Loading Box ===== */
#loadingBox {
	width: 340px;
	height: 20px;
	background: #1c222c;
	border-radius: 40px;
	overflow: hidden;
	box-shadow: inset 0 0 10px rgba(0,0,0,0.6),
	            0 0 20px rgba(0,255,170,0.15);
}

/* ===== Progress Bar ===== */
#loadingBar {
	width: 0%;
	height: 100%;
	background: linear-gradient(90deg, #00ffaa, #00c8ff);
	border-radius: 40px;
	transition: width 0.3s ease;
	box-shadow: 0 0 15px rgba(0,255,170,0.6);
}

/* ===== Loading Text ===== */
#loadingText {
	color: #9aa4b2;
	margin-top: 14px;
	font-size: 14px;
	letter-spacing: 1px;
}
</style>
</head>

<body>

<div id="loadingOverlay">

	<!-- IMPORTANT: icon.png must be in same folder as index.html -->
	<img id="gameLogo" src="icon.png" alt="Game Logo">

	<div id="loadingTitle">Zombie Survival  Last Stand</div>

	<div id="loadingBox">
		<div id="loadingBar"></div>
	</div>

	<div id="loadingText">Loading 0%</div>

</div>

<div id="gameContainer">
	<canvas id="unity-canvas"
		width="960"
		height="540">
	</canvas>
</div>

<script src="Build/c57a4043a9c5601fba5944a0f0912f57.loader.js"></script>

<script>
var canvas = document.querySelector("#unity-canvas");

var config = {
	dataUrl: "Build/28f3bcce4cbc7e7ff5b1963b43b8f719.data.unityweb",
	frameworkUrl: "Build/6b87104957d1a670454bd71a9c337da8.framework.js.unityweb",
	codeUrl: "Build/3bfbcc5ef8eb94f3c0d2bf21458cd01d.wasm.unityweb",
	streamingAssetsUrl: "StreamingAssets",
	companyName: "ritesh_dxy",
	productName: "Zombie Survival  Last Stand",
	productVersion: "2",
	autoSyncPersistentDataPath: true,
};

var scaleToFit;
try {
	scaleToFit = !!JSON.parse("");
} catch (e) {
	scaleToFit = true;
}

/* ===== Progress Handler ===== */
function progressHandler(progress) {
	var percent = Math.floor(progress * 100);
	document.getElementById("loadingBar").style.width = percent + "%";
	document.getElementById("loadingText").innerText = "Loading " + percent + "%";
}

/* ===== RESPONSIVE RESIZE (YOUR IMPORTANT FUNCTION PRESERVED) ===== */
function onResize() {
	var container = document.getElementById("gameContainer");
	var w, h;

	if (scaleToFit) {
		w = window.innerWidth;
		h = window.innerHeight;

		var r = 540 / 960;

		if (w * r > window.innerHeight) {
			w = Math.min(w, Math.ceil(h / r));
		}
		h = Math.floor(w * r);
	} else {
		w = 960;
		h = 540;
	}

	container.style.width = w + "px";
	container.style.height = h + "px";
	container.style.top = Math.floor((window.innerHeight - h) / 2) + "px";
	container.style.left = Math.floor((window.innerWidth - w) / 2) + "px";
	container.style.position = "absolute";
}

/* ===== Create Unity Instance ===== */
createUnityInstance(canvas, config, progressHandler).then(function (instance) {

	var overlay = document.getElementById("loadingOverlay");
	overlay.style.opacity = "0";

	setTimeout(function(){
		overlay.style.display = "none";
	}, 600);

	onResize();
});

window.addEventListener('resize', onResize);
onResize();

/* ===== Mobile Viewport Fix (PRESERVED) ===== */
if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
	const meta = document.createElement('meta');
	meta.name = 'viewport';
	meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
	document.getElementsByTagName('head')[0].appendChild(meta);
}
</script>

</body>
</html>
