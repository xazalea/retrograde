            }
        }
    </script>
    <script>
        // Critical Polyfill: Run this FIRST before any other scripts
        (function() {
            var memoryStorage = {};
            var mock = {
                getItem: function(key) { return memoryStorage[key] || null; },
                setItem: function(key, value) { memoryStorage[key] = String(value); },
                removeItem: function(key) { delete memoryStorage[key]; },
                clear: function() { memoryStorage = {}; },
                key: function(i) { return Object.keys(memoryStorage)[i] || null; },
                get length() { return Object.keys(memoryStorage).length; }
            };

            function polyfill(name, mockObj) {
                try {
                    try { delete window[name]; } catch(e) {}
                    Object.defineProperty(window, name, {
                        value: mockObj,
                        configurable: true,
                        enumerable: true,
                        writable: true
                    });
                    console.log("Polyfilled " + name + " with memory storage");
                } catch (e) {
                    console.error("Failed to polyfill " + name, e);
                }
            }

            var needsPolyfillLocal = false;
            try {
                window.localStorage.setItem('__test__', '1');
                window.localStorage.removeItem('__test__');
            } catch (e) {
                console.warn("LocalStorage access failed: " + e.message);
                needsPolyfillLocal = true;
            }

            if (needsPolyfillLocal) {
                polyfill('localStorage', mock);
            }
            
            var needsPolyfillSession = false;
            try {
                window.sessionStorage.setItem('__test__', '1');
                window.sessionStorage.removeItem('__test__');
            } catch (e) {
                needsPolyfillSession = true;
            }
            
            if (needsPolyfillSession) {
                var sessionMemory = {};
                var sessionMock = Object.assign({}, mock);
                sessionMock.getItem = function(key) { return sessionMemory[key] || null; };
                sessionMock.setItem = function(key, value) { sessionMemory[key] = String(value); };
                sessionMock.removeItem = function(key) { delete sessionMemory[key]; };
                sessionMock.clear = function() { sessionMemory = {}; };
                sessionMock.key = function(i) { return Object.keys(sessionMemory)[i] || null; };
                Object.defineProperty(sessionMock, 'length', { get: function() { return Object.keys(sessionMemory).length; } });
                polyfill('sessionStorage', sessionMock);
            }
        })();
    </script>

<body>
    <div id="game-container"></div>
    
    <!-- UI Layer -->
    <div id="ui-layer">
        <!-- Main Menu -->
        <div id="main-menu" class="ui-screen active">
            <h1 data-lang="title">STACK TOWER PRO</h1>
            <div class="menu-buttons">
                <button id="play-btn" class="btn primary" data-lang="play">Play Game</button>
                <button id="shop-btn" class="btn secondary" data-lang="shop">Shop</button>
                <button id="settings-btn" class="btn secondary" data-lang="settings">Settings</button>
            </div>
            <div class="version-info">v2.0 - AAA Update</div>
        </div>

        <!-- HUD -->
        <div id="hud" class="ui-screen overlay-ui hidden">
            <div class="hud-top">
                <div class="stat-box"><span data-lang="score">Score</span>: <span id="score">0</span></div>
                <div class="stat-box"><span data-lang="level">Level</span>: <span id="level">1</span></div>
                <div class="stat-box"><span data-lang="coins">Coins</span>: <span id="coins">0</span></div>
            </div>
            
            <div id="side-controls">
                <div class="vertical-slider-group">
                    <input type="range" id="speed-slider" min="0.5" max="5" step="0.5" value="1">
                    <label for="speed-slider" data-lang="speed">Speed</label>
                </div>
            </div>

            <button id="camera-btn" title="Change Camera View">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
                    <path d="M20 4h-3.17L15 2H9L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-5 11.5V13H9v2.5L5.5 12 9 8.5V11h6V8.5l3.5 3.5-3.5 3.5z"/>
                </svg>
            </button>
            <button id="tap-btn" title="Tap to Drop Block">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="48" height="48">
                    <path d="M9 11.24V7.5C9 6.12 10.12 5 11.5 5S14 6.12 14 7.5v3.74c1.21-.81 2-2.18 2-3.74C16 5.01 13.99 3 11.5 3S7 5.01 7 7.5c0 1.56.79 2.93 2 3.74zm9.84 4.63l-4.54-2.26c-.17-.07-.35-.11-.54-.11H13v-6c0-.83-.67-1.5-1.5-1.5S10 6.67 10 7.5v10.74l-3.43-.72c-.08-.01-.15-.02-.24-.02-.31 0-.59.13-.79.33l-.79.8 4.94 4.94c.27.27.65.44 1.06.44h6.79c.75 0 1.33-.55 1.44-1.28l.75-5.27c.01-.07.02-.14.02-.2 0-.62-.38-1.16-.91-1.38z"/>
                </svg>
            </button>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over" class="ui-screen hidden">
            <div class="modal">
                <h2 data-lang="gameOver">Game Over</h2>
                <p class="final-score"><span data-lang="score">Score</span>: <span id="final-score">0</span></p>
                <p class="high-score"><span data-lang="highScore">High Score</span>: <span id="high-score">0</span></p>
                <div class="modal-buttons">
                    <button id="revive-btn" class="btn ad-btn" data-lang="revive">
                        <span class="ad-icon">▶ AD</span> Revive
                    </button>
                    <button id="restart-btn" class="btn primary" data-lang="restart">Restart</button>
                    <button id="home-btn" class="btn secondary" data-lang="home">Home</button>
                </div>
            </div>
        </div>

        <!-- Shop Screen -->
        <div id="shop" class="ui-screen hidden">
            <div class="modal large-modal">
                <h2 data-lang="shop">Shop</h2>
                <div class="shop-scroll">
                    <div id="shop-items"></div>
                </div>
                <button id="close-shop" class="btn secondary" data-lang="back">Back</button>
            </div>
        </div>

        <!-- Settings Screen -->
        <div id="settings" class="ui-screen hidden">
            <div class="modal">
                <h2 data-lang="settingsTitle">Settings</h2>
                
                <div class="setting-item">
                    <label data-lang="language">Language</label>
                    <div class="language-cycler">
                        <button id="lang-prev" class="btn icon-btn arrow-btn">&lt;</button>
                        <span id="current-language">English</span>
                        <button id="lang-next" class="btn icon-btn arrow-btn">&gt;</button>
                    </div>
                </div>

                <div class="setting-item">
                    <label data-lang="music">Music</label>
                    <button id="toggle-music" class="btn toggle-btn" data-lang="on">On</button>
                </div>

                <div class="setting-item">
                    <label data-lang="sfx">Sound Effects</label>
                    <button id="toggle-sfx" class="btn toggle-btn" data-lang="on">On</button>
                </div>

                <div class="setting-item">
                    <label data-lang="theme">Theme</label>
                    <button id="toggle-theme" class="btn toggle-btn">Dark</button>
                </div>

                <button id="close-settings" class="btn secondary" data-lang="back">Back</button>
            </div>
        </div>


    </div>

    <div id="error-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); color:red; z-index:9999; padding:20px; overflow:auto;">
        <h3>Game Error</h3>
        <pre id="error-message"></pre>
        <button onclick="try{localStorage.clear()}catch(e){console.warn(e)}; location.reload()">Reset Game Data</button>
        <button onclick="location.reload()">Reload</button>
    </div>

    <script>
        window.onerror = function(msg, url, line, col, error) {
            document.getElementById('error-overlay').style.display = 'block';
            document.getElementById('error-message').textContent = `Error: ${msg}\nFile: ${url}\nLine: ${line}:${col}\nStack: ${error ? error.stack : 'N/A'}`;
            return false;
        };
        window.addEventListener('unhandledrejection', function(event) {
            document.getElementById('error-overlay').style.display = 'block';
            document.getElementById('error-message').textContent = `Promise Error: ${event.reason}`;
        });
    </script>

    <script type="module" src="./js/Game.js?v=2.5"></script>
</body>
</html>
