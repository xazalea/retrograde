    <style>
      :root {
        --safe-top: env(safe-area-inset-top, 0px);
        --safe-bottom: env(safe-area-inset-bottom, 0px);
      }
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        font-family: 'Bubblegum Sans', cursive;
        background: #FF69B4; 
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior: none;
      }
      canvas {
        display: block;
        touch-action: none;
        image-rendering: auto;
        position: relative;
        z-index: 10;
      }
      .safe-pt { padding-top: var(--safe-top); }
      .safe-pb { padding-bottom: var(--safe-bottom); }

      .bg-candy-world {
        background: 
          radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.3) 0%, rgba(255, 255, 255, 0) 70%),
          linear-gradient(180deg, #FF8BC3 0%, #FF5CA3 100%);
        background-color: #FF69B4;
        background-attachment: fixed;
      }

      /* Cloud System */
      .cloud-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        pointer-events: none;
        z-index: 1;
      }

      .cloud {
        position: absolute;
        background: white;
        width: 200px;
        height: 60px;
        border-radius: 200px;
        opacity: 0.5;
        filter: blur(8px);
        animation: drift linear infinite;
      }

      .cloud::after, .cloud::before {
        content: '';
        position: absolute;
        background: white;
        border-radius: 50%;
      }

      .cloud::after { width: 100px; height: 100px; top: -50px; left: 30px; }
      .cloud::before { width: 120px; height: 120px; top: -70px; right: 30px; }

      @keyframes drift {
        from { transform: translateX(-300px); }
        to { transform: translateX(calc(100vw + 300px)); }
      }

      .cloud-1 { top: 10%; animation-duration: 65s; opacity: 0.6; transform: scale(0.8); }
      .cloud-2 { top: 25%; animation-duration: 45s; opacity: 0.4; transform: scale(1.2); animation-delay: -20s; }
      .cloud-3 { top: 45%; animation-duration: 80s; opacity: 0.5; transform: scale(1.5); animation-delay: -40s; }
      .cloud-4 { top: 65%; animation-duration: 55s; opacity: 0.3; transform: scale(0.9); animation-delay: -10s; }
      .cloud-5 { top: 85%; animation-duration: 70s; opacity: 0.4; transform: scale(1.1); animation-delay: -30s; }

      .no-gpu-jitter {
        transform: translateZ(0);
        backface-visibility: hidden;
        perspective: 1000;
      }
    </style>

    <script type="text/javascript">
       window.SDK_OPTIONS = {
          gameId: "candy-tap-world", // Ensure this matches your Game ID from the panel
          onEvent: function (a) {
             switch (a.name) {
                case "SDK_GAME_PAUSE":
                   // MANDATORY: pause game logic / mute audio
                   window.dispatchEvent(new Event('gm_game_pause'));
                   break;
                case "SDK_GAME_START":
                   // advertisement done, resume game logic and unmute audio
                   window.dispatchEvent(new Event('gm_game_start'));
                   break;
                case "SDK_READY":
                   // when sdk is ready
                   console.log("SDK_READY");
                   break;
             }
          }
       };
       (function (a, b, c) {
          var d = a.getElementsByTagName(b)[0];
          a.getElementById(c) || (a = a.createElement(b), a.id = c, a.src = "https://api.gamemonetize.com/sdk.js", d.parentNode.insertBefore(a, d))
       })(document, "script", "gamemonetize-sdk"); 
    </script>
