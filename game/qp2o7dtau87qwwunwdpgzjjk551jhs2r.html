,U+200C-200D,U+20A8,U+20B9,U+25CC,U+A830-A839,U+A8E0-A8FF;font-display:swap;}@font-face {font-family:Poppins;font-style:normal;font-weight:600;src:url(/cf-fonts/s/poppins/5.0.11/latin-ext/600/normal.woff2);unicode-range:U+0100-02AF,U+0304,U+0308,U+0329,U+1E00-1E9F,U+1EF2-1EFF,U+2020,U+20A0-20AB,U+20AD-20CF,U+2113,U+2C60-2C7F,U+A720-A7FF;font-display:swap;}@font-face {font-family:Poppins;font-style:normal;font-weight:600;src:url(/cf-fonts/s/poppins/5.0.11/latin/600/normal.woff2);unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+2074,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD;font-display:swap;}</style>
    
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #05080f; overflow: hidden; font-family: 'Orbitron', sans-serif; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #game-container { position: relative; width: 100%; height: 100%; max-width: 1280px; max-height: 720px; background: #000; box-shadow: 0 0 50px rgba(0, 245, 255, 0.1); overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }

        /* UI SCREENS */
        .ui-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(5, 8, 15, 0.95); z-index: 10; transition: opacity 0.3s; }
        .hidden { display: none !important; }

        h1 { font-size: 4rem; margin: 0; text-transform: uppercase; letter-spacing: 5px; color: #fff; text-shadow: 0 0 20px #00f5ff; }
        h1 span { color: #9b5cff; }
        
        .daily-box { border: 1px solid #333; background: rgba(255,255,255,0.05); padding: 20px; margin: 20px; text-align: center; border-radius: 4px; }
        .daily-sub { font-family: 'Poppins', sans-serif; font-size: 0.9rem; color: #aaa; }
        .daily-mod { color: #ff3b3b; font-weight: bold; font-size: 1.1rem; margin-top: 5px; }

        .btn { background: transparent; border: 2px solid #00f5ff; color: #00f5ff; padding: 15px 40px; font-size: 1.2rem; font-family: 'Orbitron', sans-serif; font-weight: bold; cursor: pointer; text-transform: uppercase; box-shadow: 0 0 15px rgba(0, 245, 255, 0.2); transition: 0.2s; margin-top: 10px; }
        .btn:hover { background: #00f5ff; color: #000; box-shadow: 0 0 30px #00f5ff; transform: scale(1.05); }

        /* HUD */
        #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; }
        
        #energy-bar-container { position: absolute; top: 20px; left: 20px; width: 200px; height: 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); transform: skewX(-20deg); }
        #energy-bar { width: 100%; height: 100%; background: #9b5cff; box-shadow: 0 0 10px #9b5cff; transition: width 0.05s linear; }
        
        #score-box { position: absolute; top: 20px; right: 30px; text-align: right; }
        #score-val { font-size: 2rem; color: #fff; text-shadow: 0 0 10px #fff; }
        #score-label { font-size: 0.8rem; color: #aaa; font-family: 'Poppins', sans-serif; }

        /* ALERTS */
        .alert-msg {
            position: absolute; top: 30%; width: 100%; text-align: center;
            font-size: 2.5rem; font-weight: 900; letter-spacing: 3px;
            opacity: 0; transform: scale(0.8);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .visible { opacity: 1; transform: scale(1); }
        .danger { color: #ff3b3b; text-shadow: 0 0 20px #ff0000; animation: shake 0.5s infinite; }
        .success { color: #00f5ff; text-shadow: 0 0 20px #00f5ff; }
        .info { color: #00ff00; text-shadow: 0 0 20px #00ff00; }

        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -1px); } 100% { transform: translate(1px, -1px); } }
        .float-txt { position: absolute; color: #fff; font-weight: bold; pointer-events: none; animation: floatUp 1s forwards; font-size: 1.2rem; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-50px); } }

    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>

    <!-- HOME SCREEN -->
    <div id="screen-home" class="ui-screen">
        <h1>TIME <span>FRACTURE</span></h1>
        <p class="tagline">CONTROL TIME. SURVIVE THE FRACTURE.</p>
        <div class="daily-box">
            <div class="daily-sub">DAILY CHALLENGE: <span id="date-display">...</span></div>
            <div class="daily-mod" id="mod-display">MODIFIER: TIME DISTORTION</div>
            <div class="daily-sub" style="margin-top:10px">DAILY BEST: <span id="home-best" style="color:white">0</span></div>
        </div>
        <button class="btn" onclick="Game.requestStart()">ENTER TIME ZONE</button>
    </div>

    <!-- GAME OVER SCREEN -->
    <div id="screen-gameover" class="ui-screen hidden">
        <h1 style="color: #ff3b3b; font-size: 3rem;">TIME COLLAPSED</h1>
        <p style="font-size: 1.5rem;" id="final-score">SYNC SCORE:</p>
        <button class="btn" onclick="Game.requestStart()">RETRY RUN</button>
        <button class="btn" style="border-color:#666; color:#aaa; font-size:1rem; margin-top:10px" onclick="Game.homeBtnClick()">RETURN TO HUB</button>
    </div>

    <!-- HUD -->
    <div id="hud">
        <div id="energy-bar-container"><div id="energy-bar"></div></div>
        <div id="score-box">
            <div id="score-val">0</div>
            <div id="score-label">TIME SYNC</div>
        </div>
        <div id="main-alert" class="alert-msg">GRAVITY FLIP</div>
    </div>
</div>

<!-- GAMEMONETIZE SDK -->
<script type="text/javascript">
    window.SDK_OPTIONS = {
      gameId: "qp2o7dtau87qwwunwdpgzjjk551jhs2r",
      onEvent: function (a) {
        switch (a.name) {
          case "SDK_GAME_PAUSE":
            if(window.gameInstance) window.gameInstance.pauseGame();
            break;
          case "SDK_GAME_START":
            if(window.gameInstance) {
                window.gameInstance.resumeGame();
                // If the user requested a start (clicked Play/Retry), process it now
                if(window.gameInstance.pendingStart) {
                    window.gameInstance.startGame();
                    window.gameInstance.pendingStart = false;
                }
            }
            break;
          case "SDK_READY":
            console.log("SDK Ready");
            break;
        }
      }
    };
    (function (a, b, c) {
      var d = a.getElementsByTagName(b)[0];
      a.getElementById(c) || (a = a.createElement(b), a.id = c, a.src = "https://api.gamemonetize.com/sdk.js", d.parentNode.insertBefore(a, d))
    })(document, "script", "gamemonetize-sdk");
</script>

<!-- GAME LOGIC -->
<script>
    // --- SEEDED RNG ---
    class PseudoRNG {
        constructor(seedStr) {
            let h = 0xdeadbeef;
            for(let i = 0; i < seedStr.length; i++) h = Math.imul(h ^ seedStr.charCodeAt(i), 2654435761);
            this.seed = (h ^ h >>> 16) >>> 0;
        }
        next() {
            this.seed = (this.seed * 9301 + 49297) % 233280;
            return this.seed / 233280;
        }
    }

    // --- GAME ENGINE ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let width, height;

    const STATE = { MENU: 0, PLAYING: 1, GAMEOVER: 2, PAUSED: 3 };
    let currentState = STATE.MENU;

    const COLORS = { bg: '#05080f', player: '#00f5ff', obs: '#ff3b3b', safe: '#151515', lava: '#aa0000', time: '#9b5cff' };
    const GRAVITY = 0.8;

    let rng;
    let score = 0;
    let distance = 0;
    let energy = 100;
    let timeScale = 1.0;
    let baseSpeed = 9;
    
    // Logic Variables
    let anomalyMode = 'NONE';
    let anomalyTimer = 0;
    let lastAnomalyDist = 0; 
    let gravityInverted = false;
    let ghostActive = false;
    let timeLocked = false;
    let nextSpawnDist = 500;
    
    let player = { x: 100, y: 0, w: 30, h: 30, dy: 0, grounded: false, trail: [] };
    let obstacles = [];
    let particles = [];
    let actx = null;

    function init() {
        resize();
        window.addEventListener('resize', resize);
        
        const dateStr = new Date().toDateString();
        rng = new PseudoRNG(dateStr);
        document.getElementById('date-display').innerText = dateStr;
        
        const mods = ["CHAOS ENGINE", "GHOST PROTOCOL", "GRAVITY FLUX", "TIME JAMMER"];
        document.getElementById('mod-display').innerText = mods[Math.floor(rng.next()*mods.length)];
        
        const saved = localStorage.getItem('tf_daily_' + dateStr);
        document.getElementById('home-best').innerText = saved || 0;
    }

    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        player.y = height - 150;
    }

    function initAudio() {
        if(!actx) {
            actx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if(actx.state === 'suspended') {
            actx.resume();
        }
    }

    // --- INPUT ---
    let inputHeld = false;
    
    const startAction = () => {
        if(currentState !== STATE.PLAYING) return;
        
        initAudio(); 

        if(player.grounded) {
            player.dy = gravityInverted ? 15 : -15;
            player.grounded = false;
            playSound(300, 'sine', 0.1);
            createParticles(player.x, player.y + (gravityInverted?0:30), 10, '#fff');

            let closeObs = obstacles.find(o => o.x > player.x && o.x < player.x + 120);
            if(closeObs && closeObs.x < player.x + 90) {
                score += 50;
                energy = Math.min(100, energy + 20);
                spawnFloatingText(player.x, player.y - 50, "PERFECT!", "#00f5ff");
                playSound(600, 'square', 0.1);
            }
        }
        inputHeld = true;
    };
    
    const endAction = () => { inputHeld = false; };

    ['mousedown','touchstart'].forEach(e => window.addEventListener(e, (ev)=>{ ev.preventDefault(); startAction(); }));
    ['mouseup','touchend'].forEach(e => window.addEventListener(e, endAction));
    window.addEventListener('keydown', (e) => { 
        if(e.code==='Space' || e.code==='ArrowUp') {
            e.preventDefault();
            startAction(); 
        }
    });
    window.addEventListener('keyup', (e) => { if(e.code==='Space' || e.code==='ArrowUp') endAction(); });

    // --- LOGIC ---
    function update() {
        if(currentState !== STATE.PLAYING) return;

        // Energy Logic
        if(timeLocked) {
            timeScale += (1.0 - timeScale) * 0.1;
            if(inputHeld && Math.random()<0.1) spawnFloatingText(player.x, player.y-40, "JAMMED", "#ff3b3b");
        } else if(inputHeld && energy > 0) {
            timeScale += (0.2 - timeScale) * 0.1;
            energy -= 0.6;
        } else {
            timeScale += (1.0 - timeScale) * 0.1;
            energy += 0.25;
        }
        energy = Math.max(0, Math.min(100, energy)); 

        let moveSpeed = baseSpeed * timeScale;
        distance += moveSpeed;

        if(distance > lastAnomalyDist + 1500 && anomalyMode === 'NONE') {
            triggerAnomaly();
            lastAnomalyDist = distance;
        }
        
        if(anomalyMode !== 'NONE') {
            anomalyTimer--;
            if(anomalyTimer <= 0) resetAnomaly();
        }
        
        // Stabilized Zone
        if(Math.floor(distance) % 3000 > 2800) {
            nextSpawnDist = distance + 200;
            if(Math.random()<0.05) showAlert("STABILIZED", "info");
        }

        // Spawning
        if(distance > nextSpawnDist) {
            spawnPattern();
            let gap = 500 - Math.min(200, score * 0.1);
            nextSpawnDist = distance + gap + (rng.next() * 200);
        }

        // Physics
        let g = gravityInverted ? -GRAVITY : GRAVITY;
        player.dy += g * timeScale;
        player.y += player.dy * timeScale;

        let groundY = height - 100;
        let ceilingY = 100;
        
        if(!gravityInverted) {
            if(player.y + player.h > groundY) { player.y = groundY - player.h; player.dy = 0; player.grounded = true; }
            if(player.y < ceilingY) gameOver(); 
        } else {
            if(player.y < ceilingY) { player.y = ceilingY; player.dy = 0; player.grounded = true; }
            if(player.y + player.h > groundY) gameOver();
        }

        obstacles.forEach((o, i) => {
            o.x -= moveSpeed;
            if(ghostActive) o.alpha = 0.2 + Math.random() * 0.5;
            else o.alpha = 1.0;

            if(rectIntersect(player, o)) gameOver();

            if(o.x < -100) {
                obstacles.splice(i, 1);
                score++;
            }
        });

        particles.forEach((p, i) => {
            p.x += p.vx * timeScale;
            p.y += p.vy * timeScale;
            p.life -= 0.05;
            if(p.life <= 0) particles.splice(i, 1);
        });

        document.getElementById('energy-bar').style.width = energy + "%";
        document.getElementById('score-val').innerText = Math.floor(score);
    }

    function draw() {
        ctx.fillStyle = COLORS.bg;
        ctx.fillRect(0,0,width,height);

        if(!gravityInverted) {
            ctx.fillStyle = COLORS.lava; ctx.fillRect(0,0,width,100);
            ctx.fillStyle = COLORS.safe; ctx.fillRect(0,height-100,width,100);
            ctx.fillStyle = COLORS.player; ctx.fillRect(0,height-100,width,2);
        } else {
            ctx.fillStyle = COLORS.safe; ctx.fillRect(0,0,width,100);
            ctx.fillStyle = COLORS.player; ctx.fillRect(0,100,width,2);
            ctx.fillStyle = COLORS.lava; ctx.fillRect(0,height-100,width,100);
        }

        if(currentState === STATE.PLAYING) {
            ctx.shadowBlur = 20;
            ctx.shadowColor = COLORS.player;
            ctx.fillStyle = COLORS.player;
            ctx.fillRect(player.x, player.y, player.w, player.h);
            
            obstacles.forEach(o => {
                ctx.shadowColor = COLORS.obs;
                ctx.fillStyle = COLORS.obs;
                ctx.globalAlpha = o.alpha || 1;
                ctx.fillRect(o.x, o.y, o.w, o.h);
            });
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;

            particles.forEach(p => {
                ctx.fillStyle = p.c;
                ctx.fillRect(p.x, p.y, 3, 3);
            });
            
            if(inputHeld && !timeLocked && energy > 0) {
                ctx.fillStyle = COLORS.time;
                ctx.globalAlpha = 0.1;
                ctx.fillRect(0,0,width,height);
                ctx.globalAlpha = 1;
            }
        }
    }

    function loop() { 
        if(currentState === STATE.PAUSED) {
            requestAnimationFrame(loop);
            return; 
        }
        update(); 
        draw(); 
        requestAnimationFrame(loop);
    }

    function spawnPattern() {
        let baseY = gravityInverted ? 100 : height - 100;
        let dir = gravityInverted ? 1 : -1;
        let pid = Math.floor(rng.next() * 3);
        
        if(pid === 0) { 
            for(let i=0; i<3; i++) {
                obstacles.push({x: width + (i*200), y: baseY + (-40*dir) - (gravityInverted?0:40), w: 40, h: 40});
            }
        } else if(pid === 1) { 
            obstacles.push({x: width, y: baseY + (-80*dir) - (gravityInverted?0:80), w: 20, h: 80});
        } else { 
             obstacles.push({x: width, y: baseY + (-30*dir) - (gravityInverted?0:30), w: 30, h: 30});
             obstacles.push({x: width + 100, y: baseY + (-50*dir) - (gravityInverted?0:50), w: 30, h: 50});
        }
    }

    function triggerAnomaly() {
        let r = rng.next();
        if(r < 0.33) {
            anomalyMode = 'GRAVITY';
            gravityInverted = true;
            showAlert("GRAVITY FAILURE", "danger");
        } else if(r < 0.66) {
            anomalyMode = 'LOCK';
            timeLocked = true;
            showAlert("TIME JAMMER", "danger");
        } else {
            anomalyMode = 'GHOST';
            ghostActive = true;
            showAlert("GHOST PROTOCOL", "danger");
        }
        playSound(100, 'sawtooth', 0.5);
        anomalyTimer = 300;
    }

    function resetAnomaly() {
        anomalyMode = 'NONE';
        gravityInverted = false;
        timeLocked = false;
        ghostActive = false;
        showAlert("SYSTEM STABLE", "success");
        obstacles = obstacles.filter(o => o.x > player.x + 200); 
    }

    function showAlert(txt, type) {
        let el = document.getElementById('main-alert');
        el.innerText = txt;
        el.className = `alert-msg visible ${type}`;
        setTimeout(() => el.classList.remove('visible'), 2000);
    }

    function spawnFloatingText(x, y, txt, col) {
        let d = document.createElement('div');
        d.className = 'float-txt';
        d.innerText = txt;
        d.style.left = x + 'px';
        d.style.top = y + 'px';
        d.style.color = col;
        document.getElementById('game-container').appendChild(d);
        setTimeout(() => d.remove(), 1000);
    }

    function playSound(freq, type, dur) {
        if(!actx) return;
        let o = actx.createOscillator();
        let g = actx.createGain();
        o.type = type;
        o.frequency.setValueAtTime((inputHeld && !timeLocked) ? freq * 0.5 : freq, actx.currentTime);
        g.gain.setValueAtTime(0.1, actx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + dur);
        o.connect(g); g.connect(actx.destination);
        o.start(); o.stop(actx.currentTime + dur);
    }

    function rectIntersect(r1, r2) {
        return !(r2.x > r1.x + r1.w || r2.x + r2.w < r1.x || r2.y > r1.y + r1.h || r2.y + r2.h < r1.y);
    }

    // --- GAME CONTROL ---
    const Game = {
        pendingStart: false,
        requestStart: () => {
            // FIX: Always call showBanner on user interaction (Pre-roll)
            window.gameInstance.pendingStart = true;
            if (typeof sdk !== 'undefined' && sdk.showBanner) {
                sdk.showBanner();
            } else {
                // Fallback for testing or adblock
                Game.startGame();
            }
        },
        homeBtnClick: () => {
            document.getElementById('screen-gameover').classList.add('hidden');
            document.getElementById('screen-home').classList.remove('hidden');
            document.getElementById('hud').style.display = 'none';
            currentState = STATE.MENU;
            init();
        },
        startGame: () => {
            player.y = height - 150; player.dy = 0; player.grounded = false;
            obstacles = []; particles = [];
            score = 0; distance = 0; energy = 100;
            resetAnomaly();
            
            const dateStr = new Date().toDateString();
            rng = new PseudoRNG(dateStr); 

            document.getElementById('screen-home').classList.add('hidden');
            document.getElementById('screen-gameover').classList.add('hidden');
            document.getElementById('hud').style.display = 'block';
            currentState = STATE.PLAYING;
        },
        pauseGame: () => {
            if(currentState === STATE.PLAYING) currentState = STATE.PAUSED;
        },
        resumeGame: () => {
            if(currentState === STATE.PAUSED) currentState = STATE.PLAYING;
        }
    };

    function createParticles(x, y, count, color) {
        for(let i=0; i<count; i++) particles.push({ x: x, y: y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 1, c: color });
    }

    function gameOver() {
        currentState = STATE.GAMEOVER;
        playSound(50, 'sawtooth', 0.5);
        
        const dateStr = new Date().toDateString();
        let saved = localStorage.getItem('tf_daily_' + dateStr);
        if(!saved || score > parseInt(saved)) {
            localStorage.setItem('tf_daily_' + dateStr, Math.floor(score));
        }

        setTimeout(() => {
            document.getElementById('final-score').innerText = "STYLE SCORE: " + Math.floor(score);
            document.getElementById('screen-gameover').classList.remove('hidden');
            document.getElementById('hud').style.display = 'none';
        }, 800);
    }

    // Bridge for SDK
    window.gameInstance = Game;

    init();
    loop();
</script>
</body>
</html>
