	<script type="text/javascript">
		window.SDK_OPTIONS = {
			gameId: "jdqq2dsuxfzt02vp6spq62p655a0rnpb",
			onEvent: function (a) {
				switch (a.name) {
					case "SDK_GAME_PAUSE":
						console.error("SDK_GAME_PAUSE")
							Laya.SoundManager.stopMusic();
						
							Laya.timer.scale = 0;
							
							Laya.SoundManager.stopAllSound();
							if (Laya.Tween && Laya.Tween.pauseAll) Laya.Tween.pauseAll();
						
						// pause game logic / mute audio
						break;
					case "SDK_GAME_START":
						console.error("SDK_GAME_START")
						Laya.timer.scale = 1
						Laya.SoundManager.playMusic("res/sound/bgm.mp3", 0);
						if (Laya.Tween && Laya.Tween.pauseAll)Laya.Tween.resumeAll();
						// advertisement done, resume game logic and unmute audio
						break;
					case "SDK_READY":
						console.error("[GM] SDK ready");
						// when sdk is ready
						break;
				}
			}
		};
		(function (a, b, c) {
			var d = a.getElementsByTagName(b)[0];
			a.getElementById(c) || (a = a.createElement(b), a.id = c, a.src = "https://api.gamemonetize.com/sdk.js", d.parentNode.insertBefore(a, d))
		})(document, "script", "gamemonetize-sdk"); 
	</script>
