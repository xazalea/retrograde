    <script src="cc-resolution.js" charset="utf-8"></script>
    <style type="text/css">
      * {
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
      @font-face {
        font-family: "Arial";
        src: url("CookieRun-Black.ttf");
      }
      @font-face {
        font-family: "微软雅黑";
        src: url("CookieRun-Black.ttf");
      }
      html {
        touch-action: none;
      }
      body {
        overflow: hidden;
        /* 页面背景颜色 */
        background: #ffd4aa;
      }
      canvas,
      div {
        outline: none;
        -webkit-tap-highlight-color: rgba(250, 250, 250, 0);
      }
      #Game {
        position: absolute;
        margin: 0;
        overflow: hidden;
        width: 1334px;
        height: 750px;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
      }
    </style>
  </head>
  <body>
    <div id="Game">
      <canvas id="GameCanvas" width="1334" height="750"></canvas>
      <div id="splash" style="display: none">
        <div class="progress-bar stripes">
          <span style="width: 0%"></span>
        </div>
      </div>
    </div>
    <script src="src/settings.js" charset="utf-8"></script>
    <script src="main.js" charset="utf-8"></script>
    <script>
      var totalGameSize = 19000000;
    </script>
    <script type="text/javascript">
      resolution.init(1334, 750);
      // resolution.init(resolution.clientWidth, resolution.clientHeight);
      YYGGames.setDevelopmentEnv(YYGGames.ENV.PUZZLEGAME);
      YYGGames.logger.setConsoleEnable(true);
      YYGGames.setAdEnable(true);
      YYGGames.showLoadingSourceScene()
        .setAppName("Food-Truck-Chef-Cooking")
        .setBackgroundColor("#ffd4aa")
        .setGameLogoUrl("./@base/logo.png")
        .setGameBannerUrl("./@base/banner.jpg");
      (function () {
        // open web debugger console
        if (typeof VConsole !== "undefined") {
          window.vConsole = new VConsole();
        }
        var debug = window._CCSettings.debug;
        var splash = document.getElementById("splash");
        splash.style.display = "block";

        function loadScript(moduleName, cb) {
          function scriptLoaded() {
            document.body.removeChild(domScript);
            domScript.removeEventListener("load", scriptLoaded, false);
            cb && cb();
          }
          var domScript = document.createElement("script");
          domScript.async = true;
          domScript.src = moduleName;
          domScript.addEventListener("load", scriptLoaded, false);
          document.body.appendChild(domScript);
        }
        loadScript(debug ? "cocos2d-js.js" : "cocos2d-js-min.js", function () {
          YYGGames.assetManager.enableVersionControl().then(() => {
            YYGGames.assetManager.loadDir("resources");
            YYGGames.assetManager.loadDir("AppSubResFrame");
            YYGGames.assetManager.loadDir("Subf1");
            YYGGames.assetManager.loadDir("Subf2");
            YYGGames.assetManager.loadDir("Subf6");
            YYGGames.assetManager.loadDir("SubfMain");
            YYGGames.assetManager.loadDir("WorldRes");
            window.boot();
          });
        });
      })();
    </script>
  </body>
</html>
