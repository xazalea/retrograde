<body onload="addListner();" style="margin:0px;overflow:hidden;">

	<script type='text/javascript' src='https://lofgames.com/games/lofgames524.js' ></script>

<script>
// Global Scripts
	lg.sdkType = "gm";
lg.sdkId = "e3qw2s87fwplpc13omy1m2jqq06thon7";
lg.initSDKFunctions();
const otherFonts = [
	"Passion One:400",
	"Noto Color Emoji:400",
	"Noto Sans JP:700,900",
	"Noto Sans SC:700,900",
	"Noto Sans KR:700,900",
	"Noto Sans Thai:700,900",
	"Noto Sans Arabic:700,900",
	"Noto Sans:700,900"
];
lg.loadGameFonts({
	f: ["Rubik"],
	s: ["600"],
	b: ["800"]
}, otherFonts);</script>
<script>
var canvas, stage, exportRoot, anim_container, dom_overlay_container, fnStartAnimation;
var loadingBar, preloadBG, loadingAnim,preloaderDiv;
var pcnf={
	gw: 1280,
	gh: 960,
	bmw:0,
	bmh:0,
	bw:300,
	bh: 15,
	bx: (1280-310)/2,
	by: (960-80),
	th: 50,
	tw: 190,
	tx: (1280-210)/2,
	ty: (960-150),
	ldp:0,
	sbg: false	
}
window.addEventListener('resize', resizePreloader);
function init() {
	canvas = document.getElementById("canvas");
	anim_container = document.getElementById("animation_container");
	dom_overlay_container = document.getElementById("dom_overlay_container");
	var key = Object.keys(AdobeAn.compositions)[0];
	var comp=AdobeAn.getComposition(key);
	var loader = new createjs.LoadQueue(false,null,true);
	loader.installPlugin(createjs.Sound);
	loader.addEventListener("fileload", function(evt){handleFileLoad(evt,comp)});
	loader.addEventListener("complete", function(evt){handleComplete(evt,comp)});
	loader.addEventListener("progress", handleProgress);
	var lib=comp.getLibrary();
	loader.loadManifest(lib.properties.manifest);
	canvas.style.display = 'none';
    preloaderDiv.style.display = 'none';
}
function handleProgress(e){
	  pcnf.ldp = (e.loaded/e.total)*0.8;
      loadingBar.style.width =  pcnf.ldp * pcnf.bmw +"px";
      loadingBar.style.height= pcnf.bmh +"px";
      resizePreloader();	
}
function completeTheBar(){
   pcnf.it_id = setInterval(increaseWidth, 100);
   function increaseWidth(){
		pcnf.ldp += 0.02;
		if(lg.allFontLoaded && lg.allFontLoaded != true){			
			pcnf.ldp -= 0.01;
			if(pcnf.ldp >= 0.90){
				pcnf.ldp = 0.90;
			}
		}
		loadingBar.style.width =  pcnf.ldp * pcnf.bmw +"px";
		if(pcnf.ldp >= 1){
			clearInterval(pcnf.it_id);
			hidePreloader();
		}
   }
}
function hidePreloader(){ 
	  window.removeEventListener('resize', resizePreloader);
	  var arr = [loadingBar, preloadBG, loadingAnim, preloaderDiv];
	  for(var itm of arr){
		caller(100,itm);
		itm = null;
	 }
	 pcnf = null;
	 canvas.style.display = 'block';
}
function handleFileLoad(evt, comp) {
	var images=comp.getImages();
	for(var itm in evt.item){
		console.log(itm + " >  "+evt.item[itm]);
	}
	if (evt && (evt.item.type == "image")) { images[evt.item.id] = evt.result; }	
}
function handleComplete(evt,comp) {
	var lib=comp.getLibrary();
	var ss=comp.getSpriteSheet();
	var queue = evt.target;
	var ssMetadata = lib.ssMetadata;
	for(i=0; i<ssMetadata.length; i++) {
		ss[ssMetadata[i].name] = new createjs.SpriteSheet( {"images": [queue.getResult(ssMetadata[i].name)], "frames": ssMetadata[i].frames} )
	}
	exportRoot = new lib.mind_gambit();
	stage = new lib.Stage(canvas);
	stage.enableMouseOver();	
	fnStartAnimation = function() {
		stage.addChild(exportRoot);
		createjs.Ticker.framerate = lib.properties.fps;
		createjs.Ticker.addEventListener("tick", stage);
	}	    
	AdobeAn.makeResponsive(true,'both',true,1,[canvas,anim_container,dom_overlay_container]);	
	completeTheBar();
	AdobeAn.compositionLoaded(lib.properties.id);
	fnStartAnimation();
}
function resizePreloader(evt){
	try{
      var iw = window.innerWidth;
      var	ih=window.innerHeight;		
      var hR = ih/pcnf.gh;
      var wR = iw/pcnf.gw;
      wR = (hR > wR) ? wR : hR;
      pcnf.bmw = pcnf.bw * wR;
      pcnf.bmh = pcnf.bh *wR;
	  loadingBar.style.width =  pcnf.ldp * pcnf.bmw +"px";
	  loadingBar.style.height= pcnf.bmh +"px";
      preloadBG.style.width = (pcnf.gw*wR)+ 'px';
      preloadBG.style.height = (pcnf.gh *wR)+ 'px';
      preloadBG.style.left = ((window.innerWidth-pcnf.gw*wR)/2)+'px';
      preloadBG.style.top = ((window.innerHeight-pcnf.gh *wR)/2)+'px';			
      loadingBar.style.left = ((window.innerWidth-pcnf.gw*wR)/2+pcnf.bx*wR) + 'px';
      loadingBar.style.top =  ((window.innerHeight-pcnf.gh *wR)/2+ pcnf.by*wR) + 'px';			
      loadingAnim.style.left = ((window.innerWidth-pcnf.gw*wR)/2+pcnf.tx*wR )+ 'px';
      loadingAnim.style.top =  ((window.innerHeight-pcnf.gh *wR)/2+ pcnf.ty*wR) + 'px';
      loadingAnim.style.width = (pcnf.tw*wR )+ 'px';
      loadingAnim.style.height =  (pcnf.th *wR) + 'px';
	  if(pcnf.sbg==false){
		preloadBG.style.display = 'block';
		loadingBar.style.display = 'block';
		loadingAnim.style.display = 'block';
		preloaderDiv.style.display = 'block';	
	  }				
  }catch(e){
	console.log("Error");
  }
}
function addListner(){
	  try{
		  pcnf.sbg = true;
		  canvas = document.getElementById("canvas");
		  loadingBar = document.getElementById("loadingBar");
		  preloadBG = document.getElementById("preloadBG");
		  loadingAnim = document.getElementById("loadingAnim");
		  preloaderDiv =  document.getElementById("loaderset");
		 pcnf.sbg =false;
		init();
		resizePreloader(null);
		caller(42,console.log);		 
	  }catch(e){
	  }
}
</script>	
      <div class="loaderset" id="loaderset">
         <img id="preloadBG" class="img1" src="images/preload_mc.jpg?mgm" />
         <img id="loadingBar" class="img2" src="images/bar_mc.png?mgm" />	
         <img id="loadingAnim" class="img2" src="https://lofgames.com/games/loader2.gif" />	
      </div>
      <script>
         var PG = document.getElementById("loaderPJx");
         caller(100,PG);
      </script>
	<div id="animation_container" style="background-color:background-color:rgba(0, 0, 0, 0); width:1280px; height:960px">
		<canvas id="canvas" width="1280" height="960" style="position: absolute; display: block; background-color:rgba(0, 0, 0, 0);"></canvas>
		<div id="dom_overlay_container" style="pointer-events:none; overflow:hidden; width:1280px; height:960px; position: absolute; left: 0px; top: 0px; display: block;">
		</div>
	</div>    
</body>
</html>
