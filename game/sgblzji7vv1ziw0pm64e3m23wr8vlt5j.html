  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100dvh; 
      width: 100%;
      background: url('assets/images/arcade_bg.jpg') no-repeat center center fixed;
      background-size: cover; 
      background-color: #000;
      font-family: 'Press Start 2P', monospace;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none; 
    }

    canvas {
      position: absolute;
      display: block;
      opacity: 0; 
      animation: turnOn 2.5s ease-out forwards, flicker 0.15s infinite;
      box-shadow: 0 0 50px rgba(0,0,0,0.8);
    }

    #crt-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none; 
      z-index: 10; 
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                  linear-gradient(90deg, rgba(255,0,0,0.06), rgba(0,255,0,0.02), rgba(0,0,255,0.06));
      background-size: 100% 3px, 3px 100%; 
      box-shadow: inset 0 0 100px rgba(0,0,0,0.9);
    }

    #rotate-screen {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #050010;
      z-index: 9999;
      color: #00eaff;
      text-align: center;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    @media screen and (orientation: portrait) {
      #rotate-screen { display: flex; }
      canvas, #crt-overlay { display: none; }
    }

    @keyframes turnOn {
      0% { transform: scale(1, 0.002); opacity: 0; filter: brightness(30); }
      20% { transform: scale(1, 0.002); opacity: 1; }
      50% { transform: scale(1, 1); filter: brightness(5); }
      100% { transform: scale(1, 1); opacity: 1; filter: brightness(1.1) contrast(1.1) saturate(1.2); }
    }

    @keyframes flicker {
      0% { opacity: 0.97; } 5% { opacity: 0.99; } 10% { opacity: 0.94; } 15% { opacity: 0.98; } 100% { opacity: 0.97; }
    }
    
    .rotate-icon {
      font-size: 60px;
      margin-bottom: 20px;
      animation: rotateAnim 2s infinite ease-in-out;
    }
    @keyframes rotateAnim {
      0% { transform: rotate(0deg); }
      50% { transform: rotate(-90deg); }
      100% { transform: rotate(0deg); }
    }
  </style>

  <!-- GameMonetize SDK -->
  <script type="text/javascript">
    window.SDK_OPTIONS = {
      gameId: "sgblzji7vv1ziw0pm64e3m23wr8vlt5j",
      onEvent: function (a) {
        switch (a.name) {
          case "SDK_GAME_PAUSE":
            // Dispatch event så vår AdManager kan pausa spelet
            window.dispatchEvent(new CustomEvent("game_pause"));
            break;
          case "SDK_GAME_START":
            // Dispatch event så vår AdManager kan återuppta spelet
            window.dispatchEvent(new CustomEvent("game_resume"));
            break;
          case "SDK_READY":
            // SDK är redo
            window.dispatchEvent(new CustomEvent("sdk_ready"));
            break;
        }
      }
    };
    (function (a, b, c) {
      var d = a.getElementsByTagName(b)[0];
      a.getElementById(c) || (a = a.createElement(b), a.id = c, a.src = "https://api.gamemonetize.com/sdk.js", d.parentNode.insertBefore(a, d))
    })(document, "script", "gamemonetize-sdk");
  </script>

</head>

<body>
  <canvas id="gameCanvas"></canvas>
  <div id="crt-overlay"></div>
  <div id="rotate-screen">
    <div class="rotate-icon">📱</div>
    <p>PLEASE ROTATE<br>DEVICE</p>
  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
