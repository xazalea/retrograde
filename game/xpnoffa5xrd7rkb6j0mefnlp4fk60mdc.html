<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Power Shift Arena</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #050510;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            touch-action: none;
        }
        
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 100%;
            max-height: 100%;
        }
        
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #050510;
        }
        
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(5, 5, 16, 0.97);
            z-index: 10;
        }
        
        .hidden {
            display: none !important;
        }
        
        h1 {
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 900;
            background: linear-gradient(135deg, #00d4ff 0%, #0099ff 50%, #ff8800 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            margin-bottom: 10px;
            text-align: center;
            letter-spacing: 6px;
            filter: drop-shadow(0 0 20px rgba(0, 212, 255, 0.5)) drop-shadow(0 0 40px rgba(255, 136, 0, 0.3));
        }
        
        .title-sub {
            font-size: clamp(1rem, 3vw, 1.5rem);
            font-weight: 300;
            color: #ff8800;
            text-shadow: 0 0 20px #ff8800;
            margin-bottom: 30px;
            letter-spacing: 8px;
        }
        
        h2 {
            font-size: clamp(1rem, 3vw, 1.5rem);
            color: #aaa;
            margin-bottom: 25px;
            text-align: center;
            letter-spacing: 3px;
        }
        
        .subtitle {
            font-size: clamp(0.8rem, 2.5vw, 1.1rem);
            color: #666;
            margin-bottom: 40px;
            text-align: center;
        }
        
        .btn {
            padding: 18px 60px;
            margin: 8px;
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            font-weight: bold;
            border: none;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, rgba(0, 153, 255, 0.2) 100%);
            border: 2px solid #00d4ff;
            color: #00d4ff;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 3px;
            min-width: 220px;
            position: relative;
            overflow: hidden;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }
        
        .btn:hover::before {
            left: 100%;
        }
        
        .btn:hover {
            background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
            color: #050510;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.6), inset 0 0 20px rgba(255,255,255,0.2);
            transform: scale(1.05);
        }
        
        .btn.easy {
            border-color: #00ff88;
            color: #00ff88;
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.1) 0%, rgba(0, 255, 136, 0.2) 100%);
        }
        
        .btn.easy:hover {
            background: linear-gradient(135deg, #00ff88 0%, #00cc66 100%);
            color: #050510;
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.6);
        }
        
        .btn.medium {
            border-color: #ff8800;
            color: #ff8800;
            background: linear-gradient(135deg, rgba(255, 136, 0, 0.1) 0%, rgba(255, 136, 0, 0.2) 100%);
        }
        
        .btn.medium:hover {
            background: linear-gradient(135deg, #ff8800 0%, #ff6600 100%);
            color: #050510;
            box-shadow: 0 0 40px rgba(255, 136, 0, 0.6);
        }
        
        .btn.hard {
            border-color: #ff0066;
            color: #ff0066;
            background: linear-gradient(135deg, rgba(255, 0, 102, 0.1) 0%, rgba(255, 0, 102, 0.2) 100%);
        }
        
        .btn.hard:hover {
            background: linear-gradient(135deg, #ff0066 0%, #cc0052 100%);
            color: #050510;
            box-shadow: 0 0 40px rgba(255, 0, 102, 0.6);
        }
        
        .score-display {
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 900;
            background: linear-gradient(135deg, #00d4ff 0%, #ff8800 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 20px 0;
            text-align: center;
        }
        
        .high-score {
            font-size: clamp(1rem, 3vw, 1.5rem);
            color: #ff8800;
            text-shadow: 0 0 15px #ff8800;
            margin-bottom: 30px;
        }
        
        #hud {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 5;
        }
        
        .hud-item {
            font-size: clamp(1rem, 2.5vw, 1.4rem);
            font-weight: bold;
            color: #fff;
            padding: 12px 20px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.15) 0%, rgba(0, 0, 0, 0.5) 100%);
            border: 1px solid rgba(0, 212, 255, 0.4);
            border-radius: 5px;
            letter-spacing: 2px;
        }
        
        .hud-item span {
            color: #00d4ff;
            text-shadow: 0 0 10px #00d4ff;
        }
        
        #pauseIndicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 900;
            color: #ff8800;
            text-shadow: 0 0 30px #ff8800, 0 0 60px #ff8800;
            z-index: 6;
            pointer-events: none;
            letter-spacing: 10px;
        }
        
        .direction-hint {
            font-size: clamp(0.7rem, 2vw, 0.9rem);
            color: #555;
            margin-top: 40px;
            text-align: center;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div id="hud" class="hidden">
            <div class="hud-item">SCORE: <span id="scoreHud">0</span></div>
            <div class="hud-item">WAVE: <span id="waveHud">1</span></div>
        </div>
        
        <div id="pauseIndicator" class="hidden">PAUSED</div>
        
        <div id="menuScreen" class="overlay">
            <h1>POWER SHIFT</h1>
            <div class="title-sub">ARENA</div>
            <p class="subtitle">Shift your power to survive the onslaught</p>
            <h2>SELECT DIFFICULTY</h2>
            <button class="btn easy" onclick="startGame('easy')">EASY</button>
            <button class="btn medium" onclick="startGame('medium')">MEDIUM</button>
            <button class="btn hard" onclick="startGame('hard')">HARD</button>
            <p class="direction-hint">Click or tap anywhere to aim your energy pulses</p>
        </div>
        
        <div id="gameOverScreen" class="overlay hidden">
            <h1>GAME OVER</h1>
            <div class="score-display" id="finalScore">0</div>
            <div class="high-score">BEST: <span id="bestScore">0</span></div>
            <button class="btn" onclick="returnToMenu()">MENU</button>
            <button class="btn" onclick="restartGame()">PLAY AGAIN</button>
        </div>
    </div>

    <script type="text/javascript">
        window.SDK_OPTIONS = {
            gameId: "xpnoffa5xrd7rkb6j0mefnlp4fk60mdc",
            onEvent: function (a) {
                switch (a.name) {
                    case "SDK_GAME_PAUSE":
                        if (typeof pauseForAd === 'function') pauseForAd();
                        break;
                    case "SDK_GAME_START":
                        if (typeof resumeFromAd === 'function') resumeFromAd();
                        break;
                    case "SDK_READY":
                        break;
                }
            }
        };
        (function (a, b, c) {
            var d = a.getElementsByTagName(b)[0];
            a.getElementById(c) || (a = a.createElement(b), a.id = c, a.src = "https://api.gamemonetize.com/sdk.js", d.parentNode.insertBefore(a, d))
        })(document, "script", "gamemonetize-sdk");
    </script>

    <script>
        // Canvas setup
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('gameContainer');
        
        // UI elements
        const menuScreen = document.getElementById('menuScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const hud = document.getElementById('hud');
        const scoreHud = document.getElementById('scoreHud');
        const waveHud = document.getElementById('waveHud');
        const pauseIndicator = document.getElementById('pauseIndicator');
        const finalScoreEl = document.getElementById('finalScore');
        const bestScoreEl = document.getElementById('bestScore');
        
        // Game state
        let gameRunning = false;
        let gamePaused = false;
        let adPaused = false;
        let currentDifficulty = 'medium';
        let score = 0;
        let wave = 1;
        let lastTime = 0;
        let deltaTime = 0;
        let gameTime = 0;
        let adTimer = 0;
        let nextAdTime = 60000 + Math.random() * 30000;
        
        // Visual effects
        let arenaRotation = 0;
        let pulseGlow = 0;
        let screenShake = { x: 0, y: 0, intensity: 0 };
        let lightRays = [];
        let backgroundStars = [];
        
        // Difficulty settings
        const difficulties = {
            easy: {
                enemySpeedMult: 0.6,
                spawnRate: 2800,
                pulseCooldown: 350,
                waveIncrease: 0.04,
                speedIncreaseRate: 0.008
            },
            medium: {
                enemySpeedMult: 1.0,
                spawnRate: 2200,
                pulseCooldown: 450,
                waveIncrease: 0.07,
                speedIncreaseRate: 0.012
            },
            hard: {
                enemySpeedMult: 1.3,
                spawnRate: 1600,
                pulseCooldown: 550,
                waveIncrease: 0.10,
                speedIncreaseRate: 0.018
            }
        };
        
        // Player
        let player = {
            x: 0,
            y: 0,
            radius: 30,
            direction: { x: 0, y: -1 },
            angle: -Math.PI / 2,
            pulseTimer: 0,
            health: 1,
            coreRotation: 0,
            ringRotation: 0
        };
        
        // Game objects
        let pulses = [];
        let enemies = [];
        let particles = [];
        let trailParticles = [];
        let spawnTimer = 0;
        
        // Audio context
        let audioCtx = null;
        let masterGain = null;
        let musicOsc = null;
        let musicGain = null;
        let audioMuted = false;
        
        // Initialize background stars
        function initBackgroundStars() {
            backgroundStars = [];
            for (let i = 0; i < 100; i++) {
                backgroundStars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 0.5,
                    alpha: Math.random() * 0.5 + 0.2,
                    twinkle: Math.random() * Math.PI * 2
                });
            }
        }
        
        window.onload = function () {
            showAd();
        };


        // Resize handler
        function resize() {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            player.x = canvas.width / 2;
            player.y = canvas.height / 2;
            initBackgroundStars();
        }
        
        window.addEventListener('resize', resize);
        resize();
        
        // Audio system
        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.connect(audioCtx.destination);
            masterGain.gain.value = 0.3;
        }
        
        function playSound(type) {
            if (!audioCtx || audioMuted) return;
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            
            osc.connect(gain);
            osc2.connect(gain2);
            gain.connect(masterGain);
            gain2.connect(masterGain);
            
            const now = audioCtx.currentTime;
            
            switch(type) {
                case 'pulse':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(1200, now);
                    osc.frequency.exponentialRampToValueAtTime(300, now + 0.15);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                    osc2.type = 'triangle';
                    osc2.frequency.setValueAtTime(600, now);
                    osc2.frequency.exponentialRampToValueAtTime(150, now + 0.1);
                    gain2.gain.setValueAtTime(0.1, now);
                    gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                    osc.start(now);
                    osc.stop(now + 0.15);
                    osc2.start(now);
                    osc2.stop(now + 0.1);
                    break;
                case 'hit':
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(300, now);
                    osc.frequency.exponentialRampToValueAtTime(80, now + 0.15);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                    osc.start(now);
                    osc.stop(now + 0.15);
                    break;
                case 'destroy':
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(800, now);
                    osc.frequency.exponentialRampToValueAtTime(60, now + 0.25);
                    gain.gain.setValueAtTime(0.12, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                    osc2.type = 'sawtooth';
                    osc2.frequency.setValueAtTime(400, now);
                    osc2.frequency.exponentialRampToValueAtTime(30, now + 0.3);
                    gain2.gain.setValueAtTime(0.08, now);
                    gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now);
                    osc.stop(now + 0.25);
                    osc2.start(now);
                    osc2.stop(now + 0.3);
                    screenShake.intensity = 8;
                    break;
                case 'gameover':
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(500, now);
                    osc.frequency.exponentialRampToValueAtTime(30, now + 1.2);
                    gain.gain.setValueAtTime(0.4, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 1.2);
                    osc.start(now);
                    osc.stop(now + 1.2);
                    screenShake.intensity = 20;
                    break;
            }
        }
        
        function startMusic() {
            if (!audioCtx || musicOsc) return;
            
            musicGain = audioCtx.createGain();
            musicGain.connect(masterGain);
            musicGain.gain.value = 0.06;
            
            musicOsc = audioCtx.createOscillator();
            musicOsc.type = 'triangle';
            musicOsc.frequency.value = 55;
            
            const lfo = audioCtx.createOscillator();
            const lfoGain = audioCtx.createGain();
            lfo.frequency.value = 0.3;
            lfoGain.gain.value = 15;
            lfo.connect(lfoGain);
            lfoGain.connect(musicOsc.frequency);
            lfo.start();
            
            musicOsc.connect(musicGain);
            musicOsc.start();
        }
        
        function stopMusic() {
            if (musicOsc) {
                musicOsc.stop();
                musicOsc = null;
            }
        }
        
        function muteAudio() {
            audioMuted = true;
            if (masterGain) masterGain.gain.value = 0;
        }
        
        function unmuteAudio() {
            audioMuted = false;
            if (masterGain) masterGain.gain.value = 0.3;
        }
        
        // Input handling
        function handleInput(clientX, clientY) {
            if (!gameRunning || gamePaused) return;
            
            const rect = canvas.getBoundingClientRect();
            const x = (clientX - rect.left) * (canvas.width / rect.width);
            const y = (clientY - rect.top) * (canvas.height / rect.height);
            
            const dx = x - player.x;
            const dy = y - player.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            
            if (dist > 0) {
                player.direction.x = dx / dist;
                player.direction.y = dy / dist;
                player.angle = Math.atan2(dy, dx);
            }
        }
        
        canvas.addEventListener('click', (e) => {
            initAudio();
            handleInput(e.clientX, e.clientY);
        });
        
        canvas.addEventListener('mousemove', (e) => {
            if (gameRunning && !gamePaused) {
                handleInput(e.clientX, e.clientY);
            }
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            initAudio();
            if (e.touches.length > 0) {
                handleInput(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: false });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (e.touches.length > 0) {
                handleInput(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: false });
        
        // Keyboard input for 8 directions
        document.addEventListener('keydown', (e) => {
            if (!gameRunning || gamePaused) return;
            
            const dirs = {
                'ArrowUp': { x: 0, y: -1 },
                'ArrowDown': { x: 0, y: 1 },
                'ArrowLeft': { x: -1, y: 0 },
                'ArrowRight': { x: 1, y: 0 },
                'KeyW': { x: 0, y: -1 },
                'KeyS': { x: 0, y: 1 },
                'KeyA': { x: -1, y: 0 },
                'KeyD': { x: 1, y: 0 }
            };
            
            if (dirs[e.code]) {
                player.direction = { ...dirs[e.code] };
                player.angle = Math.atan2(player.direction.y, player.direction.x);
            }
        });
        
        // Visibility handling
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                pauseGame();
            } else {
                resumeGame();
            }
        });
        
        window.addEventListener('blur', pauseGame);
        window.addEventListener('focus', resumeGame);
        
        function pauseGame() {
            if (gameRunning && !gamePaused) {
                gamePaused = true;
                muteAudio();
                pauseIndicator.classList.remove('hidden');
            }
        }
        
        function resumeGame() {
            if (gameRunning && gamePaused && !adPaused) {
                gamePaused = false;
                unmuteAudio();
                pauseIndicator.classList.add('hidden');
                lastTime = performance.now();
                requestAnimationFrame(gameLoop);
            }
        }
        
        function pauseForAd() {
            adPaused = true;
            gamePaused = true;
            muteAudio();
        }
        
        function resumeFromAd() {
            adPaused = false;
            if (gameRunning) {
                gamePaused = false;
                unmuteAudio();
                lastTime = performance.now();
            }
        }
        
        // Ad display
        function showAd() {
            if (typeof sdk !== 'undefined' && sdk.showBanner !== 'undefined') {
                sdk.showBanner();
            }
        }
        
        // Game functions
        function startGame(difficulty) {
            initAudio();
            currentDifficulty = difficulty;
            
            
            
            // Reset game state
            score = 0;
            wave = 1;
            gameTime = 0;
            pulses = [];
            enemies = [];
            particles = [];
            trailParticles = [];
            lightRays = [];
            spawnTimer = 0;
            player.pulseTimer = 0;
            player.health = 1;
            player.x = canvas.width / 2;
            player.y = canvas.height / 2;
            player.direction = { x: 0, y: -1 };
            player.angle = -Math.PI / 2;
            player.coreRotation = 0;
            player.ringRotation = 0;
            arenaRotation = 0;
            pulseGlow = 0;
            screenShake = { x: 0, y: 0, intensity: 0 };
            adTimer = 0;
            nextAdTime = 60000 + Math.random() * 30000;
            
            // Update UI
            menuScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            hud.classList.remove('hidden');
            updateHUD();
            
            // Start game
            gameRunning = true;
            gamePaused = false;
            startMusic();
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }
        
        function endGame() {
            gameRunning = false;
            stopMusic();
            playSound('gameover');
            
            // Save high score
            const key = `powershift_highscore_${currentDifficulty}`;
            const best = parseInt(localStorage.getItem(key) || '0');
            if (score > best) {
                localStorage.setItem(key, score.toString());
            }
            
            // Show game over
            finalScoreEl.textContent = score;
            bestScoreEl.textContent = Math.max(score, best);
            hud.classList.add('hidden');
            gameOverScreen.classList.remove('hidden');
            
            showAd();
        }
        
        function returnToMenu() {
            gameOverScreen.classList.add('hidden');
            menuScreen.classList.remove('hidden');
        }
        
        function restartGame() {
            startGame(currentDifficulty);
        }
        
        function updateHUD() {
            scoreHud.textContent = score;
            waveHud.textContent = wave;
        }
        
        // Calculate current speed multiplier based on game time
        function getSpeedMultiplier() {
            const settings = difficulties[currentDifficulty];
            return 1 + (gameTime * settings.speedIncreaseRate);
        }
        
        // Spawn enemies
        function spawnEnemy() {
            const settings = difficulties[currentDifficulty];
            const side = Math.floor(Math.random() * 4);
            let x, y;
            
            const margin = 50;
            switch(side) {
                case 0: x = Math.random() * canvas.width; y = -margin; break;
                case 1: x = canvas.width + margin; y = Math.random() * canvas.height; break;
                case 2: x = Math.random() * canvas.width; y = canvas.height + margin; break;
                case 3: x = -margin; y = Math.random() * canvas.height; break;
            }
            
            const typeRoll = Math.random();
            let type, baseSpeed, hp, radius, points;
            
            if (typeRoll < 0.5) {
                // Fast enemy - cyan/blue crystal
                type = 'fast';
                baseSpeed = 140;
                hp = 1;
                radius = 15;
                points = 15;
            } else if (typeRoll < 0.85) {
                // Tank enemy - orange/gold hexagon
                type = 'tank';
                baseSpeed = 70;
                hp = 3;
                radius = 25;
                points = 30;
            } else {
                // Elite enemy - purple diamond
                type = 'elite';
                baseSpeed = 100;
                hp = 2;
                radius = 18;
                points = 50;
            }
            
            const waveBonus = 1 + (wave - 1) * settings.waveIncrease;
            const speedMult = getSpeedMultiplier();
            
            enemies.push({
                x: x,
                y: y,
                radius: radius,
                speed: baseSpeed * settings.enemySpeedMult * waveBonus * speedMult,
                baseSpeed: baseSpeed * settings.enemySpeedMult,
                hp: hp,
                maxHp: hp,
                type: type,
                points: points,
                rotation: Math.random() * Math.PI * 2,
                pulsePhase: Math.random() * Math.PI * 2
            });
        }
        
        // Fire pulse
        function firePulse() {
            const angle = player.angle;
            const spread = 0.1;
            
            pulses.push({
                x: player.x + player.direction.x * 40,
                y: player.y + player.direction.y * 40,
                vx: Math.cos(angle) * 600,
                vy: Math.sin(angle) * 600,
                radius: 10,
                life: 2,
                damage: 1,
                trail: []
            });
            
            // Add light ray effect
            lightRays.push({
                x: player.x,
                y: player.y,
                angle: angle,
                length: 0,
                maxLength: 300,
                life: 0.3,
                width: 30
            });
            
            pulseGlow = 1;
            playSound('pulse');
        }
        
        // Create particles
        function createParticles(x, y, color, count, type = 'normal') {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = type === 'explosion' ? 100 + Math.random() * 250 : 50 + Math.random() * 150;
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    radius: type === 'explosion' ? 3 + Math.random() * 6 : 2 + Math.random() * 4,
                    life: type === 'explosion' ? 0.8 + Math.random() * 0.6 : 0.4 + Math.random() * 0.4,
                    color: color,
                    type: type
                });
            }
        }
        
        // Game loop
        function gameLoop(timestamp) {
            if (!gameRunning || gamePaused) return;
            
            deltaTime = Math.min((timestamp - lastTime) / 1000, 0.1);
            lastTime = timestamp;
            
            update(deltaTime);
            render();
            
            requestAnimationFrame(gameLoop);
        }
        
        function update(dt) {
            const settings = difficulties[currentDifficulty];
            
            gameTime += dt;
            
            // Score over time
            score += Math.floor(dt * 12);
            
            // Wave progression
            if (score > wave * 600) {
                wave++;
                // Update existing enemy speeds on wave change
                const speedMult = getSpeedMultiplier();
                const waveBonus = 1 + (wave - 1) * settings.waveIncrease;
                enemies.forEach(e => {
                    e.speed = e.baseSpeed * waveBonus * speedMult;
                });
            }
            
            // Random ad timer
            adTimer += dt * 1000;
            if (adTimer >= nextAdTime) {
                showAd();
                adTimer = 0;
                nextAdTime = 60000 + Math.random() * 30000;
            }
            
            // Visual effects
            arenaRotation += dt * 0.1;
            player.coreRotation += dt * 2;
            player.ringRotation -= dt * 1.5;
            pulseGlow = Math.max(0, pulseGlow - dt * 3);
            
            // Screen shake
            if (screenShake.intensity > 0) {
                screenShake.x = (Math.random() - 0.5) * screenShake.intensity;
                screenShake.y = (Math.random() - 0.5) * screenShake.intensity;
                screenShake.intensity *= 0.9;
                if (screenShake.intensity < 0.5) screenShake.intensity = 0;
            }
            
            // Pulse firing
            player.pulseTimer += dt * 1000;
            if (player.pulseTimer >= settings.pulseCooldown) {
                player.pulseTimer = 0;
                firePulse();
            }
            
            // Enemy spawning
            spawnTimer += dt * 1000;
            const spawnRate = settings.spawnRate / (1 + (wave - 1) * 0.08);
            if (spawnTimer >= spawnRate) {
                spawnTimer = 0;
                const count = Math.min(1 + Math.floor(wave / 4), 5);
                for (let i = 0; i < count; i++) {
                    spawnEnemy();
                }
            }
            
            // Update light rays
            for (let i = lightRays.length - 1; i >= 0; i--) {
                const ray = lightRays[i];
                ray.length = Math.min(ray.length + dt * 2000, ray.maxLength);
                ray.life -= dt;
                if (ray.life <= 0) {
                    lightRays.splice(i, 1);
                }
            }
            
            // Update pulses
            for (let i = pulses.length - 1; i >= 0; i--) {
                const p = pulses[i];
                
                // Add trail
                if (p.trail.length === 0 || 
                    Math.hypot(p.x - p.trail[p.trail.length - 1].x, p.y - p.trail[p.trail.length - 1].y) > 10) {
                    p.trail.push({ x: p.x, y: p.y, life: 0.3 });
                }
                
                // Update trail
                for (let j = p.trail.length - 1; j >= 0; j--) {
                    p.trail[j].life -= dt;
                    if (p.trail[j].life <= 0) {
                        p.trail.splice(j, 1);
                    }
                }
                
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                p.life -= dt;
                
                if (p.life <= 0 || p.x < -100 || p.x > canvas.width + 100 || 
                    p.y < -100 || p.y > canvas.height + 100) {
                    pulses.splice(i, 1);
                }
            }
            
            // Update enemies with progressive speed increase
            const currentSpeedMult = getSpeedMultiplier();
            
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                const dx = player.x - e.x;
                const dy = player.y - e.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                // Update enemy speed based on current time
                const waveBonus = 1 + (wave - 1) * settings.waveIncrease;
                e.speed = e.baseSpeed * waveBonus * currentSpeedMult;
                
                if (dist > 0) {
                    e.x += (dx / dist) * e.speed * dt;
                    e.y += (dy / dist) * e.speed * dt;
                }
                
                e.rotation += dt * 2;
                e.pulsePhase += dt * 5;
                
                // Check collision with player
                if (dist < player.radius + e.radius - 5) {
                    endGame();
                    return;
                }
                
                // Check collision with pulses
                for (let j = pulses.length - 1; j >= 0; j--) {
                    const p = pulses[j];
                    const pdx = p.x - e.x;
                    const pdy = p.y - e.y;
                    const pdist = Math.sqrt(pdx * pdx + pdy * pdy);
                    
                    if (pdist < p.radius + e.radius) {
                        e.hp -= p.damage;
                        pulses.splice(j, 1);
                        
                        const colors = {
                            fast: ['#00d4ff', '#0099ff', '#00ffff'],
                            tank: ['#ff8800', '#ffaa00', '#ffcc00'],
                            elite: ['#ff00ff', '#cc00ff', '#ff66ff']
                        };
                        
                        if (e.hp <= 0) {
                            score += e.points;
                            createParticles(e.x, e.y, colors[e.type][0], 20, 'explosion');
                            createParticles(e.x, e.y, colors[e.type][1], 15, 'explosion');
                            createParticles(e.x, e.y, colors[e.type][2], 10, 'explosion');
                            playSound('destroy');
                            enemies.splice(i, 1);
                        } else {
                            createParticles(e.x, e.y, colors[e.type][0], 8);
                            playSound('hit');
                        }
                        break;
                    }
                }
            }
            
            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                p.vx *= 0.96;
                p.vy *= 0.96;
                p.life -= dt;
                
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
            
            // Update background stars
            backgroundStars.forEach(star => {
                star.twinkle += dt * 3;
            });
            
            updateHUD();
        }
        
        function render() {
            ctx.save();
            ctx.translate(screenShake.x, screenShake.y);
            
            // Dark gradient background
            const bgGradient = ctx.createRadialGradient(
                canvas.width / 2, canvas.height / 2, 0,
                canvas.width / 2, canvas.height / 2, Math.max(canvas.width, canvas.height) * 0.7
            );
            bgGradient.addColorStop(0, '#0a0a1a');
            bgGradient.addColorStop(0.5, '#050510');
            bgGradient.addColorStop(1, '#020208');
            ctx.fillStyle = bgGradient;
            ctx.fillRect(-50, -50, canvas.width + 100, canvas.height + 100);
            
            // Background stars
            backgroundStars.forEach(star => {
                const alpha = star.alpha * (0.5 + 0.5 * Math.sin(star.twinkle));
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });
            
            // Draw circular arena rings
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const maxRadius = Math.min(canvas.width, canvas.height) * 0.45;
            
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(arenaRotation);
            
            // Outer glow rings
            for (let i = 5; i >= 1; i--) {
                const ringRadius = maxRadius * (0.3 + i * 0.14);
                const alpha = 0.03 + (5 - i) * 0.02;
                
                ctx.strokeStyle = `rgba(0, 212, 255, ${alpha})`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(0, 0, ringRadius, 0, Math.PI * 2);
                ctx.stroke();
            }
            
            // Main arena circle
            ctx.strokeStyle = 'rgba(0, 212, 255, 0.3)';
            ctx.lineWidth = 3;
            ctx.shadowColor = '#00d4ff';
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.arc(0, 0, maxRadius, 0, Math.PI * 2);
            ctx.stroke();
            
            // Animated segments
            const segments = 8;
            for (let i = 0; i < segments; i++) {
                const segAngle = (Math.PI * 2 / segments) * i + arenaRotation * 2;
                const segLength = maxRadius * 0.15;
                
                ctx.strokeStyle = `rgba(255, 136, 0, ${0.3 + 0.2 * Math.sin(gameTime * 3 + i)})`;
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.arc(0, 0, maxRadius * 0.85, segAngle, segAngle + 0.2);
                ctx.stroke();
            }
            
            ctx.restore();
            ctx.shadowBlur = 0;
            
            // Draw light rays
            lightRays.forEach(ray => {
                const alpha = ray.life / 0.3;
                const gradient = ctx.createLinearGradient(
                    ray.x, ray.y,
                    ray.x + Math.cos(ray.angle) * ray.length,
                    ray.y + Math.sin(ray.angle) * ray.length
                );
                gradient.addColorStop(0, `rgba(0, 212, 255, ${alpha * 0.8})`);
                gradient.addColorStop(0.5, `rgba(0, 255, 255, ${alpha * 0.4})`);
                gradient.addColorStop(1, 'rgba(0, 255, 255, 0)');
                
                ctx.save();
                ctx.translate(ray.x, ray.y);
                ctx.rotate(ray.angle);
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.moveTo(0, -ray.width * alpha / 2);
                ctx.lineTo(ray.length, 0);
                ctx.lineTo(0, ray.width * alpha / 2);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            });
            
            // Draw particles
            particles.forEach(p => {
                const alpha = p.life / (p.type === 'explosion' ? 1.4 : 0.8);
                ctx.globalAlpha = alpha;
                
                const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.radius);
                gradient.addColorStop(0, '#ffffff');
                gradient.addColorStop(0.3, p.color);
                gradient.addColorStop(1, 'rgba(0,0,0,0)');
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius * (1 + (1 - alpha) * 0.5), 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
            
            // Draw pulse trails and pulses
            pulses.forEach(p => {
                // Trail
                p.trail.forEach((t, idx) => {
                    const trailAlpha = t.life / 0.3 * 0.5;
                    const trailGradient = ctx.createRadialGradient(t.x, t.y, 0, t.x, t.y, p.radius * 1.5);
                    trailGradient.addColorStop(0, `rgba(0, 212, 255, ${trailAlpha})`);
                    trailGradient.addColorStop(1, 'rgba(0, 212, 255, 0)');
                    ctx.fillStyle = trailGradient;
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, p.radius * 1.5, 0, Math.PI * 2);
                    ctx.fill();
                });
                
                // Main pulse
                ctx.shadowColor = '#00d4ff';
                ctx.shadowBlur = 25;
                
                const pulseGradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.radius * 2.5);
                pulseGradient.addColorStop(0, '#ffffff');
                pulseGradient.addColorStop(0.2, '#00ffff');
                pulseGradient.addColorStop(0.5, '#00d4ff');
                pulseGradient.addColorStop(1, 'rgba(0, 212, 255, 0)');
                
                ctx.fillStyle = pulseGradient;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius * 2.5, 0, Math.PI * 2);
                ctx.fill();
                
                // Core
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius * 0.4, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.shadowBlur = 0;
            });
            
            // Draw enemies
            enemies.forEach(e => {
                const pulseFactor = 1 + Math.sin(e.pulsePhase) * 0.1;
                
                ctx.save();
                ctx.translate(e.x, e.y);
                
                if (e.type === 'fast') {
                    // Cyan crystal triangle
                    ctx.rotate(e.rotation);
                    
                    ctx.shadowColor = '#00d4ff';
                    ctx.shadowBlur = 20;
                    
                    // Outer glow
                    const glowGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, e.radius * 2);
                    glowGradient.addColorStop(0, 'rgba(0, 212, 255, 0.3)');
                    glowGradient.addColorStop(1, 'rgba(0, 212, 255, 0)');
                    ctx.fillStyle = glowGradient;
                    ctx.beginPath();
                    ctx.arc(0, 0, e.radius * 2, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Crystal body
                    const gradient = ctx.createLinearGradient(-e.radius, -e.radius, e.radius, e.radius);
                    gradient.addColorStop(0, '#00ffff');
                    gradient.addColorStop(0.5, '#00d4ff');
                    gradient.addColorStop(1, '#0099ff');
                    ctx.fillStyle = gradient;
                    
                    ctx.beginPath();
                    for (let i = 0; i < 3; i++) {
                        const angle = (Math.PI * 2 / 3) * i - Math.PI / 2;
                        const px = Math.cos(angle) * e.radius * pulseFactor;
                        const py = Math.sin(angle) * e.radius * pulseFactor;
                        if (i === 0) ctx.moveTo(px, py);
                        else ctx.lineTo(px, py);
                    }
                    ctx.closePath();
                    ctx.fill();
                    
                    // Inner highlight
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                    ctx.beginPath();
                    for (let i = 0; i < 3; i++) {
                        const angle = (Math.PI * 2 / 3) * i - Math.PI / 2;
                        const px = Math.cos(angle) * e.radius * 0.4;
                        const py = Math.sin(angle) * e.radius * 0.4;
                        if (i === 0) ctx.moveTo(px, py);
                        else ctx.lineTo(px, py);
                    }
                    ctx.closePath();
                    ctx.fill();
                    
                } else if (e.type === 'tank') {
                    // Orange/gold hexagon
                    ctx.rotate(e.rotation * 0.5);
                    
                    ctx.shadowColor = '#ff8800';
                    ctx.shadowBlur = 25;
                    
                    // Outer glow
                    const glowGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, e.radius * 2);
                    glowGradient.addColorStop(0, 'rgba(255, 136, 0, 0.3)');
                    glowGradient.addColorStop(1, 'rgba(255, 136, 0, 0)');
                    ctx.fillStyle = glowGradient;
                    ctx.beginPath();
                    ctx.arc(0, 0, e.radius * 2, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Hexagon body
                    const gradient = ctx.createLinearGradient(-e.radius, -e.radius, e.radius, e.radius);
                    gradient.addColorStop(0, '#ffcc00');
                    gradient.addColorStop(0.5, '#ff8800');
                    gradient.addColorStop(1, '#ff6600');
                    ctx.fillStyle = gradient;
                    
                    ctx.beginPath();
                    for (let i = 0; i < 6; i++) {
                        const angle = (Math.PI / 3) * i;
                        const px = Math.cos(angle) * e.radius * pulseFactor;
                        const py = Math.sin(angle) * e.radius * pulseFactor;
                        if (i === 0) ctx.moveTo(px, py);
                        else ctx.lineTo(px, py);
                    }
                    ctx.closePath();
                    ctx.fill();
                    
                    // Inner pattern
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    for (let i = 0; i < 6; i++) {
                        const angle = (Math.PI / 3) * i;
                        const px = Math.cos(angle) * e.radius * 0.5;
                        const py = Math.sin(angle) * e.radius * 0.5;
                        if (i === 0) ctx.moveTo(px, py);
                        else ctx.lineTo(px, py);
                    }
                    ctx.closePath();
                    ctx.stroke();
                    
                    // HP indicator
                    if (e.hp < e.maxHp) {
                        ctx.rotate(-e.rotation * 0.5);
                        ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                        ctx.fillRect(-20, -e.radius - 12, 40, 6);
                        ctx.fillStyle = '#00ff88';
                        ctx.shadowColor = '#00ff88';
                        ctx.shadowBlur = 8;
                        ctx.fillRect(-20, -e.radius - 12, 40 * (e.hp / e.maxHp), 6);
                    }
                    
                } else {
                    // Elite - purple diamond
                    ctx.rotate(e.rotation * 1.5);
                    
                    ctx.shadowColor = '#ff00ff';
                    ctx.shadowBlur = 30;
                    
                    // Outer glow
                    const glowGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, e.radius * 2.5);
                    glowGradient.addColorStop(0, 'rgba(255, 0, 255, 0.4)');
                    glowGradient.addColorStop(1, 'rgba(255, 0, 255, 0)');
                    ctx.fillStyle = glowGradient;
                    ctx.beginPath();
                    ctx.arc(0, 0, e.radius * 2.5, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Diamond body
                    const gradient = ctx.createLinearGradient(-e.radius, -e.radius, e.radius, e.radius);
                    gradient.addColorStop(0, '#ff66ff');
                    gradient.addColorStop(0.5, '#ff00ff');
                    gradient.addColorStop(1, '#cc00cc');
                    ctx.fillStyle = gradient;
                    
                    ctx.beginPath();
                    ctx.moveTo(0, -e.radius * pulseFactor * 1.3);
                    ctx.lineTo(e.radius * pulseFactor, 0);
                    ctx.lineTo(0, e.radius * pulseFactor * 1.3);
                    ctx.lineTo(-e.radius * pulseFactor, 0);
                    ctx.closePath();
                    ctx.fill();
                    
                    // Inner glow
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                    ctx.beginPath();
                    ctx.moveTo(0, -e.radius * 0.4);
                    ctx.lineTo(e.radius * 0.3, 0);
                    ctx.lineTo(0, e.radius * 0.4);
                    ctx.lineTo(-e.radius * 0.3, 0);
                    ctx.closePath();
                    ctx.fill();
                    
                    // HP indicator
                    if (e.hp < e.maxHp) {
                        ctx.rotate(-e.rotation * 1.5);
                        ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                        ctx.fillRect(-18, -e.radius - 15, 36, 5);
                        ctx.fillStyle = '#00ff88';
                        ctx.shadowColor = '#00ff88';
                        ctx.shadowBlur = 8;
                        ctx.fillRect(-18, -e.radius - 15, 36 * (e.hp / e.maxHp), 5);
                    }
                }
                
                ctx.restore();
                ctx.shadowBlur = 0;
            });
            
            // Draw player core
            ctx.save();
            ctx.translate(player.x, player.y);
            
            // Outer energy field
            const fieldGradient = ctx.createRadialGradient(0, 0, player.radius * 0.5, 0, 0, player.radius * 3);
            fieldGradient.addColorStop(0, 'rgba(0, 212, 255, 0.1)');
            fieldGradient.addColorStop(0.5, 'rgba(0, 153, 255, 0.05)');
            fieldGradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = fieldGradient;
            ctx.beginPath();
            ctx.arc(0, 0, player.radius * 3, 0, Math.PI * 2);
            ctx.fill();
            
            // Rotating outer ring
            ctx.save();
            ctx.rotate(player.ringRotation);
            ctx.strokeStyle = 'rgba(0, 212, 255, 0.6)';
            ctx.lineWidth = 3;
            ctx.shadowColor = '#00d4ff';
            ctx.shadowBlur = 15;
            
            for (let i = 0; i < 4; i++) {
                const startAngle = (Math.PI / 2) * i + 0.2;
                const endAngle = (Math.PI / 2) * i + 1.2;
                ctx.beginPath();
                ctx.arc(0, 0, player.radius * 1.6, startAngle, endAngle);
                ctx.stroke();
            }
            ctx.restore();
            
            // Middle ring
            ctx.save();
            ctx.rotate(-player.ringRotation * 1.5);
            ctx.strokeStyle = 'rgba(255, 136, 0, 0.5)';
            ctx.lineWidth = 2;
            ctx.shadowColor = '#ff8800';
            ctx.shadowBlur = 10;
            
            for (let i = 0; i < 6; i++) {
                const startAngle = (Math.PI / 3) * i + 0.1;
                const endAngle = (Math.PI / 3) * i + 0.4;
                ctx.beginPath();
                ctx.arc(0, 0, player.radius * 1.25, startAngle, endAngle);
                ctx.stroke();
            }
            ctx.restore();
            
            // Core glow pulse
            const glowSize = player.radius * (1.8 + pulseGlow * 0.5);
            const coreGlowGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, glowSize);
            coreGlowGradient.addColorStop(0, `rgba(255, 255, 255, ${0.8 + pulseGlow * 0.2})`);
            coreGlowGradient.addColorStop(0.2, `rgba(0, 212, 255, ${0.6 + pulseGlow * 0.3})`);
            coreGlowGradient.addColorStop(0.5, 'rgba(0, 153, 255, 0.3)');
            coreGlowGradient.addColorStop(1, 'rgba(0, 102, 255, 0)');
            
            ctx.shadowColor = '#00d4ff';
            ctx.shadowBlur = 40 + pulseGlow * 20;
            ctx.fillStyle = coreGlowGradient;
            ctx.beginPath();
            ctx.arc(0, 0, glowSize, 0, Math.PI * 2);
            ctx.fill();
            
            // Core body
            const coreGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, player.radius);
            coreGradient.addColorStop(0, '#ffffff');
            coreGradient.addColorStop(0.3, '#00ffff');
            coreGradient.addColorStop(0.6, '#00aaff');
            coreGradient.addColorStop(1, '#0066ff');
            
            ctx.fillStyle = coreGradient;
            ctx.beginPath();
            ctx.arc(0, 0, player.radius, 0, Math.PI * 2);
            ctx.fill();
            
            // Core inner pattern
            ctx.save();
            ctx.rotate(player.coreRotation);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.lineWidth = 2;
            for (let i = 0; i < 8; i++) {
                const angle = (Math.PI / 4) * i;
                ctx.beginPath();
                ctx.moveTo(Math.cos(angle) * 5, Math.sin(angle) * 5);
                ctx.lineTo(Math.cos(angle) * player.radius * 0.7, Math.sin(angle) * player.radius * 0.7);
                ctx.stroke();
            }
            ctx.restore();
            
            ctx.restore();
            
            // Draw direction indicator / beam
            const beamLength = 80;
            const beamEndX = player.x + player.direction.x * beamLength;
            const beamEndY = player.y + player.direction.y * beamLength;
            
            // Direction beam
            const beamGradient = ctx.createLinearGradient(
                player.x + player.direction.x * player.radius,
                player.y + player.direction.y * player.radius,
                beamEndX, beamEndY
            );
            beamGradient.addColorStop(0, 'rgba(0, 212, 255, 0.9)');
            beamGradient.addColorStop(0.5, 'rgba(0, 255, 255, 0.6)');
            beamGradient.addColorStop(1, 'rgba(0, 255, 255, 0)');
            
            ctx.strokeStyle = beamGradient;
            ctx.lineWidth = 6;
            ctx.lineCap = 'round';
            ctx.shadowColor = '#00ffff';
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.moveTo(player.x + player.direction.x * player.radius * 1.2, 
                       player.y + player.direction.y * player.radius * 1.2);
            ctx.lineTo(beamEndX, beamEndY);
            ctx.stroke();
            
            // Arrow head
            const arrowSize = 15;
            const arrowAngle = Math.PI / 5;
            ctx.fillStyle = '#00ffff';
            ctx.beginPath();
            ctx.moveTo(beamEndX, beamEndY);
            ctx.lineTo(
                beamEndX - arrowSize * Math.cos(player.angle - arrowAngle),
                beamEndY - arrowSize * Math.sin(player.angle - arrowAngle)
            );
            ctx.lineTo(
                beamEndX - arrowSize * Math.cos(player.angle + arrowAngle),
                beamEndY - arrowSize * Math.sin(player.angle + arrowAngle)
            );
            ctx.closePath();
            ctx.fill();
            
            ctx.shadowBlur = 0;
            
            // Pulse charge indicator
            const settings = difficulties[currentDifficulty];
            const chargePercent = player.pulseTimer / settings.pulseCooldown;
            
            ctx.strokeStyle = `rgba(255, 136, 0, ${0.4 + chargePercent * 0.6})`;
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.shadowColor = '#ff8800';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius + 12, 
                    player.angle - Math.PI * chargePercent, 
                    player.angle + Math.PI * chargePercent);
            ctx.stroke();
            ctx.shadowBlur = 0;
            
            ctx.restore();
        }
        
        // Initialize
        resize();
    </script>
</body>
</html>
