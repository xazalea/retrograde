<!DOCTYPE html>
<html lang="en-us">

<head>
  <meta charset="utf-8">
  <!-- Add viewport meta tag for proper mobile scaling -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pipe Connect</title>
  <style>
    html {
      box-sizing: border-box;
    }

    *,
    *:before,
    *:after {
      box-sizing: inherit;
    }

    body {
      margin: 0;
      background: #444;
      /* --- Use Flexbox to center the game container --- */
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      /* Hide any potential scrollbars */
    }

    #gameContainer {
      /* --- Force the 720x1280 (9:16) aspect ratio --- */
      height: 100vh;
      max-width: 100vw;
      /* Ensure it doesn't overflow horizontally */
      aspect-ratio: 720 / 1280;
      margin: 0 auto;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* try to handle mobile dialog */
    canvas+* {
      z-index: 2;
    }

    .logo {
      display: block;
      width: 250px;
      height: 50px;
      max-width: 90vw;
      /* Ensure it shrinks on small screens */
      object-fit: contain;
    }

    .progress {
      margin: 1.5em;
      border: 1px solid white;
      width: 50vw;
      display: none;
    }

    .progress .full {
      margin: 2px;
      background: white;
      height: 1em;
      transform-origin: top left;
    }

    #loader {
      position: absolute;
      left: 0;
      top: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      /* --- FIX: Set background and z-index to show loader ON TOP --- */
      background: #444;
      z-index: 10;
    }

    .spinner,
    .spinner:after {
      border-radius: 50%;
      width: 5em;
      height: 5em;
    }

    .spinner {
      margin: 10px;
      font-size: 10px;
      position: relative;
      text-indent: -9999em;
      border-top: 1.1em solid rgba(255, 255, 255, 0.2);
      border-right: 1.1em solid rgba(255, 255, 255, 0.2);
      border-bottom: 1.1em solid rgba(255, 255, 255, 0.2);
      border-left: 1.1em solid #ffffff;
      transform: translateZ(0);
      animation: spinner-spin 1.1s infinite linear;
    }

    @keyframes spinner-spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <!-- This div will now be scaled by the CSS -->
  <div id="gameContainer"></div>

  <!-- This loader will appear ON TOP of the gameContainer -->
  <div id="loader">
    <!-- Added a fallback placeholder in case logo.png doesn't load -->
    <img class="logo" src="logo.png" width="250" height="50" onerror="this.onerror=null; this.src='https://placehold.co/250x50/666/FFF?text=Pipe+Connect';">
    <div class="spinner"></div>
    <div class="progress">
      <div class="full"></div>
    </div>
  </div>
</body>

<script src="Build/UnityLoader.js"></script>
<script>
  var gameInstance = UnityLoader.instantiate("gameContainer", "Build/azama.json", { onProgress: UnityProgress });
  function UnityProgress(gameInstance, progress) {
    if (!gameInstance.Module) {
      return;
    }
    const loader = document.querySelector("#loader");
    if (!gameInstance.progress) {
      const progressEl = document.querySelector("#loader .progress");
      progressEl.style.display = "block";
      gameInstance.progress = progressEl.querySelector(".full");
      loader.querySelector(".spinner").style.display = "none";
    }
    gameInstance.progress.style.transform = `scaleX(${progress})`;
    if (progress === 1 && !gameInstance.removeTimeout) {
      gameInstance.removeTimeout = setTimeout(function () {
        // This will hide the whole loader div
        loader.style.display = "none";
      }, 2000); // 2-second delay
    }
  }

</script>

</html>
