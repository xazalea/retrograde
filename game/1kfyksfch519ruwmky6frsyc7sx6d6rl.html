<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Stellar Dash - Ad Optimized</title>

<script type="text/javascript">
// Global flags for SDK and Game State
var isPausedBySDK = false;
var isWaitingForRevive = false;

window.SDK_OPTIONS = {
   gameId: "1kfyksfch519ruwmky6frsyc7sx6d6rl",
   onEvent: function (a) {
      switch (a.name) {
         case "SDK_GAME_PAUSE":
            isPausedBySDK = true;
            if (typeof pauseGame === "function") pauseGame();
            break;
         case "SDK_GAME_START":
            isPausedBySDK = false;
            // Removed automatic startGame() call here so it waits for user click
            if (isWaitingForRevive) {
                if (typeof resumeAfterRevive === "function") resumeAfterRevive();
            }
            if (typeof resumeGame === "function") resumeGame();
            break;
         case "SDK_READY":
            console.log("SDK Ready");
            if (typeof sdk !== 'undefined' && typeof sdk.showBanner === 'function') {
                sdk.showBanner();
            }
            break;
         case "SDK_REWARDED_WATCH_COMPLETE":
            isWaitingForRevive = true;
            break;
      }
   }
};

(function (a, b, c) {
    var d = a.getElementsByTagName(b)[0];
    a.getElementById(c) || (a = a.createElement(b), a.id = c, a.src = "https://api.gamemonetize.com/sdk.js", d.parentNode.insertBefore(a, d))
})(document, "script", "gamemonetize-sdk"); 
</script>

<style>
:root { --primary: #94a3b8; --accent: #ffffff; --bg: #1e1b4b; }
body { margin:0; padding:0; background-color: var(--bg); font-family: 'Segoe UI', Roboto, sans-serif; overflow:hidden; display:flex; justify-content:center; align-items:center; height:100vh; touch-action:none; color:white; }
#game-container { position: relative; width:100%; max-width:480px; height:100%; max-height:850px; background:#000; overflow:hidden; box-shadow:0 0 50px rgba(0,0,0,0.5); }
canvas { display:block; width:100%; height:100%; }
#ui-layer { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; z-index:10; }
.hud { position:absolute; top:40px; width:100%; font-size:48px; font-weight:900; letter-spacing:2px; text-shadow:2px 2px 10px rgba(0,0,0,0.5); pointer-events:none; }
.screen { background: rgba(15, 15, 25, 0.95); padding: 40px 20px; border-radius: 24px; border: 3px solid var(--primary); box-shadow: 0 0 30px rgba(0,0,0,0.4); pointer-events:auto; display:none; width:75%; backdrop-filter: blur(12px); }
.screen h1 { margin-top:0; color: var(--accent); font-size:2.5rem; text-shadow:0 0 10px var(--primary); }
button { background: linear-gradient(135deg,#475569,#1e293b); color:#fff; border:1px solid #64748b; padding:16px 40px; font-size:20px; border-radius:12px; cursor:pointer; margin-top:12px; font-weight:800; text-transform:uppercase; box-shadow:0 4px 0 #0f172a; width: 100%; transition: transform 0.1s; }
button:active { transform:translateY(2px); box-shadow:0 2px 0 #0f172a; }
#reviveBtn { background: linear-gradient(135deg,#f59e0b,#d97706); border-color: #fbbf24; }
.stats { font-size:18px; margin:12px 0; }
.high-score-label { color: var(--primary); font-weight:bold; }
</style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="ui-layer">
        <div id="hud" class="hud">0</div>

        <div id="start-screen" class="screen" style="display:block;">
            <h1>STELLAR DASH</h1>
            <p id="start-msg">Spacebar, Tap, or Click to drift.</p>
            <button id="startBtn">START GAME</button>
        </div>

        <div id="game-over" class="screen">
            <h1>SYSTEM RESET</h1>
            <div class="stats">SCORE: <span id="final-score" style="font-size: 24px; color: var(--accent);">0</span></div>
            <div class="stats">BEST: <span id="high-score" class="high-score-label">0</span></div>
            <p id="retry-msg" style="font-size: 14px; margin-bottom: 5px; color: #94a3b8; display:none;">Ad finished. Ready to try again?</p>
            <button id="reviveBtn">REVIVE (AD)</button>
            <button id="retryBtn">RETRY</button>
        </div>
    </div>
</div>

<script>
const AudioEngine = (() => {
    let audioCtx = null, isMuted = false;
    const init = ()=>{ if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }
    const playJump=()=>{if(isMuted)return; init(); const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type='sine'; o.frequency.setValueAtTime(800,audioCtx.currentTime); o.frequency.exponentialRampToValueAtTime(1600,audioCtx.currentTime+0.08); g.gain.setValueAtTime(0.08,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.1); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+0.1);}
    const playScore=()=>{if(isMuted)return; init(); const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type='triangle'; o.frequency.setValueAtTime(523.25,audioCtx.currentTime); o.frequency.exponentialRampToValueAtTime(1046.5,audioCtx.currentTime+0.1); g.gain.setValueAtTime(0.1,audioCtx.currentTime); g.gain.linearRampToValueAtTime(0,audioCtx.currentTime+0.2); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+0.2);}
    const playCrash=()=>{if(isMuted)return; init(); const d=0.5,b=audioCtx.sampleRate*d,buf=audioCtx.createBuffer(1,b,audioCtx.sampleRate),data=buf.getChannelData(0); for(let i=0;i<b;i++){data[i]=Math.random()*2-1;} const noise=audioCtx.createBufferSource(); noise.buffer=buf; const filter=audioCtx.createBiquadFilter(); filter.type='lowpass'; filter.frequency.setValueAtTime(1000,audioCtx.currentTime); filter.frequency.exponentialRampToValueAtTime(40,audioCtx.currentTime+d); const g=audioCtx.createGain(); g.gain.setValueAtTime(0.3,audioCtx.currentTime); g.gain.linearRampToValueAtTime(0,audioCtx.currentTime+d); noise.connect(filter); filter.connect(g); g.connect(audioCtx.destination); noise.start();}
    const mute=()=>isMuted=true, unmute=()=>isMuted=false;
    return { playJump, playScore, playCrash, mute, unmute };
})();

const canvas=document.getElementById('gameCanvas'), ctx=canvas.getContext('2d'), hud=document.getElementById('hud'), startScreen=document.getElementById('start-screen'), gameOverScreen=document.getElementById('game-over'), finalScoreLabel=document.getElementById('final-score'), highScoreLabel=document.getElementById('high-score');
const BASE_WIDTH=480, BASE_HEIGHT=800;
let gameState='START'; 
window.currentGameState = 'START';
let canRevive=true;
let adShownThisScreen = false; // New flag to track interstitial ad
let score=0, highScore=parseInt(localStorage.getItem('stellarDash_highScore')||'0');
const GRAVITY=0.22, FLAP=-5.2, PIPE_WIDTH=70, PIPE_GAP=200, INITIAL_SPEED=3.2;
let ship={x:100,y:400,radius:20,velocity:0,rotation:0}, pipes=[], particles=[], speed=INITIAL_SPEED, frameCount=0;

window.pauseGame = () => { AudioEngine.mute(); };
window.resumeGame = () => { AudioEngine.unmute(); };

const paintPatches = Array.from({ length: 18 }, () => ({
    x: Math.random()*BASE_WIDTH, y: Math.random()*BASE_HEIGHT,
    w: 60 + Math.random()*160, h: 120 + Math.random()*350,
    color: ['#f97316','#fbbf24','#7c3aed','#4c1d95','#ea580c','#f59e0b','#6d28d9'][Math.floor(Math.random()*7)],
    drift: 0.15 + Math.random()*0.4, opacity: 0.35 + Math.random()*0.4
}));

function resize() { const c=document.getElementById('game-container'); canvas.width=c.clientWidth; canvas.height=c.clientHeight; }
window.addEventListener('resize', resize); resize();

function createPipe(){ const min=100,max=BASE_HEIGHT-PIPE_GAP-100,top=Math.floor(Math.random()*(max-min+1))+min; pipes.push({x:BASE_WIDTH,top:top,passed:false}); }
function createParticle(x,y){ particles.push({x,y,vx:-2-Math.random()*2,vy:(Math.random()-0.5)*2,life:1,size:Math.random()*5+2,color:'#fff'}); }

function handleUserAction() {
    // If SDK is available and we haven't shown an ad for this screen yet
    if (typeof sdk !== 'undefined' && typeof sdk.showInterstitial === 'function' && !adShownThisScreen) {
        adShownThisScreen = true;
        // Update UI hints to let user know they can start now
        document.getElementById('start-msg').textContent = "Ad finished! Press Start to play.";
        document.getElementById('retry-msg').style.display = "block";
        sdk.showInterstitial();
    } else {
        // Either SDK not present or ad already watched for this screen
        startGame();
    }
}

function handleReviveAction() {
    if (typeof sdk !== 'undefined' && typeof sdk.showRewarded === 'function') {
        isWaitingForRevive = false;
        sdk.showRewarded();
    } else {
        resumeAfterRevive(); 
    }
}

window.startGame = function() {
    gameState='PLAYING';
    window.currentGameState = 'PLAYING';
    adShownThisScreen = false; // Reset for next death
    score=0; speed=INITIAL_SPEED; ship.y=BASE_HEIGHT/2; ship.velocity=0; pipes=[]; particles=[]; frameCount=0; canRevive=true;
    startScreen.style.display='none'; gameOverScreen.style.display='none'; hud.textContent='0';
    document.getElementById('retry-msg').style.display = "none";
    document.getElementById('start-msg').textContent = "Spacebar, Tap, or Click to drift.";
    isPausedBySDK = false; isWaitingForRevive = false;
};

window.resumeAfterRevive = function() {
    gameState='PLAYING';
    window.currentGameState = 'PLAYING';
    ship.y = BASE_HEIGHT / 2;
    ship.velocity = 0;
    pipes = pipes.filter(p => p.x > ship.x + 150 || p.x < ship.x - 50);
    canRevive = false; 
    isWaitingForRevive = false;
    isPausedBySDK = false;
    gameOverScreen.style.display='none';
};

function triggerGameOver(){
    if(gameState==='GAME_OVER') return;
    gameState='GAME_OVER'; 
    window.currentGameState = 'GAME_OVER';
    adShownThisScreen = false; // Ready to show ad for the next retry click
    AudioEngine.playCrash(); 
    if(typeof sdk !== 'undefined' && typeof sdk.showBanner==='function'){ sdk.showBanner(); }
    if(score>highScore){ highScore=score; localStorage.setItem('stellarDash_highScore',highScore); }
    finalScoreLabel.textContent=score; highScoreLabel.textContent=highScore;
    document.getElementById('reviveBtn').style.display = canRevive ? 'block' : 'none';
    document.getElementById('retry-msg').style.display = "none";
    gameOverScreen.style.display='block';
}

function update(){
    if(isPausedBySDK) return;
    paintPatches.forEach(p=>{ p.x -= p.drift*(gameState==='PLAYING'?speed:0.5); if(p.x+p.w<-50){ p.x=BASE_WIDTH+50; p.y=Math.random()*BASE_HEIGHT; } });
    if(gameState!=='PLAYING') return;
    frameCount++; ship.velocity+=GRAVITY; ship.y+=ship.velocity; ship.rotation+=ship.velocity*0.05;
    if(frameCount%3===0) createParticle(ship.x,ship.y);
    for(let i=particles.length-1;i>=0;i--){ const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.life-=0.05; if(p.life<=0) particles.splice(i,1); }
    if(ship.y+ship.radius>BASE_HEIGHT||ship.y-ship.radius<0) triggerGameOver();
    if(frameCount%100===0) createPipe();
    for(let i=pipes.length-1;i>=0;i--){ const p=pipes[i]; p.x-=speed;
        const cx=Math.max(p.x,Math.min(ship.x,p.x+PIPE_WIDTH));
        const ct=Math.max(0,Math.min(ship.y,p.top));
        const cb=Math.max(p.top+PIPE_GAP,Math.min(ship.y,BASE_HEIGHT));
        if(Math.hypot(ship.x-cx,ship.y-ct)<ship.radius||Math.hypot(ship.x-cx,ship.y-cb)<ship.radius) triggerGameOver();
        if(!p.passed && p.x+PIPE_WIDTH<ship.x){ p.passed=true; score++; AudioEngine.playScore(); hud.textContent=score; speed=Math.min(speed+0.04,8); }
        if(p.x+PIPE_WIDTH<-100) pipes.splice(i,1);
    }
}

function drawArtBackground(ctx){
    const grad=ctx.createLinearGradient(0,0,0,BASE_HEIGHT); grad.addColorStop(0,'#111827'); grad.addColorStop(0.5,'#1e1b4b'); grad.addColorStop(1,'#312e81'); ctx.fillStyle=grad; ctx.fillRect(0,0,BASE_WIDTH,BASE_HEIGHT);
    paintPatches.forEach(p=>{ ctx.globalAlpha=p.opacity; ctx.fillStyle=p.color; ctx.fillRect(p.x,p.y,p.w,p.h); ctx.strokeStyle='rgba(0,0,0,0.2)'; ctx.lineWidth=1; for(let o=5;o<p.w;o+=15){ ctx.beginPath(); ctx.moveTo(p.x+o,p.y); ctx.lineTo(p.x+o,p.y+p.h); ctx.stroke(); } }); ctx.globalAlpha=1.0;
}
function drawShip(ctx){ ctx.save(); ctx.translate(ship.x,ship.y); ctx.rotate(ship.rotation); ctx.shadowBlur=15; ctx.shadowColor='#fff'; ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(0,0,ship.radius,0,Math.PI*2); ctx.fill(); ctx.restore(); }
function drawPipe(ctx,p){ ctx.fillStyle='#334155'; ctx.fillRect(p.x,0,PIPE_WIDTH,p.top); ctx.fillRect(p.x,p.top+PIPE_GAP,PIPE_WIDTH,BASE_HEIGHT); ctx.fillStyle='#fff'; ctx.fillRect(p.x-2,p.top-8,PIPE_WIDTH+4,8); ctx.fillRect(p.x-2,p.top+PIPE_GAP,PIPE_WIDTH+4,8); }
function render(){ const scaleX=canvas.width/BASE_WIDTH, scaleY=canvas.height/BASE_HEIGHT; ctx.save(); ctx.scale(scaleX,scaleY); drawArtBackground(ctx); particles.forEach(p=>{ ctx.globalAlpha=p.life; ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2); ctx.fill(); }); ctx.globalAlpha=1; pipes.forEach(p=>drawPipe(ctx,p)); drawShip(ctx); ctx.restore(); }
function loop(){ update(); render(); requestAnimationFrame(loop); }

function flap(){ 
    if(isPausedBySDK) return; 
    if(gameState==='PLAYING'){ 
        ship.velocity=FLAP; 
        AudioEngine.playJump(); 
    }
}

window.addEventListener('keydown',e=>{ if(e.code==='Space'){ e.preventDefault(); flap(); }});
window.addEventListener('mousedown',e=>{ if(e.target.tagName!=='BUTTON') flap(); });
window.addEventListener('touchstart',e=>{ if(e.target.tagName!=='BUTTON'){ e.preventDefault(); flap(); }},{passive:false});

document.getElementById('startBtn').addEventListener('click', handleUserAction);
document.getElementById('retryBtn').addEventListener('click', handleUserAction);
document.getElementById('reviveBtn').addEventListener('click', handleReviveAction);

window.onload = function() {
    loop();
};
</script>
</body>
</html>
