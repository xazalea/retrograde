<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">

  <title>Cocos Creator | GunMatch</title>

  <!--http://www.html5rocks.com/en/mobile/mobifying/-->
  <meta name="viewport"
        content="width=device-width,user-scalable=no,initial-scale=1,minimum-scale=1,maximum-scale=1,minimal-ui=true"/>

  <!--https://developer.apple.com/library/safari/documentation/AppleApplications/Reference/SafariHTMLRef/Articles/MetaTags.html-->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">

  <!-- force webkit on 360 -->
  <meta name="renderer" content="webkit"/>
  <meta name="force-rendering" content="webkit"/>
  <!-- force edge on IE -->
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
  <meta name="msapplication-tap-highlight" content="no">

  <!-- force full screen on some browser -->
  <meta name="full-screen" content="yes"/>
  <meta name="x5-fullscreen" content="true"/>
  <meta name="360-fullscreen" content="true"/>

  <!--fix fireball/issues/3568 -->
  <!--<meta name="browsermode" content="application">-->
  <meta name="x5-page-mode" content="app">

  <!--<link rel="apple-touch-icon" href=".png" />-->
  <!--<link rel="apple-touch-icon-precomposed" href=".png" />-->

  <link rel="stylesheet" type="text/css" href="style.css"/>

  <script>

  window.isCrazyGame = false;
  window.isGameMemotize = true;

  if (window.isCrazyGame === true) {
    var script = document.createElement("script");
    script.src = "https://sdk.crazygames.com/crazygames-sdk-v3.js";
    script.async = true; // 可选，异步加载
    document.head.appendChild(script);
}
  </script>

</head>
<body>
  <div id="GameDiv" cc_exact_fit_screen="true">
      <div id="Cocos3dGameContainer">
        <canvas id="GameCanvas" oncontextmenu="event.preventDefault()" tabindex="99"></canvas>
      </div>
    </div>
  

<!-- Polyfills bundle. -->

<script src="src/polyfills.bundle.js" charset="utf-8"> </script>


<!-- SystemJS support. -->
<script src="src/system.bundle.js" charset="utf-8"> </script>

<!-- Import map -->
<script src="src/import-map.json" type="systemjs-importmap" charset="utf-8"> </script>

<script>
  window.showconsolelog = true;


  if (window.isCrazyGame) {
    async function initializeGame() {
      // 等待 CrazyGames SDK 初始化完成
      await window.CrazyGames.SDK.init();

      // SDK 初始化完成后，继续执行其他操作
      console.log('SDK initialized, now starting the game...');
      System.import('./index.js').catch(function(err) { console.error(err); })
    }
    initializeGame();
  } else if (window.isGameMemotize) {
      window.SDK_OPTIONS = {
            gameId: "w0uhn2ohy7yjt4qm1jqhwrnyhpq4uydx",
            onEvent: function (a) {
               switch (a.name) {
                  case "SDK_GAME_PAUSE":
                     // pause game logic / mute audio
                     break;
                  case "SDK_GAME_START":
                     // advertisement done, resume game logic and unmute audio
                    console.log(JSON.stringify(a));
                    if (window.videoCallback){
                      if (a.message.indexOf("error") == -1) {
                        window.videoCallback();
                      } else {
                        window.failcallback && window.failcallback();
                      }
                    }
                    break;
                  case "SDK_READY":
                     // when sdk is ready
                     break;
               }
            }
         };
      (function (a, b, c) {
         var d = a.getElementsByTagName(b)[0];
         a.getElementById(c) || (a = a.createElement(b), a.id = c, a.src = "https://api.gamemonetize.com/sdk.js", d.parentNode.insertBefore(a, d))
      })(document, "script", "gamemonetize-sdk"); 

      window.showInter = () => {
        window.showVideoAd(null);
      }

      window.showVideoAd = (callback, failcallback) => {
        window.videoCallback = callback;
        window.failcallback = failcallback;
        if (typeof sdk !== 'undefined' && sdk.showBanner !== 'undefined') {
            sdk.showBanner();
        }
      }

      System.import('./index.js').catch(function(err) { console.error(err); })
  }

</script>

</body>
</html>
