    const boss3Img=makeImg('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAHgAAAA8CAYAAACtrX6oAAACcElEQVR4nO2cMVLDMBBF1x6GY6ShT0HlgtqHSEMaThCOkZyAJjQ5hE8QWnoajkFjKs94bFleW8ruSvmvw4GRk8ezJWsmRAAAAAAAAAAAAAAApEChNXC9ObZaY2vR/L6Lf94P0gP22dUHzeHlaaiVllxKDtZRb47t3clVQkXwvbKrD+K3JnHBqFcWFCyMdMWiglGvPChYAcmKxZZJ2vW+ftDP8NjnGz1pnIskqutgCVxih69piN7VB5F1MfsS/X1ur2sH0arXJ3fN71mC64MlOESuFkulaUgOvRdzvMwKDpWrUe9aWTmW7BWcYrmpEWNG7fM0KTiG3JTqjfX3Wkz5cgpGubLEWhe7vI0Ex5Krve69V4b+St+LQI6YT7f6HkvXwVBQrz6dz7L/Qw6EPpXSfHwZ+xn197m9lrHlol5blNt9UWmfRGzWVmhh8yF2xVG3Cy3Vu1SWBbm3oCQiyrFiIr40a3JjVbzdF1W07UJL9fbp5N39fvB2X1Q5zaaHpCYzdL+4uypHuQdbrRcMBOd6L06VtffivsfgglGvbUaCUbEtllY89Bc0i06p3ktzGh1L5dxDcApOfUbtkumcjTY0KsOidO6M2nX1XV2wlXrZMh2kLJ3LpGCLFYfI5GJV+lzFU3OnVQVL1Cshk4tV6Ry8gqUqtiSTi4b0qYp9K5/FBYfWm6JMLhZLnxUcUnHOMrnElt5VTERfRPPPLRYV7KsXMvlIls4SPKwYMuOzRHonnvPUcfE9+NKcFsv8q69Bm9ePTWX2n+eW780n/fmFV7fIBwfB09z6veErHDIHgjMHgjMHgjMHgjMHgjMHgjMHgjPnH1Gid+KJrVZ/AAAAAElFTkSuQmCC');

    let muted=false; function playSound(base,vol=1,rate=1){ if(muted) return; try{ const a=base.cloneNode(true); a.volume=vol; a.playbackRate=rate; a.currentTime=0; a.play().catch(()=>{}); }catch(_){} }
    function showToast(){ toast.style.display='block'; clearTimeout(showToast._t); showToast._t=setTimeout(()=>toast.style.display='none', 1200); }

    const levels=[
      {targetScore:10,lives:3,enemyColor:'#4ade80',min:1,max:2,spawn:900,starMul:1,bossHP:15},
      {targetScore:25,lives:3,enemyColor:'#f59e0b',min:1.5,max:2.6,spawn:700,starMul:1.3,bossHP:24},
      {targetScore:9999,lives:4,enemyColor:'#a78bfa',min:2.2,max:3.2,spawn:520,starMul:1.6,bossHP:36}
    ];

    let isRunning=false, animId=0, lastTime=0;
    let score=0, best=0, lives=3, levelIndex=0;
    const player={x:canvas.width/2-20,y:canvas.height-60,w:40,h:40,sp:5,left:false,right:false,shoot:false};
    const bullets=[]; const bulletSp=7; let lastBullet=0;
    const enemies=[]; let spawnInt=900, lastSpawn=0, minE=1, maxE=2;
    let boss=null;
    const stars=[]; let starMul=1;
    let lvl3NextBossScore=null;

    const BEST_KEY='spaceShooterBestEN';
    try { best = Math.max(0, parseInt(localStorage.getItem(BEST_KEY)||'0',10)); } catch(_e) {};
    bestEl.textContent = best;

    function maybeSetBest(){ if(score>best){ best=score; bestEl.textContent=best; try{ localStorage.setItem(BEST_KEY, String(best)); }catch(_e){} showToast(); } }
    function resetBest(){ best=0; bestEl.textContent=0; try{ localStorage.setItem(BEST_KEY,'0'); }catch(_e){} }

    function applyLevel(l){ spawnInt=l.spawn; starMul=l.starMul; minE=l.min; maxE=l.max; lives=l.lives; livesEl.textContent=lives; levelEl.textContent=levelIndex+1; }
    function initStars(){ stars.length=0; for(let i=0;i<120;i++) stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,s:Math.random()*2,sp:0.5+Math.random()*1.8}); }
    function updStars(){ for(const s of stars){ s.y+=s.sp*starMul; if(s.y>canvas.height){ s.y=0; s.x=Math.random()*canvas.width; } } }
    function drawStars(){ ctx.fillStyle='#fff'; for(const s of stars) ctx.fillRect(s.x,s.y,s.s,s.s); }

    const explosions=[];
    function createExplosion(x,y){ const parts=[]; for(let i=0;i<20;i++){ const a=Math.random()*2*Math.PI; const sp=1+Math.random()*3; parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:600+Math.random()*400,age:0}); } explosions.push(parts); playSound(sExplosion,0.7); }
    function updExpl(dt){ for(const ps of explosions) for(const p of ps){ p.age+=dt; p.x+=p.vx; p.y+=p.vy; p.vy+=0.01; } for(let i=explosions.length-1;i>=0;i--) if(!explosions[i].some(p=>p.age<p.life)) explosions.splice(i,1); }
    function drawExpl(){ ctx.fillStyle='orange'; for(const ps of explosions) for(const p of ps){ const a=1-p.age/p.life; if(a>0){ ctx.globalAlpha=a; ctx.fillRect(p.x,p.y,3,3); ctx.globalAlpha=1; } } }

    function resetGame(){ score=0; levelIndex=0; boss=null; bullets.length=0; enemies.length=0; explosions.length=0; initStars(); applyLevel(levels[0]); lvl3NextBossScore=null; scoreEl.textContent=score; }
    function spawnEnemy(){ const w=32, h=32; const x=Math.random()*(canvas.width-w); const sp=minE+Math.random()*(maxE-minE); enemies.push({x, y:-h, w, h, sp}); }
    function spawnBoss(imgType){ const lv=levels[levelIndex]; boss={ x:canvas.width/2-60, y:-100, w:120, h:60, vx:2, hp:lv.bossHP, imgType }; }

    function damagePlayer(){ lives--; livesEl.textContent=lives; if(lives<=0){ maybeSetBest(); alert('Game Over! Score: '+score+' — Best: '+best); window.location.reload(); } }

    function update(dt){
      const now=performance.now();
      if(player.left) player.x-=player.sp;
      if(player.right) player.x+=player.sp;
      player.x=Math.max(0, Math.min(canvas.width-player.w, player.x));

      if(player.shoot && now-lastBullet>200){ bullets.push({x:player.x+player.w/2-3, y:player.y, w:6, h:12}); lastBullet=now; playSound(sLaser,0.6); }
      for(let i=bullets.length-1;i>=0;i--){ const b=bullets[i]; b.y-=bulletSp; if(b.y<0) bullets.splice(i,1); }

      if(!boss && now-lastSpawn>spawnInt){ spawnEnemy(); lastSpawn=now; }
      for(let i=enemies.length-1;i>=0;i--){ const e=enemies[i]; e.y+=e.sp;
        if(e.x<player.x+player.w&&e.x+e.w>player.x&&e.y<player.y+player.h&&e.y+e.h>player.y){ enemies.splice(i,1); damagePlayer(); continue; }
        for(let bi=bullets.length-1;bi>=0;bi--){ const b=bullets[bi];
          if(b.x<e.x+e.w&&b.x+b.w>e.x&&b.y<e.y+e.h&&b.y+b.h>e.y){ enemies.splice(i,1); bullets.splice(bi,1); score++; scoreEl.textContent=score; if(score>best) maybeSetBest(); createExplosion(e.x+e.w/2,e.y+e.h/2); break; }
        }
        if(e.y>canvas.height) enemies.splice(i,1);
      }

      if(levelIndex<2) {
        if(!boss && score>=levels[levelIndex].targetScore) spawnBoss(1);
      } else {
        if(lvl3NextBossScore===null) lvl3NextBossScore = score + 25;
        if(!boss && score >= lvl3NextBossScore) spawnBoss(3);
      }

      if(boss) {
        if(boss.y<80) boss.y+=2; else { boss.x+=boss.vx; if(boss.x<0||boss.x+boss.w>canvas.width) boss.vx*=-1; }
        for(let bi=bullets.length-1;bi>=0;bi--){ const b=bullets[bi];
          if(b.x<boss.x+boss.w&&b.x+b.w>boss.x&&b.y<boss.y+boss.h&&b.y+b.h>boss.y){ bullets.splice(bi,1); boss.hp--; createExplosion(boss.x+boss.w/2,boss.y+boss.h/2);
            if(boss.hp<=0){ boss=null; if(levelIndex<2){ levelIndex++; applyLevel(levels[levelIndex]); if(levelIndex===2) lvl3NextBossScore = score + 25; } else { lvl3NextBossScore += 25; } }
          }
        }
      }

      updStars(); updExpl(dt);
    }

    function draw(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      drawStars(); drawExpl();
      ctx.drawImage(shipImg, player.x, player.y, player.w, player.h);
      for(const b of bullets) ctx.drawImage(bulletImg, b.x, b.y, b.w, b.h);
      for(const e of enemies) ctx.drawImage(enemyImg, e.x, e.y, e.w, e.h);
      if(boss) { const img = boss.imgType===3 ? boss3Img : bossImg; ctx.drawImage(img, boss.x, boss.y, boss.w, boss.h); }
    }

    function loop(){ if(!isRunning) return; const now=performance.now(); const dt=now-lastTime; lastTime=now; update(dt); draw(); animId=requestAnimationFrame(loop); }

    document.addEventListener('keydown',e=>{ if(e.code==='ArrowLeft'||e.code==='KeyA') player.left=true; if(e.code==='ArrowRight'||e.code==='KeyD') player.right=true; if(e.code==='Space') player.shoot=true; });
    document.addEventListener('keyup',e=>{ if(e.code==='ArrowLeft'||e.code==='KeyA') player.left=false; if(e.code==='ArrowRight'||e.code==='KeyD') player.right=false; if(e.code==='Space') player.shoot=false; });
    canvas.addEventListener('mousemove', e=>{ const r=canvas.getBoundingClientRect(); const x=e.clientX - r.left; player.x=Math.max(0,Math.min(canvas.width-player.w,x - player.w/2)); });
    canvas.addEventListener('mousedown', e=>{ if(e.button===0) player.shoot=true; });
    window.addEventListener('mouseup', ()=> player.shoot=false);
    canvas.addEventListener('touchstart', e=>{ e.preventDefault(); const r=canvas.getBoundingClientRect(); const t=e.touches[0]; const x=t.clientX - r.left; player.x=Math.max(0,Math.min(canvas.width-player.w,x - player.w/2)); player.shoot=true; }, false);
    canvas.addEventListener('touchmove', e=>{ e.preventDefault(); const r=canvas.getBoundingClientRect(); const t=e.touches[0]; const x=t.clientX - r.left; player.x=Math.max(0,Math.min(canvas.width-player.w,x - player.w/2)); }, false);
    window.addEventListener('touchend', ()=> player.shoot=false, false);

    playBtn.onclick=()=>{ if(!isRunning){ score=0; isRunning=true; lastTime=performance.now(); boss=null; bullets.length=0; enemies.length=0; explosions.length=0; initStars(); levelIndex=0; applyLevel(levels[0]); lvl3NextBossScore=null; scoreEl.textContent=0; loop(); playBtn.disabled=true; stopBtn.disabled=false; try{ if(!muted){ sBg.currentTime=0; sBg.volume=0.3; sBg.play().catch(()=>{}); } }catch(_e){} } };
    stopBtn.onclick=()=>{ if(isRunning){ isRunning=false; cancelAnimationFrame(animId); resumeBtn.disabled=false; stopBtn.disabled=true; try{ sBg.pause(); }catch(_e){} } };
    resumeBtn.onclick=()=>{ if(!isRunning){ isRunning=true; lastTime=performance.now(); loop(); resumeBtn.disabled=true; stopBtn.disabled=false; try{ if(!muted) sBg.play().catch(()=>{}); }catch(_e){} } };
    muteBtn.onclick=()=>{ muted=!muted; muteBtn.textContent = muted? '🔇 Mute' : '🔊 Sound'; try{ if(muted) sBg.pause(); else sBg.play(); }catch(_e){} };
    resetBestBtn.onclick=()=>{ if(confirm('Reset best score?')) resetBest(); };
  })();
  </script>
