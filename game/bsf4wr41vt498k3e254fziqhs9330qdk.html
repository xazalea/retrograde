<!DOCTYPE html>
<html lang="en-us">

  <head>
    <meta charset="utf-8">
    <title>Color Sort Impostor Edition</title>
    <style>
      html {
        box-sizing: border-box;
      }
      *, *:before, *:after {
        box-sizing: inherit;
      }
      
      body {
        margin: 0;
        background: #232323; 
        /* Flexbox to center the game container on Desktop */
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100vw;
        overflow: hidden; 
      }

      #gameContainer {
        position: relative;
        background: black;
        box-shadow: 0 0 50px rgba(0,0,0,0.5); 
      }

      /* 9:16 Aspect Ratio Logic */
      /* Desktop / Wide Screens */
      @media (min-aspect-ratio: 9/16) {
        #gameContainer {
          height: 100vh;
          width: 56.25vh; /* 100vh * (9/16) */
        }
      }

      /* Mobile / Tall Screens */
      @media (max-aspect-ratio: 9/16) {
        #gameContainer {
          width: 100vw;
          height: 177.78vw; /* 100vw * (16/9) */
        }
      }

      canvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      canvas + * {
        z-index: 2;
      }

      /* Loader Styles */
      .logo {
          display: block;
          max-width: 80%;
          height: auto;
      }

      .progress-bar {
          margin: 1.5em;
          border: 1px solid white;
          width: 80%;
          display: none;
      }
      .progress-bar .full {
          margin: 2px;
          background: white;
          height: 1em;
          transform-origin: top left;
      }

      #loader {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #444;
      }

      .spinner {
        margin: 10px;
        width: 5em;
        height: 5em;
        border-radius: 50%;
        border-top: 1.1em solid rgba(255, 255, 255, 0.2);
        border-right: 1.1em solid rgba(255, 255, 255, 0.2);
        border-bottom: 1.1em solid rgba(255, 255, 255, 0.2);
        border-left: 1.1em solid #ffffff;
        animation: spinner-spin 1.1s infinite linear;
      }
      @keyframes spinner-spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

    </style>
  </head>

  <body>
    <div id="gameContainer"></div>
    
    <div id="loader">
      <img class="logo" src="logo.png">
      <div class="spinner"></div>
      <div class="progress-bar"><div class="full"></div></div>
    </div>
  </body>

  <script src="Build/UnityLoader.js"></script>
  <script>
  // Wait for the window to load to ensure HTML elements exist
  window.addEventListener('load', function() {
      
      // 1. Setup Mobile Helper
      var container = document.querySelector("#gameContainer");
      if (container && /iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
          container.className = "unity-mobile";
      }

      // 2. Instantiate Game
      // Ensure "gameContainer" exists before running UnityLoader
      if(document.getElementById("gameContainer")){
        var gameInstance = UnityLoader.instantiate("gameContainer", "Build/gmo.json", {onProgress: UnityProgress});
      } else {
        console.error("Game Container not found!");
      }

      // 3. Progress Function
      function UnityProgress(gameInstance, progressValue) {
        if (!gameInstance.Module) {
          return;
        }

        const loader = document.querySelector("#loader");
        if (!loader) return; // Safety check

        if (!gameInstance.progress) {
          const bar = loader.querySelector(".progress-bar");
          const spinner = loader.querySelector(".spinner");
          
          if (bar) bar.style.display = "block";
          if (spinner) spinner.style.display = "none";
          
          if (bar) {
             gameInstance.progress = bar.querySelector(".full");
          }
        }

        if (gameInstance.progress) {
          gameInstance.progress.style.transform = `scaleX(${progressValue})`;
        }

        if (progressValue === 1 && !gameInstance.removeTimeout) {
          gameInstance.removeTimeout = setTimeout(function() {
              loader.style.display = "none";
          }, 2000);
        }
      }
  });
  </script>

</html>
