    <style>
      /* FULL SCREEN FIX: SIDE GAPS KHATAM KARNE KE LIYE */
      body, html {
        margin: 0; padding: 0; width: 100%; height: 100%;
        overflow: hidden; background-color: #87CEEB; /* Game background color */
        display: flex; align-items: center; justify-content: center;
      }

      #root { 
        width: 100vw; 
        height: 100vh; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        position: relative;
      }

      canvas {
        /* Side gaps khatam karne ke liye width aur height 100% */
        width: 100% !important; 
        height: 100% !important;
        object-fit: fill; /* Isse game puri screen par stretch ho jayegi */
        image-rendering: pixelated;
        display: block;
      }

      /* BUTTON STYLE: CENTER TOP */
      #fs-btn {
        position: fixed;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 999999; 
        background: #FFD700; 
        color: #000;
        border: 3px solid #000;
        padding: 5px 15px;
        cursor: pointer;
        font-family: 'Press Start 2P', cursive;
        font-size: 14px;
        box-shadow: 4px 4px 0px #000;
      }
    </style>

<body>
    <button id="fs-btn" onclick="toggleFullScreen()">{ }</button>
    <div id="root"></div>

    <script>
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => console.error(err));
                document.getElementById('fs-btn').innerText = "[ ]";
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                    document.getElementById('fs-btn').innerText = "{ }";
                }
            }
        }

        // 60-65s Cooldown focus
        let lastAdTime = 0;
        const cooldownMs = 65000; 

        window.triggerAd = function() {
            const now = Date.now();
            if (now - lastAdTime > cooldownMs) {
                if (typeof sdk !== 'undefined' && sdk.showBanner) {
                    sdk.showBanner();
                    lastAdTime = now;
                }
            }
        };
    </script>
