		// Orijinal fonksiyon ismi ve yapısı aynı, sadece içerik mock oldu
		function GetFlags() {
		  return new Promise((resolve) => {
			try {
			  // Gerçek veri yapısını taklit et (names[] ve values[] ile)
			  let names = [];
			  let values = [];

			  for (let key in mockFlags) {
				if (mockFlags.hasOwnProperty(key)) {
				  names.push(key);
				  values.push(mockFlags[key]);
				}
			  }

			  let jsonFlags = {
				names: names,
				values: values,
			  };

			  // Gerçek fonksiyon gibi 100ms gecikme ekle (async simülasyonu)
			  setTimeout(() => {
				resolve(JSON.stringify(jsonFlags));
			  }, 100);

			} catch (e) {
			  console.error("CRASH Get Flags: ", e.message);  // Orijinal hata mesajı
			  resolve("null");
			}
		  });
		}

      function RequestingEnvironmentData(sendback) {
        return new Promise((resolve) => {
          try {
            // Mock environment data
            var browser = navigator.userAgent;
            if (
              browser.includes("YaBrowser") ||
              browser.includes("YaSearchBrowser")
            )
              browser = "Yandex";
            else if (browser.includes("Opera") || browser.includes("OPR"))
              browser = "Opera";
            else if (browser.includes("Firefox")) browser = "Firefox";
            else if (browser.includes("MSIE")) browser = "IE";
            else if (browser.includes("Edge")) browser = "Edge";
            else if (browser.includes("Chrome")) browser = "Chrome";
            else if (browser.includes("Safari")) browser = "Safari";
            else browser = "Other";

            let jsonEnvir = {
              language: navigator.language || "en",
              domain: "com",
              deviceType: "desktop",
              isMobile: /iPhone|iPad|iPod|Android/i.test(navigator.userAgent),

              browserLang: navigator.language || "en",
              payload: "",
              promptCanShow: false,
              reviewCanShow: false,
              platform: navigator.platform,

            resolve("null");
