        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@400;700&display=swap');
        body {
            font-family: 'Lato', sans-serif;

        }
        h1, h2, h3, button {

        /* IMPROVED CENTER STYLE: Professional Pill Design */
        .center-fs-btn {
            position: fixed !important;
            top: 10px !important;            /* Edge se thora niche (Clean look) */
            left: 50% !important;
            transform: translateX(-50%) !important;
            z-index: 999999 !important;
            
            /* Professional Capsule Design */
            background: rgba(45, 27, 20, 0.85) !important; /* Brown game theme */
            border: 1.5px solid #facc15 !important;      /* Subtle yellow border */
            border-radius: 20px !important;              /* Rounded pill shape */
            
            width: 50px !important;          /* Chota aur compact */
            height: 28px !important;         /* Sleek height */
            
            cursor: pointer !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            transition: all 0.2s ease-in-out !important;
            box-shadow: 0 3px 6px rgba(0,0,0,0.4) !important;
        }

        .center-fs-btn svg {
            width: 16px !important;          /* Chota icon */
            height: 16px !important;
            stroke: #facc15 !important;
            stroke-width: 2.5 !important;
        }

        .center-fs-btn:hover {
            background: #facc15 !important;
            width: 55px !important;          /* Hover par halka sa phailta hai */
        }
        
        .center-fs-btn:hover svg {
            stroke: #2d1b14 !important;
        }

        .center-fs-btn:active {
            transform: translateX(-50%) scale(0.9) !important;
        }
    </style>
