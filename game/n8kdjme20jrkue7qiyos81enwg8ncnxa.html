<!DOCTYPE html>

<head>

    <title>Secret Reef Merge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Arial Rounded MT Bold', 'Arial', sans-serif;
            background: linear-gradient(to bottom, #0a4a8e, #0077be);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }
        
        .game-container {
            width: 100%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            position: relative;
            z-index: 2;
        }
        
        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            background: rgba(0, 20, 60, 0.7);
            padding: 12px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            border: 2px solid #5ad0ff;
        }
        
        .score-box {
            text-align: center;
        }
        
        .score-label {
            font-size: 14px;
            opacity: 0.9;
            color: #a0e7ff;
        }
        
        .score-value {
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 5px #00b7ff;
        }
        
        .game-area {
            position: relative;
            width: 100%;
            height: 500px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
            border: 3px solid #2abaff;
        }
        
        #game-canvas {
            width: 100%;
            height: 100%;
            display: block;
            position: relative;
            z-index: 3;
        }
        
        .next-animal {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 20, 60, 0.7);
            padding: 12px 20px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            border: 2px solid #5ad0ff;
        }
        
        .next-label {
            font-size: 16px;
            color: #a0e7ff;
        }
        
        .next-image {
            width: 40px;
            height: 40px;
            filter: drop-shadow(0 0 8px rgba(0, 231, 255, 0.8));
        }
        
        .instructions {
            font-size: 14px;
            text-align: center;
            margin-top: 10px;
            opacity: 0.9;
            color: #a0e7ff;
        }
        
        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 10, 30, 0.92);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            z-index: 100;
            display: none;
        }
        
        .game-over-text {
            font-size: 36px;
            font-weight: bold;
            color: #ff5555;
            text-shadow: 0 0 15px rgba(255, 85, 85, 0.8);
        }
        
        .final-score {
            font-size: 24px;
            color: #a0e7ff;
        }
        
        .restart-btn, .play-btn, .settings-btn {
            background: linear-gradient(to bottom, #00cec9, #0099cc);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #007799, 0 8px 20px rgba(0, 0, 0, 0.4);
            transition: all 0.1s;
        }
        
        .restart-btn:active, .play-btn:active, .settings-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #007799, 0 4px 10px rgba(0, 0, 0, 0.3);
        }
        
        .level-up {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 15, 35, 0.9);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            display: none;
            z-index: 90;
            border: 2px solid #5ad0ff;
            box-shadow: 0 0 25px rgba(90, 208, 255, 0.6);
        }
        
        .level-text {
            font-size: 28px;
            color: '5ad0ff';
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(90, 208, 255, 0.8);
        }
        
        .level-target {
            font-size: 18px;
            color: #a0e7ff;
        }
        
        .ocean-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        
        .bubble {
            position: absolute;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.8), rgba(173, 216, 230, 0.4));
            border-radius: 50%;
            bottom: -50px;
            animation: rise linear infinite;
        }
        
        @keyframes rise {
            0% {
                transform: translateY(0) translateX(0) scale(0.5);
                opacity: 0;
            }
            10% {
                opacity: 0.7;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-600px) translateX(20px) scale(1.2);
                opacity: 0;
            }
        }
        
        /* FIXED: Sandy rocks with proper overlapping */
        .sandy-rocks {
            position: absolute;
            bottom: -10px;
            left: -12px;
            width: calc(100% + 20px);
            height: 100px;
            z-index: 2;
            overflow: visible;
        }
        
        .rock {
            position: absolute;
            bottom: -12px;
            animation: shimmer 5s ease-in-out infinite alternate;
            z-index: 2;
            transform-origin: bottom center;
            object-fit: contain;
            min-width: 40px;
        }
        
        @keyframes shimmer {
            0% { transform: translateX(0px); }
            100% { transform: translateX(5px); }
        }
        
        /* Add these styles to your existing CSS */

/* Coral animation styles */
.coral {
    margin: 0 -20px;
    z-index: 3;
    animation: 
        coralSway 12s ease-in-out infinite alternate,
        coralPulse 8s ease-in-out infinite alternate,
        coralColorShift 15s ease-in-out infinite alternate;
    transform-origin: bottom center;
    filter: 
        drop-shadow(0 2px 5px rgba(0, 0, 0, 0.3))
        brightness(1.1)
        saturate(1.2);
}

/* Coral swaying animation */
@keyframes coralSway {
    0%, 100% { 
        transform: rotate(-3deg) translateY(0px); 
    }
    25% { 
        transform: rotate(2deg) translateY(-2px); 
    }
    50% { 
        transform: rotate(4deg) translateY(1px); 
    }
    75% { 
        transform: rotate(-2deg) translateY(-1px); 
    }
}

/* Coral pulsing animation */
@keyframes coralPulse {
    0%, 100% { 
        transform: scale(1);
        filter: 
            drop-shadow(0 2px 5px rgba(0, 0, 0, 0.3))
            brightness(1.1)
            saturate(1.2);
    }
    50% { 
        transform: scale(1.05);
        filter: 
            drop-shadow(0 0 8px rgba(255, 150, 150, 0.4))
            brightness(1.2)
            saturate(1.4);
    }
}

/* Coral color shifting animation */
@keyframes coralColorShift {
    0%, 100% { 
        filter: 
            drop-shadow(0 2px 5px rgba(0, 0, 0, 0.3))
            brightness(1.1)
            saturate(1.2)
            hue-rotate(0deg);
    }
    33% { 
        filter: 
            drop-shadow(0 2px 5px rgba(0, 0, 0, 0.3))
            brightness(1.15)
            saturate(1.3)
            hue-rotate(5deg);
    }
    66% { 
        filter: 
            drop-shadow(0 2px 5px rgba(0, 0, 0, 0.3))
            brightness(1.05)
            saturate(1.25)
            hue-rotate(-3deg);
    }
}

/* Add slight variation to each coral element */
.coral:nth-child(2) {
    animation-delay: -2s, -1s, -5s;
}

.coral:nth-child(5) {
    animation-delay: -4s, -3s, -10s;
}

        function createSandyRocks() {
            const sandyRocks = document.getElementById('sandy-rocks');
            sandyRocks.innerHTML = '';
            
            // Create rocks to fill the entire width
            for (let i = 0; i < 40; i++) {
                const rock = document.createElement('img');
                rock.className = 'rock';
                rock.src = 'https://uploads.onecompiler.io/43j5sskjn/43vmte6ux/WhatsApp%20Image%202025-09-03%20at%2018.36.47.png';
                
                // Position rocks to span the entire width with some overlap
                const left = (i / 39) * 100;
                const bottom = -5;
                const delay = Math.random() * 5;
                
                rock.style.left = `${left}%`;
                rock.style.bottom = `${bottom}px`;
                rock.style.animationDelay = `${delay}s`;
                rock.style.width = `${70 + Math.random() * 50}px`;
                rock.style.height = 'auto';
                rock.style.zIndex = `${Math.floor(Math.random() * 3)}`;
                rock.style.transform = `translateX(-50%)`;
                
                sandyRocks.appendChild(rock);
            }
            
            // Add extra rocks on the left side to ensure full coverage
            for (let i = 0; i < 5; i++) {
                const leftRock = document.createElement('img');
                leftRock.className = 'rock';
                leftRock.src = 'https://uploads.onecompiler.io/43j5sskjn/43vmte6ux/WhatsApp%20Image%202025-09-03%20at%2018.36.47.png';
                leftRock.style.left = `${i * 5}%`;
                leftRock.style.bottom = '-5px';
                leftRock.style.width = `${60 + Math.random() * 40}px`;
                leftRock.style.height = 'auto';
                leftRock.style.zIndex = '1';
                leftRock.style.transform = `translateX(-50%)`;
                sandyRocks.appendChild(leftRock);
            }
            
            // Add edge rocks to ensure full coverage
            const leftEdgeRock = document.createElement('img');
            leftEdgeRock.className = 'rock';
            leftEdgeRock.src = 'https://uploads.onecompiler.io/43j5sskjn/43vmte6ux/WhatsApp%20Image%202025-09-03%20at%2018.36.47.png';
            leftEdgeRock.style.left = '0';
            leftEdgeRock.style.bottom = '-5px';
            leftEdgeRock.style.width = '90px';
            leftEdgeRock.style.height = 'auto';
            leftEdgeRock.style.zIndex = '1';
            leftEdgeRock.style.transform = 'translateX(0)';
            sandyRocks.appendChild(leftEdgeRock);
            
            const rightEdgeRock = document.createElement('img');
            rightEdgeRock.className = 'rock';
            rightEdgeRock.src = 'https://uploads.onecompiler.io/43j5sskjn/43vmte6ux/WhatsApp%20Image%202025-09-03%20at%2018.36.47.png';
            rightEdgeRock.style.left = '100%';
            rightEdgeRock.style.bottom = '-5px';
            rightEdgeRock.style.width = '90px';
            rightEdgeRock.style.height = 'auto';
            rightEdgeRock.style.zIndex = '1';
            rightEdgeRock.style.transform = 'translateX(-100%)';
            sandyRocks.appendChild(rightEdgeRock);
        }

        // Game constants and variables
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const restartBtn = document.getElementById('restart-btn');
        const gameOverScreen = document.getElementById('game-over');
        const levelUpScreen = document.getElementById('level-up');
        const oceanBg = document.getElementById('ocean-bg');
        const nextImage = document.getElementById('next-image');
        const playScreen = document.getElementById('play-screen');
        const playBtn = document.getElementById('play-btn');
        const muteBtn = document.getElementById('mute-btn');
        const pauseBtn = document.getElementById('pause-btn');
        const settingsBtn = document.getElementById('settings-btn');
        const settingsPanel = document.getElementById('settings-panel');
        const closeSettings = document.getElementById('close-settings');
        const musicUpload = document.getElementById('music-upload');
        const volumeSlider = document.getElementById('volume-slider');
        const musicInfo = document.getElementById('music-info');
        const adNotification = document.getElementById('ad-notification');
        const backgroundMusic = document.getElementById('background-music');
        
        // Device pixel ratio for high-resolution displays
        const dpr = Math.min(2, window.devicePixelRatio || 1);
        
        // Game state
        let score = 0;
        let bestScore = localStorage.getItem('seaMergeBestScore') || 0;
        let level = 1;
        let gameActive = false; // Start with game not active
        let gamePaused = false;
        let gameMuted = false;
        let animals = [];
        let nextAnimalType = 0;
        let lastDropTime = 0;
        let wasMusicPlaying = false;
        const dropCooldown = 500;
        
        // Level targets
        const levelTargets = [500, 1500, 4000, 10000, 25000, 60000, 150000, 350000, 800000, 2000000];
        
        // Sea animal data (image URLs, radius, points, color)
        const animalTypes = [
            { imageUrl: 'https://uploads.onecompiler.io/43j5sskjn/43u7h8e53/copilot_image_1756852246675.png', radius: 20, points: 10, color: '#5ad0ff' },
            { imageUrl: 'https://uploads.onecompiler.io/43j5sskjn/43u7h8e53/copilot_image_1756853190816.png', radius: 25, points: 20, color: '#2abaff' },
            { imageUrl: 'https://uploads.onecompiler.io/43j5sskjn/43u7h8e53/copilot_image_1756853498376.png', radius: 30, points: 40, color: '#0099cc' },
            { imageUrl: 'https://uploads.onecompiler.io/43j5sskjn/43u7h8e53/copilot_image_1756853712949.png', radius: 35, points: 80, color: '#0077be' },
            { imageUrl: 'https://uploads.onecompiler.io/43j5sskjn/43u7h8e53/copilot_image_1756853888153.png', radius: 40, points: 160, color: '#005a8e' },
            { imageUrl: 'https://uploads.onecompiler.io/43j5sskjn/43u7h8e53/copilot_image_1756854046967.png', radius: 45, points: 320, color: '#004a7c' },
            { imageUrl: 'https://uploads.onecompiler.io/43j5sskjn/43u7h8e53/copilot_image_1756854196856.png', radius: 50, points: 640, color: '#003b6b' },
            { imageUrl: 'https://uploads.onecompiler.io/43j5sskjn/43u7h8e53/copilot_image_1756854256470.png', radius: 55, points: 1280, color: '#002d5a' },
            { imageUrl: 'https://uploads.onecompiler.io/43j5sskjn/43u7h8e53/image_1756854491350.png', radius: 60, points: 2560, color: '#00204a' },
            { imageUrl: 'https://uploads.onecompiler.io/43j5sskjn/43u7h8e53/copilot_image_1756854566658.png', radius: 65, points: 5120, color: '#001235' }
        ];
        
        // Preload images
        const animalImages = [];
        function preloadImages() {
            for (let i = 0; i < animalTypes.length; i++) {
                const img = new Image();
                img.src = animalTypes[i].imageUrl;
                animalImages.push(img);
            }
        }
        
        // Create ocean background with bubbles
        function createOceanBackground() {
            // Clear previous bubbles
            oceanBg.innerHTML = '';
            
            // Create multiple bubbles with more realistic properties
            for (let i = 0; i < 20; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                
                // Randomize bubble properties for more realistic effect
                const size = Math.random() * 15 + 5;
                const left = Math.random() * 100;
                const duration = Math.random() * 20 + 15;
                const delay = Math.random() * 15;
                
                bubble.style.width = `${size}px`;
                bubble.style.height = `${size}px`;
                bubble.style.left = `${left}%`;
                bubble.style.animationDuration = `${duration}s`;
                bubble.style.animationDelay = `${delay}s`;
                bubble.style.animation = `rise ${duration}s linear ${delay}s infinite`;
                
                oceanBg.appendChild(bubble);
            }
        }
        
        // Set canvas size with proper scaling
        function resizeCanvas() {
            const displayWidth = Math.floor(canvas.clientWidth);
            const displayHeight = Math.floor(canvas.clientHeight);
            
            // Check if canvas is the right size
            if (canvas.width !== displayWidth * dpr || canvas.height !== displayHeight * dpr) {
                canvas.width = displayWidth * dpr;
                canvas.height = displayHeight * dpr;
                
                // Reset and scale the context for high DPI displays
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.scale(dpr, dpr);
                
                // Set the CSS size to match the display size
                canvas.style.width = `${displayWidth}px`;
                canvas.style.height = `${displayHeight}px`;
            }
        }
        
        // Initialize game
        function init() {
            score = 0;
            level = 1;
            gameActive = true;
            gamePaused = false;
            animals = [];
            nextAnimalType = 0;
            lastDropTime = 0;
            
            resizeCanvas();
            updateUI();
            generateNextAnimal();
            gameOverScreen.style.display = 'none';
            createOceanBackground();
            createSandyRocks();
            
            // Update button icons
            updatePauseButtonIcon();
            updateMuteButtonIcon();
            
            // Show level info
            showLevelInfo();
            
            // Start background music if available and not muted
            if (backgroundMusic.src && !gameMuted) {
                backgroundMusic.volume = parseFloat(volumeSlider.value);
                backgroundMusic.play().catch(e => console.log("Audio play failed:", e));
            }
            
            // Show banner ad when starting the game
            if (typeof sdk !== 'undefined' && sdk.showBanner !== 'undefined') {
                sdk.showBanner();
            }
            
            // Start game loop
            requestAnimationFrame(gameLoop);
        }
        
        // Start the game (called when play button is clicked)
        function startGame() {
            playScreen.style.display = 'none';
            init();
        }
        
        // Toggle settings panel
        function toggleSettings() {
            if (settingsPanel.style.display === 'block') {
                settingsPanel.style.display = 'none';
            } else {
                settingsPanel.style.display = 'block';
            }
        }
        
        // Show ad when a button is clicked
        function showAd() {
            if (typeof sdk !== 'undefined' && sdk.showInterstitial !== 'undefined') {
                // Show ad notification
                adNotification.style.display = 'block';
                setTimeout(() => {
                    adNotification.style.display = 'none';
                }, 2000);
                
                // Show the ad
                sdk.showInterstitial();
            }
        }
        
        // Toggle game pause state
function togglePause() {
    if (!gameActive) return;
    
    gamePaused = !gamePaused;
    
    if (gamePaused) {
        // Show ad only when pausing, not when unpausing
        showAd();
        
        // Pause music
        if (backgroundMusic && !backgroundMusic.paused) {
            backgroundMusic.pause();
        }
    } else {
        // Resume game
        requestAnimationFrame(gameLoop);
        
        // Resume music if not muted
        if (backgroundMusic.src && !gameMuted) {
            backgroundMusic.play().catch(e => console.log("Audio play failed:", e));
        }
    }
    
    updatePauseButtonIcon();
}
        // Update pause button icon based on current state
        function updatePauseButtonIcon() {
            const pauseIcon = pauseBtn.querySelector('svg');
            if (gamePaused) {
                pauseIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
            } else {
                pauseIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
            }
        }
        
        // Toggle game mute state
function toggleMute() {
    if (!gameMuted) {
        // Only show ad when the user mutes (not when unmuting)
        showAd();
    }

    gameMuted = !gameMuted;
    
    if (backgroundMusic.src) {
        if (gameMuted) {
            backgroundMusic.volume = 0;
        } else {
            backgroundMusic.volume = parseFloat(volumeSlider.value);
            if (!gamePaused && gameActive) {
                backgroundMusic.play().catch(e => console.log("Audio play failed:", e));
            }
        }
    }
    
    updateMuteButtonIcon();
}

        
        // Update mute button icon based on current state
function updateMuteButtonIcon() {
    const muteIcon = muteBtn.querySelector('svg');
    if (gameMuted) {
        muteIcon.innerHTML = '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>';
    } else {
        muteIcon.innerHTML = '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
    }
}
        
        // Handle music file upload
        function handleMusicUpload(e) {
            const file = e.target.files[0];
            if (file) {
                if (file.type.startsWith('audio/')) {
                    const objectURL = URL.createObjectURL(file);
                    backgroundMusic.src = objectURL;
                    backgroundMusic.volume = gameMuted ? 0 : parseFloat(volumeSlider.value);
                    
                    // Update music info
                    musicInfo.textContent = file.name;
                    
                    // Play the music if game is active and not muted/paused
                    if (gameActive && !gamePaused && !gameMuted) {
                        backgroundMusic.play().catch(e => console.log("Audio play failed:", e));
                    }
                } else {
                    alert('Please select a valid audio file.');
                }
            }
        }
        
        // Handle volume change
        function handleVolumeChange() {
            if (backgroundMusic.src && !gameMuted) {
                backgroundMusic.volume = parseFloat(volumeSlider.value);
            }
        }
        
        // Show level information
        function showLevelInfo() {
            const levelNumber = document.getElementById('level-number');
            const targetScore = document.getElementById('target-score');
            
            levelNumber.textContent = level;
            targetScore.textContent = levelTargets[level-1].toLocaleString();
            
            levelUpScreen.style.display = 'block';
            
            setTimeout(() => {
                levelUpScreen.style.display = 'none';
            }, 2500);
        }
        
        // Update UI elements
        function updateUI() {
            document.getElementById('score').textContent = score.toLocaleString();
            document.getElementById('best').textContent = bestScore.toLocaleString();
            document.getElementById('level').textContent = level;
            
            // Update next animal preview image
            nextImage.src = animalTypes[nextAnimalType].imageUrl;
        }
        
        // Generate next animal type (weighted toward lower tiers)
        function generateNextAnimal() {
            const rand = Math.random();
            if (rand < 0.7) {
                nextAnimalType = 0;
            } else if (rand < 0.9) {
                nextAnimalType = 1;
            } else {
                nextAnimalType = 2;
            }
            updateUI();
        }
        
        // Drop the current animal at the specified position
        function dropAnimal(x) {
            if (!gameActive || gamePaused) return;
            
            const currentTime = Date.now();
            if (currentTime - lastDropTime < dropCooldown) return;
            lastDropTime = currentTime;
            
            const type = nextAnimalType;
            const dropX = Math.max(animalTypes[type].radius, Math.min(x, canvas.width / dpr - animalTypes[type].radius));
            const y = 40;
            
            animals.push({
                type: type,
                x: dropX,
                y: y,
                vx: (Math.random() - 0.5) * 2,
                vy: 0,
                radius: animalTypes[type].radius
            });
            
            generateNextAnimal();
        }
        
        // Check for collisions and merges
        function checkCollisions() {
            for (let i = 0; i < animals.length; i++) {
                for (let j = i + 1; j < animals.length; j++) {
                    const a = animals[i];
                    const b = animals[j];
                    
                    const dx = a.x - b.x;
                    const dy = a.y - b.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < a.radius + b.radius) {
                        if (a.type === b.type && a.type < animalTypes.length - 1) {
                            const newType = a.type + 1;
                            const newX = (a.x + b.x) / 2;
                            const newY = (a.y + b.y) / 2;
                            
                            animals.splice(j, 1);
                            animals.splice(i, 1);
                            
                            animals.push({
                                type: newType,
                                x: newX,
                                y: newY,
                                vx: (a.vx + b.vx) / 2,
                                vy: (a.vy + b.vy) / 2,
                                radius: animalTypes[newType].radius
                            });
                                            score += animalTypes[newType].points;
                            updateUI();
                            checkLevelCompletion();
                            return;
                        } else {
                            const angle = Math.atan2(dy, dx);
                            const targetDistance = a.radius + b.radius;
                            const moveX = (targetDistance - distance) * Math.cos(angle) * 0.5;
                            const moveY = (targetDistance - distance) * Math.sin(angle) * 0.5;
                            
                            a.x += moveX;
                            a.y += moveY;
                            b.x -= moveX;
                            b.y -= moveY;
                                            const tempVx = a.vx;
                            const tempVy = a.vy;
                            a.vx = b.vx * 0.8;
                            a.vy = b.vy * 0.8;
                            b.vx = tempVx * 0.8;
                            b.vy = tempVy * 0.8;
                        }
                    }
                }
            }
        }
        
        // Check if level is completed
        function checkLevelCompletion() {
            if (score >= levelTargets[level-1] && level < levelTargets.length) {
                level++;
                showLevelInfo();
            }
            updateUI();
        }
        
        // Check for game over - fixed to only trigger when animals reach the very top
        function checkGameOver() {
            for (let animal of animals) {
                if (animal.y - animal.radius < 10) {
                    return true;
                }
            }
            return false;
        }
        
        // Physics update
        function updatePhysics() {
            const gravity = 0.3;
            const friction = 0.98;
            
            for (let animal of animals) {
                animal.vy += gravity;
                animal.vx *= friction;
                animal.vy *= friction;
                
                animal.x += animal.vx;
                animal.y += animal.vy;
                
                if (animal.x - animal.radius < 0) {
                    animal.x = animal.radius;
                    animal.vx *= -0.7;
                } else if (animal.x + animal.radius > canvas.width / dpr) {
                    animal.x = canvas.width / dpr - animal.radius;
                    animal.vx *= -0.7;
                }
                
                if (animal.y + animal.radius > canvas.height / dpr) {
                    animal.y = canvas.height / dpr - animal.radius;
                    animal.vy *= -0.7;
                    animal.vx *= 0.9;
                }
            }
        }
        
        // Draw game elements
        function draw() {
            // Clear canvas to transparent so DOM behind shows through
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw animals with blue bubble effects
            for (let animal of animals) {
                const typeData = animalTypes[animal.type];
                
                // Bubble halo
                ctx.beginPath();
                ctx.arc(animal.x, animal.y, animal.radius + 3, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(90, 208, 255, 0.4)';
                ctx.fill();
                ctx.strokeStyle = 'rgba(173, 216, 230, 0.7)';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // Main bubble
                ctx.beginPath();
                ctx.arc(animal.x, animal.y, animal.radius, 0, Math.PI * 2);
                ctx.fillStyle = typeData.color;
                ctx.fill();
                
                // Draw animal image if loaded
                if (animalImages[animal.type].complete) {
                    ctx.save();
                    ctx.beginPath();
                    ctx.arc(animal.x, animal.y, animal.radius - 2, 0, Math.PI * 2);
                    ctx.clip();
                    
                    const imgSize = (animal.radius - 2) * 2;
                    ctx.drawImage(
                        animalImages[animal.type],
                        animal.x - animal.radius + 2,
                        animal.y - animal.radius + 2,
                        imgSize,
                        imgSize
                    );
                    
                    ctx.restore();
                }
                
                // Bubble highlight
                ctx.beginPath();
                ctx.arc(animal.x - animal.radius * 0.3, animal.y - animal.radius * 0.3, animal.radius * 0.2, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                ctx.fill();
            }
        }
        
        // Game loop
        function gameLoop() {
            if (!gameActive || gamePaused) return;
            
            resizeCanvas();
            updatePhysics();
            checkCollisions();
            draw();
            
            if (checkGameOver()) {
                gameActive = false;
                gameOverScreen.style.display = 'flex';
                document.getElementById('final-score').textContent = score.toLocaleString();
                
                if (score > bestScore) {
                    bestScore = score;
                    localStorage.setItem('seaMergeBestScore', bestScore);
                    updateUI();
                }
                
                // Pause music when game over
                if (backgroundMusic && !backgroundMusic.paused) {
                    backgroundMusic.pause();
                }
                
                // Show interstitial ad when game is over
                if (typeof sdk !== 'undefined' && sdk.showInterstitial !== 'undefined') {
                    sdk.showInterstitial();
                }
            } else {
                requestAnimationFrame(gameLoop);
            }
        }
        
        // Event listeners
        canvas.addEventListener('click', (e) => {
            if (gameActive && !gamePaused) {
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX - rect.left) * (canvas.width / (rect.width * dpr));
                dropAnimal(x);
            }
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameActive && !gamePaused) {
                const rect = canvas.getBoundingClientRect();
                const x = (e.touches[0].clientX - rect.left) * (canvas.width / (rect.width * dpr));
                dropAnimal(x);
            }
        });
        
        restartBtn.addEventListener('click', init);
        playBtn.addEventListener('click', startGame);
        muteBtn.addEventListener('click', toggleMute);
        pauseBtn.addEventListener('click', togglePause);
        settingsBtn.addEventListener('click', toggleSettings);
        closeSettings.addEventListener('click', toggleSettings);
        musicUpload.addEventListener('change', handleMusicUpload);
        volumeSlider.addEventListener('input', handleVolumeChange);
        
        // Initialize on load
        window.addEventListener('load', () => {
            // Set canvas size
            resizeCanvas();
            
            // Preload images
            preloadImages();
            
            // Create background elements
            createOceanBackground();
            createSandyRocks();
            
            // Show play screen initially
            playScreen.style.display = 'flex';
            
            // Update best score
            document.getElementById('best').textContent = bestScore.toLocaleString();
            
            // Set initial volume
            if (backgroundMusic.src) {
                backgroundMusic.volume = parseFloat(volumeSlider.value);
            }
        });
        
        window.addEventListener('resize', () => {
            resizeCanvas();
            createOceanBackground();
            createSandyRocks();
        });
    </script>
