<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Rock Paper Scissors Adventure</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="style.css">
    
    <script type="text/javascript">
        window.SDK_OPTIONS = {
            gameId: "josjif5rysmcx2wap9iluipssoinetbc",
            onEvent: function (a) {
                switch (a.name) {
                    case "SDK_GAME_PAUSE":
                        // pause game logic / mute audio
                        if (window.gameInstance) {
                            window.gameInstance.pauseForAd();
                        }
                        break;
                    case "SDK_GAME_START":
                        // advertisement done, resume game logic and unmute audio
                        if (window.gameInstance) {
                            window.gameInstance.resumeFromAd();
                        }
                        break;
                    case "SDK_READY":
                        // when sdk is ready
                        console.log("GameMonetize SDK Ready");
                        break;
                }
            }
        };
        (function (a, b, c) {
            var d = a.getElementsByTagName(b)[0];
            a.getElementById(c) || (a = a.createElement(b), a.id = c, a.src = 
            "https://api.gamemonetize.com/sdk.js", d.parentNode.insertBefore(a, d))
        })(document, "script", "gamemonetize-sdk");
    </script>
</head>
<body>
    <div id="startMenu">
        <h1>⚔️ RPS Battle Arena ⚔️</h1>
        <p>Choose your warrior:</p>
        <div id="choices">
            <button class="choiceBtn" data-type="scissors">✂️</button>
            <button class="choiceBtn" data-type="paper">📄</button>
            <button class="choiceBtn" data-type="rock">⛰️</button>
        </div>
        <p class="hint">Move with W A S D</p>
    </div>

    <canvas id="gameCanvas" tabindex="0"></canvas>

    <!-- Mobile Controls -->
    <div id="mobile-controls">
        <button class="mobile-btn" data-direction="up">↑</button>
        <button class="mobile-btn" data-direction="down">↓</button>
        <button class="mobile-btn" data-direction="left">←</button>
        <button class="mobile-btn" data-direction="right">→</button>
    </div>

    <div id="gameOverScreen">
        <h2 id="gameOverTitle">💀 Defeated 💀</h2>
        <p id="survivalTime"></p>
        <button id="restartBtn">⚔️ Battle Again</button>
    </div>

    <div id="victoryScreen">
        <h2>🏆 Victory! 🏆</h2>
        <p id="victoryTime"></p>
        <p id="victoryStats"></p>
        <button id="victoryRestartBtn">🎮 Play Again</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
