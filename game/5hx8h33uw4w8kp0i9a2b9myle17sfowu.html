<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lumina Weaver v2 - Mobile Optimized</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Segoe UI', Arial, sans-serif;
            cursor: default; 
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }
        canvas { display: block; }
        
        #ui {
            display: none;
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.8);
            pointer-events: none;
            z-index: 10;
        }
        h1 { margin: 0; font-size: 18px; font-weight: lighter; letter-spacing: 2px; }
        #score-board { font-size: 24px; color: #00ffcc; margin-top: 5px; font-weight: bold;}
        
        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            z-index: 20;
            background: rgba(0, 0, 0, 0.9);
            padding: 30px;
            border: 1px solid #333;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.15);
            width: 85%;
            max-width: 400px;
            box-sizing: border-box;
        }

        h2 { margin: 0 0 10px; font-size: 28px; color: #fff; letter-spacing: 2px; }
        h3 { margin: 0 0 20px; font-size: 32px; color: #ff3333; }
        
        .instructions {
            color: #ccc;
            margin: 15px 0;
            font-size: 14px;
            line-height: 1.5;
            text-align: left;
            background: rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 8px;
        }
        .key-highlight { color: #00ffcc; font-weight: bold; }
        .warning-highlight { color: #ff3333; font-weight: bold; }

        button {
            background: #fff; 
            border: none; 
            padding: 15px 40px;
            font-size: 18px; 
            cursor: pointer; 
            border-radius: 30px;
            transition: 0.2s;
            font-weight: bold;
            width: 100%;
        }
        button:active { transform: scale(0.95); background: #00ffcc; }
        
        #pause-screen {
            display: none;
            font-size: 24px;
            letter-spacing: 5px;
            background: rgba(0,0,0,0.5);
        }

        @media (max-height: 500px) {
            .overlay { padding: 15px; }
            h2 { font-size: 20px; }
            .instructions { font-size: 12px; margin: 10px 0; }
        }
    </style>
</head>
<body>

<div id="ui">
    <h1>LUMINA WEAVER</h1>
    <div id="score-board">0</div>
</div>

<div id="start-screen" class="overlay">
    <h2>LUMINA WEAVER</h2>
    <div class="instructions">
        <strong>How to Play:</strong><br>
        1. <span class="key-highlight">Drag</span> your finger to move the ribbon.<br>
        2. Collect <span class="key-highlight">Glowing Orbs</span> for points.<br>
        3. <span class="warning-highlight">AVOID</span> the Red Spikes.
    </div>
    <button onclick="startGame()">START GAME</button>
</div>

<div id="game-over" class="overlay" style="display: none;">
    <h3>CONSUMED</h3>
    <p id="final-score" style="color: white; font-size: 18px; margin-bottom: 20px;">Final score: 0</p>
    <button onclick="startGame()">TRY AGAIN</button>
</div>

<div id="pause-screen" class="overlay">PAUSED</div>

<canvas id="gameCanvas"></canvas>

<script type="text/javascript">
    // 标记：是否正在播放结算广告
    var isProcessingGameOver = false;

    window.SDK_OPTIONS = {
        gameId: "5hx8h33uw4w8kp0i9a2b9myle17sfowu",
        onEvent: function (a) {
            switch (a.name) {
                case "SDK_GAME_PAUSE":
                    // 广告开始播放，暂停游戏背景
                    isPaused = true;
                    break;
                    
                case "SDK_GAME_START":
                    // 广告结束/关闭
                    isPaused = false;
                    
                    // 关键逻辑：如果是“死亡广告”播放结束了，现在才显示结算界面
                    if (isProcessingGameOver) {
                        showGameOverUI();
                        isProcessingGameOver = false; // 重置标记
                    }
                    break;
                    
                case "SDK_READY":
                    console.log("SDK Ready");
                    break;
                
                case "SDK_ERROR":
                    console.log("SDK Error");
                    isPaused = false;
                    // 如果广告加载出错，不能让用户卡在黑屏，必须立刻显示结算界面
                    if (isProcessingGameOver) {
                        showGameOverUI();
                        isProcessingGameOver = false;
                    }
                    break;
            }
        }
    };

    (function (a, b, c) {
        var d = a.getElementsByTagName(b)[0];
        a.getElementById(c) || (a = a.createElement(b), a.id = c, 
        a.src = "https://api.gamemonetize.com/sdk.js", d.parentNode.insertBefore(a, d))
    })(document, "script", "gamemonetize-sdk"); 
</script>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score-board');
    const uiEl = document.getElementById('ui');
    const startScreen = document.getElementById('start-screen');
    const gameOverScreen = document.getElementById('game-over');
    const pauseScreen = document.getElementById('pause-screen');
    const finalScoreEl = document.getElementById('final-score');

    let width, height, dpr;
    let score = 0;
    let frameCount = 0;
    let isPlaying = false;
    let isPaused = false;
    let difficultyMultiplier = 1;
    
    const mouse = { x: 0, y: 0 };

    function resize() {
        dpr = window.devicePixelRatio || 1;
        width = window.innerWidth;
        height = window.innerHeight;
        
        canvas.width = width * dpr;
        canvas.height = height * dpr;
        
        canvas.style.width = width + 'px';
        canvas.style.height = height + 'px';
        
        ctx.scale(dpr, dpr);
        
        if (!isPlaying) {
            mouse.x = width / 2;
            mouse.y = height / 2;
        }
    }
    window.addEventListener('resize', resize);
    window.addEventListener('orientationchange', () => setTimeout(resize, 200));
    resize();

    function setInput(x, y) {
        mouse.x = x;
        mouse.y = y;
    }

    window.addEventListener('mousemove', (e) => setInput(e.clientX, e.clientY));

    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        setInput(touch.clientX, touch.clientY);
    }, { passive: false });

    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        setInput(touch.clientX, touch.clientY);
    }, { passive: false });

    // 自动暂停处理
    window.addEventListener('blur', () => {
        if (isPlaying && !isPaused) {
            isPaused = true;
            pauseScreen.style.display = 'block';
        }
    });
    
    window.addEventListener('focus', () => {
        if (isPlaying && isPaused && typeof sdk === 'undefined') {
             isPaused = false;
             pauseScreen.style.display = 'none';
        } else if (isPlaying && isPaused) {
            pauseScreen.style.display = 'none';
        }
    });

    // --- 游戏对象类 ---

    class Ribbon {
        constructor() {
            this.nodes = [];
            this.nodeCount = 25;
            this.color = 'hsl(180, 100%, 50%)';
            for (let i = 0; i < this.nodeCount; i++) {
                this.nodes.push({ x: mouse.x, y: mouse.y });
            }
        }
        update() {
            this.nodes[0].x += (mouse.x - this.nodes[0].x) * 0.25;
            this.nodes[0].y += (mouse.y - this.nodes[0].y) * 0.25;
            for (let i = 1; i < this.nodes.length; i++) {
                const node = this.nodes[i];
                const prevNode = this.nodes[i - 1];
                node.x += (prevNode.x - node.x) * 0.5;
                node.y += (prevNode.y - node.y) * 0.5;
            }
        }
        draw() {
            ctx.shadowBlur = 10;
            ctx.shadowColor = this.color;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.beginPath();
            ctx.moveTo(this.nodes[0].x, this.nodes[0].y);
            for (let i = 1; i < this.nodes.length; i++) {
                const p0 = this.nodes[i - 1];
                const p1 = this.nodes[i];
                ctx.quadraticCurveTo(p0.x, p0.y, (p0.x + p1.x) / 2, (p0.y + p1.y) / 2);
            }
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 4; 
            ctx.stroke();
            ctx.shadowBlur = 0;
        }
    }

    class Orb {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * width;
            this.y = Math.random() * height;
            this.radius = 12 + Math.random() * 8;
            this.color = `hsl(${Math.random() * 360}, 80%, 60%)`;
        }
        draw() {
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 15;
            ctx.shadowColor = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius * 0.6, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
    }

    class Enemy {
        constructor() {
            const side = Math.floor(Math.random() * 4);
            if(side === 0) { this.x = Math.random() * width; this.y = -30; }
            else if(side === 1) { this.x = width + 30; this.y = Math.random() * height; }
            else if(side === 2) { this.x = Math.random() * width; this.y = height + 30; }
            else { this.x = -30; this.y = Math.random() * height; }
            this.radius = 10 + Math.random() * 5;
            this.baseSpeed = (width < 600 ? 1.2 : 1.8); 
            this.speed = (this.baseSpeed + Math.random()) * difficultyMultiplier;
        }
        update() {
            const dx = mouse.x - this.x;
            const dy = mouse.y - this.y;
            const angle = Math.atan2(dy, dx);
            this.x += Math.cos(angle) * this.speed;
            this.y += Math.sin(angle) * this.speed;
        }
        draw() {
            ctx.fillStyle = '#ff3333';
            ctx.shadowBlur = 8;
            ctx.shadowColor = '#ff0000';
            ctx.beginPath();
            for(let i=0; i<8; i++) {
                const r = i % 2 === 0 ? this.radius : this.radius / 2;
                const a = (Math.PI * i) / 4;
                ctx.lineTo(this.x + Math.cos(a) * r, this.y + Math.sin(a) * r);
            }
            ctx.closePath();
            ctx.fill();
            ctx.shadowBlur = 0;
        }
    }

    let ribbon, orbs = [], enemies = [];

    function initEnvironment() {
        ribbon = new Ribbon();
        animate();
    }

    function startGame() {
        // 重置所有标记
        isProcessingGameOver = false;
        
        score = 0;
        difficultyMultiplier = 1;
        frameCount = 0;
        orbs = [new Orb(), new Orb()];
        enemies = [];
        scoreEl.innerText = `0`;
        startScreen.style.display = 'none';
        gameOverScreen.style.display = 'none';
        uiEl.style.display = 'block';
        document.body.style.cursor = 'none';
        
        isPlaying = true;
        isPaused = false; 
        
        mouse.x = width / 2;
        mouse.y = height / 2;
        ribbon = new Ribbon(); 
    }

    // 新增：专门显示结算UI的函数
    function showGameOverUI() {
        document.body.style.cursor = 'default';
        finalScoreEl.innerText = `Final score: ${score}`;
        gameOverScreen.style.display = 'block';
        uiEl.style.display = 'none';
    }

    function triggerGameOver() {
        isPlaying = false;
        
        // 注意：这里我们不再直接显示 GameOverScreen
        // 而是先尝试调起广告
        
        if (typeof sdk !== 'undefined' && typeof sdk.showBanner !== 'undefined') {
            // 设置标记，告诉 SDK 回调函数：“这次播放广告是因为人死了”
            isProcessingGameOver = true; 
            sdk.showBanner();
            // 代码到这里就停了，界面保持静止，等待广告结束触发 SDK_GAME_START
        } else {
            // 如果没有 SDK（比如本地测试或被屏蔽），直接显示结算
            showGameOverUI();
        }
    }

    function animate() {
        ctx.fillStyle = 'rgba(5, 5, 5, 0.2)';
        ctx.fillRect(0, 0, width, height);

        ribbon.update();
        ribbon.draw();

        if (isPlaying && !isPaused) {
            frameCount++;
            if (frameCount % Math.max(40, 100 - Math.floor(score/300)) === 0) {
                enemies.push(new Enemy());
            }

            orbs.forEach(orb => {
                orb.draw();
                if (Math.hypot(ribbon.nodes[0].x - orb.x, ribbon.nodes[0].y - orb.y) < orb.radius + 15) {
                    ribbon.color = orb.color;
                    score += 100;
                    scoreEl.innerText = score;
                    difficultyMultiplier += 0.02;
                    orb.reset();
                }
            });

            enemies.forEach((enemy, index) => {
                enemy.update();
                enemy.draw();
                if (Math.hypot(ribbon.nodes[0].x - enemy.x, ribbon.nodes[0].y - enemy.y) < enemy.radius + 5) {
                    triggerGameOver();
                }
                if(enemy.x < -100 || enemy.x > width + 100 || enemy.y < -100 || enemy.y > height + 100) {
                    enemies.splice(index, 1);
                }
            });
        }
        requestAnimationFrame(animate);
    }

    initEnvironment();
</script>
</body>
</html>
