<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
		<title>Neon Directive</title>
		<style>
html, body, #canvas {
	margin: 0;
	padding: 0;
	border: 0;
	width: 100%;
	height: 100%;
	overflow: hidden;
}

body {
	color: white;
	background-color: #000;
	overflow: hidden;
	touch-action: none;
	font-family: 'Arial', sans-serif;
}

#canvas {
	display: block;
	width: 100%;
	height: 100%;
}

#canvas:focus {
	outline: none;
}

#status {
	position: fixed;
	top: 0;
	left: 0;
	width: 100%;
	height: 100%;
	background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	z-index: 1000;
	visibility: hidden;
}

#status-splash {
	max-width: 300px;
	max-height: 200px;
	margin-bottom: 30px;
	filter: drop-shadow(0 0 15px rgba(0, 150, 255, 0.5));
	animation: pulse 2s infinite alternate;
}

@keyframes pulse {
	0% { opacity: 0.8; transform: scale(0.98); }
	100% { opacity: 1; transform: scale(1.02); }
}

.loading-container {
	width: 90%;
	max-width: 500px;
	text-align: center;
	padding: 20px;
}

.progress-container {
	width: 100%;
	background: rgba(0, 0, 0, 0.3);
	border-radius: 15px;
	padding: 4px;
	margin: 20px 0;
	border: 1px solid rgba(255, 255, 255, 0.1);
	box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
}

#status-progress {
	width: 100%;
	height: 24px;
	border: none;
	border-radius: 12px;
	background: transparent;
	overflow: hidden;
	display: none;
}

/* WebKit browsers (Chrome, Safari) */
#status-progress::-webkit-progress-bar {
	background: transparent;
	border-radius: 12px;
}

#status-progress::-webkit-progress-value {
	background: linear-gradient(90deg, #0066ff, #00ccff, #0066ff);
	background-size: 200% 100%;
	border-radius: 12px;
	animation: progressShine 2s infinite linear;
	transition: width 0.3s ease;
}

/* Firefox */
#status-progress::-moz-progress-bar {
	background: linear-gradient(90deg, #0066ff, #00ccff, #0066ff);
	background-size: 200% 100%;
	border-radius: 12px;
	animation: progressShine 2s infinite linear;
}

@keyframes progressShine {
	0% { background-position: -200% 0; }
	100% { background-position: 200% 0; }
}

.loading-info {
	display: flex;
	justify-content: space-between;
	color: #ddd;
	font-size: 14px;
	margin-top: 10px;
	margin-bottom: 20px;
}

.loading-text {
	font-weight: bold;
	text-transform: uppercase;
	letter-spacing: 1px;
	font-size: 12px;
	color: #00ccff;
}

.percentage {
	font-size: 16px;
	font-weight: bold;
	color: #ffffff;
	text-shadow: 0 0 10px rgba(0, 204, 255, 0.7);
}

.loading-tip {
	color: #aaa;
	font-style: italic;
	font-size: 12px;
	margin-top: 15px;
	min-height: 20px;
	text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
}

.game-title {
	font-size: 36px;
	font-weight: bold;
	color: white;
	text-shadow: 0 0 20px rgba(0, 150, 255, 0.8);
	margin-bottom: 10px;
	letter-spacing: 2px;
}

.game-subtitle {
	font-size: 14px;
	color: #00ccff;
	margin-bottom: 30px;
	letter-spacing: 1px;
}

.loading-dots {
	display: inline-block;
	margin-left: 5px;
}

.loading-dots::after {
	content: '...';
	animation: dots 1.5s infinite steps(4, end);
}

@keyframes dots {
	0%, 20% { content: '.'; }
	40% { content: '..'; }
	60%, 100% { content: '...'; }
}

#status-notice {
	display: none;
	background: rgba(91, 57, 67, 0.9);
	border-radius: 0.5rem;
	border: 1px solid #9b3943;
	color: #e0e0e0;
	font-family: 'Arial', sans-serif;
	line-height: 1.3;
	margin: 2rem;
	overflow: hidden;
	padding: 1.5rem;
	text-align: center;
	z-index: 1;
	backdrop-filter: blur(10px);
}

/* Responsive design */
@media (max-width: 768px) {
	#status-splash {
		max-width: 200px;
		max-height: 150px;
	}
	
	.game-title {
		font-size: 28px;
	}
	
	.progress-container {
		width: 95%;
	}
}

/* Fade out animation */
.fade-out {
	animation: fadeOut 0.5s ease forwards;
}

@keyframes fadeOut {
	from { opacity: 1; }
	to { opacity: 0; visibility: hidden; }
}
		</style>

<link rel="apple-touch-icon" href="index.apple-touch-icon.png"/>
 <script>
    var SDK_OPTIONS = {
      gameId: "uld6tyf7inegdrqfnx6w34vj3jqdtzv2",
      userId: "",
      sources: [
        "local"
      ],
      onEvent: function (event) {
        console.log("[GameMonetize SDK] Event received:", event.name, event);

        if (event.name === "SDK_READY") {
          console.log("[GameMonetize SDK] SDK is ready");
          window.isGameMonetizeReady = true;
          if (typeof window.godotSdkReady === "function") {
            window.godotSdkReady();
          }
        }

        if (event.name === "SDK_GAME_PAUSE") {
          console.log("[GameMonetize SDK] Game should PAUSE and MUTE audio");
          if (typeof window.godotPauseGame === "function") {
            window.godotPauseGame();
          }
        }

        if (event.name === "SDK_GAME_START" || event.name === "SDK_GAME_RESUME") {
          console.log("[GameMonetize SDK] Game should RESUME and UNMUTE audio");
          if (typeof window.godotResumeGame === "function") {
            window.godotResumeGame();
          }
        }

        if (event.name === "SDK_GAME_AD_START") {
          console.log("[GameMonetize SDK] Ad started");
          if (typeof window.godotAdCallback === "function") {
            window.godotAdCallback("start");
          }
        }

        if (event.name === "SDK_GAME_AD_END" || event.name === "SDK_GAME_AD_CLOSE") {
          console.log("[GameMonetize SDK] Ad ended/closed");
          if (typeof window.godotAdCallback === "function") {
            window.godotAdCallback("complete");
          }
        }
      }
    };
  </script>
  <script src="https://api.gamemonetize.com/sdk.js"></script>
	</head>
	<body>
		<canvas id="canvas">
			Your browser does not support the canvas tag.
		</canvas>

		<noscript>
			<div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: white; display: flex; justify-content: center; align-items: center; text-align: center; padding: 20px;">
				<div>
					<h2>JavaScript Required</h2>
					<p>Your browser does not support JavaScript or it is disabled.</p>
					<p>Please enable JavaScript to play this game.</p>
				</div>
			</div>
		</noscript>

		<div id="status">
			<div class="loading-container">
				<div class="game-title">NEON DIRECTIVE</div>
				<div class="game-subtitle">ARCADE PROTOCOL</div>
				
				<img id="status-splash" src="index.png" alt="Loading...">
				
				<div class="progress-container">
					<progress id="status-progress"></progress>
				</div>
				
				<div class="loading-info">
					<div class="loading-text">Loading resources<span class="loading-dots"></span></div>
					<div id="percentage" class="percentage">0%</div>
				</div>
				
				<div id="loading-tip" class="loading-tip">Initializing game engine...</div>
			</div>
			<div id="status-notice"></div>
		</div>

		<script src="index.js"></script>
		<script>
const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"ensureCrossOriginIsolationHeaders":false,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":61584976,"index.wasm":35376909},"focusCanvas":true,"gdextensionLibs":[]};
const GODOT_THREADS_ENABLED = false;
const engine = new Engine(GODOT_CONFIG);

(function () {
	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice = document.getElementById('status-notice');
	const percentageElement = document.getElementById('percentage');
	const loadingTipElement = document.getElementById('loading-tip');
	const loadingTextElement = document.querySelector('.loading-text');

	let initializing = true;
	let statusMode = '';

	// Loading tips in English
	const loadingTips = [
		"Initializing game engine...",
		"Loading game assets...",
		"Preparing levels...",
		"Compiling shaders...",
		"Loading textures...",
		"Setting up physics...",
		"Initializing audio system...",
		"Optimizing performance...",
		"Almost ready...",
		"Finalizing setup..."
	];

	let currentTipIndex = 0;

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) {
			return;
		}
		if (mode === 'hidden') {
			// Add fade out animation before removing
			statusOverlay.classList.add('fade-out');
			setTimeout(() => {
				statusOverlay.remove();
				initializing = false;
			}, 500);
			return;
		}
		statusOverlay.style.visibility = 'visible';
		statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) {
			statusNotice.removeChild(statusNotice.lastChild);
		}
		const lines = text.split('\n');
		lines.forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		console.error(err);
		if (err instanceof Error) {
			setStatusNotice(err.message);
		} else if (typeof err === 'string') {
			setStatusNotice(err);
		} else {
			setStatusNotice('An unknown error occurred');
		}
		setStatusMode('notice');
		initializing = false;
	}

	function updateLoadingTip(percentage) {
		// Change tip every 10% progress
		const tipIndex = Math.min(Math.floor(percentage / 10), loadingTips.length - 1);
		if (tipIndex !== currentTipIndex) {
			currentTipIndex = tipIndex;
			loadingTipElement.textContent = loadingTips[tipIndex];
		}
	}

	function updateLoadingText(percentage) {
		if (percentage < 30) {
			loadingTextElement.innerHTML = 'Loading core assets<span class="loading-dots"></span>';
		} else if (percentage < 70) {
			loadingTextElement.innerHTML = 'Loading game content<span class="loading-dots"></span>';
		} else {
			loadingTextElement.innerHTML = 'Finalizing<span class="loading-dots"></span>';
		}
	}

	const missing = Engine.getMissingFeatures({
		threads: GODOT_THREADS_ENABLED,
	});

	if (missing.length !== 0) {
		if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
			Promise.race([
				navigator.serviceWorker.getRegistration().then((registration) => {
					if (registration != null) {
						return Promise.reject(new Error('Service worker already exists.'));
					}
					return registration;
				}).then(() => engine.installServiceWorker()),
				new Promise((resolve) => {
					setTimeout(() => resolve(), 2000);
				}),
			]).catch((err) => {
				console.error('Error while registering service worker:', err);
			}).then(() => {
				window.location.reload();
			});
		} else {
			const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
			displayFailureNotice(missingMsg + missing.join('\n'));
		}
	} else {
		setStatusMode('progress');
		engine.startGame({
			'onProgress': function (current, total) {
				if (current > 0 && total > 0) {
					// Update progress bar
					statusProgress.value = current;
					statusProgress.max = total;
					
					// Calculate percentage
					const percentage = Math.round((current / total) * 100);
					
					// Update percentage display
					percentageElement.textContent = percentage + '%';
					
					// Update loading tip and text
					updateLoadingTip(percentage);
					updateLoadingText(percentage);
					
					// Add glow effect when near completion
					if (percentage > 90) {
						percentageElement.style.textShadow = '0 0 15px rgba(0, 204, 255, 1)';
					}
				} else {
					statusProgress.removeAttribute('value');
					statusProgress.removeAttribute('max');
				}
			},
		}).then(() => {
			setStatusMode('hidden');
		}, displayFailureNotice);
	}
}());
		</script>
	</body>
</html>
