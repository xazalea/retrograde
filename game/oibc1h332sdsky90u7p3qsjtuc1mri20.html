	<title>Crowd Evolution 3D</title>
	<style>
		@font-face {
			font-family: "Arial";
			src: url("rrzzhh.ttf");
		}

		* {
			margin: 0;
			padding: 0;
			overflow: hidden;
		}

		body {
			overflow: 'hidden';
			/* 页面背景颜色 */
			background: #AD9EE7
		}

		#unity-container {
			z-index: 1000;
			background: #AD9EE7;
			position: absolute;
			overflow: hidden;
		}

		#LoadingView {
			position: absolute;
			left: 50%;
			top: 50%;
			height: 100%;
			width: 100%;
			overflow: hidden;
			transform: translate(-50%, -50%);

			text-align: center;
		}

		#top-container {
			flex: 0;
			display: flex;
			flex-direction: column;
			align-items: center;
			/* 距离顶部位置 */
			margin-top: 10%;
		}

		#progress {
			flex: 0;
			display: flex;
			flex-direction: column;
			align-items: center;
			position: absolute;
			bottom: 10%;
		}

		div {
			text-align: center;
		}
	</style>
	


	
	<script type="text/javascript">
		window.SDK_OPTIONS = {
			gameId: "oibc1h332sdsky90u7p3qsjtuc1mri20",
			onEvent: function (a) {
				switch (a.name) {
					case "SDK_GAME_PAUSE":
						// pause game logic / mute audio
						Laya.timer.scale = 0;     // 暂停所有定时器
						Laya.SoundManager.stopAll();
						break;
					case "SDK_GAME_START":
						Laya.timer.scale = 1;     // 恢复定时器

						// advertisement done, resume game logic and unmute audio
						break;
					case "SDK_READY":
						// when sdk is ready
						StartGame();

						console.error("SDK_READY");
						break;
				}
			}
		};
		(function (a, b, c) {
			var d = a.getElementsByTagName(b)[0];
			a.getElementById(c) || (a = a.createElement(b), a.id = c, a.src = "https://api.gamemonetize.com/sdk.js", d.parentNode.insertBefore(a, d))
		})(document, "script", "gamemonetize-sdk"); 
	</script>
</head>

<body>


	<script>

		const keysToBlockWhenFramed = [32, 33, 34, 35, 36, 37, 38, 39, 40, 44];
		document.addEventListener('keydown', function (info) {
			if (window != window.top && keysToBlockWhenFramed.indexOf(info.which) > -1) {
				info.preventDefault();
				info.stopPropagation();
			}
		}, true)
		document.addEventListener("mousedown", function () {
			window.focus();
		}, true);
		document.addEventListener("touchstart", function () {
			window.focus();
		}, true);

		//游戏加载时关闭触控
		document.addEventListener('gesturestart', function (event) {
			event.preventDefault()
		})

		function StartGame(url) {
			var s = document.createElement('script');
			s.src = 'index.js';  // ← 如果你的入口不是 index.js，这里改掉
			s.async = false;
			document.body.appendChild(s);
		}
		function loadLib(url) {
			var script = document.createElement("script");
			script.async = false;
			script.src = url;
			document.body.appendChild(script);
		}
	</script>
	<!-- <script type="text/javascript" src="index.js"></script> -->

</body>

</html>
