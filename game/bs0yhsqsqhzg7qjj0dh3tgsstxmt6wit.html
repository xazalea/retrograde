<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
    <style>
        html {
            /* background-color: #051616; */
        }

        html,
        body {
            height: 100%;
            max-height: 100%;
            width: 100%;
            max-width: 100%;
            display: flex;
            background-image: url("assets/sprites/webp/bg_all.webp");
            flex-wrap: wrap;
            overflow: hidden;
            margin: 0;
        }

        #teststand {
            position: fixed;
            top: 0;
            left: 0;
        }

        #teststand_content.hidden {
            display: none;
        }

        #teststand_content select {
            padding-left: 5px;
            padding-right: 5px;
            margin-left: 5px;
            margin-right: 5px;
        }

        #teststand_content select option:checked+option,
        #teststand_content select option:checked+option+option {
            color: white;
            background-color: blue;
        }

        #teststand_content select option:disabled {
            color: red !important;
        }
        #root_debug {
            position: absolute;
        }
    </style>
    <script type="text/javascript">
        window.SDK_OPTIONS = {
            gameId: "bs0yhsqsqhzg7qjj0dh3tgsstxmt6wit",
            onEvent: function (a) {
                switch (a.name) {
                    case "SDK_GAME_PAUSE":
                    // pause game logic / mute audio
                    document.dispatchEvent(new CustomEvent("gamePause"));
                    break;
                    case "SDK_GAME_START":
                    // advertisement done, resume game logic and unmute audio
                    document.dispatchEvent(new CustomEvent("gameResume"));
                    break;
                    case "SDK_READY":
                    // when sdk is ready
                    break;
                }
            }
        };
        (function (a, b, c) {
        var d = a.getElementsByTagName(b)[0];
        a.getElementById(c) || (a = a.createElement(b), a.id = c, a.src = "https://api.gamemonetize.com/sdk.js", d.parentNode.insertBefore(a, d))
        })(document, "script", "gamemonetize-sdk"); 
    </script>
<body>
    <canvas id="root"></canvas>
    <div id="root_debug"></div>
    <script>
            var script = document.createElement("script");

            script.type = "text/javascript";
            script.src = `./app.js`;

            document.head.appendChild(script);
    </script>
</body>
</html>
