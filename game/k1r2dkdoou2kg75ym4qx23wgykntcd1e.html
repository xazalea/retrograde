<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />

        <title>Fun Memory</title>
        <link rel="stylesheet" href="style.css" />
        <link rel="icon" href="favicon.webp" type="image/webp">
    </head>
    
    <body>
        <script src="music.js"></script>
        <script src="sound.js"></script>
        
          
        <!--sdk для gamemonetize-->
        <script type="text/javascript">
            window.SDK_OPTIONS = {
                gameId: "k1r2dkdoou2kg75ym4qx23wgykntcd1e",
                onEvent: function (a) { 
                    switch (a.name) {
                         


                        case "SDK_GAME_PAUSE": 
                            window.gameMusic.pauseForAd(); // Музыка на паузу
                            window.gameSounds.stopAll();   // Эффекты на паузу
                            break;

                        case "SDK_GAME_START":
                            setTimeout(() => {
                                window.gameMusic.resumeAfterAd(); // Музыка играет, если была включена
                                window.gameSounds.resumeAll();   // Эффекты снова разрешены
                            }, 100);
                            break;
                            

                            break;
                        case "SDK_READY":
                            console.log("SDK is ready");
                        }
                    }
                };
            (function (a, b, c) {
                var d = a.getElementsByTagName(b)[0];
                a.getElementById(c) || (a = a.createElement(b), 
                a.id = c, a.src = "https://api.gamemonetize.com/sdk.js", 
                d.parentNode.insertBefore(a, d)) 
            })(document, "script", "gamemonetize-sdk"); 
        </script>
         
        <div id="game-container">
            <div id="game-conteiner_2">
                <div id="level-info">Level: 1</div> <!-- ето отвечает за уровень в игре -->
                <div id="menu-wrapper">
                    <div id="menu"></div> <!-- отвечает за кнопку виход в меню --> 
                    <div class="timer-container">
                        <img id="home-btn" src="home.webp" alt="Home" /> 
                        <div id="timer-display">01:00</div>
                    </div>
                </div>
            </div> 
            <div id="game-board"></div>
        </div>

        <script src="cards_position.js" defer></script> 
        <script src="orentesan.js" defer></script>
        <script src="main.js" defer></script>
