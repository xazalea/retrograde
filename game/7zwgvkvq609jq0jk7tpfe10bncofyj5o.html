    <style>
        :root {
            --xmas-red: #ef4444;
            --xmas-green: #15803d;
            --xmas-gold: #fbbf24;
            --xmas-dark: #05051a;
        }
        body {
            font-family: 'Quicksand', sans-serif;
            margin: 0;
            overflow: hidden;
            background: var(--xmas-dark);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            color: white;
        }
        .christmas-font { font-family: 'Mountains of Christmas', cursive; }
        
        .title-glow {
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.7), 
                         0 0 30px rgba(239, 68, 68, 0.4), 
                         0 0 45px rgba(239, 68, 68, 0.2);
        }

        canvas#snow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .view {
            display: none;
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100vh;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.4s ease-out;
        }
        .view.active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* Card Flip Styles */
        .card-container {
            perspective: 1000px;
        }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.5s;
            transform-style: preserve-3d;
        }
        .card-inner.flipped {
            transform: rotateY(180deg);
        }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.3);
        }
        .card-front {
            background: #1e3a8a;
            border: 3px solid white;
        }
        .card-back {
            background: white;
            border: 3px solid var(--xmas-gold);
            transform: rotateY(180deg);
        }
        .card-matched {
            opacity: 0.3;
            filter: grayscale(0.8);
            pointer-events: none;
        }

        .grid-layout { display: grid; gap: 0.75rem; }
        @media (min-width: 640px) { .grid-layout { gap: 1.5rem; } }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>

    <script>
        // --- GAME DATA ---
        const EMOJIS = ['🎅', '🦌', '⛄', '🎄', '🎁', '🍬', '🍫', '🤶', '🔔', '❄️', '🕯️', '🍪', '🧦', '🧣', '🏰', '🐧', '🐻'];
        const ROUNDS = [4, 6, 8, 10, 12, 16, 20];
        window.isGamePaused = false;

        // --- STATE ---
        let count = 1;
        let pList = [];
        let currIdx = 0;
        let level = 1;
        let cardList = [];
        let activeFlipped = [];
        let busy = false;
        let adAttempts = 0;

        // --- ADS INTEGRATION WITH ROBUST RETRY ---
        function requestAd() {
            const attempt = () => {
                const sdkInst = window.sdk;
                if (sdkInst && typeof sdkInst.showBanner === 'function') {
                    console.log("Triggering Interstitial Ad...");
                    sdkInst.showBanner();
                    adAttempts = 0; 
                } else if (adAttempts < 3) {
                    adAttempts++;
                    console.log(`SDK Interstitial Ad failed/not ready. Retry ${adAttempts}/3 in 1.2s...`);
                    setTimeout(attempt, 1200);
                } else {
                    console.warn("Max ad attempts reached. Proceeding...");
                    adAttempts = 0;
                }
            };
            attempt();
        }

        // --- LOGIC ---
        function switchView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'home-view') { level = 1; pList = []; }
            if(id === 'lobby-view') renderInputs();
        }

        function goToLobby() {
            // Ad removed from Home to Lobby transition as requested
            switchView('lobby-view');
        }

        function goToHome() {
            requestAd(); // Menu button Ad kept as per previous specific request
            switchView('home-view');
        }

        function setPlayerCount(n) {
            count = n;
            document.querySelectorAll('.player-count-btn').forEach(b => {
                const active = parseInt(b.dataset.count) === n;
                b.className = `player-count-btn w-12 h-12 rounded-xl font-black transition-all ${active ? 'bg-red-600 text-white shadow-lg scale-110' : 'bg-slate-100 text-slate-400 opacity-50'}`;
            });
            renderInputs();
        }

        function renderInputs() {
            const box = document.getElementById('player-inputs');
            box.innerHTML = '';
            for (let i = 0; i < count; i++) {
                const input = document.createElement('input');
                input.type = 'text';
                input.maxLength = 10;
                input.placeholder = `Player ${i + 1} Name...`;
                input.className = 'w-full p-4 rounded-xl bg-slate-50 border-2 border-slate-100 font-bold outline-none focus:border-green-500 mb-2 text-slate-800';
                input.id = `input-p-${i}`;
                box.appendChild(input);
            }
        }

        function startGame() {
            requestAd(); // Ads on 'LET'S GO!' button
            pList = [];
            for (let i = 0; i < count; i++) {
                const name = document.getElementById(`input-p-${i}`).value || `Player ${i + 1}`;
                pList.push({ id: i, name: name, score: 0 });
            }
            currIdx = 0;
            switchView('game-view');
            initLevel();
        }

        function nextLevel() {
            requestAd(); // Ads on 'NEXT LEVEL' button
            level++;
            pList.forEach(p => p.score = 0);
            currIdx = 0;
            switchView('game-view');
            initLevel();
        }

        function initLevel() {
            document.getElementById('lvl-num').innerText = level;
            const pairs = level <= ROUNDS.length ? ROUNDS[level-1] / 2 : 10;
            const symbols = [...EMOJIS].sort(() => Math.random() - 0.5).slice(0, pairs);
            const set = [...symbols, ...symbols].sort(() => Math.random() - 0.5);
            
            cardList = set.map((s, i) => ({ id: i, emoji: s, matched: false, flipped: false }));
            activeFlipped = [];
            busy = false;
            
            updateHUDs();
            renderBoard();
            notifyTurn();
        }

        function updateHUDs() {
            for (let i = 0; i < 4; i++) {
                const hud = document.getElementById(`p${i+1}-hud`);
                if (i < count) {
                    hud.classList.remove('hidden');
                    hud.querySelector('.hud-name').innerText = pList[i].name;
                    hud.querySelector('.hud-score').innerText = pList[i].score;
                    const active = (currIdx === i);
                    hud.className = `absolute w-24 sm:w-40 p-2 sm:p-4 rounded-3xl border-4 transition-all duration-500 ${hud.id.includes('1')?'top-4 left-4':hud.id.includes('2')?'top-4 right-4':hud.id.includes('3')?'bottom-4 left-4':'bottom-4 right-4'} ${active ? 'bg-yellow-400 border-white text-blue-950 scale-110 shadow-2xl z-50' : 'bg-red-900/40 border-white/10 text-white/60 scale-95 z-40'}`;
                } else {
                    hud.classList.add('hidden');
                }
            }
            document.getElementById('current-player-label').innerText = pList[currIdx].name;
        }

        function renderBoard() {
            const grid = document.getElementById('card-grid');
            grid.innerHTML = '';
            let colClass = cardList.length > 12 ? 'grid-cols-4 sm:grid-cols-5' : cardList.length > 8 ? 'grid-cols-3 sm:grid-cols-4' : 'grid-cols-2 sm:grid-cols-4';
            grid.className = `grid-layout ${colClass}`;

            cardList.forEach(c => {
                const wrap = document.createElement('div');
                wrap.className = `card-container w-16 h-16 sm:w-28 sm:h-28 cursor-pointer`;
                wrap.onclick = () => flipCard(c.id);
                wrap.innerHTML = `
                    <div id="card-${c.id}" class="card-inner ${c.flipped || c.matched ? 'flipped' : ''}">
                        <div class="card-face card-front"><span class="text-3xl sm:text-5xl opacity-30">❄️</span></div>
                        <div class="card-face card-back ${c.matched ? 'card-matched' : ''}">
                            <span class="text-3xl sm:text-6xl">${c.emoji}</span>
                            ${c.matched ? '<div class="absolute inset-0 flex items-center justify-center text-green-500 font-black text-4xl">✓</div>' : ''}
                        </div>
                    </div>
                `;
                grid.appendChild(wrap);
            });
        }

        function flipCard(id) {
            if (busy || window.isGamePaused || activeFlipped.includes(id) || cardList[id].matched) return;

            const el = document.getElementById(`card-${id}`);
            el.classList.add('flipped');
            cardList[id].flipped = true;
            activeFlipped.push(id);

            if (activeFlipped.length === 2) {
                busy = true;
                const [a, b] = activeFlipped;
                if (cardList[a].emoji === cardList[b].emoji) {
                    setTimeout(() => {
                        cardList[a].matched = true;
                        cardList[b].matched = true;
                        pList[currIdx].score++;
                        activeFlipped = [];
                        busy = false;
                        updateHUDs();
                        renderBoard();
                        checkEnd();
                    }, 500);
                } else {
                    setTimeout(() => {
                        document.getElementById(`card-${a}`).classList.remove('flipped');
                        document.getElementById(`card-${b}`).classList.remove('flipped');
                        cardList[a].flipped = false;
                        cardList[b].flipped = false;
                        activeFlipped = [];
                        currIdx = (currIdx + 1) % count;
                        updateHUDs();
                        notifyTurn();
                        busy = false;
                    }, 800);
                }
            }
        }

        function notifyTurn() {
            const overlay = document.getElementById('turn-overlay');
            const txt = document.getElementById('turn-text');
            txt.innerText = `${pList[currIdx].name}'s Turn!`;
            overlay.classList.replace('hidden', 'flex');
            setTimeout(() => overlay.classList.replace('flex', 'hidden'), 1000);
        }

        function checkEnd() {
            if (cardList.every(c => c.matched)) {
                setTimeout(() => {
                    renderRanks();
                    switchView('win-view');
                }, 800);
            }
        }

        function renderRanks() {
            const box = document.getElementById('rank-list');
            box.innerHTML = '';
            const sorted = [...pList].sort((a,b) => b.score - a.score);
            sorted.forEach((p, i) => {
                const div = document.createElement('div');
                div.className = `flex justify-between items-center p-4 rounded-2xl ${i===0?'bg-yellow-50 border-2 border-yellow-400 scale-105':'bg-slate-50'}`;
                div.innerHTML = `
                    <div class="flex items-center gap-3">
                        <span class="w-8 h-8 rounded-full bg-slate-800 text-white flex items-center justify-center font-black text-xs">${i+1}</span>
                        <span class="font-bold text-lg text-slate-800">${p.name}</span>
                    </div>
                    <span class="font-black text-xl text-red-600">${p.score}</span>
                `;
                box.appendChild(div);
            });
        }

        const canvas = document.getElementById('snow');
        const ctx = canvas.getContext('2d');
        let w, h, flakes = [];
        function initSnow() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            flakes = Array.from({length: 100}, () => ({ 
                x: Math.random()*w, y: Math.random()*h, r: Math.random()*3+1, v: Math.random()*1+0.5 
            }));
        }
        function drawSnow() {
            ctx.clearRect(0,0,w,h);
            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.beginPath();
            flakes.forEach(f => {
                ctx.moveTo(f.x, f.y);
                ctx.arc(f.x, f.y, f.r, 0, Math.PI*2);
                f.y += f.v; f.x += Math.sin(f.y/30);
                if (f.y > h) f.y = -10;
            });
            ctx.fill();
            requestAnimationFrame(drawSnow);
        }
        window.addEventListener('resize', initSnow);
        initSnow(); drawSnow();
        window.onload = () => { renderInputs(); };
    </script>
</body>
</html>
