    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/motion.css">

    <!-- GameMonetize SDK -->
    <script type="text/javascript">
        window.SDK_OPTIONS = {
            gameId: "71kap8r3c2kj9n5rl4xt89khiwf2kowt",
            onEvent: function (a) {
                switch (a.name) {
                    case "SDK_GAME_PAUSE":
                        // pause game logic / mute audio
                        window.dispatchEvent(new CustomEvent("GM_EVENT", { detail: { name: "SDK_GAME_PAUSE" } }));
                        break;
                    case "SDK_GAME_START":
                        // advertisement done, resume game logic and unmute audio
                        window.dispatchEvent(new CustomEvent("GM_EVENT", { detail: { name: "SDK_GAME_START" } }));
                        break;
                    case "SDK_READY":
                        // when sdk is ready
                        window.dispatchEvent(new CustomEvent("GM_EVENT", { detail: { name: "SDK_READY" } }));
                        break;
                    case "SDK_ERROR":
                        // when sdk get error
                        window.dispatchEvent(new CustomEvent("GM_EVENT", { detail: { name: "SDK_ERROR" } }));
                        break;
                }
            }
        };
        (function (a, b, c) {
            var d = a.getElementsByTagName(b)[0];
            a.getElementById(c) || (a = a.createElement(b), a.id = c, a.src = "https://api.gamemonetize.com/sdk.js", d.parentNode.insertBefore(a, d))
        })(document, "script", "gamemonetize-sdk");
    </script>
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>

        <!-- Flash Effect -->
        <div id="flash-overlay" class="flash-fx"></div>

        <!-- ERROR LOGGER -->
        <div id="error-log" style="position:fixed; top:0; left:0; width:100%; background:rgba(255,0,0,0.8); color:white; font-size:12px; z-index:9999; pointer-events:none; white-space:pre-wrap;"></div>

        <!-- REMOVED SETTINGS BAR FROM HERE -->

        <!-- HUD -->
        <div id="hud" class="hidden">
            <div class="hud-item hud-glass">
                <div class="hud-label">DISTANCE</div>
                <div class="hud-value" id="hud-score">0</div>
            </div>
            <div class="hud-item hud-glass">
                <div class="hud-label">SPEED</div>
                <div class="hud-value" id="hud-speed" style="color: var(--accent); text-shadow: 0 0 20px var(--accent-glow);">50</div>
            </div>
            <button id="btn-pause" class="hud-item hud-glass" style="margin-left: auto; pointer-events: auto; cursor: pointer; font-size: 1.5rem; padding: 0.5rem 1rem; border: none; color: var(--text);">
                ⏸
            </button>
        </div>

        <!-- Pause Screen -->
        <div id="screen-pause" class="screen hidden">
            <div class="card">
                <h1 style="font-size: 2.5rem;">PAUSED</h1>
                <button id="btn-resume" class="btn" style="width: 100%; margin: 1rem 0;">RESUME</button>
                <button id="btn-quit" class="btn btn-secondary" style="width: 100%;">QUIT TO MENU</button>
            </div>
        </div>

        <!-- Countdown Overlay -->
        <div id="countdown-overlay" class="screen hidden" style="background: rgba(0,0,0,0.2); z-index: 3000;">
            <div id="countdown-text" style="font-size: 8rem; font-weight: 900; color: #fff; text-shadow: 0 0 30px var(--accent);">3</div>
        </div>
        
        <!-- Ad Wait/Resume Overlay -->
        <div id="ad-overlay" class="screen hidden" style="background: #000; z-index: 2000; flex-direction: column;">
            <div id="ad-status-text" style="color: #fff; font-size: 1.5rem; margin-bottom: 2rem;">AD COMPLETED</div>
            <button id="btn-ad-resume" class="btn" style="background: #22c55e; transform: scale(1.2);">TAP TO RESUME</button>
        </div>

        <!-- Menu Screen -->
        <div id="screen-menu" class="screen hidden">
            <div class="card" style="max-width: 500px;">
                <h1 style="margin-bottom: 0.2rem;" class="glitch" data-text="MOMENTUM">MOMENTUM</h1>
                <p style="margin-bottom: 2rem; color: var(--text-muted); font-weight: 600; letter-spacing: 1px; font-size: 0.9rem;">REFLEX CHALLENGE</p>
                
                <div class="hud-label">BEST RUN: <span id="menu-best" style="color: var(--text); font-size: 1.2rem;">0</span></div>
                
                <button id="btn-play" class="btn" style="width: 100%; margin: 2rem 0;">TAP TO START</button>
                
                <button id="btn-settings" class="btn btn-secondary" style="width: 100%; margin-top: 0;">
                    <span style="font-size: 1.2rem;">⚙</span> SETTINGS
                </button>
            </div>
        </div>

        <!-- Settings & World Select Screen -->
        <div id="screen-settings" class="screen hidden">
            <div class="card" style="max-width: 600px; height: 85vh; justify-content: flex-start; padding-top: 1rem;">
                <h1 style="font-size: 2rem;">SETTINGS</h1>
                
                <!-- Toggles -->
                <div style="display: flex; gap: 1rem; margin-bottom: 2rem;">
                    <button id="btn-theme" class="toggle-btn">☀ Day</button>
                    <button id="btn-sound" class="toggle-btn">🔊 On</button>
                </div>

                <div class="hud-label" style="width: 100%; border-bottom: 1px solid var(--surface-border); padding-bottom: 0.5rem; margin-bottom: 1rem;">SELECT WORLD</div>
                
                <div id="world-list" class="world-container">
                    <!-- World Cards Injected via JS -->
                </div>
                
                <button id="btn-back-settings" class="btn btn-secondary" style="margin-top: auto;">BACK</button>
            </div>
        </div>

        <!-- Death/Win Screen -->
        <div id="screen-death" class="screen hidden">
            <div class="card">
                <h1 id="death-title" style="font-size: 2.5rem; color: var(--danger);">CRASHED</h1>
                <div class="hud-value" id="death-score" style="font-size: 4rem; margin: 1rem 0;">0</div>
                <div class="hud-label" id="death-msg">MOMENTUM LOST</div>
                
                <button id="btn-retry" class="btn">RETRY</button>
                <button id="btn-revive" class="btn" style="background: #22c55e; margin-top: 0.5rem;">📺 REVIVE AD</button>
                <button id="btn-home" class="btn btn-secondary" style="border: none; margin-top: 1rem;">MENU</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/main.js?v=6"></script>
</body>
</html>
