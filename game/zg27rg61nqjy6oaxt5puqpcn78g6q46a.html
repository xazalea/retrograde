    <style>
        :root {
            --primary-color: #5b21b6;
            --secondary-color: #9d34da;
            --accent-color: #0ea5e9;
            --background-start: #1e1b4b;
            --background-end: #312e81;
            --text-light: #f8fafc;
            --text-dark: #334155;
            --text-muted: #64748b;
            --card-bg: rgba(255, 255, 255, 0.7);
            --border-color: rgba(255, 255, 255, 0.2);
            --correct-color: #22c55e;
            --wrong-color: #ef4444;
            --font-family: 'Poppins', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* KUNCI RESPONSIVITAS 1: Mencegah scroll di body */
        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        body {
            font-family: var(--font-family);
            background: linear-gradient(135deg, var(--background-start), var(--background-end));
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        /* KUNCI RESPONSIVITAS 2: Container yang fleksibel */
        .container {
            width: 100%;
            max-width: 700px;
            height: 100%;
            max-height: 95vh; /* Tidak akan pernah lebih tinggi dari layar */
            background: var(--card-bg);
            border-radius: 24px;
            border: 1px solid var(--border-color);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            padding: 25px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            
            /* Mengatur layout internal dengan flexbox */
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Sembunyikan overflow dari container utama */
        }

        /* KUNCI RESPONSIVITAS 3: Wrapper konten dengan scroll internal */
        .screen-wrapper {
            overflow-y: auto; /* SCROLLBAR vertikal akan muncul DI SINI jika konten terlalu panjang */
            overflow-x: hidden;
            flex-grow: 1; /* Ambil semua sisa ruang vertikal */
            padding-right: 10px; 
            margin-right: -10px;
        }
        
        /* Custom Scrollbar */
        .screen-wrapper::-webkit-scrollbar { width: 8px; }
        .screen-wrapper::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 10px; }
        .screen-wrapper::-webkit-scrollbar-thumb { background: linear-gradient(var(--primary-color), var(--secondary-color)); border-radius: 10px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .question-card.fade-out {
            animation: fadeOut 0.4s ease-out forwards;
        }

        @keyframes fadeOut {
            from { opacity: 1; transform: scale(1); }
            to { opacity: 0; transform: scale(0.95); }
        }

        /* START SCREEN */
        .start-screen {
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
        }
        .start-title { font-size: 3em; font-weight: 700; color: var(--text-light); margin-bottom: 15px; }
        .start-description { font-size: 1em; color: #d1d5db; margin: 0 auto 30px auto; max-width: 550px; line-height: 1.6; }
        .start-button { background: linear-gradient(90deg, var(--accent-color), #38bdf8); color: white; border: none; padding: 16px 45px; border-radius: 50px; font-size: 1.2em; cursor: pointer; transition: all 0.3s ease; }
        .start-button:hover { transform: translateY(-5px); }

        /* QUIZ SCREEN */
        .header { text-align: center; margin-bottom: 20px; flex-shrink: 0; }
        .title { font-size: 2em; color: var(--text-light); }
        .score-section { display: flex; justify-content: space-around; margin-bottom: 20px; padding: 10px; background: rgba(0, 0, 0, 0.1); border-radius: 15px; color: var(--text-light); flex-shrink: 0; }
        .score-item { text-align: center; }
        .score-item span:first-child { font-size: 0.8em; opacity: 0.8; }
        .score-number { font-size: 1.8em; font-weight: 600; }
        .progress-bar { width: 100%; height: 10px; background: rgba(0, 0, 0, 0.2); border-radius: 10px; overflow: hidden; margin-bottom: 20px; flex-shrink: 0; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent-color), #38bdf8); border-radius: 10px; transition: width 0.4s ease-in-out; }
        
        .question-card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            animation: fadeIn 0.5s ease-out;
        }

        .category-badge { display: inline-block; background: linear-gradient(90deg, var(--primary-color), var(--secondary-color)); color: white; padding: 5px 14px; border-radius: 20px; font-size: 0.8em; margin-bottom: 12px; }
        .question-number { color: var(--text-muted); font-size: 0.9em; margin-bottom: 8px; }
        .question-text { font-size: 1.25em; font-weight: 600; color: var(--text-dark); margin-bottom: 20px; line-height: 1.5; }
        
        .options-container { display: grid; gap: 10px; }
        .option-button { width: 100%; text-align: left; background: #f1f5f9; border: 2px solid #e2e8f0; padding: 12px 18px; border-radius: 12px; font-size: 1em; color: var(--text-dark); cursor: pointer; transition: all 0.2s ease; }
        .option-button:not(.disabled):hover { transform: translateY(-2px); border-color: var(--accent-color); }
        .option-button.correct { background: var(--correct-color); border-color: var(--correct-color); color: white; font-weight: 600; }
        .option-button.wrong { background: var(--wrong-color); border-color: var(--wrong-color); color: white; font-weight: 600; }
        .option-button.disabled { cursor: not-allowed; opacity: 0.7; }

        /* RESULTS SCREEN */
        .results-card { text-align: center; padding: 40px 20px; background: white; border-radius: 20px; animation: fadeIn 0.6s ease-out; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; }
        .results-title { font-size: 2.5em; font-weight: 700; color: var(--text-dark); margin-bottom: 15px; }
        .results-score { font-size: 3em; color: var(--primary-color); margin-bottom: 15px; font-weight: 700; }
        .results-message { font-size: 1.15em; color: var(--text-muted); margin-bottom: 25px; }
        .control-button { background: linear-gradient(90deg, var(--primary-color), var(--secondary-color)); color: white; border: none; padding: 12px 35px; border-radius: 50px; font-size: 1em; cursor: pointer; transition: all 0.3s ease; }
        .control-button:hover { transform: translateY(-3px); }

        .hidden { display: none !important; }

        /* KUNCI RESPONSIVITAS 4: Media Query untuk layar kecil */
        @media (max-width: 600px) {
            body { padding: 0; }
            .container { height: 100%; max-height: 100vh; border-radius: 0; padding: 15px; }
            .screen-wrapper { padding-right: 5px; margin-right: -5px; }
            .start-title, .results-title { font-size: 2.2em; }
            .title { font-size: 1.8em; }
            .question-text { font-size: 1.1em; }
            .option-button { padding: 10px 15px; font-size: 0.95em; }
        }
    </style>
</head>

        const categories = {
            0: "🔬 Science", 30: "🔢 Mathematics", 50: "🌍 Geography", 70: "📚 History", 90: "📖 English", 110: "🎨 General Knowledge"
        };

        function initGame() {
            questions = shuffleArray([...questionsData]).slice(0, 20);
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function startQuiz() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('quizScreen').classList.remove('hidden');
            loadQuestion();
            showInterstitialAd();
        }

        function getCategory(index) {
            const originalIndex = questionsData.findIndex(q => q.text === questions[index].text);
            for (let catIndex of Object.keys(categories).sort((a, b) => b - a)) {
                if (originalIndex >= parseInt(catIndex)) return categories[catIndex];
            }
            return categories[0];
        }

        function loadQuestion() {
            if (currentQuestionIndex >= questions.length) {
                finishQuiz();
                return;
            }

            const questionCard = document.getElementById('questionCard');
            const question = questions[currentQuestionIndex];
            const category = getCategory(currentQuestionIndex);
            
            // Update UI Header
            document.getElementById('currentQuestion').textContent = currentQuestionIndex + 1;
            document.getElementById('score').textContent = score;
            document.getElementById('correctCount').textContent = correctAnswers;
            const progress = ((currentQuestionIndex) / questions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';

            // Bangun HTML untuk kartu pertanyaan
            let optionsHTML = '';
            question.options.forEach((option, index) => {
                optionsHTML += `<button class="option-button" onclick="selectAnswer(${index}, this)">${option}</button>`;
            });

            questionCard.innerHTML = `
                <div class="category-badge">${category}</div>
                <div class="question-number">Question ${currentQuestionIndex + 1} of ${questions.length}</div>
                <div class="question-text">${question.text}</div>
                <div class="options-container">${optionsHTML}</div>
            `;
            
            // Reset animasi
            questionCard.classList.remove('fade-out');
            questionCard.style.animation = 'fadeIn 0.5s ease-out';
            
            // Scroll ke atas jika kontennya panjang
            document.querySelector('#quizScreen .screen-wrapper').scrollTop = 0;
        }

        function selectAnswer(answerIndex, buttonElement) {
            const parentCard = buttonElement.closest('.question-card');
            if (parentCard.querySelector('.disabled')) return; // Sudah dijawab

            const question = questions[currentQuestionIndex];
            const isCorrect = answerIndex === question.correct;
            
            const buttons = parentCard.querySelectorAll('.option-button');
            buttons.forEach(btn => btn.classList.add('disabled'));

            if (isCorrect) {
                buttonElement.classList.add('correct');
                score += 10;
                correctAnswers++;
            } else {
                buttonElement.classList.add('wrong');
                buttons[question.correct].classList.add('correct'); // Tunjukkan jawaban yang benar
            }
            
            // Otomatis lanjut ke pertanyaan berikutnya
            setTimeout(() => {
                document.getElementById('questionCard').classList.add('fade-out');
            }, 1500);

            setTimeout(() => {
                currentQuestionIndex++;
                loadQuestion();
            }, 1900); // Harus lebih lama dari animasi fade-out
        }

        function finishQuiz() {
            document.getElementById('quizScreen').classList.add('hidden');
            document.getElementById('resultsScreen').classList.remove('hidden');

            const percentage = Math.round((correctAnswers / questions.length) * 100);
            document.getElementById('finalScore').textContent = `${correctAnswers}/${questions.length} (${percentage}%)`;

            let message = '';
            if (percentage >= 90) message = '🌟 Outstanding! You\'re a true scholar!';
            else if (percentage >= 70) message = '🎉 Excellent work!';
            else if (percentage >= 50) message = '👍 Good job! Keep practicing!';
            else message = '💪 Don\'t give up! Every attempt is a step forward!';
            document.getElementById('resultsMessage').textContent = message;
        }

        function restartQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            correctAnswers = 0;
            initGame(); // Acak pertanyaan lagi
            document.getElementById('resultsScreen').classList.add('hidden');
            document.getElementById('startScreen').classList.remove('hidden');
        }

        window.onload = initGame;

            }
