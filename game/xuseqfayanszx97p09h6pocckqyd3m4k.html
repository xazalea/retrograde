        window.SDK_OPTIONS = {
            gameId: "xuseqfayanszx97p09h6pocckqyd3m4k",
            onEvent: function (a) {
                switch (a.name) {
                    case "SDK_GAME_PAUSE":
                        // Pause game logic / mute audio
                        if (window.gameInstance) {
                            window.gameInstance.pauseForAd();
                        }
                        break;
                    case "SDK_GAME_START":
                        // Advertisement done, resume game logic and unmute audio
                        if (window.gameInstance) {
                            window.gameInstance.resumeAfterAd();

                        // When SDK is ready
                        console.log("GameMonetize SDK Ready");
                        break;
                }
            }
        };

<body>
    <div class="stars"></div>
    <div class="stars2"></div>
    <div class="stars3"></div>
    
    <div class="game-wrapper">
        <header class="game-header">
            <h1 class="game-title">
                <span class="title-magic">MAGIC</span>
                <span class="title-number">15</span>
                <span class="title-puzzle">PUZZLE</span>
            </h1>
        </header>

        <div class="game-container">
            <div class="game-board-section">
                <div class="board-wrapper">
                    <div id="game-board"></div>
                    <div class="board-glow"></div>
                </div>
                
                <div class="controls-section">
                    <button id="shuffle-button" class="btn btn-primary">
                        <span class="btn-icon">🔄</span>
                        <span class="btn-text">New Game</span>
                    </button>
                    <button id="toggle-music" class="btn btn-secondary">
                        <span class="btn-icon">🎵</span>
                        <span class="btn-text">Pause Music</span>
                    </button>
                </div>
            </div>

            <div class="stats-section">
                <div class="stats-card current-game">
                    <div class="card-header">
                        <h3>Current Game</h3>
                        <div class="card-icon">⚡</div>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-label">Time</div>
                            <div class="stat-value">
                                <span id="timer">0</span>
                                <span class="stat-unit">sec</span>
                            </div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">Moves</div>
                            <div class="stat-value">
                                <span id="moves">0</span>
                                <span class="stat-unit">moves</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="stats-card best-score">
                    <div class="card-header">
                        <h3>Best Score</h3>
                        <div class="card-icon">🏆</div>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-label">Time</div>
                            <div class="stat-value">
                                <span id="record-time">0</span>
                                <span class="stat-unit">sec</span>
                            </div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">Moves</div>
                            <div class="stat-value">
                                <span id="record-moves">0</span>
                                <span class="stat-unit">moves</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="win-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🎉 Congratulations! 🎉</h2>
            </div>
            <div class="modal-body">
                <p>You solved the puzzle!</p>
                <div class="modal-stats">
                    <div class="modal-stat">
                        <span class="modal-stat-label">Time:</span>
                        <span id="modal-time" class="modal-stat-value">0</span>
                    </div>
                    <div class="modal-stat">
                        <span class="modal-stat-label">Moves:</span>
                        <span id="modal-moves" class="modal-stat-value">0</span>
                    </div>
                </div>
                <div id="new-record" class="new-record">🏆 NEW RECORD! 🏆</div>
            </div>
            <div class="modal-footer">
                <button id="play-again" class="btn btn-primary">Play Again</button>
            </div>
        </div>
    </div>

    <script>
        // Prevent unwanted page scrolling
        window.addEventListener("keydown", (event) => {
            if (["ArrowUp", "ArrowDown", " "].includes(event.key)) {
                event.preventDefault();
            }
        });
        window.addEventListener("wheel", (event) => event.preventDefault(), {
            passive: false,
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
