    <title>Trishift</title>

    <style>
      :root {
        --safe-top: env(safe-area-inset-top, 0px);
        --safe-bottom: env(safe-area-inset-bottom, 0px);
        --safe-left: env(safe-area-inset-left, 0px);
        --safe-right: env(safe-area-inset-right, 0px);
      }
      
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #020617;
        font-family: system-ui, -apple-system, sans-serif;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        overscroll-behavior: none;
        position: fixed; /* Prevents pull-to-refresh and bounce on mobile */
      }
      
      #root {
        width: 100%;
        height: 100%;
        background-color: #020617;
        position: relative;
        overflow: hidden;
      }

      /* Robust Forced Landscape for Mobile Portrait Devices */
      @media (orientation: portrait) and (max-width: 1024px) {
        #root {
          width: 100vh;
          height: 100vw;
          transform: rotate(90deg);
          transform-origin: top left;
          position: fixed;
          top: 0;
          left: 100%;
        }
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      .animate-shimmer {
        animation: shimmer 3s infinite linear;
      }

      @keyframes laser-scan {
        0% { transform: translateY(-100%); opacity: 0; }
        50% { opacity: 0.5; }
        100% { transform: translateY(100%); opacity: 0; }
      }
      .animate-laser {
        animation: laser-scan 3s infinite ease-in-out;
      }

      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        20%, 60% { transform: translateX(-4px); }
        40%, 80% { transform: translateX(4px); }
      }
      .animate-shake {
        animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
      }

      @keyframes glitch {
        0% { transform: translate(0); text-shadow: none; }
        20% { transform: translate(-2px, 1px); text-shadow: 2px 0 #ff00c1, -2px 0 #00fff9; }
        40% { transform: translate(-2px, -1px); text-shadow: -2px 0 #ff00c1, 2px 0 #00fff9; }
        60% { transform: translate(2px, 1px); text-shadow: 2px 0 #ff00c1, -2px 0 #00fff9; }
        80% { transform: translate(2px, -1px); text-shadow: -2px 0 #ff00c1, 2px 0 #00fff9; }
        100% { transform: translate(0); text-shadow: none; }
      }
      .group:hover .animate-glitch {
        animation: glitch 0.3s infinite;
      }

      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      .animate-float {
        animation: float 2.5s ease-in-out infinite;
      }

      @keyframes data-rise {
        0% { transform: translateY(100%) scale(0); opacity: 0; }
        50% { opacity: 0.8; }
        100% { transform: translateY(-200%) scale(1.5); opacity: 0; }
      }
      .data-bit {
        position: absolute;
        width: 4px;
        height: 4px;
        background: #06b6d4;
        pointer-events: none;
        opacity: 0;
      }
      .group:hover .data-bit {
        animation: data-rise 1.5s infinite linear;
      }
    </style>
