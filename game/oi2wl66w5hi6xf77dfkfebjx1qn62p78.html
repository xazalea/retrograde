  <script type="text/javascript">
     function setGameMute(isMuted) {
        const audios = document.querySelectorAll('audio, video');
        audios.forEach(audio => {
           audio.muted = isMuted;
           if (isMuted) {
              audio.pause(); 
           } else {
              audio.play().catch(() => {}); 
           }
        });
     }

     window.SDK_OPTIONS = {
        gameId: "oi2wl66w5hi6xf77dfkfebjx1qn62p78",
        onEvent: function (a) {
           switch (a.name) {
              case "SDK_GAME_PAUSE":
                 setGameMute(true); 
                 console.log("Game Muted");
                 break;
              case "SDK_GAME_START":
                 setGameMute(false); 
                 console.log("Game Unmuted");
                 break;
              case "SDK_READY":
                 console.log("SDK is ready");
                 break;
           }
        }
     };

     (function (a, b, c) {
        var d = a.getElementsByTagName(b)[0];
        if (!a.getElementById(c)) {
           var s = a.createElement(b);
           s.id = c;
           s.src = "https://api.gamemonetize.com/sdk.js";
           d.parentNode.insertBefore(s, d);
        }
     })(document, "script", "gamemonetize-sdk");

     function showAd() {
        if (typeof sdk !== 'undefined' && sdk.showBanner !== undefined) {
           sdk.showBanner();
        }
     }
  </script>
