<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Ninja Obby Parkour</title>
    <style>
        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            padding: 0; margin: 0;
            background-color: black;
        }
        div#gameContainer {
            background: transparent !important;
            position: absolute;
            top: 0px; left: 0px;
            width: 100% !important;
            height: 100% !important;
            display: none;
        }
        div#gameContainer canvas {
            width: 100% !important;
            height: 100% !important;
        }
        .loadingOut {
            width: 250px;
            position: fixed;
            left: 50%; top: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid white;
            height: 14px;
            z-index: 10;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: white;
        }
        #playScreen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url("https://cdn.jsdelivr.net/gh/netclassroom/664x@main/Build/Build.jpg");
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        #playScreen h1 {
            color: white;
            font-size: 2.5em;
            font-family: Arial, sans-serif;
            text-shadow: 2px 2px 8px black;
            margin-bottom: 30px;
        }
        #playBtn {
            padding: 18px 60px;
            font-size: 1.5em;
            font-family: Arial, sans-serif;
            background: #ff6600;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: background 0.2s, transform 0.1s;
        }
        #playBtn:hover { background: #e05500; transform: scale(1.05); }
        #playBtn:active { transform: scale(0.98); }
        #playBtn:disabled { background: #888; cursor: not-allowed; transform: none; }
        #sdkStatus {
            color: rgba(255,255,255,0.6);
            font-family: Arial, sans-serif;
            font-size: 0.85em;
            margin-top: 15px;
        }
    </style>

    <!-- GameMonetize SDK -->
    <script type="text/javascript">
        window.SDK_OPTIONS = {
            gameId: "4x8w3579mcw0j8n4yxu7c05a3ws5k72n",
            onEvent: function (a) {
                switch (a.name) {
                    case "SDK_GAME_PAUSE":
                        break;
                    case "SDK_GAME_START":
                        onAdFinished();
                        break;
                    case "SDK_READY":
                        console.log("SDK Ready");
                        onSdkReady();
                        break;
                    case "SDK_ERROR":
                        console.log("SDK Error");
                        onAdFinished();
                        break;
                }
            }
        };
        (function (a, b, c) {
            var d = a.getElementsByTagName(b)[0];
            a.getElementById(c) || (a = a.createElement(b), a.id = c, a.src = "https://api.gamemonetize.com/sdk.js", d.parentNode.insertBefore(a, d))
        })(document, "script", "gamemonetize-sdk");
    </script>
</head>
<body>

    <div id="playScreen">
        <h1>Ninja Obby Parkour</h1>
        <button id="playBtn" disabled onclick="onPlayClicked()">&#9654; PLAY</button>
        <div id="sdkStatus">Loading...</div>
    </div>

    <div id="gameContainer">
        <div class="loadingOut" id="loadingBox">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <canvas id="unity-canvas" data-pixel-art="false"></canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/netclassroom/664x@main/Build/NinjaObbyParkourV3_H5.loader.js"></script>

    <script>
        var gameLoaded = false;
        var adShownOnLoad = false;

        var canvas = document.querySelector("#unity-canvas");
        var progressBar = document.querySelector("#progress-bar");
        var loadingBox = document.querySelector("#loadingBox");
        var gameContainer = document.querySelector("#gameContainer");
        var playScreen = document.querySelector("#playScreen");
        var playBtn = document.querySelector("#playBtn");
        var sdkStatus = document.querySelector("#sdkStatus");

        function onSdkReady() {
            playBtn.disabled = false;
            sdkStatus.textContent = "Ready!";
        }

        function onPlayClicked() {
            playBtn.disabled = true;
            playBtn.textContent = "Loading Ad...";
            sdkStatus.textContent = "";
            if (typeof sdk !== 'undefined' && sdk.showBanner !== 'undefined') {
                sdk.showBanner();
            } else {
                onAdFinished();
            }
        }

        function onAdFinished() {
            playScreen.style.display = "none";
            gameContainer.style.display = "block";
            if (!gameLoaded) {
                loadUnity();
            }
        }

        function loadUnity() {
            gameLoaded = true;
            var config = {
                frameworkUrl: "https://cdn.jsdelivr.net/gh/netclassroom/664x@main/Build/NinjaObbyParkourV3_H5.framework.js.unityweb",
                codeUrl: "https://cdn.jsdelivr.net/gh/netclassroom/664x@main/Build/NinjaObbyParkourV3_H5.wasm.unityweb",
                streamingAssetsUrl: "StreamingAssets",
                companyName: "GameVGames",
                productName: "Ninja Obby Parkour",
                productVersion: "0.1.0",
            };
            (async () => {
                try {
                    const partUrls = [
                        "https://cdn.jsdelivr.net/gh/netclassroom/664x@main/Build/NinjaObbyParkourV3_H5.data.unityweb.part000",
                        "https://cdn.jsdelivr.net/gh/netclassroom/664x@main/Build/NinjaObbyParkourV3_H5.data.unityweb.part001",
                        "https://cdn.jsdelivr.net/gh/netclassroom/664x@main/Build/NinjaObbyParkourV3_H5.data.unityweb.part002"
                    ];
                    const parts = [];
                    for (const url of partUrls) {
                        const response = await fetch(url);
                        parts.push(await response.arrayBuffer());
                    }
                    const totalLength = parts.reduce((acc, b) => acc + b.byteLength, 0);
                    const combined = new Uint8Array(totalLength);
                    let offset = 0;
                    for (const part of parts) {
                        combined.set(new Uint8Array(part), offset);
                        offset += part.byteLength;
                    }
                    config.dataUrl = URL.createObjectURL(new Blob([combined]));
                    createUnityInstance(canvas, config, function(progress) {
                        progressBar.style.width = (progress * 100) + '%';
                    }).then((unityInstance) => {
                        loadingBox.style.display = "none";
                        if (!adShownOnLoad) {
                            adShownOnLoad = true;
                            if (typeof sdk !== 'undefined' && sdk.showBanner !== 'undefined') {
                                sdk.showBanner();
                            }
                        }
                    });
                } catch (err) {
                    console.error("Unity Load Error:", err);
                }
            })();
        }

        function CallInterstitialAdsJs() {
            if (typeof sdk !== 'undefined' && sdk.showBanner !== 'undefined') {
                sdk.showBanner();
            }
        }
        function CallRewardedAdsJs() {
            if (typeof sdk !== 'undefined' && sdk.showBanner !== 'undefined') {
                sdk.showBanner();
            }
        }
        function InitSDKJs() {}
        function LoadRewardedAdsJs() {}

        window.addEventListener('resize', () => {
            canvas.style.width = window.innerWidth + "px";
            canvas.style.height = window.innerHeight + "px";
        });
    </script>
</body>
</html>
