  <script>
    let sdkInitialized = false;
    let sdkReady = false;
    
    function initializeSDK() {
      if (sdkInitialized) return;
      sdkInitialized = true;
      
      window.SDK_OPTIONS = {
        "gameId": "m4scm9dora4j56myxv3gxx16vi2drpw9",
        "advertisementSettings": {
          "autoplay": false
        },
        "onEvent": function(event) {
          switch (event.name) {
            case "SDK_GAME_START":
              console.log("GameMonetize: Game started");
              break;
            case "SDK_GAME_PAUSE":
              console.log("GameMonetize: Game paused");
              break;
            case "SDK_READY":
              console.log("GameMonetize: SDK ready");
              sdkReady = true;
              // Exibir banner quando SDK estiver pronto
              showGameMonetizeBanner();
              break;
            case "SDK_ERROR":
              console.log("GameMonetize: SDK error", event);
              break;
          }
        }
      };
      
      (function(d, s, id) {
        var js, fjs = d.getElementsByTagName(s)[0];
        if (d.getElementById(id)) return;
        js = d.createElement(s);
        js.id = id;
        js.src = 'https://api.gamemonetize.com/sdk.js';
        fjs.parentNode.insertBefore(js, fjs);
      }(document, 'script', 'gamemonetize-sdk'));
    }
    
    window.showGameMonetizeAd = function() {
      if (typeof window.sdk !== 'undefined' && window.sdk.play) {
        try {
          window.sdk.play();
        } catch(e) {
          console.log("GameMonetize: Error showing ad", e);
        }
      } else {
        setTimeout(function() {
          if (typeof window.sdk !== 'undefined' && window.sdk.play) {
            try {
              window.sdk.play();
            } catch(e) {
              console.log("GameMonetize: Error showing ad (retry)", e);
            }
          }
        }, 500);
      }
    };
    
    window.showGameMonetizeBanner = function() {
      if (typeof window.sdk !== 'undefined' && window.sdk.showBanner) {
        try {
          window.sdk.showBanner();
        } catch(e) {
          console.log("GameMonetize: Error showing banner", e);
        }
      } else {
        setTimeout(function() {
          if (typeof window.sdk !== 'undefined' && window.sdk.showBanner) {
            try {
              window.sdk.showBanner();
            } catch(e) {
              console.log("GameMonetize: Error showing banner (retry)", e);
            }
          }
        }, 500);
      }
    };
    
    function ensureAdsOnTop() {
      const observer = new MutationObserver(function(mutations) {
        mutations.forEach(function(mutation) {
          mutation.addedNodes.forEach(function(node) {
            if (node.nodeType === 1) { // Element node
              if (node.tagName === 'IFRAME') {
                const src = node.src || node.getAttribute('src') || '';
                if (src.includes('gamemonetize') || src.includes('adsense') || 
                    src.includes('googleads') || src.includes('doubleclick')) {
                  node.style.position = 'fixed';
                  node.style.top = '0';
                  node.style.left = '0';
                  node.style.width = '100vw';
                  node.style.height = '100vh';
                  node.style.zIndex = '999999';
                  node.style.backgroundColor = 'rgba(0, 0, 0, 0.9)';
                }
              }
              
              const id = node.id || '';
              const className = node.className || '';
              if (id.includes('gamemonetize') || id.includes('adsense') || 
                  id.includes('google_ads') || className.includes('gamemonetize') || 
                  className.includes('adsense') || className.includes('ad-container')) {
                node.style.position = 'fixed';
                node.style.top = '0';
                node.style.left = '0';
                node.style.width = '100vw';
                node.style.height = '100vh';
                node.style.zIndex = '999999';
                node.style.backgroundColor = 'rgba(0, 0, 0, 0.9)';
              }
              
              const iframes = node.querySelectorAll ? node.querySelectorAll('iframe') : [];
              iframes.forEach(function(iframe) {
                const src = iframe.src || iframe.getAttribute('src') || '';
                if (src.includes('gamemonetize') || src.includes('adsense') || 
                    src.includes('googleads') || src.includes('doubleclick')) {
                  iframe.style.position = 'fixed';
                  iframe.style.top = '0';
                  iframe.style.left = '0';
                  iframe.style.width = '100vw';
                  iframe.style.height = '100vh';
                  iframe.style.zIndex = '999999';
                  
                  let parent = iframe.parentElement;
                  while (parent && parent !== document.body) {
                    parent.style.position = 'fixed';
                    parent.style.top = '0';
                    parent.style.left = '0';
                    parent.style.width = '100vw';
                    parent.style.height = '100vh';
                    parent.style.zIndex = '999999';
                    parent.style.backgroundColor = 'rgba(0, 0, 0, 0.9)';
                    parent = parent.parentElement;
                  }
                }
              });
            }
          });
        });
      });
      
      observer.observe(document.body, {
        childList: true,
        subtree: true
      });
      
      setInterval(function() {
        const allIframes = document.querySelectorAll('iframe');
        allIframes.forEach(function(iframe) {
          const src = iframe.src || iframe.getAttribute('src') || '';
          if (src.includes('gamemonetize') || src.includes('adsense') || 
              src.includes('googleads') || src.includes('doubleclick')) {
            iframe.style.position = 'fixed';
            iframe.style.top = '0';
            iframe.style.left = '0';
            iframe.style.width = '100vw';
            iframe.style.height = '100vh';
            iframe.style.zIndex = '999999';
            
            let parent = iframe.parentElement;
            while (parent && parent !== document.body) {
              parent.style.position = 'fixed';
              parent.style.top = '0';
              parent.style.left = '0';
              parent.style.width = '100vw';
              parent.style.height = '100vh';
              parent.style.zIndex = '999999';
              parent.style.backgroundColor = 'rgba(0, 0, 0, 0.9)';
              parent = parent.parentElement;
            }
          }
        });
      }, 500);
    }

  <script>
    // Controle do Menu Inicial
    const startMenu = document.getElementById('startMenu');
    const startButton = document.getElementById('startButton');
    const mainWrapper = document.querySelector('.mainWrapper');

    // Inicialmente, esconder o jogo até o menu ser fechado
    if (mainWrapper) {
      mainWrapper.style.opacity = '0';
      mainWrapper.style.pointerEvents = 'none';
    }

    function startGame() {
      // Inicializar SDK e anúncios apenas quando o jogo começar
      if (typeof initializeSDK === 'function') {
        initializeSDK();
      }
      if (typeof ensureAdsOnTop === 'function') {
        ensureAdsOnTop();
      }
      
      startMenu.classList.add('hidden');
      if (mainWrapper) {
        setTimeout(() => {
          mainWrapper.style.opacity = '1';
          mainWrapper.style.pointerEvents = 'auto';
        }, 500);
      }
    }

    startButton.addEventListener('click', startGame);

    // Permitir iniciar com Enter também
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !startMenu.classList.contains('hidden')) {
        startGame();
      }
    });
  </script>

  <script>
    // Animação de círculo demonstrativo (apenas primeira tentativa)
    (function() {
      let showDemoCircle = true;
      let demoAnimationId = null;
      let demoProgress = 0;
      let mainCanvas, demoCanvas, demoCtx;
      let userHasStarted = false;
      
      function syncCanvasSize() {
        if (!mainCanvas || !demoCanvas) return;
        
        // Sincronizar tamanhos
        const rect = mainCanvas.getBoundingClientRect();
        const scale = window.devicePixelRatio || 1;
        
        demoCanvas.width = mainCanvas.width;
        demoCanvas.height = mainCanvas.height;
        demoCanvas.style.width = rect.width + 'px';
        demoCanvas.style.height = rect.height + 'px';
        
        // Posicionar sobre o canvas principal
        const wrapper = mainCanvas.parentElement;
        if (wrapper) {
          const wrapperRect = wrapper.getBoundingClientRect();
          const canvasRect = mainCanvas.getBoundingClientRect();
          demoCanvas.style.position = 'absolute';
          demoCanvas.style.top = (canvasRect.top - wrapperRect.top) + 'px';
          demoCanvas.style.left = (canvasRect.left - wrapperRect.left) + 'px';
        }
      }
      
      function drawDemoCircle() {
        if (!showDemoCircle || !demoCanvas || !demoCtx || userHasStarted) {
          return;
        }
        
        syncCanvasSize();
        
        const scale = window.devicePixelRatio || 1;
        const displayWidth = demoCanvas.width / scale;
        const displayHeight = demoCanvas.height / scale;
        const centerX = displayWidth / 2;
        const centerY = displayHeight / 2;
        const radius = Math.min(displayWidth, displayHeight) * 0.35;
        
        // Limpar canvas de demo
        demoCtx.clearRect(0, 0, demoCanvas.width, demoCanvas.height);
        
        // Desenhar círculo progressivamente
        demoCtx.save();
        demoCtx.setTransform(1, 0, 0, 1, 0, 0);
        demoCtx.scale(scale, scale);
        
        demoCtx.strokeStyle = '#000000';
        demoCtx.lineWidth = 3;
        demoCtx.lineCap = 'round';
        demoCtx.lineJoin = 'round';
        demoCtx.setLineDash([8, 4]);
        
        demoCtx.beginPath();
        const endAngle = (demoProgress / 100) * Math.PI * 2;
        demoCtx.arc(centerX, centerY, radius, 0, endAngle, false);
        demoCtx.stroke();
        
        // Desenhar ponto inicial
        if (demoProgress > 2) {
          demoCtx.setLineDash([]);
          demoCtx.fillStyle = '#000000';
          demoCtx.beginPath();
          demoCtx.arc(centerX + radius, centerY, 5, 0, Math.PI * 2);
          demoCtx.fill();
        }
        
        demoCtx.restore();
        
        // Incrementar progresso
        demoProgress += 1.2;
        if (demoProgress >= 100) {
          demoProgress = 0;
        }
      }
      
      function startAnimation() {
        if (!showDemoCircle || userHasStarted || !demoCanvas || !demoCtx) {
          return;
        }
        
        function animate() {
          if (!showDemoCircle || userHasStarted) {
            if (demoAnimationId) {
              cancelAnimationFrame(demoAnimationId);
              demoAnimationId = null;
            }
            if (demoCanvas) {
              demoCtx.clearRect(0, 0, demoCanvas.width, demoCanvas.height);
            }
            return;
          }
          
          // Desenhar animação
          drawDemoCircle();
          
          // Continuar animação
          demoAnimationId = requestAnimationFrame(animate);
        }
        
        animate();
      }
      
      function integrateDemoAnimation() {
        mainCanvas = document.getElementById('drawingCanvas');
        demoCanvas = document.getElementById('demoCanvas');
        
        if (!mainCanvas || !demoCanvas) {
          setTimeout(integrateDemoAnimation, 50);
          return;
        }
        
        demoCtx = demoCanvas.getContext('2d');
        syncCanvasSize();
        
        // Observar mudanças de tamanho do canvas principal
        if (typeof ResizeObserver !== 'undefined') {
          const resizeObserver = new ResizeObserver(() => {
            syncCanvasSize();
          });
          resizeObserver.observe(mainCanvas);
        }
        
        // Também observar mudanças na janela
        window.addEventListener('resize', syncCanvasSize);
        
        // Sincronizar periodicamente para garantir
        const syncInterval = setInterval(() => {
          if (userHasStarted) {
            clearInterval(syncInterval);
          } else {
            syncCanvasSize();
          }
        }, 100);
        
        // Interceptar eventos para parar animação quando usuário começar
        const stopDemoOnStart = (e) => {
          userHasStarted = true;
          showDemoCircle = false;
          if (demoAnimationId) {
            cancelAnimationFrame(demoAnimationId);
            demoAnimationId = null;
          }
          if (demoCanvas && demoCtx) {
            demoCtx.clearRect(0, 0, demoCanvas.width, demoCanvas.height);
          }
        };
        
        // Adicionar listeners com capture para interceptar antes dos outros
        mainCanvas.addEventListener('mousedown', stopDemoOnStart, { capture: true });
        mainCanvas.addEventListener('touchstart', stopDemoOnStart, { passive: false, capture: true });
        
        // Aguardar o jogo estar pronto e então iniciar animação
        function waitForGameReady() {
          const wrapper = document.querySelector('.mainWrapper');
          const isVisible = wrapper && (wrapper.style.opacity === '1' || wrapper.style.opacity === '' || !wrapper.style.opacity);
          
          if (isVisible) {
            setTimeout(() => {
              startAnimation();
            }, 1000);
          } else {
            setTimeout(waitForGameReady, 200);
          }
        }
        
        // Aguardar scripts carregarem e jogo estar pronto
        setTimeout(waitForGameReady, 600);
      }
      
      // Aguardar scripts carregarem
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => {
          setTimeout(integrateDemoAnimation, 400);
        });
      } else {
        setTimeout(integrateDemoAnimation, 400);
      }
    })();
  </script>

</body>
