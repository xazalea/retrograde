<!DOCTYPE html>
<html lang="en-us">

<head>
    <meta charset="utf-8">
    <title>Super Doctor Bros Mano </title>
    <script>
        var Module = {};
    </script>
    <script src="Build/UnityLoader.js"></script>
    <script src="TemplateData/jquery-3.5.0.min.js"></script>
    <script src="TemplateData/progress.js"></script>
    <link rel="stylesheet" href="TemplateData/animate.css">

    <script>
        var gameInstance = UnityLoader.instantiate("gameContainer", "Build/m9.json", {
            onProgress: UnityProgress
        });
        var scaleToFit;
        try {
            scaleToFit = !!JSON.parse("");
        } catch (e) {
            scaleToFit = true;
        }

        window.onresize = function () {
            var canvas = gameInstance.Module.canvas;
            var container = gameInstance.container;
            var w, h;

            if (scaleToFit) {
                w = window.innerWidth;
                h = window.innerHeight;

                var r = 16 / 9; // Landscape ratio

                if (w / h > r) {
                    w = Math.floor(h * r);
                } else {
                    h = Math.floor(w / r);
                }
            } else {
                w = 1920;
                h = 1080;
            }

            container.style.width = canvas.style.width = w + "px";
            container.style.height = canvas.style.height = h + "px";
            container.style.top = Math.floor((window.innerHeight - h) / 2) + "px";
            container.style.left = Math.floor((window.innerWidth - w) / 2) + "px";
        };

        window.FFFF = function () {
            var gameInstance = UnityLoader.instantiate("gameContainer", "Build/m9.json", {
                onProgress: UnityProgress
            });
        };
    </script>

    <style>
        html, body {
            background: #000;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        #orientation {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url('TemplateData/images/orientation.jpg');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            background-color: #000;
            z-index: 999;
            display: none;
        }

        #gameContainer {
            position: absolute;
            background: transparent !important;
        }

        #gameContainer canvas {
            position: absolute;
            image-rendering: optimizeSpeed;
            image-rendering: -webkit-crisp-edges;
            image-rendering: -moz-crisp-edges;
            image-rendering: -o-crisp-edges;
            image-rendering: crisp-edges;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: pixelated;
            -ms-interpolation-mode: nearest-neighbor;
        }

        #loadingBox {
            width: 100%;
            height: 80%;
            position: absolute;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
        }

        #blurBackground {
            background: url(TemplateData/images/gamelogo.png);
            filter: blur(20px);
            width: 100vw;
            height: 100vh;
            position: absolute;
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
        }

        #bgBar {
            width: 200px;
            height: 22px;
            background-color: #2f2f2f;
            border-radius: 10px;
        }

        #progressBar {
            width: 0px;
            height: 22px;
            background: linear-gradient(to right, #ff7400 0%, #ffc700 100%);
            border-radius: 10px;
            transition: all 1s;
        }

        #loadingInfo {
            color: #fff;
            font-family: "arial", sans-serif;
            text-transform: uppercase;
            font-size: 14px;
            margin-top: 10px;
        }

        #gameLogo img {
            width: 25vh;
            border-radius: 20px;
        }

        #gameTitle {
            font-family: "arial";
            font-size: 20px;
            font-weight: bold;
            color: #ffffff;
            text-transform: uppercase;
            text-shadow: 0 0 10px #ffffff, 2px 2px 2px rgb(27, 99, 245);
        }

        #studioLogo img {
            height: 100px;
        }

        #gameContainer.hide {
            display: none;
        }
    </style>
</head>

<body onload="window.onresize();">
    <div id="blurBackground"></div>
    <div id="orientation"></div>

    <div id="loadingBox">
        <a id="gameLogo" class="animated zoomIn noselect" target="_blank">
            <img src="TemplateData/images/gamelogo.png" alt="Logo">
            <p id="gameTitle"></p>
        </a>

        <div id="loadingSection">
            <div id="bgBar">
                <div id="progressBar"></div>
            </div>
            <p id="loadingInfo">Loading...</p>
        </div>

        <a id="studioLogo" class="animated fadeIn noselect" target="_blank">
            <img src="TemplateData/images/studiologo.png" alt="Studio Logo">
        </a>
    </div>

    <div id="gameContainer" style="width: 960px; height: 540px;"></div>

    <script>
        function isMobileDevice() {
            return /android|iphone|ipad|ipod|iemobile|blackberry|bada/i.test(navigator.userAgent);
        }

        if (isMobileDevice()) {
            const setOrientation = () => {
                document.getElementById("orientation").style.display = (window.orientation === 90 || window.orientation === -90) ? "none" : "block";
            };

            window.addEventListener("orientationchange", () => {
                setOrientation();
                window.FFFF();
            });

            setOrientation();
            window.setTimeout(() => {
                setOrientation();
                window.FFFF();
            }, 1000);
        }
    </script>
</body>

</html>
