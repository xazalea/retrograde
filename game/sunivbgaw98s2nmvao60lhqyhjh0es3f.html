	  function GetFlags() {
        return new Promise((resolve) => {
		// Mock data that mimics Yandex SDK's flag structure
		const mockFlags = {
		  "new_year_event": true,
		  "summer_sale": false,
		  "ab_test_variant": "B",
		  "double_rewards_weekend": true,
		  "premium_promo": false,
		  "mobile_optimized": true,
		  "high_performance_mode": false
		};

		// Convert to same format as Yandex SDK response
		let names = [];
		let values = [];

		for (let key in mockFlags) {
		  if (mockFlags.hasOwnProperty(key)) {
			names.push(key);
			values.push(mockFlags[key]);
		  }
		}

		const jsonFlags = {
		  names: names,
		  values: values
		};

		// Simulate async response with slight delay
		setTimeout(() => {
		  resolve(JSON.stringify(jsonFlags));
		}, 150); // Small delay to simulate network
	  });
      }
