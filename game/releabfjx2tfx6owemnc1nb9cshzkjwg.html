    <style>
        /* Critical inline styles to prevent FOUC */
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Montserrat', sans-serif; }
    </style>
</head>
<body>
    <div id="game-container"></div>
    
    <script type="text/javascript">
        window.SDK_OPTIONS = {
            gameId: "releabfjx2tfx6owemnc1nb9cshzkjwg",
            onEvent: function (a) {
                switch (a.name) {
                    case "SDK_GAME_PAUSE":
                        window.dispatchEvent(new CustomEvent('sdk-pause'));
                        break;
                    case "SDK_GAME_START":
                        window.dispatchEvent(new CustomEvent('sdk-resume'));
                        break;
                    case "SDK_READY":
                        console.log("GameMonetize SDK Ready");
                        window.sdkReady = true;
                        break;
                    case "SDK_ERROR":
                        console.error("GameMonetize SDK Error");
                        // Dispatch resume event to prevent game from sticking in pause state
                        window.dispatchEvent(new CustomEvent('sdk-resume'));
                        break;
                }
            }
        };

        (function (a, b, c) {
            var d = a.getElementsByTagName(b)[0];
            a.getElementById(c) || (a = a.createElement(b), a.id = c,
            a.src = "https://api.gamemonetize.com/sdk.js", 
            a.onerror = function() {
                console.warn("SDK failed to load (blocked or network error). Enabling fallback mode.");
                window.sdkReady = true; // Pretend it's ready to allow game flow
                // Dispatch resume in case game was waiting
                window.dispatchEvent(new CustomEvent('sdk-resume'));
            },
            d.parentNode.insertBefore(a, d))
        })(document, "script", "gamemonetize-sdk");
    </script>
    
    <div id="ui-layer">
        <div id="loading-screen" class="screen">
            <div class="loader-content">
                <h1>LOADING</h1>
                <div class="progress-container">
                    <div id="progress-bar"></div>
                </div>
                <p id="loading-text">Preparing the mountain...</p>
            </div>
        </div>

        <div id="ui-overlay" class="screen hidden">
            <div class="hud-top">
                <div id="score-container" class="hud-item">
                    <div class="label">SCORE</div>
                    <div id="score" class="value">0</div>
                </div>
                <div id="highscore-container" class="hud-item">
                    <div class="label">HIGH SCORE</div>
                    <div id="highscore" class="value">0</div>
                </div>
                <div id="coins-container" class="hud-item">
                    <div class="coin-icon"></div>
                    <div id="coins" class="value">0</div>
                </div>
            </div>
            
            <div id="powerup-container">
                <div id="magnet-timer" class="powerup-timer hidden">
                    <div class="icon">🧲</div>
                    <div class="bar-bg"><div id="magnet-bar" class="bar-fill"></div></div>
                    <div id="magnet-text">10s</div>
                </div>
            </div>

            <div id="mobile-controls-info" class="mobile-hint">
                <div class="hint-left">TAP LEFT</div>
                <div class="hint-right">TAP RIGHT</div>
            </div>
        </div>

        <button id="camera-toggle" class="camera-btn" title="Change Camera View">🎥 Cinematic</button>

        <div id="start-screen" class="screen hidden">
            <div class="menu-content glass">
                <h1 class="game-title">MOUNTAIN RUN</h1>
                <p class="subtitle">MASTER THE PEAK</p>
                <button id="start-btn" class="main-btn">START GAME</button>
                <div class="menu-footer">
                    <button id="shop-btn" class="icon-btn">🛒 SHOP</button>
                    <button id="settings-btn" class="icon-btn">⚙️ SETTINGS</button>
                </div>
            </div>
        </div>

        <div id="settings-panel" class="screen hidden">
            <div class="settings-content glass-panel">
                <h2>SETTINGS</h2>
                <div class="settings-options">
                    <div class="setting-item">
                        <span>SOUND EFFECTS</span>
                        <label class="switch">
                            <input type="checkbox" id="sound-toggle" checked>
                            <span class="slider round"></span>
                        </label>
                    </div>
                    <div class="setting-item">
                        <span>MUSIC</span>
                        <label class="switch">
                            <input type="checkbox" id="music-toggle" checked>
                            <span class="slider round"></span>
                        </label>
                    </div>
                </div>
                <button id="settings-back-btn" class="primary-btn small">BACK</button>
            </div>
        </div>

        <div id="game-over-screen" class="screen hidden">
            <div class="menu-content glass">
                <h1 class="game-title">GAME OVER</h1>
                <p class="score-display">Score: <span id="final-score">0</span></p>
                <p id="high-score-display" style="color: #ffd700; font-weight: 700; margin-bottom: 20px;">HIGH SCORE: <span id="high-score-val">0</span></p>
                <div class="game-over-buttons">
                    <button id="revive-btn" class="main-btn" style="background: linear-gradient(135deg, #ff4757, #ff6b81); margin-bottom: 10px;">❤️ REVIVE (AD)</button>
                    <button id="restart-btn" class="main-btn">PLAY AGAIN</button>
                    <button id="home-btn" class="secondary-btn">🏠 HOME</button>
                </div>
            </div>
        </div>

        <div id="countdown-overlay" class="screen hidden">
            <div id="countdown-text">3</div>
        </div>
    </div>

    <!-- Import Map -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    
    <!-- Game Modules -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
