<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">

    <title>Apple Worm</title>

    <meta name="viewport"
        content="width=device-width,user-scalable=no,initial-scale=1, minimum-scale=1,maximum-scale=1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="full-screen" content="yes" />
    <meta name="x5-fullscreen" content="true" />
    <meta name="360-fullscreen" content="true" />

    <meta name="renderer" content="webkit" />
    <meta name="force-rendering" content="webkit" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />

    <link rel="stylesheet" type="text/css" href="style-desktop.css" />
    <link rel="icon" href="favicon.ico" />
    <link rel="preload" as="font" href="./CookieRun-Black.ttf" type="fontf" crossorigin="anonymous">
    <script src="cc-resolution.js" charset="utf-8"></script>
    <style type="text/css">
        * {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        @font-face {
            font-family: "Arial";
            src: url("CookieRun-Black.ttf");
        }

        html {
            touch-action: none
        }

        body {
            overflow: hidden;
            /* 页面背景颜色 */
            background: #94c4ff;
        }

        #Game {
            position: absolute;
            margin: 0;
            overflow: hidden;
            width: 1334;
            height: 750;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
    <script>var totalGameSize = 24200000;</script>
    <script type="text/javascript" src="https://api.gamemonetize.com/YYGGamesForGamemonetize.js"></script>
<script>
YYGGames.setConfig({
    gm:"pnqinh9qlg6fnsvf7qzvten219lj5q1a"
})
     </script>
</head>

<body>
    <div id="Game" style="width:1334px; height:750px;">
        <canvas id="GameCanvas" width="1334" height="750"></canvas>
        <div id="splash" style="display: none;">
            <div class="progress-bar stripes">
                <span style="width: 0%"></span>
            </div>
        </div>
    </div>
    <script src="src/settings.js" charset="utf-8"></script>
    <script src="main.js" charset="utf-8"></script>
    <script type="text/javascript">
        console.timeEnd = console.time = console.error = console.log = console.info = console.warn = function () { };
        // resolution.init(1334, 750);
        //显示
        YYGGames.showLoadingSourceScene()
            .setAppName("Apple-Worm")//需要设置appName
            .setBackgroundColor("#94c4ff") //设置背景颜色 非必填参数
            .setGameLogoUrl("./@base/logo.png") //设置游戏logo
            .setGameBannerUrl("./@base/banner.jpg");//设置游戏banner
        //隐藏
        // YYGGames.hideLoadingSourceScene();

        (function () {
            // open web debugger console
            if (typeof VConsole !== 'undefined') {
                window.vConsole = new VConsole();
            }
            var debug = window._CCSettings.debug;
            var splash = document.getElementById('splash');
            splash.style.display = 'block';

            function loadScript(moduleName, cb) {
                function scriptLoaded() {
                    document.body.removeChild(domScript);
                    domScript.removeEventListener('load', scriptLoaded, false);
                    cb && cb();
                };
                var domScript = document.createElement('script');
                domScript.async = true;
                domScript.src = moduleName;
                domScript.addEventListener('load', scriptLoaded, false);
                document.body.appendChild(domScript);
            }

            function fun() {


                if (cc.sys.isMobile) {
                    if (/iPad|iPod|BlackBerry/i.test(navigator.userAgent)) {
                        resolution.init(1334, 750);
                    } else {
                        resolution.init(resolution.clientWidth, resolution.clientHeight);
                    }
                } else {
                    // resolution.init(resolution.clientWidth, resolution.clientHeight);
                    resolution.init(1334, 750);
                }




            }

            loadScript(debug ? 'cocos2d-js.js' : 'cocos2d-js-min.js', function () {

                if (cc.sys.isMobile) {

                    if (/iPad|iPod|BlackBerry/i.test(navigator.userAgent)) {
                        var script = document.createElement('script');
                        script.setAttribute('type', 'text/javascript');
                        // script.setAttribute('src', "cc-resolution.js");
                        script.setAttribute('src', "cc-resolution2.js");
                        document.getElementsByTagName('head')[0].appendChild(script);
                        if (fun) script.onload = fun;
                        // resolution.init(1334, 750);
                    } else {
                        var script = document.createElement('script');
                        script.setAttribute('type', 'text/javascript');
                        script.setAttribute('src', "cc-resolution.js");
                        document.getElementsByTagName('head')[0].appendChild(script);
                        if (fun) script.onload = fun;
                        // resolution.init(resolution.clientWidth, resolution.clientHeight);
                    }
                    // var script = document.createElement('script');
                    // script.setAttribute('type', 'text/javascript');
                    // script.setAttribute('src', "cc-resolution.js");
                    // document.getElementsByTagName('head')[0].appendChild(script);
                    // if (fun) script.onload = fun;
                    // // resolution.init(resolution.clientWidth, resolution.clientHeight);

                } else {
                    var script = document.createElement('script');
                    script.setAttribute('type', 'text/javascript');
                    // script.setAttribute('src', "cc-resolution.js");
                    script.setAttribute('src', "cc-resolution2.js");
                    document.getElementsByTagName('head')[0].appendChild(script);
                    if (fun) script.onload = fun;
                    // resolution.init(1334, 750);

                }

                YYGGames.assetManager.enableVersionControl().then(() => {
                    window.boot();
                    // YYGGames.assetManager.loadDir("")
                });

            });
        })();
    </script>

</body>

</html>
