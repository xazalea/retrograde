	<link
		href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Oswald:wght@200..700&family=Pixelify+Sans:wght@400..700&family=Tiny5&display=swap"

	<style>
		* {
			padding: 0;
			margin: 0;
		}

		body {
			background: #240057;
			background: url('./assets/images/bg.svg');
			background-size: cover;
			font-size: 20px;
			font-family: 'Inter';
			color: white;
		}

		.layout-spinner-box {
			position: fixed;
			top: 0;
			left: 0;
			width: 100vw;
			height: 100svh;
			display: flex;
			align-items: center;
			justify-content: center;
			background: #000000bc;
			z-index: 999;
		}

		.layout-spinner {
			width: 64px;
			height: 64px;
			border: 5px dotted #FFF;
			border-radius: 50%;
			display: inline-block;
			position: relative;
			box-sizing: border-box;
			animation: rotation 1.8s linear infinite;
		}

		@keyframes rotation {
			0% {
				transform: rotate(0deg);
			}

			100% {
				transform: rotate(360deg);
			}
		}

		@media(max-width: 640px){
			body{
				background: #240057;
			}
		}
	</style>

</head>

		</div>
	</div>

		document.addEventListener('contextmenu', event => event.preventDefault());
