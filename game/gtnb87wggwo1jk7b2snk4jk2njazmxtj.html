<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>Food-Jam</title>
  </head>
<body style="margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #231F20;">
  <div id="unity-container"
    style="position: absolute; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center;">
    <canvas id="unity-canvas" width="1080" height="1920"
      style="max-width: 100%; max-height: 100%; width: auto; height: auto;"></canvas>
  </div>
    <script src="Build/Build.loader.js"></script>
    <script>
      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        // Mobile device style: fill the whole browser client area with the game canvas:
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);

        var canvas = document.querySelector("#unity-canvas");
        canvas.style.width = "100%";
        canvas.style.height = "100%";
        canvas.style.position = "fixed";

        document.body.style.textAlign = "left";

      }else {
      function resizeCanvas() {
        const canvas = document.getElementById('unity-canvas');
        const aspect = 1080 / 1920;
        let width = window.innerWidth;
        let height = window.innerHeight;

        if (width / height > aspect) {
          canvas.style.height = height + 'px';
          canvas.style.width = (height * aspect) + 'px';
        } else {
          canvas.style.width = width + 'px';
          canvas.style.height = (width / aspect) + 'px';
        }
      }

      window.addEventListener('resize', resizeCanvas);
      window.addEventListener('load', resizeCanvas);
    }

      createUnityInstance(document.querySelector("#unity-canvas"), {
        arguments: [],
        dataUrl: "Build/Build.data",
        frameworkUrl: "Build/Build.framework.js",
        codeUrl: "Build/Build.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Food-Jam",
        productVersion: "1.1.1",
        matchWebGLToCanvasSize: false, // Uncomment this to separately control WebGL canvas render size and DOM element size.
        // devicePixelRatio: 1, // Uncomment this to override low DPI rendering on high DPI displays.
      }).then((unityInstance) => {
      }).catch((message) => {
        alert(message);
      });
    </script>
  </body>
</html>
