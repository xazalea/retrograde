<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zombie Horde Survival</title>
  <style>
    :root{
      --w: 800px;
      --h: 570px;
      --panel: #151a2e;
      --accent: #7dd3fc;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --chip-bg: rgba(21,26,46,.9);
      --chip-brd: rgba(125, 211, 252, .18);
    }
    html, body { height:100%; margin:0; background:#000; font-family: system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,Arial; color:var(--text); }
    .wrap { min-height:100%; display:grid; place-items:center; padding:24px; }
    .game-shell { width:var(--w); height:var(--h); position:relative; background:#000; border-radius:16px; box-shadow:0 10px 30px rgba(0,0,0,.45), inset 0 0 0 1px rgba(255,255,255,.06); overflow:hidden; user-select:none; }
    .topbar { position:absolute; top:6px; left:6px; right:6px; display:flex; align-items:center; gap:8px; white-space:nowrap; z-index:5; background:linear-gradient(180deg, rgba(6,8,16,.35), rgba(6,8,16,.0)); padding:4px 4px; }
    .btn { background:var(--panel); border:1px solid var(--chip-brd); border-radius:10px; color:var(--text); font-weight:700; padding:6px 10px; cursor:pointer; box-shadow:0 4px 10px rgba(0,0,0,.25); font-size:13px; line-height:1; display:inline-flex; align-items:center; gap:6px; }
    .chip { background:var(--chip-bg); border:1px solid var(--chip-brd); border-radius:10px; padding:6px 10px; font-weight:600; font-size:13px; display:inline-flex; align-items:center; gap:8px; box-shadow: inset 0 0 18px rgba(125,211,252,.06); }
    .chip span { color:var(--muted); font-weight:500; }
    .spacer { flex:1 1 auto; }
    canvas { position:absolute; inset:0; cursor: crosshair; }
    .centerOverlay { position:absolute; inset:0; background:rgba(6,8,16,.86); display:grid; place-items:center; z-index:6; backdrop-filter:blur(2px); text-align:center; }
    .card { background:#151a2e; border:1px solid rgba(125,211,252,.25); border-radius:16px; padding:18px 20px; text-align:center; max-width:520px; box-shadow:0 20px 40px rgba(0,0,0,.45); }
    .card h2 { margin:0 0 8px 0; font-size:20px; }
    .card p { margin:4px 0 12px 0; color:var(--muted); }
    .playBig { background:linear-gradient(180deg,#1e293b,#0b1022); border:1px solid rgba(125,211,252,.45); border-radius:14px; color:#e2f3ff; font-weight:800; font-size:18px; padding:12px 22px; cursor:pointer; box-shadow:0 8px 24px rgba(0,0,0,.35); display:inline-flex; align-items:center; gap:10px; }
    .countdown { font-size:56px; font-weight:900; letter-spacing:2px; color:#e2f3ff; margin-top:8px; opacity:0; transform:scale(0.9); transition:opacity .2s ease, transform .2s ease; }
    .countdown.show { opacity:1; transform:scale(1); }
    .hidden { display:none !important; }
    .hint { font-size:12px; color:#cbd5e1; opacity:.9; margin-top:8px; }
    .debugHud { position:absolute; left:8px; bottom:8px; background:rgba(0,0,0,.55); border:1px solid rgba(125,211,252,.25); padding:6px 8px; border-radius:8px; font:12px/1.3 system-ui,Segoe UI,Roboto; color:#cbd5e1; pointer-events:none; }
    .debugHud.hidden { display:none; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="game-shell" id="game">
      <div class="topbar">
        <button id="btnStart" class="btn" onclick="sdk.showBanner()">▶ Start / Resume</button>
        <button id="btnPause" class="btn">⏸️ Pause</button>
        <div class="spacer"></div>
        <div class="chip"><span>Lives</span><b id="livesVal">3</b></div>
        <div class="chip"><span>Level</span><b id="levelVal">1</b></div>
        <div class="chip"><span>Score</span><b id="scoreVal">0</b></div>
        <div class="chip"><span>Kills</span><b id="killsVal">0</b><span>/</span><b id="targetVal">25</b></div>
        <div class="chip"><span>Best</span><b id="bestVal">0</b></div>
      </div>

      <canvas id="view" width="800" height="570"></canvas>

      <div id="centerPlay" class="centerOverlay">
        <div class="card">
          <h2 id="playTitle">Level 1</h2>
          <p id="playSub">Click Play to begin.</p>
          <button id="btnPlayCenter" class="playBig" onclick="sdk.showBanner()">▶ Play</button>
          <div id="countdown" class="countdown hidden">3</div>
          <div class="hint">Controls: Move with mouse • Hold click to fire • Pause/Resume from top buttons</div>
        </div>
      </div>

      <div id="gameOver" class="centerOverlay hidden">
        <div class="card">
          <h2>Game Over</h2>
          <p>Final score: <b id="finalScore">0</b></p>
          <button id="btnTryAgain" class="playBig">↻ Play Again</button>
        </div>
      </div>

      <div id="winOverlay" class="centerOverlay hidden">
        <div class="card">
          <h2>Victory!</h2>
          <p>Total score: <b id="winScore">0</b></p>
          <button id="btnPlayAgainWin" class="playBig">↻ Play Again</button>
        </div>
      </div>

      <div id="pausedOverlay" class="centerOverlay hidden">
        <div class="card">
          <h2>Paused</h2>
          <p>Press Resume to continue.</p>
          <button id="btnResume" class="playBig">▶ Resume</button>
        </div>
      </div>

      <div id="debugHud" class="debugHud hidden"></div>
    </div>
  </div>

  <script>
    const WIDTH = 800, HEIGHT = 570;
    const BOTTOM_ZONE_H = 160;
    const MARGIN_X = 10, MARGIN_Y = 10;
    const STORAGE_BEST_KEY = 'neon_abyss_defender_best_v1';
    const MAX_LEVEL = 6;

    const KILL_BASE = 20;
    const KILL_INC = 15;

    const RESPAWN_SHIELD_TIME = 1.5;

    const cvs = document.getElementById('view');
    const ctx = cvs.getContext('2d');

    // roundRect polyfill (for older browsers)
    if (!CanvasRenderingContext2D.prototype.roundRect){
      CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
        r = Math.min(r, w/2, h/2);
        this.beginPath();
        this.moveTo(x+r, y);
        this.arcTo(x+w, y, x+w, y+h, r);
        this.arcTo(x+w, y+h, x, y+h, r);
        this.arcTo(x, y+h, x, y, r);
        this.arcTo(x, y, x+w, y, r);
        this.closePath();
        return this;
      };
    }

    const btnStart = document.getElementById('btnStart');
    const btnPause = document.getElementById('btnPause');
    const btnResume = document.getElementById('btnResume');

    const scoreVal = document.getElementById('scoreVal');
    const levelVal = document.getElementById('levelVal');
    const livesVal = document.getElementById('livesVal');
    const killsVal = document.getElementById('killsVal');
    const targetVal = document.getElementById('targetVal');
    const bestVal = document.getElementById('bestVal');

    const centerPlay = document.getElementById('centerPlay');
    const btnPlayCenter = document.getElementById('btnPlayCenter');
    const playTitle = document.getElementById('playTitle');
    const playSub   = document.getElementById('playSub');
    const countdownEl = document.getElementById('countdown');

    const gameOverOverlay = document.getElementById('gameOver');
    const finalScoreEl = document.getElementById('finalScore');
    const btnTryAgain = document.getElementById('btnTryAgain');

    const winOverlay = document.getElementById('winOverlay');
    const winScoreEl = document.getElementById('winScore');
    const btnPlayAgainWin = document.getElementById('btnPlayAgainWin');

    const pausedOverlay = document.getElementById('pausedOverlay');

    let bestScore = 0;
    try { bestScore = parseInt(localStorage.getItem(STORAGE_BEST_KEY) || '0', 10) || 0; } catch(e){}
    bestVal.textContent = bestScore;

    const FX = {
      parts: [],
      spawn(x,y, power=1){
        const count = Math.floor(14 + 10*power);
        for (let i=0;i<count;i++){
          const a = Math.random()*Math.PI*2;
          const spd = (80 + Math.random()*150)*(0.8 + 0.6*power);
          FX.parts.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:0,max:0.55+Math.random()*0.35});
        }
      },
      update(dt){
        for (let i=FX.parts.length-1;i>=0;i--){
          const p=FX.parts[i];
          p.life+=dt; p.x+=p.vx*dt; p.y+=p.vy*dt;
          p.vx*= (1-0.9*dt); p.vy*= (1-0.9*dt);
          if (p.life>=p.max) FX.parts.splice(i,1);
        }
      },
      draw(ctx){
        ctx.save();
        ctx.fillStyle="#e2f3ff";
        for (const p of FX.parts){
          const a = Math.max(0,1-p.life/p.max);
          ctx.globalAlpha=a;
          ctx.fillRect(p.x,p.y,2,2);
        }
        ctx.restore();
      }
    };

    // ====== SFX (WebAudio - no external files)
    // Audio starts after the first user gesture (click/tap).
    const SFX = {
      ctx: null,
      enabled: true,
      _lastShotT: 0,
      init(){
        if (this.ctx) return;
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) { this.enabled=false; return; }
        this.ctx = new AC();
      },
      resume(){
        if (!this.enabled) return;
        if (!this.ctx) this.init();
        if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume().catch(()=>{});
      },
      _tone(freq, dur, type='sine', gain=0.06, bend=0){
        if (!this.enabled || !this.ctx) return;
        const t0 = this.ctx.currentTime;
        const o = this.ctx.createOscillator();
        const g = this.ctx.createGain();
        o.type = type;
        o.frequency.setValueAtTime(freq, t0);
        if (bend !== 0){
          o.frequency.exponentialRampToValueAtTime(Math.max(40, freq + bend), t0 + dur);
        }
        g.gain.setValueAtTime(0.0001, t0);
        g.gain.exponentialRampToValueAtTime(gain, t0 + 0.01);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
        o.connect(g); g.connect(this.ctx.destination);
        o.start(t0);
        o.stop(t0 + dur + 0.02);
      },
      _noise(dur, gain=0.08, hp=700){
        if (!this.enabled || !this.ctx) return;
        const t0 = this.ctx.currentTime;
        const len = Math.floor(this.ctx.sampleRate * dur);
        const buf = this.ctx.createBuffer(1, len, this.ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i=0;i<len;i++){
          data[i] = (Math.random()*2-1) * (1 - i/len);
        }
        const src = this.ctx.createBufferSource();
        src.buffer = buf;

        const filter = this.ctx.createBiquadFilter();
        filter.type = 'highpass';
        filter.frequency.value = hp;

        const g = this.ctx.createGain();
        g.gain.setValueAtTime(0.0001, t0);
        g.gain.exponentialRampToValueAtTime(gain, t0 + 0.01);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);

        src.connect(filter);
        filter.connect(g);
        g.connect(this.ctx.destination);

        src.start(t0);
        src.stop(t0 + dur + 0.02);
      },
      shot(){
        if (!this.enabled || !this.ctx) return;
        const t = this.ctx.currentTime;
        if (t - this._lastShotT < 0.04) return;
        this._lastShotT = t;

        this._tone(820, 0.06, 'square', 0.045, -420);
        this._tone(1200, 0.04, 'sine', 0.020, -500);
      },
      hit(){
        if (!this.enabled || !this.ctx) return;
        this._noise(0.10, 0.11, 800);
        this._tone(140, 0.10, 'sawtooth', 0.06, -60);
      },
      bigHit(){
        if (!this.enabled || !this.ctx) return;
        this._noise(0.18, 0.14, 500);
        this._tone(90, 0.18, 'sawtooth', 0.08, -40);
        this._tone(220, 0.12, 'square', 0.04, -90);
      }
    };


    const BG = {
      t:0,
      stars:[],
      fog:[],
      graves:[],
      init(){
        // Sparse stars + heavy fog for a zombie-night vibe
        this.stars.length=0;
        for (let i=0;i<260;i++){
          this.stars.push({
            x:Math.random()*WIDTH,
            y:Math.random()*HEIGHT*0.65,
            s:Math.random()<0.85?1:2,
            a:0.12+Math.random()*0.45,
            tw:Math.random()*Math.PI*2,
            sp:0.4+Math.random()*1.1
          });
        }

        this.fog.length=0;
        for (let i=0;i<70;i++){
          this.fog.push({
            x:Math.random()*WIDTH,
            y:Math.random()*HEIGHT,
            r: 60+Math.random()*180,
            a: 0.05+Math.random()*0.10,
            vx: (-1+Math.random()*2) * (6+Math.random()*14),
            vy: (-1+Math.random()*2) * (2+Math.random()*8)
          });
        }

        this.graves.length=0;
        // Graveyard silhouette band near the horizon
        const horizon = HEIGHT*0.56;
        for (let i=0;i<22;i++){
          const w = 18 + Math.random()*34;
          const h = 22 + Math.random()*44;
          const x = Math.random()*(WIDTH - w);
          const y = horizon + (Math.random()*18);
          const tilt = (-0.12 + Math.random()*0.24);
          this.graves.push({x,y,w,h,tilt});
        }
      },
      draw(ctx,dt){
        this.t += dt;

        // Night sky base
        ctx.fillStyle="#03040a";
        ctx.fillRect(0,0,WIDTH,HEIGHT);

        // Moon (off-center) with a faint glow
        const mx = WIDTH*0.72, my = HEIGHT*0.18;
        const moonR = 54;
        const moonG = ctx.createRadialGradient(mx,my, 0, mx,my, moonR*2.4);
        moonG.addColorStop(0, "rgba(220,230,255,0.22)");
        moonG.addColorStop(0.35, "rgba(220,230,255,0.10)");
        moonG.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = moonG;
        ctx.beginPath(); ctx.arc(mx,my, moonR*2.4, 0, Math.PI*2); ctx.fill();

        ctx.fillStyle = "rgba(215,225,255,0.85)";
        ctx.beginPath(); ctx.arc(mx,my, moonR, 0, Math.PI*2); ctx.fill();

        // Moon craters
        ctx.globalAlpha = 0.18;
        ctx.fillStyle = "#6b7280";
        for (let i=0;i<9;i++){
          const r = 4 + Math.random()*10;
          const x = mx + (-moonR*0.55 + Math.random()*moonR*1.1);
          const y = my + (-moonR*0.55 + Math.random()*moonR*1.1);
          ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
        }
        ctx.globalAlpha = 1;

        // Stars
        for (const s of this.stars){
          s.tw += dt*s.sp;
          const tw = 0.70 + 0.30*Math.sin(s.tw);
          ctx.globalAlpha = s.a*tw;
          ctx.fillStyle="#e6f0ff";
          ctx.fillRect(s.x,s.y,s.s,s.s);
        }
        ctx.globalAlpha=1;

        // Horizon glow / mist
        const horizonY = HEIGHT*0.58;
        const haze = ctx.createLinearGradient(0,horizonY-120,0,horizonY+160);
        haze.addColorStop(0, "rgba(10,12,22,0)");
        haze.addColorStop(0.35, "rgba(60,30,80,0.12)");
        haze.addColorStop(0.75, "rgba(20,24,50,0.22)");
        haze.addColorStop(1, "rgba(0,0,0,0.70)");
        ctx.fillStyle = haze;
        ctx.fillRect(0,horizonY-120,WIDTH,280);

        // Distant city/trees silhouette
        ctx.save();
        ctx.globalAlpha = 0.55;
        ctx.fillStyle = "rgba(0,0,0,0.92)";
        ctx.beginPath();
        ctx.moveTo(0,horizonY+10);
        for (let x=0;x<=WIDTH;x+=28){
          const bump = (Math.sin((x*0.035)+this.t*0.6)*8) + (Math.sin((x*0.09)+this.t*0.25)*4);
          const peak = horizonY - 22 + bump;
          ctx.lineTo(x, peak);
          ctx.lineTo(x+14, horizonY - 8 + bump*0.35);
        }
        ctx.lineTo(WIDTH,horizonY+10);
        ctx.lineTo(WIDTH,HEIGHT);
        ctx.lineTo(0,HEIGHT);
        ctx.closePath();
        ctx.fill();
        ctx.restore();

        // Graveyard band
        ctx.save();
        ctx.globalAlpha = 0.75;
        ctx.fillStyle = "rgba(0,0,0,0.92)";
        for (const g0 of this.graves){
          ctx.save();
          ctx.translate(g0.x + g0.w/2, g0.y + g0.h/2);
          ctx.rotate(g0.tilt);
          // tombstone
          ctx.beginPath();
          ctx.roundRect(-g0.w/2, -g0.h/2, g0.w, g0.h, 8);
          ctx.fill();
          // cross
          if (Math.random() < 0.25){
            ctx.fillRect(-2, -g0.h/2-10, 4, 16);
            ctx.fillRect(-8, -g0.h/2-6, 16, 4);
          }
          ctx.restore();
        }
        ctx.restore();

        // Ground (cracked asphalt / dirt)
        const groundTop = HEIGHT - BOTTOM_ZONE_H - 8;
        const grd = ctx.createLinearGradient(0,groundTop,0,HEIGHT);
        grd.addColorStop(0,"rgba(18,18,22,0.88)");
        grd.addColorStop(1,"rgba(0,0,0,0.95)");
        ctx.fillStyle = grd;
        ctx.fillRect(0,groundTop,WIDTH,HEIGHT-groundTop);

        // Cracks
        ctx.save();
        ctx.globalAlpha = 0.14;
        ctx.strokeStyle = "rgba(220,230,255,0.35)";
        ctx.lineWidth = 1;
        for (let i=0;i<18;i++){
          const x0 = Math.random()*WIDTH;
          const y0 = groundTop + Math.random()*(HEIGHT-groundTop);
          ctx.beginPath();
          ctx.moveTo(x0,y0);
          let x=x0, y=y0;
          for (let k=0;k<5;k++){
            x += (-40 + Math.random()*80);
            y += (10 + Math.random()*40);
            ctx.lineTo(clamp(x,0,WIDTH), clamp(y,groundTop,HEIGHT));
          }
          ctx.stroke();
        }
        ctx.restore();

        // Fog puffs drifting
        for (const f of this.fog){
          f.x += f.vx*dt;
          f.y += f.vy*dt;
          // wrap
          if (f.x < -f.r) f.x = WIDTH + f.r;
          if (f.x > WIDTH + f.r) f.x = -f.r;
          if (f.y < -f.r) f.y = HEIGHT + f.r;
          if (f.y > HEIGHT + f.r) f.y = -f.r;

          const g = ctx.createRadialGradient(f.x,f.y, 0, f.x,f.y, f.r);
          g.addColorStop(0, `rgba(180,190,220,${f.a})`);
          g.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = g;
          ctx.beginPath(); ctx.arc(f.x,f.y,f.r,0,Math.PI*2); ctx.fill();
        }

        // Vignette for horror mood
        const vg = ctx.createRadialGradient(WIDTH/2,HEIGHT/2,120, WIDTH/2,HEIGHT/2, 560);
        vg.addColorStop(0,"rgba(0,0,0,0)");
        vg.addColorStop(1,"rgba(0,0,0,0.62)");
        ctx.fillStyle = vg;
        ctx.fillRect(0,0,WIDTH,HEIGHT);
      }
    };


    const Game = {
      running:false, paused:false, lastFrame:performance.now(),
      score:0,
      bullets:[], enemyBullets:[], enemies:[], boss:null,
      powerups:[],
      weapon:'pistol', shotgunT:0,
      hazards:{ meteors:[], mines:[], storms:[] },
      firing:false, _fireCD:0,

      player:{ x: WIDTH/2, y: HEIGHT - (BOTTOM_ZONE_H/2), speed: 1200 },
      mousePos:{ x: WIDTH/2, y: HEIGHT - (BOTTOM_ZONE_H/2) },
      aimPos:{ x: WIDTH/2, y: HEIGHT*0.35 },

      lives:3, level:1, kills:0, targetKills:KILL_BASE,
      phase:'init', awaitingCountdown:false,
      respawnShieldT:0,
      _handlingImpact:false,

      spawnT:0
    };

    function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
    function rectsOverlap(a,b){ return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y; }

    cvs.addEventListener('mousemove', (e)=>{
      const rect = cvs.getBoundingClientRect();
      const mx = (e.clientX - rect.left) * (cvs.width / rect.width);
      const my = (e.clientY - rect.top) * (cvs.height / rect.height);

      // Movement stays locked to the bottom zone (same structure),
      // but aiming can use the full canvas for side threats.
      Game.mousePos.x = clamp(mx, MARGIN_X, WIDTH - MARGIN_X);
      const top = HEIGHT - BOTTOM_ZONE_H + MARGIN_Y, bottom = HEIGHT - MARGIN_Y;
      Game.mousePos.y = clamp(my, top, bottom);

      Game.aimPos.x = clamp(mx, 0, WIDTH);
      Game.aimPos.y = clamp(my, 0, HEIGHT);
    });
    cvs.addEventListener('pointerdown', ()=>{ SFX.resume(); Game.firing = true; shoot(); });
    window.addEventListener('pointerup', ()=> Game.firing = false);

    btnStart.addEventListener('click', startOrResume);
    btnPlayCenter.addEventListener('click', startOrResume);
    btnTryAgain.addEventListener('click', resetAndShowIntro);
    btnPlayAgainWin.addEventListener('click', resetAndShowIntro);
    btnPause.addEventListener('click', ()=> togglePause(true));
    btnResume.addEventListener('click', ()=> togglePause(false));

    function runCountdown(done){
      if (Game.awaitingCountdown) return;
      Game.awaitingCountdown = true;
      let n=3;
      countdownEl.textContent=String(n);
      countdownEl.classList.remove('hidden');
      setTimeout(()=>countdownEl.classList.add('show'),0);

      const tick=()=>{
        n--;
        if (n>0){
          countdownEl.classList.remove('show');
          setTimeout(()=>{ countdownEl.textContent=String(n); countdownEl.classList.add('show'); },180);
          setTimeout(tick,800);
        } else {
          countdownEl.classList.remove('show');
          setTimeout(()=>{ countdownEl.classList.add('hidden'); Game.awaitingCountdown=false; done&&done(); },200);
        }
      };
      setTimeout(tick,800);
    }

    function startOrResume(){
      SFX.resume();
      gameOverOverlay.classList.add('hidden');
      winOverlay.classList.add('hidden');
      pausedOverlay.classList.add('hidden');

      runCountdown(()=>{
        centerPlay.classList.add('hidden');
        if (!Game.running) startGame();
        Game.paused = false;
        Game.lastFrame = performance.now();
        Game.phase = 'playing';
      });
    }

    function togglePause(forcePause){
      if (!Game.running) return;
      const newPaused = typeof forcePause === 'boolean' ? forcePause : !Game.paused;
      Game.paused = newPaused;
      if (!newPaused){
        Game.lastFrame = performance.now();
        pausedOverlay.classList.add('hidden');
      } else {
        pausedOverlay.classList.remove('hidden');
      }
    }

    function enemySpawnEvery(){
      // Horde pacing: L1 ~0.90s -> L5 ~0.50s
      return Math.max(0.42, 0.90 - (Game.level-1)*0.10);
    }
    function enemyCap(){
      // Keep performance stable during horde waves
      return Math.min(50, 18 + Game.level*6);
    }
    function enemySpeed(){
      // slower at start, ramps up
      return 55 + Game.level*10;
    }
    function enemyFireEvery(){
      // slower fire early
      // L1 ~2.7s, L2 ~2.4s, L3 ~2.1s, L4 ~1.85s, L5 ~1.6s, L6 ~1.35s
      return Math.max(1.15, 2.7 - (Game.level-1)*0.32);
    }

    // ====== Enemy ship variants (5-6 silhouettes)
    const ENEMY_TYPES = [
      // Horde zombies: mostly 1 HP, different speeds/behaviors
      { kind:'shambler', w:46, h:46, hp:10,  speed: 85,  role:'melee' },
      { kind:'runner',   w:42, h:42, hp:10,  speed: 145, role:'melee' },
      { kind:'spitter',  w:48, h:48, hp:10,  speed: 95,  role:'ranged' }
    ];

    function pickEnemyKind(){
      // Slight weighting: simpler ships early, more variety later
      const lv = Game.level;
      const pool = (lv <= 1)
        ? ['drone','scout','drone','saucer']
        : (lv <= 3)
          ? ['drone','scout','heavy','saucer','zigzag']
          : ['drone','scout','heavy','saucer','zigzag','interceptor'];
      return pool[(Math.random()*pool.length)|0];
    }


    function spawnEnemy(kind='shambler'){
      // Choose type mix by level (horde-first)
      const lv = Game.level;
      const r = Math.random();
      if (!kind || kind==='auto'){
        if (lv >= 3 && r < 0.08) kind = 'spitter';
        else if (lv >= 2 && r < 0.26) kind = 'runner';
        else kind = 'shambler';
      }

      const spec = ENEMY_TYPES.find(t => t.kind === kind) || ENEMY_TYPES[0];
      const w = spec.w, h = spec.h;

      // Spawn from top/left/right (survival)
      const margin = 26;
      let x=0, y=0;
      const spawnR = Math.random();
      const bandH = HEIGHT*0.75;

      // Distribution shifts towards sides as levels increase
      const sideWeight = clamp(0.30 + (Game.level-1)*0.08, 0.30, 0.66);
      const topWeight = 1 - sideWeight;
      const leftWeight = sideWeight/2;

      if (spawnR < topWeight){
        x = Math.random()*(WIDTH - w);
        y = -h - margin;
      } else if (spawnR < topWeight + leftWeight){
        x = -w - margin;
        y = Math.random()*(bandH - h);
      } else {
        x = WIDTH + margin;
        y = Math.random()*(bandH - h);
      }

      // Initial velocity points roughly at the player
      const cx = x + w/2, cy = y + h/2;
      const tx = Game.player.x, ty = Game.player.y;
      let dx = tx - cx, dy = ty - cy;
      const d = Math.max(0.001, Math.hypot(dx,dy));
      dx /= d; dy /= d;

      const base = spec.speed + (Game.level-1)*6;
      const speed = base * (0.92 + Math.random()*0.20);

      Game.enemies.push({
        kind,
        x, y, w, h,
        vx: dx * speed,
        vy: dy * speed,
        hp: 10, // kept for structure; effective HP is 10 per hit below
        fireCD: (kind==='spitter') ? (0.8 + Math.random()*0.8) : 999,
        retargetT: 0.18 + Math.random()*0.22
      });
    }

    function spawnBoss(){
      const w=170, h=120;

      // Spawn from a random edge
      const margin = 40;
      const r = Math.random();
      let x=WIDTH/2-w/2, y=HEIGHT*0.18-h/2;
      if (r < 0.34){ x = -w - margin; y = 80 + Math.random()*120; }
      else if (r < 0.67){ x = WIDTH + margin; y = 80 + Math.random()*120; }
      else { x = Math.random()*(WIDTH - w); y = -h - margin; }

      const baseHp = 260 + (Game.level-1)*70;
      Game.boss = {
        x, y, w, h,
        vx: (Math.random()<0.5?-1:1) * (110 + Game.level*10),
        vy:  (70 + Game.level*6),
        hp: baseHp, maxHp: baseHp,
        fireCD: 0.9, summonCD: 1.6, t:0
      };

      Game.enemies.length=0;
      Game.phase='boss';
    }

    function shoot(){
      if (!Game.running || Game.paused) return;
      if (Game.phase!=='playing' && Game.phase!=='boss') return;

      const px = Game.player.x, py = Game.player.y - 10;
      const ax = Game.aimPos.x, ay = Game.aimPos.y;

      // Aim towards cursor; if cursor is too close/below the player, shoot upward.
      let ang = Math.atan2(ay - py, ax - px);
      if (ay > py - 6) ang = -Math.PI/2;

      const speed = 640;
      const makeBullet = (a)=>{
        const vx = Math.cos(a) * speed;
        const vy = Math.sin(a) * speed;
        Game.bullets.push({x:px-2, y:py-6, w:4, h:10, vx, vy});
      };

      if (Game.weapon === 'shotgun' && Game.shotgunT > 0){
        const spread = 0.21; // ~12 degrees
        makeBullet(ang - spread);
        makeBullet(ang);
        makeBullet(ang + spread);
      } else {
        makeBullet(ang);
      }

      SFX.shot();
    }

    function enemyShootFrom(x,y, aimPlayer=true, spread=0){
      const p = Game.player;
      const dx = (p.x - x), dy = (p.y - y);
      const L = Math.hypot(dx,dy) || 1;
      const spd = 260 + Game.level*10;
      const vx = aimPlayer ? (dx/L)*spd : 0;
      const vy = aimPlayer ? (dy/L)*spd : spd;
      const a = spread;
      const c = Math.cos(a), s = Math.sin(a);
      const rvx = vx*c - vy*s;
      const rvy = vx*s + vy*c;
      Game.enemyBullets.push({x:x-3,y:y+6,w:6,h:10,vx:rvx,vy:rvy});
    }

    function meteorRate(){
      // Zombie mode: no meteors
      return 0;
    }
    function spawnMeteor(){
      const w=18, h=22;
      const x=Math.random()*(WIDTH-w);
      const vy=240 + Game.level*18;
      Game.hazards.meteors.push({x,y:-h-10,w,h,vy,rot:Math.random()*Math.PI*2,rs:(Math.random()<0.5?-1:1)*(1.5+Math.random()*2.2)});
    }

    function mineEvery(){
      if (Game.level < 3) return Infinity;
      // mines less frequent early
      return Math.max(3.0, 4.6 - (Game.level-3)*0.40);
    }
    function dropMine(x,y){
      const w=14, h=14;
      Game.hazards.mines.push({x:x-w/2,y:y,w,h,vy:80 + Game.level*6, armedT:0.25});
    }

    function ensureStorms(){
      // Zombie mode: storms disabled (reserved for future fog zones)
      Game.hazards.storms.length = 0;
    }
    function bulletSlowFactor(b){
      if (Game.level < 4) return 1;
      for (const z of Game.hazards.storms){
        if (rectsOverlap({x:b.x,y:b.y,w:b.w,h:b.h}, z)) return 0.55;
      }
      return 1;
    }

    function isSplitLevel(){ return Game.level >= 5; }

    function registerImpact(){
      // Zombie mode: lose a life on contact; brief invincibility to prevent instant death.
      if (Game._handlingImpact) return;
      if (Game.respawnShieldT > 0) return;

      Game._handlingImpact = true;
      try{
        if (typeof Game.lives !== 'number' || !Number.isFinite(Game.lives)) Game.lives = 1;

        SFX.bigHit();
        Game.lives -= 1;

        if (Game.lives <= 0){
          Game.lives = 0;
          updateHUD();
          endGame();
          return;
        }

        Game.respawnShieldT = 0.80; // i-frames
        updateHUD();
      } finally {
        Game._handlingImpact = false;
      }
    }

    function endGame(){
      Game.running=false; Game.paused=false; Game.phase='over';
      finalScoreEl.textContent = String(Game.score);
      if (Game.score > bestScore){
        bestScore = Game.score;
        bestVal.textContent = bestScore;
        try { localStorage.setItem(STORAGE_BEST_KEY, String(bestScore)); } catch(e){}
      }
      gameOverOverlay.classList.remove('hidden');
    }

    function victory(){
      Game.running=false; Game.paused=false; Game.phase='win';
      winScoreEl.textContent = String(Game.score);
      if (Game.score > bestScore){
        bestScore = Game.score;
        bestVal.textContent = bestScore;
        try { localStorage.setItem(STORAGE_BEST_KEY, String(bestScore)); } catch(e){}
      }
      winOverlay.classList.remove('hidden');
    }

    function onLevelComplete(){
      Game.phase='between';
      Game.boss=null;
      Game.enemies.length=0;
      Game.enemyBullets.length=0;
      Game.bullets.length=0;
      Game.hazards.meteors.length=0;
      Game.hazards.mines.length=0;
      Game.hazards.storms.length=0;

      if (Game.level >= MAX_LEVEL){
        victory();
        return;
      }

      Game.level += 1;
      Game.kills = 0;
      Game.targetKills = KILL_BASE + KILL_INC*(Game.level-1);
      Game.lives += 1;

      playTitle.textContent = `Level ${Game.level}`;
      playSub.textContent = levelDescription(Game.level);
      centerPlay.classList.remove('hidden');
      updateHUD();
    }

    function levelDescription(lv){
      if (lv===1) return "Press Play to begin the outbreak.";
      if (lv===2) return "Runners join the horde. Keep moving!";
      if (lv===3) return "Spitters appear. Watch the acid!";
      if (lv===4) return "Tight corridors... the horde closes in.";
      if (lv===5) return "Full swarm: zombies from above and the sides.";
      return "Final stand. The Mutant Brute is coming.";
    }

    function resetGame(){
      Game.running=false; Game.paused=false;
      Game.score=0;
      Game.bullets.length=0; Game.enemyBullets.length=0; Game.enemies.length=0; Game.boss=null;
      Game.hazards.meteors.length=0; Game.hazards.mines.length=0; Game.hazards.storms.length=0;
      Game.firing=false; Game._fireCD=0;
      Game.player.x=WIDTH/2; Game.player.y=HEIGHT - (BOTTOM_ZONE_H/2);
      Game.mousePos.x=Game.player.x; Game.mousePos.y=Game.player.y;
      Game.lives=3; Game.level=1; Game.kills=0; Game.targetKills=KILL_BASE;
      Game.phase='init'; Game.awaitingCountdown=false;
      Game.respawnShieldT=0; Game._handlingImpact=false;
      Game.spawnT=0;
      playTitle.textContent="Level 1";
      playSub.textContent="Click Play to begin.";
      updateHUD();
      centerPlay.classList.remove('hidden');
    }

    function resetAndShowIntro(){
      gameOverOverlay.classList.add('hidden');
      winOverlay.classList.add('hidden');
      pausedOverlay.classList.add('hidden');
      resetGame();
    }

    function startGame(){
      Game.running=true;
      Game.paused=false;
      Game.phase='playing';
      Game.lastFrame=performance.now();
      Game.spawnT = 0.05;
      spawnEnemy('drone');
      spawnEnemy('drone');
    }

    function drawPlayer(){
      const p=Game.player;

      // Invincibility blink
      const blink = (Game.respawnShieldT>0) ? (Math.sin(performance.now()/80) > 0 ? 0.35 : 1) : 1;

      // shadow
      ctx.save();
      ctx.globalAlpha = 0.22 * blink;
      ctx.fillStyle = "rgba(0,0,0,0.95)";
      ctx.beginPath();
      ctx.ellipse(p.x+3, p.y+7, 18, 11, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();

      // flashlight cone (dark horror)
      ctx.save();
      ctx.globalAlpha = 0.10 * blink;
      ctx.fillStyle = "rgba(255,255,220,0.9)";
      ctx.beginPath();
      ctx.moveTo(p.x, p.y-6);
      ctx.lineTo(Game.aimPos.x-40, Game.aimPos.y-90);
      ctx.lineTo(Game.aimPos.x+40, Game.aimPos.y-90);
      ctx.closePath();
      ctx.fill();
      ctx.restore();

      // survivor body
      ctx.save();
      ctx.translate(p.x,p.y);
      ctx.globalAlpha = blink;

      const body = ctx.createLinearGradient(0,-18,0,18);
      body.addColorStop(0,"rgba(230,230,230,0.85)");
      body.addColorStop(1,"rgba(120,120,120,0.85)");
      ctx.fillStyle = body;
      ctx.beginPath();
      ctx.roundRect(-10,-12,20,24,8);
      ctx.fill();

      // head
      ctx.fillStyle="rgba(200,200,200,0.85)";
      ctx.beginPath(); ctx.arc(0,-18,8,0,Math.PI*2); ctx.fill();

      // weapon hint
      ctx.globalAlpha = 0.85*blink;
      ctx.fillStyle = (Game.weapon==='shotgun' && Game.shotgunT>0) ? "rgba(255,220,140,0.85)" : "rgba(180,220,255,0.8)";
      ctx.fillRect(8,-6,10,4);

      // i-frame ring
      if (Game.respawnShieldT>0){
        ctx.globalAlpha = 0.22;
        ctx.strokeStyle="rgba(255,255,255,0.6)";
        ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(0,0,22,0,Math.PI*2); ctx.stroke();
      }

      ctx.restore();
    }


    

    function drawEnemy(e){
      const cx = e.x + e.w/2;
      const cy = e.y + e.h/2;

      // Shadow
      ctx.save();
      ctx.globalAlpha = 0.35;
      ctx.fillStyle = "rgba(0,0,0,0.85)";
      ctx.beginPath();
      ctx.ellipse(cx+3, cy+6, e.w*0.42, e.h*0.30, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();

      // Body (dark silhouette)
      ctx.save();
      ctx.translate(cx, cy);

      const body = ctx.createRadialGradient(0,-6,4, 0,0, e.w*0.7);
      body.addColorStop(0, "rgba(40,40,40,0.95)");
      body.addColorStop(1, "rgba(10,10,10,0.95)");
      ctx.fillStyle = body;

      // torso
      ctx.beginPath();
      ctx.roundRect(-e.w*0.28, -e.h*0.18, e.w*0.56, e.h*0.62, 10);
      ctx.fill();

      // head
      ctx.beginPath();
      ctx.roundRect(-e.w*0.22, -e.h*0.44, e.w*0.44, e.h*0.30, 10);
      ctx.fill();

      // arms
      ctx.globalAlpha = 0.9;
      ctx.beginPath();
      ctx.roundRect(-e.w*0.45, -e.h*0.10, e.w*0.18, e.h*0.26, 8);
      ctx.roundRect(e.w*0.27, -e.h*0.10, e.w*0.18, e.h*0.26, 8);
      ctx.fill();

      // Eyes glow (different per type)
      const eyeColor = (e.kind==='spitter') ? "rgba(80,255,160,0.95)" : (e.kind==='runner' ? "rgba(255,120,120,0.95)" : "rgba(255,60,60,0.90)");
      ctx.globalAlpha = 1;
      const eg = ctx.createRadialGradient(-6,-e.h*0.30,0, -6,-e.h*0.30, 10);
      eg.addColorStop(0, eyeColor);
      eg.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = eg;
      ctx.beginPath(); ctx.arc(-6, -e.h*0.30, 10, 0, Math.PI*2); ctx.fill();
      const eg2 = ctx.createRadialGradient(6,-e.h*0.30,0, 6,-e.h*0.30, 10);
      eg2.addColorStop(0, eyeColor);
      eg2.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = eg2;
      ctx.beginPath(); ctx.arc(6, -e.h*0.30, 10, 0, Math.PI*2); ctx.fill();

      // Small type hint (runner lean)
      if (e.kind==='runner'){
        ctx.globalAlpha = 0.55;
        ctx.strokeStyle = "rgba(255,255,255,0.12)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-e.w*0.10, e.h*0.20);
        ctx.lineTo(e.w*0.10, e.h*0.20);
        ctx.stroke();
      }

      ctx.restore();
    }

    function drawBoss(b){
      const cx = b.x + b.w/2;
      const cy = b.y + b.h/2;

      // Shadow
      ctx.save();
      ctx.globalAlpha = 0.40;
      ctx.fillStyle = "rgba(0,0,0,0.95)";
      ctx.beginPath();
      ctx.ellipse(cx+8, cy+12, b.w*0.55, b.h*0.42, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();

      ctx.save();
      ctx.translate(cx, cy);

      // Mutant brute body
      const t = performance.now()/1000;
      const pulse = 0.55 + 0.45*Math.sin(t*2.6);
      const g = ctx.createRadialGradient(0,-12,10, 0,0, Math.max(b.w,b.h)*0.8);
      g.addColorStop(0, "rgba(55,55,55,0.98)");
      g.addColorStop(1, "rgba(8,8,8,0.98)");
      ctx.fillStyle = g;

      // torso
      ctx.beginPath();
      ctx.roundRect(-b.w*0.28, -b.h*0.06, b.w*0.56, b.h*0.62, 16);
      ctx.fill();

      // shoulders
      ctx.beginPath();
      ctx.roundRect(-b.w*0.42, -b.h*0.12, b.w*0.84, b.h*0.22, 18);
      ctx.fill();

      // head
      ctx.beginPath();
      ctx.roundRect(-b.w*0.18, -b.h*0.44, b.w*0.36, b.h*0.30, 16);
      ctx.fill();

      // eyes (angry glow)
      const eye = ctx.createRadialGradient(-14,-b.h*0.30,0, -14,-b.h*0.30, 18);
      eye.addColorStop(0, `rgba(255,40,40,${0.75+0.25*pulse})`);
      eye.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = eye;
      ctx.beginPath(); ctx.arc(-14, -b.h*0.30, 18, 0, Math.PI*2); ctx.fill();
      const eye2 = ctx.createRadialGradient(14,-b.h*0.30,0, 14,-b.h*0.30, 18);
      eye2.addColorStop(0, `rgba(255,40,40,${0.75+0.25*pulse})`);
      eye2.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = eye2;
      ctx.beginPath(); ctx.arc(14, -b.h*0.30, 18, 0, Math.PI*2); ctx.fill();

      // Health bar (kept as before style)
      const hpPct = clamp(b.hp / b.maxHp, 0, 1);
      ctx.save();
      ctx.translate(-b.w*0.34, -b.h*0.60);
      ctx.globalAlpha = 0.9;
      ctx.fillStyle="rgba(0,0,0,0.55)";
      ctx.fillRect(0,0, b.w*0.68, 10);
      ctx.fillStyle="rgba(255,60,60,0.8)";
      ctx.fillRect(0,0, b.w*0.68*hpPct, 10);
      ctx.restore();

      ctx.restore();
    }


    function drawHazards(){
      for (const m of Game.hazards.meteors){
        ctx.save();
        ctx.translate(m.x+m.w/2, m.y+m.h/2);
        ctx.rotate(m.rot);
        ctx.fillStyle="rgba(255,200,120,0.95)";
        ctx.fillRect(-m.w/2,-m.h/2,m.w,m.h);
        ctx.globalAlpha=0.35;
        ctx.fillStyle="#ffffff";
        ctx.fillRect(-m.w/2,-2,m.w,4);
        ctx.restore();
        ctx.globalAlpha=1;
      }

      for (const mn of Game.hazards.mines){
        const pulse = 0.55 + 0.45*Math.sin(performance.now()/150);
        ctx.globalAlpha = pulse;
        ctx.fillStyle="rgba(255,70,70,0.95)";
        ctx.beginPath();
        ctx.arc(mn.x+mn.w/2, mn.y+mn.h/2, 9, 0, Math.PI*2);
        ctx.fill();
        ctx.globalAlpha=1;
      }

      for (const z of Game.hazards.storms){
        z.t += 0.016;
        const p = 0.35 + 0.15*Math.sin(z.t*2.2);
        ctx.globalAlpha=p;
        ctx.fillStyle="rgba(120,210,255,0.25)";
        ctx.fillRect(z.x,z.y,z.w,z.h);
        ctx.globalAlpha=0.9*p;
        ctx.strokeStyle="rgba(255,80,200,0.45)";
        ctx.strokeRect(z.x,z.y,z.w,z.h);
        ctx.globalAlpha=1;
      }
    }

    function update(dt){
      const p=Game.player, m=Game.mousePos;
      const dx=m.x-p.x, dy=m.y-p.y;
      const maxStep=p.speed*dt;
      const dist=Math.hypot(dx,dy);
      if (dist<=maxStep){ p.x=m.x; p.y=m.y; } else { p.x += dx/dist*maxStep; p.y += dy/dist*maxStep; }
      p.x = clamp(p.x, MARGIN_X, WIDTH - MARGIN_X);
      const top = HEIGHT - BOTTOM_ZONE_H + MARGIN_Y, bottom = HEIGHT - MARGIN_Y;
      p.y = clamp(p.y, top, bottom);

      if (Game.firing){
        Game._fireCD -= dt;
        if (Game._fireCD <= 0){ shoot(); Game._fireCD = 0.15; }
      } else {
        Game._fireCD = 0;
      }

      if (Game.respawnShieldT>0) Game.respawnShieldT = Math.max(0, Game.respawnShieldT - dt);

      ensureStorms();

      if (Game.phase==='playing'){
        Game.spawnT += dt;
        const every = enemySpawnEvery();
        while (Game.spawnT >= every){
          Game.spawnT -= every;
          if (Game.enemies.length < enemyCap()){
                        spawnEnemy('auto');
          }
        }
      }

      if (Game.phase==='playing' && Game.level >= 2){
        if (Math.random() < meteorRate()*dt){
          spawnMeteor();
        }
      }

      for (let i=Game.bullets.length-1;i>=0;i--){
        const b=Game.bullets[i];
        const slow = bulletSlowFactor(b);
        b.x += b.vx*dt*slow;
        b.y += b.vy*dt*slow;
        if (b.y + b.h < -30 || b.y > HEIGHT+30 || b.x < -40 || b.x > WIDTH+40) Game.bullets.splice(i,1);
      }

      for (let i=Game.enemyBullets.length-1;i>=0;i--){
        const eb=Game.enemyBullets[i];
        eb.x += eb.vx*dt; eb.y += eb.vy*dt;
        if (eb.y > HEIGHT+30 || eb.y < -40 || eb.x < -40 || eb.x > WIDTH+40){
          Game.enemyBullets.splice(i,1); continue;
        }
      }

      if (Game.phase==='playing'){
        for (let i=Game.enemies.length-1;i>=0;i--){
          const e=Game.enemies[i];

          // Retarget occasionally for a more natural horde movement (and cheaper than every frame)
          e.retargetT -= dt;
          if (e.retargetT <= 0){
            const cx = e.x + e.w/2, cy = e.y + e.h/2;
            const tx = Game.player.x, ty = Game.player.y;
            let dx = tx - cx, dy = ty - cy;
            const d = Math.max(0.001, Math.hypot(dx,dy));
            dx /= d; dy /= d;

            // Slight wobble so they don't stack perfectly
            const wob = (Math.random()*2-1) * 0.12;
            const cs = Math.cos(wob), sn = Math.sin(wob);
            const rdx = dx*cs - dy*sn, rdy = dx*sn + dy*cs;

            const base = (e.kind==='runner' ? 145 : (e.kind==='spitter' ? 95 : 85)) + (Game.level-1)*6;
            const spd = base * (0.92 + Math.random()*0.16);
            e.vx = rdx * spd;
            e.vy = rdy * spd;
            e.retargetT = 0.14 + Math.random()*0.22;
          }

          e.x += e.vx*dt;
          e.y += e.vy*dt;

          // Spitters shoot acid blobs occasionally
          if (e.kind==='spitter'){
            e.fireCD -= dt;
            if (e.fireCD <= 0){
              enemyShootFrom(e.x+e.w/2, e.y+e.h/2, true, 0);
              // make it feel like acid (slower + slightly larger)
              const eb = Game.enemyBullets[Game.enemyBullets.length-1];
              if (eb){
                eb.w = 8; eb.h = 10;
                eb.vx *= 0.65; eb.vy *= 0.65;
              }
              e.fireCD = (1.05 + Math.random()*0.75) * Math.max(0.85, 1.05 - Game.level*0.05);
            }
          }

          // Cleanup far offscreen
          if (e.y > HEIGHT+80 || e.y < -120 || e.x < -140 || e.x > WIDTH+140){
            Game.enemies.splice(i,1);
          }
        }
      }

      if (Game.phase==='boss' && Game.boss){
        const b=Game.boss;
        b.t += dt;
        b.x += b.vx*dt; b.y += b.vy*dt;
        if (b.x < MARGIN_X){ b.x=MARGIN_X; b.vx*=-1; }
        if (b.x + b.w > WIDTH - MARGIN_X){ b.x = WIDTH - MARGIN_X - b.w; b.vx*=-1; }
        if (b.y < MARGIN_Y){ b.y=MARGIN_Y; b.vy*=-1; }
        if (b.y + b.h > HEIGHT - BOTTOM_ZONE_H - 20){ b.y = HEIGHT - BOTTOM_ZONE_H - 20 - b.h; b.vy*=-1; }

        b.fireCD -= dt;
        b.summonCD -= dt;
        const baseCD = Math.max(0.35, 1.05 - Game.level*0.1);
        if (b.fireCD <= 0){
          const cx=b.x+b.w/2, cy=b.y+b.h/2;
          if (Game.level <= 2){
            enemyShootFrom(cx,cy,false,0);
            Game.enemyBullets[Game.enemyBullets.length-1].vy = 290 + Game.level*12;
            Game.enemyBullets[Game.enemyBullets.length-1].vx = 0;
          } else if (Game.level === 3){
            enemyShootFrom(cx,cy,true,0);
            enemyShootFrom(cx,cy,true,0.22);
            enemyShootFrom(cx,cy,true,-0.22);
          } else if (Game.level === 4){
            for (let i=0;i<6;i++){
              const a = (Math.PI*2/6)*i;
              const spd = 235;
              Game.enemyBullets.push({x:cx-3,y:cy+6,w:6,h:10,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd});
            }
          } else {
            b._spiral = (b._spiral||0)+0.5;
            for (let i=0;i<5;i++){
              const a=b._spiral+i*0.65;
              const spd=245;
              Game.enemyBullets.push({x:cx-3,y:cy+6,w:6,h:10,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd});
            }
          }
          b.fireCD = baseCD;        }

        // Summon minions during the boss fight (horde pressure)
        if (b.summonCD <= 0){
          const n = 3 + Math.min(4, Game.level);
          for (let k=0;k<n;k++){
            spawnEnemy('auto');
          }
          b.summonCD = 2.2 - Math.min(1.0, Game.level*0.12);
        }
      }

      for (let i=Game.hazards.meteors.length-1;i>=0;i--){
        const m=Game.hazards.meteors[i];
        m.y += m.vy*dt;
        m.rot += m.rs*dt;
        if (m.y > HEIGHT+40) Game.hazards.meteors.splice(i,1);
      }

      for (let i=Game.hazards.mines.length-1;i>=0;i--){
        const mn=Game.hazards.mines[i];
        mn.y += mn.vy*dt;
        mn.armedT = Math.max(0, mn.armedT - dt);
        if (mn.y > HEIGHT+40) Game.hazards.mines.splice(i,1);
      }

      const pr = {x:Game.player.x-15,y:Game.player.y-7,w:30,h:14};

      // Powerups (shotgun)
      if (Game.shotgunT > 0){
        Game.shotgunT = Math.max(0, Game.shotgunT - dt);
        if (Game.shotgunT <= 0){
          Game.weapon = 'pistol';
        }
      }

      for (let i=Game.powerups.length-1;i>=0;i--){
        const pu = Game.powerups[i];
        pu.y += pu.vy*dt;
        pu.t += dt;

        const box = {x:pu.x, y:pu.y, w:pu.w, h:pu.h};
        if (rectsOverlap(pr, box)){
          // Pickup
          if (pu.type === 'shotgun'){
            Game.weapon = 'shotgun';
            Game.shotgunT = 8.0; // refresh timer
          }
          Game.powerups.splice(i,1);
          continue;
        }
        if (pu.y > HEIGHT+60) Game.powerups.splice(i,1);
      }

      if (Game.respawnShieldT<=0){
        for (let i=Game.enemyBullets.length-1;i>=0;i--){
          const eb=Game.enemyBullets[i];
          if (rectsOverlap(pr, eb)){
            Game.enemyBullets.splice(i,1);
            registerImpact();
            break;
          }
        }
      }

      if (Game.respawnShieldT<=0){
        for (let i=Game.hazards.meteors.length-1;i>=0;i--){
          const m=Game.hazards.meteors[i];
          if (rectsOverlap(pr, m)){
            Game.hazards.meteors.splice(i,1);
            FX.spawn(m.x+m.w/2, m.y+m.h/2, 1.2);
            registerImpact();
            break;
          }
        }
        for (let i=Game.hazards.mines.length-1;i>=0;i--){
          const mn=Game.hazards.mines[i];
          if (mn.armedT<=0 && rectsOverlap(pr, mn)){
            Game.hazards.mines.splice(i,1);
            FX.spawn(mn.x+mn.w/2, mn.y+mn.h/2, 1.3);
            registerImpact();
            break;
          }
        }
      }

      if (Game.respawnShieldT<=0){
        for (let i=Game.enemies.length-1;i>=0;i--){
          const e=Game.enemies[i];
          if (rectsOverlap(pr, e)){
            Game.enemies.splice(i,1);
            registerImpact();
            break;
          }
        }
      }

      for (let i=Game.bullets.length-1;i>=0;i--){
        const b=Game.bullets[i];

        if (Game.boss && rectsOverlap({x:Game.boss.x,y:Game.boss.y,w:Game.boss.w,h:Game.boss.h}, b)){
          Game.bullets.splice(i,1);
          Game.boss.hp -= 10;
          FX.spawn(b.x,b.y,0.35);
          SFX.hit();
          Game.score += 2;
          if (Game.boss.hp <= 0){
            FX.spawn(Game.boss.x+Game.boss.w/2, Game.boss.y+Game.boss.h/2, 2.0);
            SFX.bigHit();
            Game.score += 150;
            Game.boss = null;
            onLevelComplete();
          }
          continue;
        }

        for (let j=Game.enemies.length-1;j>=0;j--){
          const e=Game.enemies[j];
          if (rectsOverlap(e, b)){
            Game.bullets.splice(i,1);
            e.hp -= 10;
            FX.spawn(b.x,b.y,0.35);
            SFX.hit();
            if (e.hp <= 0){
              Game.enemies.splice(j,1);
              SFX.bigHit();
              Game.score += 10;
              Game.kills += 1;

              // Small chance to drop a shotgun powerup (great for horde control)
              if (Math.random() < 0.08){
                Game.powerups.push({type:'shotgun', x:e.x + e.w/2 - 10, y:e.y + e.h/2 - 10, w:20, h:20, vy:90, t:0});
              }

              
              Game.score += 2;

              if (Game.kills >= Game.targetKills && Game.phase==='playing'){
                spawnBoss();
              }
            }
            break;
          }
        }
      }

      FX.update(dt);
      updateHUD();
    }

    function updateHUD(){
      scoreVal.textContent = Game.score;
      levelVal.textContent = Game.level;
      livesVal.textContent = Game.lives;
      killsVal.textContent = Game.kills;
      targetVal.textContent = Game.targetKills;
      bestVal.textContent = bestScore;
    }

    const debugHud = document.getElementById('debugHud');
    let debugOn = false;
    window.addEventListener('keydown', (e)=>{
      if (e.key === 'd' || e.key === 'D'){
        debugOn = !debugOn;
        debugHud.classList.toggle('hidden', !debugOn);
      }
    });
    function renderDebug(){
      if (!debugOn) return;
      debugHud.textContent = [
        `phase: ${Game.phase}`,
        `level: ${Game.level}`,
        `kills: ${Game.kills}/${Game.targetKills}`,
        `enemies: ${Game.enemies.length}`,
        `bullets: ${Game.bullets.length} / ${Game.enemyBullets.length}`,
        `meteors: ${Game.hazards.meteors.length}`,
        `mines: ${Game.hazards.mines.length}`,
        `boss: ${!!Game.boss}`
      ].join(' | ');
    }

    function drawAll(){
      drawHazards();
      ctx.fillStyle="#e5e7eb";
      for (const b of Game.bullets) ctx.fillRect(b.x,b.y,b.w,b.h);
      ctx.fillStyle="#fca5a5";
      for (const eb of Game.enemyBullets) ctx.fillRect(eb.x,eb.y,eb.w,eb.h);

      // Powerups
      for (const pu of Game.powerups){
        const cx = pu.x + pu.w/2, cy = pu.y + pu.h/2;
        const pulse = 0.6 + 0.4*Math.sin((performance.now()/1000)*6 + pu.t*3);
        ctx.save();
        ctx.globalAlpha = 0.85;
        const g = ctx.createRadialGradient(cx,cy,2, cx,cy, pu.w*1.2);
        g.addColorStop(0, `rgba(255,220,140,${0.65+0.25*pulse})`);
        g.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(cx,cy, pu.w*1.2, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 0.95;
        ctx.fillStyle="rgba(255,220,140,0.85)";
        ctx.beginPath(); ctx.roundRect(pu.x,pu.y,pu.w,pu.h,6); ctx.fill();
        ctx.fillStyle="rgba(30,20,10,0.85)";
        ctx.font="12px system-ui";
        ctx.textAlign="center"; ctx.textBaseline="middle";
        ctx.fillText("SG", cx, cy);
        ctx.restore();
      }

      for (const e of Game.enemies) drawEnemy(e);
      if (Game.boss) drawBoss(Game.boss);
      drawPlayer();
      FX.draw(ctx);
      renderDebug();
    }

    let _rafLast = performance.now();
    function raf(){
      const now = performance.now();
      const dt = Math.min(0.033, (now - _rafLast)/1000);
      _rafLast = now;

      BG.draw(ctx, dt);
      drawAll();

      if (Game.running && !Game.paused && !Game.awaitingCountdown){
        update(dt);
      }
      requestAnimationFrame(raf);
    }

    BG.init();
    resetGame();
    requestAnimationFrame(raf);
  </script>
</body>
