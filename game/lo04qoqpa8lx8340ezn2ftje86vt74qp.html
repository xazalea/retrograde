	<script>

    (function() {
        //Initialization
        var game = new gdjs.RuntimeGame(gdjs.projectData, {});

        //Create a renderer
        game.getRenderer().createStandardCanvas(document.body);

        //Bind keyboards/mouse/touch events
        game.getRenderer().bindStandardEvents(game.getInputManager(), window, document);

        //Load all assets and start the game
        game.loadAllAssets(function() {
            game.startGameLoop();
        });
    })();

	</script>

<script>
  window.SDK_OPTIONS = {
    gameId: "lo04qoqpa8lx8340ezn2ftje86vt74qp",
    onEvent: function (e) {
      switch (e.name) {
        case "SDK_GAME_PAUSE":
          // ここでゲームをミュート／一時停止
          if (window.Howler) Howler.mute(true);
          break;
        case "SDK_GAME_START":
          // 広告終了：ゲーム再開／ミュート解除
          if (window.Howler) Howler.mute(false);
          break;
        case "SDK_READY":
          // SDK の準備完了（必要ならフラグに使う）
          break;
      }
    }
