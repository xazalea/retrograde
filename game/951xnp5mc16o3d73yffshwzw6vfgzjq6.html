        body {

            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            user-select: none;
        }

        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Ini adalah bagian terpenting */
        #banner-container {

            /* Mengeluarkannya dari alur normal agar bisa diposisikan */
            top: 10px;
            /* Jarak 10px dari bawah layar */
            left: 50%;
            /* Posisikan 50% dari kiri */
            transform: translateX(-50%);
            /* Geser ke kiri sebesar 50% dari lebarnya sendiri untuk membuatnya pas di tengah */

            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;

            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            color: white;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .control-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.3);
        }

        .control-btn:active {
            transform: scale(0.95);
        }

        .arrow-controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 15px;
            width: 200px;
            height: 200px;
        }

        .arrow-btn {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            border: none;
            color: white;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .arrow-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(255, 255, 255, 0.3);
        }

        .arrow-btn:active {
            transform: scale(0.9);
            background: rgba(255, 255, 255, 0.3) !important;
        }

        .arrow-up {
            grid-column: 2;
            grid-row: 1;
        }

        .arrow-left {
            grid-column: 1;
            grid-row: 2;
        }

        .arrow-right {
            grid-column: 3;
            grid-row: 2;
        }

        .arrow-down {
            grid-column: 2;
            grid-row: 3;
        }

        .menu-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

            text-align: center;
            color: white;
            max-width: 500px;
            width: 90%;

            font-weight: bold;

            100% {

            25% {
                transform: translateX(-3px) translateY(-3px);
            }

            75% {

            width: 0%;
            transition: width 0.5s ease;
        }

        .level-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
            gap: 15px;
            max-height: 350px;
            overflow-y: auto;

        }

        .level-btn {

            height: 70px;
            border: none;
            border-radius: 15px;
            font-size: 16px;

            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

            background: rgba(76, 175, 80, 0.3);
            border: 2px solid rgba(76, 175, 80, 0.5);
        }

        .level-btn.locked {
            background: rgba(100, 100, 100, 0.2);
            border: 2px solid rgba(100, 100, 100, 0.3);
            cursor: not-allowed;
        }

            background: rgba(76, 175, 80, 0.4);

            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

            align-items: center;

            position: absolute;
            width: 4px;
            height: 4px;

            50% {

            }

                height: 170px;
            }

            .arrow-btn {
                width: 50px;
                height: 50px;

            .menu-content {

            }

</head>

<body>
    <div id="gameContainer">
        <div id="banner-container" style="width: 320px; height: 50px"></div>
        <canvas id="gameCanvas"></canvas>

        <div class="ui-overlay">
            <div class="hud ui-element glassmorphism">
                <div>Level: <span id="levelNum">1</span></div>
                <div>Score: <span id="score">0</span></div>
                <div>Coin: <span id="coins">0</span></div>
                <div>Star: <span id="stars">0</span></div>
            </div>

            <div class="progress-bar ui-element glassmorphism">
                <div class="progress-fill" id="progressFill"></div>
            </div>

            <div class="controls ui-element">
                <button class="control-btn glassmorphism" id="pauseBtn">⏸</button>
                <button class="control-btn glassmorphism" id="soundBtn">🔊</button>
            </div>

            <div class="arrow-controls ui-element">
                <button class="arrow-btn glassmorphism arrow-up" id="upBtn">↑</button>
                <button class="arrow-btn glassmorphism arrow-left" id="leftBtn">←</button>
                <button class="arrow-btn glassmorphism arrow-right" id="rightBtn">→</button>
                <button class="arrow-btn glassmorphism arrow-down" id="downBtn">↓</button>
            </div>
        </div>

        <div class="menu-overlay ui-element" id="mainMenu">
            <div class="menu-content glassmorphism">
                <h1 class="menu-title">🚗 Educational Car Adventure</h1>
                <p style="margin-bottom: 25px; font-weight: bold;">Learn while playing</p>
                <button class="menu-btn glassmorphism" id="playBtn">Start Playing</button>
                <button class="menu-btn glassmorphism" id="levelSelectBtn">Select Levels</button>
                <button class="menu-btn glassmorphism" id="settingsBtn">Setting</button>
            </div>
        </div>

        <div class="pause-overlay ui-element hidden" id="pauseOverlay">
            <div class="pause-content glassmorphism">
                <h2 style="margin-bottom: 25px; font-weight: bold;">⏸ Game Paused</h2>
                <button class="menu-btn glassmorphism" id="resumeBtn">Continue</button>
                <button class="menu-btn glassmorphism" id="mainMenuBtn">Return to Main Menu</button>
                <button class="menu-btn glassmorphism" id="pauseSettingsBtn">Setting</button>
                <!--<button class="menu-btn ad-btn" id="watchAdBtn">🎥 View Ad +50 Coins</button>
            -->
            </div>
        </div>

        <div class="quiz-overlay ui-element hidden" id="quizOverlay">
            <div class="quiz-content glassmorphism">
                <h2 style="font-weight: bold;">🎓 Educational Quiz</h2>
                <p class="quiz-question" id="quizQuestion">What does the STOP sign mean?</p>
                <button class="quiz-option glassmorphism" data-answer="0">Full stop</button>
                <button class="quiz-option glassmorphism" data-answer="1">Just slowly</button>
                <button class="quiz-option glassmorphism" data-answer="2">Straight ahead</button>
            </div>
        </div>

        <div class="message-overlay ui-element hidden" id="messageOverlay">
            <div class="message-content glassmorphism" id="messageContent">
                Your answer is correct! 🎉
            </div>
        </div>

        <div class="fireworks hidden" id="fireworksContainer"></div>
    </div>

                this.currentLevel = this.loadProgress().level || 1;

                this.totalLevels = 250;
                this.soundEnabled = true;
                this.isPaused = false;

                const progress = {

                    score: this.score,
                    coins: this.coins,
                    stars: this.stars

        // Sound Manager
        class SoundManager {
            constructor(gameState) {
                this.gameState = gameState;
                this.sounds = {};
                this.backgroundMusic = null;
                this.initSounds();
            }

            initSounds() {
                // Background Music
                this.backgroundMusic = new Audio('https://assets.mixkit.co/music/846/846.mp3');
                this.backgroundMusic.loop = true;
                this.backgroundMusic.volume = 1;
                this.backgroundMusic.preload = 'auto';
                const soundUrls = {
                    engine: 'https://assets.mixkit.co/active_storage/sfx/1561/1561.wav',
                    coin: 'https://assets.mixkit.co/active_storage/sfx/269/269.wav',
                    click: 'https://assets.mixkit.co/active_storage/sfx/1117/1117.wav',
                    success: 'https://assets.mixkit.co/active_storage/sfx/902/902.wav'
                };

                Object.keys(soundUrls).forEach(key => {
                    this.sounds[key] = new Audio(soundUrls[key]);
                    this.sounds[key].preload = 'auto';
                    if (key === 'engine') {
                        this.sounds[key].loop = true;
                        this.sounds[key].volume = 0.3;
                    }
                });
            }
            playBackgroundMusic() {
                if (this.gameState.soundEnabled) {
                    this.backgroundMusic.play().catch(e => console.log('Music play failed:', e));
                }
            }

            stopBackgroundMusic() {
                this.backgroundMusic.pause();
                this.backgroundMusic.currentTime = 0;
            }

            play(soundName) {
                if (this.gameState.soundEnabled && this.sounds[soundName]) {
                    this.sounds[soundName].currentTime = 0;
                    this.sounds[soundName].play().catch(e => console.log('Sound play failed:', e));
                }
            }

            stop(soundName) {
                if (this.sounds[soundName]) {
                    this.sounds[soundName].pause();
                    this.sounds[soundName].currentTime = 0;
                }
            }
        }

        // Fireworks Effect
        class FireworksEffect {
            static create() {
                const container = document.getElementById('fireworksContainer');
                container.classList.remove('hidden');

                // Create multiple fireworks
                for (let i = 0; i < 5; i++) {
                    setTimeout(() => {
                        this.createSingleFirework(container);
                    }, i * 300);
                }

                // Hide container after animation
                setTimeout(() => {
                    container.classList.add('hidden');
                    container.innerHTML = '';
                }, 3000);
            }

            static createSingleFirework(container) {
                const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7', '#DDA0DD', '#98D8C8'];
                const centerX = Math.random() * window.innerWidth;
                const centerY = Math.random() * window.innerHeight * 0.6 + window.innerHeight * 0.2;

                // Create particles
                for (let i = 0; i < 12; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'firework';

                    const angle = (i / 12) * Math.PI * 2;
                    const distance = 50 + Math.random() * 100;
                    const endX = centerX + Math.cos(angle) * distance;
                    const endY = centerY + Math.sin(angle) * distance;

                    particle.style.left = centerX + 'px';
                    particle.style.top = centerY + 'px';
                    particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    particle.style.boxShadow = `0 0 10px ${colors[Math.floor(Math.random() * colors.length)]}`;

                    // Animate to end position
                    particle.style.setProperty('--end-x', endX + 'px');
                    particle.style.setProperty('--end-y', endY + 'px');
                    particle.style.animation = `fireworkMove 1.5s ease-out forwards, fireworkExplode 1.5s ease-out forwards`;

                    container.appendChild(particle);

                    // Remove particle after animation
                    setTimeout(() => {
                        if (particle.parentNode) {
                            particle.parentNode.removeChild(particle);
                        }
                    }, 2000);
                }
            }
        }

                    const marking = new THREE.Mesh(markingGeometry, markingMaterial);

            generateLevel() {
                // Clear existing collectibles and signs
                this.collectibleMeshes.forEach(mesh => this.scene.remove(mesh));
                this.signMeshes.forEach(mesh => this.scene.remove(mesh));
                this.collectibleMeshes = [];
                this.signMeshes = [];

                // Generate collectibles
                for (let i = 0; i < 10; i++) {
                    const coin = this.createCoin();
                    const x = (Math.random() - 0.5) * 4;
                    const z = Math.random() * 40 - 20;
                    coin.position.set(x, 1, z);
                    this.scene.add(coin);
                    this.collectibleMeshes.push(coin);
                }

                // Generate traffic signs
                for (let i = 0; i < 3; i++) {
                    const sign = this.createTrafficSign();
                    const x = (Math.random() > 0.5 ? 1 : -1) * (6 + Math.random() * 3);
                    const z = Math.random() * 30 - 15;
                    sign.position.set(x, 0, z);
                    this.scene.add(sign);
                    this.signMeshes.push(sign);
                }
            }

            createCoin() {
                const coinGeometry = new THREE.CylinderGeometry(0.5, 0.5, 0.1);
                const coinMaterial = new THREE.MeshLambertMaterial({ color: 0xFFC000 });
                const coin = new THREE.Mesh(coinGeometry, coinMaterial);
                coin.userData = { type: 'coin', collected: false };
                return coin;
            }

            createTrafficSign() {
                const sign = new THREE.Group();

                // Post
                const postGeometry = new THREE.CylinderGeometry(0.1, 0.1, 3);
                const postMaterial = new THREE.MeshLambertMaterial({ color: 0x888888 });
                const post = new THREE.Mesh(postGeometry, postMaterial);
                post.position.y = 1.5;
                sign.add(post);

                // Sign board
                const signGeometry = new THREE.PlaneGeometry(1.5, 1.5);
                const signMaterial = new THREE.MeshLambertMaterial({ color: 0xFF0000 });
                const signBoard = new THREE.Mesh(signGeometry, signMaterial);
                signBoard.position.set(0, 3, 0);
                sign.add(signBoard);

                // STOP text
                const textGeometry = new THREE.PlaneGeometry(1, 0.3);
                const textMaterial = new THREE.MeshLambertMaterial({ color: 0xFFFFFF });
                const text = new THREE.Mesh(textGeometry, textMaterial);
                text.position.set(0, 3, 0.01);
                sign.add(text);

                sign.userData = { type: 'sign' };
                return sign;
            }

            updateCar() {
                if (this.gameState.gameMode !== 'playing') return;

                let moved = false;
                const speed = this.gameState.carSpeed;
                let wheelRotation = 0;

                if (this.keys['ArrowUp'] || this.keys['KeyW']) {
                    this.car.position.z += speed;
                    moved = true;
                    wheelRotation += speed * 3;
                }
                if (this.keys['ArrowDown'] || this.keys['KeyS']) {
                    this.car.position.z -= speed * 0.5;
                    moved = true;
                    wheelRotation -= speed;
                }
                if (this.keys['ArrowLeft'] || this.keys['KeyA']) {
                    if (this.car.position.x < 2.5) {
                        this.car.position.x += speed * 0.8;
                        this.car.rotation.y = 0.15;
                        moved = true;
                    }

                }
                if (this.keys['ArrowRight'] || this.keys['KeyD']) {
                    if (this.car.position.x > -2.5) {
                        this.car.position.x -= speed * 0.8;
                        this.car.rotation.y = -0.15;
                        moved = true;
                    }
                }

                if (!this.keys['ArrowLeft'] && !this.keys['ArrowRight'] && !this.keys['KeyA'] && !this.keys['KeyD']) {
                    this.car.rotation.y *= 0.9;
                }

                // Rotate wheels
                if (moved && this.wheels) {
                    this.wheels.forEach(wheel => {
                        wheel.rotation.x += wheelRotation;
                    });
                }

                // Camera follow
                this.camera.position.z = this.car.position.z - 5;
                this.camera.lookAt(this.car.position.x, this.car.position.y, this.car.position.z + 5);

                // Check collisions
                this.checkCollisions();

                // Auto forward movement
                this.car.position.z += speed * 0.3;

                // Check level completion
                if (this.car.position.z > 40) {
                    this.completeLevel();
                }
            }

            checkCollisions() {
                this.collectibleMeshes.forEach((coin, index) => {
                    if (!coin.userData.collected) {
                        const distance = this.car.position.distanceTo(coin.position);
                        if (distance < 1.5) {
                            coin.userData.collected = true;
                            coin.visible = false;
                            this.gameState.coins++;
                            this.gameState.score += 100;
                            this.soundManager.play('coin');
                            this.updateHUD();
                        }
                    }
                });
            }

            completeLevel() {
                this.gameState.currentLevel++;
                this.gameState.stars += Math.floor(this.gameState.coins / 5);
                this.soundManager.play('success');
                this.gameState.saveProgress();

                this.showQuiz();

            }

            nextLevel() {
                this.car.position.set(0, 0, -40);
                this.generateLevel();
                this.updateHUD();
                this.updateProgressBar();
            }

            showQuiz() {
                this.gameState.gameMode = 'quiz';
                const quizOverlay = document.getElementById('quizOverlay');
                const quizData = this.gameState.quizData[Math.floor(Math.random() * this.gameState.quizData.length)];

                document.getElementById('quizQuestion').textContent = quizData.question;
                const options = quizOverlay.querySelectorAll('.quiz-option');
                options.forEach((option, index) => {
                    option.textContent = quizData.options[index];
                    option.setAttribute('data-answer', index);
                    option.classList.remove('correct');
                    option.style.animation = '';
                    option.onclick = () => this.answerQuiz(index === quizData.correct, quizData.correct);
                });

                quizOverlay.classList.remove('hidden');
            }

            answerQuiz(correct, correctIndex) {
                const options = document.querySelectorAll('.quiz-option');

                if (correct) {
                    this.gameState.score += 500;
                    this.gameState.stars += 2;
                    this.soundManager.play('success');
                    this.showMessage('Your answer is correct! 🎉', 'correct');
                    FireworksEffect.create();
                } else {
                    this.soundManager.play('click');
                    const correctAnswerText = options[correctIndex].textContent;
                    this.showMessage(`Your answer is wrong! 😔. correct answer: ${correctAnswerText}`, 'wrong');

                    // Highlight correct answer
                    options[correctIndex].classList.add('correct');
                }

                setTimeout(() => {
                    document.getElementById('quizOverlay').classList.add('hidden');
                    this.gameState.gameMode = 'playing';
                    this.nextLevel();
                }, 5555);
            }

            showMessage(text, type) {
                const messageOverlay = document.getElementById('messageOverlay');
                const messageContent = document.getElementById('messageContent');

                messageContent.textContent = text;
                messageContent.className = `message-content glassmorphism message-${type}`;
                messageOverlay.classList.remove('hidden');

                setTimeout(() => {
                    messageOverlay.classList.add('hidden');
                }, 5555);
            }

            updateHUD() {
                document.getElementById('levelNum').textContent = this.gameState.currentLevel;
                document.getElementById('score').textContent = this.gameState.score;
                document.getElementById('coins').textContent = this.gameState.coins;
                document.getElementById('stars').textContent = this.gameState.stars;
            }

            updateProgressBar() {
                const progress = (this.gameState.currentLevel / this.gameState.totalLevels) * 100;
                document.getElementById('progressFill').style.width = progress + '%';
            }

            animate() {
                requestAnimationFrame(() => this.animate());

                if (this.gameState.gameMode === 'playing') {
                    this.updateCar();

                    // Animate collectibles
                    this.collectibleMeshes.forEach(coin => {
                        coin.rotation.y += 0.05;
                        coin.position.y = 1 + Math.sin(Date.now() * 0.005 + coin.position.x) * 0.2;
                    });
                }

                this.renderer.render(this.scene, this.camera);
            }
        }

            setupEventListeners() {

                });

                // Pause menu buttons
                document.getElementById('resumeBtn').addEventListener('click', () => {

                });

                document.getElementById('mainMenuBtn').addEventListener('click', () => {

                    this.backToMainMenu();
                });

                document.getElementById('pauseSettingsBtn').addEventListener('click', () => {
                    this.soundManager.play('click');
                    this.showSettingsFromPause();
                });

                document.getElementById('watchAdBtn').addEventListener('click', () => {
                    this.soundManager.play('click');
                    this.watchAd();
                });

                // Arrow controls with improved feedback
                const arrowButtons = {
                    'upBtn': 'ArrowUp',
                    'downBtn': 'ArrowDown',
                    'leftBtn': 'ArrowLeft',
                    'rightBtn': 'ArrowRight'
                };


                Object.keys(arrowButtons).forEach(buttonId => {
                    const button = document.getElementById(buttonId);
                    const key = arrowButtons[buttonId];

                    // Touch events
                    button.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        this.game3D.keys[key] = true;
                        button.style.transform = 'scale(0.9)';
                        button.style.background = 'rgba(255, 255, 255, 0.3)';
                    });

                    button.addEventListener('touchend', (e) => {
                        e.preventDefault();
                        this.game3D.keys[key] = false;
                        button.style.transform = 'scale(1)';
                        button.style.background = '';
                    });

                    // Mouse events
                    button.addEventListener('mousedown', (e) => {
                        e.preventDefault();
                        this.game3D.keys[key] = true;
                        button.style.transform = 'scale(0.9)';
                        button.style.background = 'rgba(255, 255, 255, 0.3)';
                    });

                    button.addEventListener('mouseup', (e) => {
                        e.preventDefault();
                        this.game3D.keys[key] = false;
                        button.style.transform = 'scale(1)';
                        button.style.background = '';
                    });

                    button.addEventListener('mouseleave', (e) => {
                        this.game3D.keys[key] = false;
                        button.style.transform = 'scale(1)';
                        button.style.background = '';
                    });
                });

                // Prevent context menu on mobile
                document.addEventListener('contextmenu', (e) => e.preventDefault());

                // Handle touch swipe controls
                this.setupTouchControls();
            }

            setupTouchControls() {
                let touchStartX = 0;
                let touchStartY = 0;
                let isSwiping = false;

                document.addEventListener('touchstart', (e) => {
                    if (e.target.classList.contains('arrow-btn')) return;
                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                    isSwiping = false;
                });

                document.addEventListener('touchmove', (e) => {
                    if (e.target.classList.contains('arrow-btn')) return;
                    if (this.gameState.gameMode !== 'playing') return;

                    e.preventDefault();

                    const touchX = e.touches[0].clientX;
                    const touchY = e.touches[0].clientY;
                    const deltaX = touchX - touchStartX;
                    const deltaY = touchY - touchStartY;

                    if (Math.abs(deltaX) > 50 || Math.abs(deltaY) > 50) {
                        isSwiping = true;

                        // Reset all keys first
                        Object.keys(this.game3D.keys).forEach(key => {
                            if (key.startsWith('Arrow')) {
                                this.game3D.keys[key] = false;
                            }
                        });

                        if (Math.abs(deltaX) > Math.abs(deltaY)) {
                            if (deltaX > 50) {
                                this.game3D.keys['ArrowRight'] = true;
                            } else if (deltaX < -50) {
                                this.game3D.keys['ArrowLeft'] = true;
                            }
                        } else {
                            if (deltaY > 50) {
                                this.game3D.keys['ArrowDown'] = true;
                            } else if (deltaY < -50) {
                                this.game3D.keys['ArrowUp'] = true;
                            }
                        }
                    }
                });

                document.addEventListener('touchend', (e) => {
                    if (isSwiping) {
                        Object.keys(this.game3D.keys).forEach(key => {
                            if (key.startsWith('Arrow')) {
                                this.game3D.keys[key] = false;
                            }
                        });
                    }
                    isSwiping = false;
                });
            }

            startGame() {
                document.getElementById('mainMenu').classList.add('hidden');
                this.gameState.gameMode = 'playing';
                this.game3D.updateHUD();
                this.game3D.updateProgressBar();
                this.soundManager.play('engine');
                this.soundManager.playBackgroundMusic();
            }

            showPauseMenu() {
                if (this.gameState.gameMode === 'playing') {
                    this.gameState.gameMode = 'paused';
                    this.gameState.isPaused = true;
                    document.getElementById('pauseBtn').textContent = '▶';
                    document.getElementById('pauseOverlay').classList.remove('hidden');
                    this.soundManager.stop('engine');
                    this.soundManager.stopBackgroundMusic();
                }
            }

            resumeGame() {
                this.gameState.gameMode = 'playing';
                this.gameState.isPaused = false;
                document.getElementById('pauseBtn').textContent = '⏸';
                document.getElementById('pauseOverlay').classList.add('hidden');
                this.soundManager.play('engine');
                this.soundManager.playBackgroundMusic();
            }

            backToMainMenu() {
                this.gameState.gameMode = 'menu';
                this.gameState.isPaused = false;
                document.getElementById('pauseBtn').textContent = '⏸';
                document.getElementById('pauseOverlay').classList.add('hidden');
                document.getElementById('mainMenu').classList.remove('hidden');
                this.soundManager.stop('engine');
                this.soundManager.stopBackgroundMusic();
                this.showMainMenu();
            }

            showSettingsFromPause() {
                document.getElementById('pauseOverlay').classList.add('hidden');
                document.getElementById('mainMenu').classList.remove('hidden');
                this.showSettings();
            }

            watchAd() {
                // Simulate watching ad
                this.gameState.coins += 50;
                this.gameState.score += 200;
                this.game3D.updateHUD();
                this.soundManager.play('success');

                const callbacks = {
                    adFinished: () => console.log("End rewarded ad"),
                    adError: (error) => console.log("Error rewarded ad", error),
                    adStarted: () => console.log("Start rewarded ad"),
                };

                // Show confirmation
                const adBtn = document.getElementById('watchAdBtn');
                const originalText = adBtn.textContent;
                adBtn.textContent = '✓ +50 Coins Received!';
                adBtn.style.background = 'rgba(76, 175, 80, 0.3)';
                adBtn.style.animation = 'none';

                setTimeout(() => {
                    adBtn.textContent = originalText;
                    adBtn.style.background = 'linear-gradient(45deg, #FFD700, #FFA500)';
                    adBtn.style.animation = 'shake 0.5s infinite';
                }, 3333);
            }

            showLevelSelect() {
                const menuContent = document.querySelector('.menu-content');
                menuContent.innerHTML = `
                    <h1 class="menu-title">Select Levels</h1>
                    <button class="menu-btn glassmorphism" onclick="gameManager.ui.showMainMenu()">Back</button>
                    <div class="level-grid">
                        ${this.generateLevelButtons()}
                    </div>
                    
                `;
            }

            generateLevelButtons() {
                let buttons = '';
                const maxUnlockedLevel = this.gameState.currentLevel;

                for (let i = 1; i <= Math.min(250, this.gameState.totalLevels); i++) {
                    const unlocked = i <= maxUnlockedLevel;
                    const buttonClass = unlocked ? 'level-btn unlocked glassmorphism' : 'level-btn locked glassmorphism';
                    const onclick = unlocked ? `onclick="gameManager.ui.selectLevel(${i})"` : '';
                    const content = unlocked ? i : '<span class="lock-icon">🔒</span>';

                    buttons += `<button class="${buttonClass}" ${onclick}>${content}</button>`;
                }

                return buttons;
            }

            selectLevel(level) {
                this.gameState.currentLevel = level;
                this.soundManager.play('click');
                this.startGame();
            }

            showSettings() {
                const menuContent = document.querySelector('.menu-content');
                const soundText = this.gameState.soundEnabled ? 'Turn Off Sound' : 'Turn on Sound';

                menuContent.innerHTML = `
                    <h1 class="menu-title">Setting</h1>
                    <button class="menu-btn glassmorphism" onclick="gameManager.ui.toggleSoundSetting()">${soundText}</button>
                    <button class="menu-btn glassmorphism" onclick="gameManager.ui.resetProgress()">Reset Progress</button>
                    <button class="menu-btn glassmorphism" onclick="gameManager.ui.showControls()">How to Play</button>
                    <button class="menu-btn glassmorphism" onclick="gameManager.ui.showMainMenu()">Back</button>
                `;
            }

            showControls() {
                const menuContent = document.querySelector('.menu-content');
                menuContent.innerHTML = `
                    <h1 class="menu-title">How to Play</h1>
                    <div style="text-align: left; font-size: 18px; line-height: 1.8; font-weight: bold;">
                        <p><strong>Controls:</strong></p>
                        <p>• Use the keyboard arrows or on-screen buttons</p>
                        <p>• ↑ = Forward, ↓ = Backward</p>
                        <p>• ← = Turn left, → = Turn right</p>
                        <p>• Swipe on the screen for quick controls</p>
                        <p><strong>Objective:</strong></p>
                        <p>• Collect the gold coins</p>
                        <p>• Learn the traffic signs</p>
                        <p>• Answer a quiz every 5 levels</p>
                        <p>• Reach the finish line!</p>
                    </div>
                    <button class="menu-btn glassmorphism" onclick="gameManager.ui.showSettings()">Back</button>
                `;
            }

            showMainMenu() {
                const menuContent = document.querySelector('.menu-content');
                menuContent.innerHTML = `
                    <h1 class="menu-title">🚗 Educational Car Adventure</h1>
                    <p style="margin-bottom: 25px; font-weight: bold;">Learn while playing!</p>
                    <button class="menu-btn glassmorphism" onclick="gameManager.ui.startGame()">Start Playing</button>
                    <button class="menu-btn glassmorphism" onclick="gameManager.ui.showLevelSelect()">Select Levels</button>
                    <button class="menu-btn glassmorphism" onclick="gameManager.ui.showSettings()">Setting</button>
                `;
            }

            toggleSound() {
                this.gameState.soundEnabled = !this.gameState.soundEnabled;
                document.getElementById('soundBtn').textContent = this.gameState.soundEnabled ? '🔊' : '🔇';

                if (!this.gameState.soundEnabled) {
                    Object.keys(this.soundManager.sounds).forEach(key => {
                        this.soundManager.stop(key);
                    });
                    this.soundManager.stopBackgroundMusic();
                } else if (this.gameState.gameMode === 'playing') {
                    this.soundManager.play('engine');
                    this.soundManager.playBackgroundMusic();
                }
            }

            toggleSoundSetting() {
                this.toggleSound();
                this.showSettings();
            }

            resetProgress() {
                if (confirm('Are you sure you want to delete all progress?')) {
                    localStorage.removeItem('carGameProgress');
                    this.gameState.currentLevel = 1;
                    this.gameState.score = 0;
                    this.gameState.coins = 0;
                    this.gameState.stars = 0;
                    this.soundManager.play('click');
                    this.showMainMenu();
                }
            }
        }

        // Game Manager - Main Controller
        class GameManager {
            constructor() {
                this.gameState = new GameState();
                this.soundManager = new SoundManager(this.gameState);
                this.game3D = new Game3D(this.gameState, this.soundManager);
                this.ui = new UIManager(this.gameState, this.soundManager, this.game3D);

                // Make UI methods globally accessible for onclick handlers
                window.gameManager = this;

                this.init();

            }


            init() {

                // Initialize game
                console.log('🚗 3D Educational Car Adventure - Game Started!');
                console.log('Level:', this.gameState.currentLevel);

                // Auto-start background music after user interaction
                document.addEventListener('click', () => {
                    if (this.gameState.soundEnabled) {
                        this.soundManager.play('click');
                    }
                }, { once: true });

                // Handle visibility change (pause when tab not active)
                document.addEventListener('visibilitychange', () => {
                    if (document.hidden && this.gameState.gameMode === 'playing') {
                        this.ui.showPauseMenu();
                    }
                });

                // Performance monitoring
                this.setupPerformanceMonitoring();


            }

            setupPerformanceMonitoring() {
                let lastTime = performance.now();
                let frameCount = 0;
                let fps = 60;

                const updateFPS = () => {
                    frameCount++;
                    const currentTime = performance.now();

                    if (currentTime - lastTime >= 1000) {
                        fps = Math.round((frameCount * 1000) / (currentTime - lastTime));
                        frameCount = 0;
                        lastTime = currentTime;

                        // Adjust quality based on performance
                        if (fps < 30) {
                            this.game3D.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1));
                        } else if (fps > 50) {
                            this.game3D.renderer.setPixelRatio(window.devicePixelRatio);
                        }
                    }

                    requestAnimationFrame(updateFPS);
                };

                updateFPS();
            }
        }

        // Initialize game when page loads
        document.addEventListener('DOMContentLoaded', () => {
            new GameManager();
        });

        // Global helper functions for UI
        function showMainMenu() {
            gameManager.ui.showMainMenu();
        }

        function selectLevel(level) {
            gameManager.ui.selectLevel(level);
        }

        function toggleSoundSetting() {
            gameManager.ui.toggleSoundSetting();
        }

        function resetProgress() {
            gameManager.ui.resetProgress();
        }

        function showControls() {
            gameManager.ui.showControls();
        }

        function showSettings() {
            gameManager.ui.showSettings();
        }

        // PWA Support
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                // Service worker registration would go here
                console.log('PWA support detected');
            });
        }


        // Analytics (simple implementation)
        class Analytics {
            static trackEvent(eventName, parameters = {}) {
                const event = {
                    event: eventName,
                    timestamp: Date.now(),
                    ...parameters
                };

                // Store in localStorage for simple analytics
                const events = JSON.parse(localStorage.getItem('gameAnalytics') || '[]');
                events.push(event);

                // Keep only last 100 events
                if (events.length > 100) {
                    events.splice(0, events.length - 100);
                }

                localStorage.setItem('gameAnalytics', JSON.stringify(events));
                console.log('Analytics:', event);
            }

            static getSessionStats() {
                const events = JSON.parse(localStorage.getItem('gameAnalytics') || '[]');
                return {
                    totalEvents: events.length,
                    levelsCompleted: events.filter(e => e.event === 'level_complete').length,
                    coinsCollected: events.filter(e => e.event === 'coin_collected').length,
                    quizzesAnswered: events.filter(e => e.event === 'quiz_answered').length
                };
            }
        }

        // Export Analytics for external use
        window.GameAnalytics = Analytics;
    </script>
