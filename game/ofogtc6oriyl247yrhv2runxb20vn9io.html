<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zombie Horde Survival</title>
  <style>
    :root{
      --w: 800px;
      --h: 570px;
      --panel: #151a2e;
      --accent: #7dd3fc;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --chip-bg: rgba(21,26,46,.9);
      --chip-brd: rgba(125, 211, 252, .18);
    }
    html, body { height:100%; margin:0; background:#000; font-family: system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,Arial; color:var(--text); }
    .wrap { min-height:100%; display:grid; place-items:center; padding:24px; }
    .game-shell { width:var(--w); height:var(--h); position:relative; background:#000; border-radius:16px; box-shadow:0 10px 30px rgba(0,0,0,.45), inset 0 0 0 1px rgba(255,255,255,.06); overflow:hidden; user-select:none; }
    .topbar { position:absolute; top:6px; left:6px; right:6px; display:flex; align-items:center; gap:8px; white-space:nowrap; z-index:5; background:linear-gradient(180deg, rgba(6,8,16,.35), rgba(6,8,16,.0)); padding:4px 4px; }
    .btn { background:var(--panel); border:1px solid var(--chip-brd); border-radius:10px; color:var(--text); font-weight:700; padding:6px 10px; cursor:pointer; box-shadow:0 4px 10px rgba(0,0,0,.25); font-size:13px; line-height:1; display:inline-flex; align-items:center; gap:6px; }
    .chip { background:var(--chip-bg); border:1px solid var(--chip-brd); border-radius:10px; padding:6px 10px; font-weight:600; font-size:13px; display:inline-flex; align-items:center; gap:8px; box-shadow: inset 0 0 18px rgba(125,211,252,.06); }
    .chip span { color:var(--muted); font-weight:500; }
    .spacer { flex:1 1 auto; }
    canvas { position:absolute; inset:0; cursor: crosshair; }
    .centerOverlay { position:absolute; inset:0; background:rgba(6,8,16,.86); display:grid; place-items:center; z-index:6; backdrop-filter:blur(2px); text-align:center; }
    .card { background:#151a2e; border:1px solid rgba(125,211,252,.25); border-radius:16px; padding:18px 20px; text-align:center; max-width:520px; box-shadow:0 20px 40px rgba(0,0,0,.45); }
    .card h2 { margin:0 0 8px 0; font-size:20px; }
    .card p { margin:4px 0 12px 0; color:var(--muted); }
    .playBig { background:linear-gradient(180deg,#1e293b,#0b1022); border:1px solid rgba(125,211,252,.45); border-radius:14px; color:#e2f3ff; font-weight:800; font-size:18px; padding:12px 22px; cursor:pointer; box-shadow:0 8px 24px rgba(0,0,0,.35); display:inline-flex; align-items:center; gap:10px; }
    .countdown { font-size:56px; font-weight:900; letter-spacing:2px; color:#e2f3ff; margin-top:8px; opacity:0; transform:scale(0.9); transition:opacity .2s ease, transform .2s ease; }
    .countdown.show { opacity:1; transform:scale(1); }
    .hidden { display:none !important; }
    .hint { font-size:12px; color:#cbd5e1; opacity:.9; margin-top:8px; }
    .debugHud { position:absolute; left:8px; bottom:8px; background:rgba(0,0,0,.55); border:1px solid rgba(125,211,252,.25); padding:6px 8px; border-radius:8px; font:12px/1.3 system-ui,Segoe UI,Roboto; color:#cbd5e1; pointer-events:none; }
    .debugHud.hidden { display:none; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="game-shell" id="game">
      <div class="topbar">
        <button id="btnStart" class="btn" onclick="sdk.showBanner()">▶ Start / Resume</button>
        <button id="btnPause" class="btn">⏸️ Pause</button>
        <div class="spacer"></div>
        <div class="chip"><span>Lives</span><b id="livesVal">3</b></div>
        <div class="chip"><span>Level</span><b id="levelVal">1</b></div>
        <div class="chip"><span>Score</span><b id="scoreVal">0</b></div>
        <div class="chip"><span>Kills</span><b id="killsVal">0</b><span>/</span><b id="targetVal">25</b></div>
        <div class="chip"><span>Best</span><b id="bestVal">0</b></div>
      </div>

      <canvas id="view" width="800" height="570"></canvas>

      <div id="centerPlay" class="centerOverlay">
        <div class="card">
          <h2 id="playTitle">Level 1</h2>
          <p id="playSub">Click Play to begin.</p>
          <button id="btnPlayCenter" class="playBig" onclick="sdk.showBanner()">▶ Play</button>
          <div id="countdown" class="countdown hidden">3</div>
          <div class="hint">Controls: Move with mouse • Collect items • Avoid traps • Pause/Resume from top buttons</div>
        </div>
      </div>

      <div id="gameOver" class="centerOverlay hidden">
        <div class="card">
          <h2>Game Over</h2>
          <p>Final score: <b id="finalScore">0</b></p>
          <button id="btnTryAgain" class="playBig">↻ Play Again</button>
        </div>
      </div>

      <div id="winOverlay" class="centerOverlay hidden">
        <div class="card">
          <h2>Victory!</h2>
          <p>Total score: <b id="winScore">0</b></p>
          <button id="btnPlayAgainWin" class="playBig">↻ Play Again</button>
        </div>
      </div>

      <div id="pausedOverlay" class="centerOverlay hidden">
        <div class="card">
          <h2>Paused</h2>
          <p>Press Resume to continue.</p>
          <button id="btnResume" class="playBig">▶ Resume</button>
        </div>
      </div>

      <div id="debugHud" class="debugHud hidden"></div>
    </div>
  </div>


  <!-- GameMonetize Ads (kept intact) -->

  <script>
    const WIDTH = 800, HEIGHT = 570;
    const BOTTOM_ZONE_H = 0;
    const MARGIN_X = 10, MARGIN_Y = 10;
    const STORAGE_BEST_KEY = 'neon_abyss_defender_best_v1';
    const MAX_LEVEL = 5;

    const KILL_BASE = 20;   // repurposed as "Collected"
    const KILL_INC = 15;

    const RESPAWN_SHIELD_TIME = 1.5;

    const cvs = document.getElementById('view');
    const ctx = cvs.getContext('2d');

    // roundRect polyfill (for older browsers)
    if (!CanvasRenderingContext2D.prototype.roundRect){
      CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
        r = Math.min(r, w/2, h/2);
        this.beginPath();
        this.moveTo(x+r, y);
        this.arcTo(x+w, y, x+w, y+h, r);
        this.arcTo(x+w, y+h, x, y+h, r);
        this.arcTo(x, y+h, x, y, r);
        this.arcTo(x, y, x+w, y, r);
        this.closePath();
        return this;
      };
    }

    const btnStart = document.getElementById('btnStart');
    const btnPause = document.getElementById('btnPause');
    const btnResume = document.getElementById('btnResume');

    const scoreVal = document.getElementById('scoreVal');
    const levelVal = document.getElementById('levelVal');
    const livesVal = document.getElementById('livesVal');
    const killsVal = document.getElementById('killsVal');
    const targetVal = document.getElementById('targetVal');
    const bestVal = document.getElementById('bestVal');

    const centerPlay = document.getElementById('centerPlay');
    const btnPlayCenter = document.getElementById('btnPlayCenter');
    const playTitle = document.getElementById('playTitle');
    const playSub   = document.getElementById('playSub');
    const countdownEl = document.getElementById('countdown');

    const gameOverOverlay = document.getElementById('gameOver');
    const finalScoreEl = document.getElementById('finalScore');
    const btnTryAgain = document.getElementById('btnTryAgain');

    const winOverlay = document.getElementById('winOverlay');
    const winScoreEl = document.getElementById('winScore');
    const btnPlayAgainWin = document.getElementById('btnPlayAgainWin');

    const pausedOverlay = document.getElementById('pausedOverlay');

    let bestScore = 0;
    try { bestScore = parseInt(localStorage.getItem(STORAGE_BEST_KEY) || '0', 10) || 0; } catch(e){}
    bestVal.textContent = bestScore;

    const FX = {
      parts: [],
      spawn(x,y, power=1){
        const count = Math.floor(14 + 10*power);
        for (let i=0;i<count;i++){
          const a = Math.random()*Math.PI*2;
          const spd = (80 + Math.random()*150)*(0.8 + 0.6*power);
          FX.parts.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:0,max:0.55+Math.random()*0.35});
        }
      },
      update(dt){
        for (let i=FX.parts.length-1;i>=0;i--){
          const p=FX.parts[i];
          p.life+=dt; p.x+=p.vx*dt; p.y+=p.vy*dt;
          p.vx*= (1-0.9*dt); p.vy*= (1-0.9*dt);
          if (p.life>=p.max) FX.parts.splice(i,1);
        }
      },
      draw(ctx){
        ctx.save();
        ctx.fillStyle="#e2f3ff";
        for (const p of FX.parts){
          const a = Math.max(0,1-p.life/p.max);
          ctx.globalAlpha=a;
          ctx.fillRect(p.x,p.y,2,2);
        }
        ctx.restore();
      }
    };

    // ====== SFX (WebAudio - no external files)
    // Audio starts after the first user gesture (click/tap).
    const SFX = {
      ctx: null,
      enabled: true,
      init(){
        if (this.ctx) return;
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) { this.enabled=false; return; }
        this.ctx = new AC();
      },
      resume(){
        if (!this.enabled) return;
        if (!this.ctx) this.init();
        if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume().catch(()=>{});
      },
      _tone(freq, dur, type='sine', gain=0.06, bend=0){
        if (!this.enabled || !this.ctx) return;
        const t0 = this.ctx.currentTime;
        const o = this.ctx.createOscillator();
        const g = this.ctx.createGain();
        o.type = type;
        o.frequency.setValueAtTime(freq, t0);
        if (bend !== 0){
          o.frequency.exponentialRampToValueAtTime(Math.max(40, freq + bend), t0 + dur);
        }
        g.gain.setValueAtTime(0.0001, t0);
        g.gain.exponentialRampToValueAtTime(gain, t0 + 0.01);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
        o.connect(g); g.connect(this.ctx.destination);
        o.start(t0);
        o.stop(t0 + dur + 0.02);
      },
      _noise(dur, gain=0.08, hp=700){
        if (!this.enabled || !this.ctx) return;
        const t0 = this.ctx.currentTime;
        const len = Math.floor(this.ctx.sampleRate * dur);
        const buf = this.ctx.createBuffer(1, len, this.ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i=0;i<len;i++){
          data[i] = (Math.random()*2-1) * (1 - i/len);
        }
        const src = this.ctx.createBufferSource();
        src.buffer = buf;

        const filter = this.ctx.createBiquadFilter();
        filter.type = 'highpass';
        filter.frequency.value = hp;

        const g = this.ctx.createGain();
        g.gain.setValueAtTime(0.0001, t0);
        g.gain.exponentialRampToValueAtTime(gain, t0 + 0.01);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);

        src.connect(filter);
        filter.connect(g);
        g.connect(this.ctx.destination);

        src.start(t0);
        src.stop(t0 + dur + 0.02);
      },
      collect(){
        if (!this.enabled || !this.ctx) return;

        // Casino-like "chime": quick ascending arpeggio with bell-ish partials
        const t0 = this.ctx.currentTime;

        const play = (freq, dt, dur, gain, bend=0)=>{
          // primary
          const o1 = this.ctx.createOscillator();
          const g1 = this.ctx.createGain();
          o1.type = 'triangle';
          o1.frequency.setValueAtTime(freq, t0 + dt);
          if (bend) o1.frequency.exponentialRampToValueAtTime(Math.max(60, freq + bend), t0 + dt + dur);
          g1.gain.setValueAtTime(0.0001, t0 + dt);
          g1.gain.exponentialRampToValueAtTime(gain, t0 + dt + 0.008);
          g1.gain.exponentialRampToValueAtTime(0.0001, t0 + dt + dur);
          o1.connect(g1); g1.connect(this.ctx.destination);
          o1.start(t0 + dt);
          o1.stop(t0 + dt + dur + 0.02);

          // bell partial (adds sparkle)
          const o2 = this.ctx.createOscillator();
          const g2 = this.ctx.createGain();
          o2.type = 'sine';
          o2.frequency.setValueAtTime(freq*2.01, t0 + dt);
          g2.gain.setValueAtTime(0.0001, t0 + dt);
          g2.gain.exponentialRampToValueAtTime(gain*0.45, t0 + dt + 0.006);
          g2.gain.exponentialRampToValueAtTime(0.0001, t0 + dt + dur*0.9);
          o2.connect(g2); g2.connect(this.ctx.destination);
          o2.start(t0 + dt);
          o2.stop(t0 + dt + dur + 0.02);
        };

        // Ascending notes (C6-ish -> E6-ish -> G6-ish), very short
        play(1046.5, 0.000, 0.070, 0.055, 80);   // C6
        play(1318.5, 0.060, 0.070, 0.050, 90);   // E6
        play(1568.0, 0.120, 0.090, 0.045, 110);  // G6
      },
      heal(){
        if (!this.enabled || !this.ctx) return;
        this._tone(520, 0.14, 'triangle', 0.06, 420);
      },
      hurt(){
        if (!this.enabled || !this.ctx) return;
        this._noise(0.10, 0.11, 800);
        this._tone(140, 0.10, 'sawtooth', 0.06, -60);
      },
      bigHurt(){
        if (!this.enabled || !this.ctx) return;
        this._noise(0.18, 0.14, 500);
        this._tone(90, 0.18, 'sawtooth', 0.08, -40);
        this._tone(220, 0.12, 'square', 0.04, -90);
      }
    };


    const BG = {
      t:0,
      stars:[],
      init(){
        this.stars.length=0;
        for (let i=0;i<420;i++){
          this.stars.push({
            x:Math.random()*WIDTH,
            y:Math.random()*HEIGHT,
            s:Math.random()<0.86?1:(Math.random()<0.92?2:3),
            a:0.10+Math.random()*0.60,
            tw:Math.random()*Math.PI*2,
            sp:0.35+Math.random()*1.25
          });
        }
      },
      draw(ctx,dt){
        this.t += dt;

        // Pure starry sky background
        ctx.fillStyle = "#02030a";
        ctx.fillRect(0,0,WIDTH,HEIGHT);

        // Soft nebula gradients
        const n1 = ctx.createRadialGradient(WIDTH*0.25, HEIGHT*0.30, 0, WIDTH*0.25, HEIGHT*0.30, 520);
        n1.addColorStop(0, "rgba(70,120,255,0.10)");
        n1.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = n1;
        ctx.fillRect(0,0,WIDTH,HEIGHT);

        const n2 = ctx.createRadialGradient(WIDTH*0.80, HEIGHT*0.70, 0, WIDTH*0.80, HEIGHT*0.70, 560);
        n2.addColorStop(0, "rgba(255,80,200,0.06)");
        n2.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = n2;
        ctx.fillRect(0,0,WIDTH,HEIGHT);

        // Stars
        for (const s of this.stars){
          s.tw += dt*s.sp;
          const tw = 0.65 + 0.35*Math.sin(s.tw);
          ctx.globalAlpha = s.a*tw;
          ctx.fillStyle="#eaf2ff";
          ctx.fillRect(s.x,s.y,s.s,s.s);
        }
        ctx.globalAlpha=1;

        // Vignette
        const vg = ctx.createRadialGradient(WIDTH/2,HEIGHT/2,120, WIDTH/2,HEIGHT/2, 620);
        vg.addColorStop(0,"rgba(0,0,0,0)");
        vg.addColorStop(1,"rgba(0,0,0,0.55)");
        ctx.fillStyle = vg;
        ctx.fillRect(0,0,WIDTH,HEIGHT);
      }
    };



    const Game = {
      running:false, paused:false, lastFrame:performance.now(),
      score:0,

      // kept for structure (unused in Collector)
      bullets:[], enemyBullets:[], enemies:[], boss:null,
      powerups:[],

      // collector-specific
      collectibles: [],
      collectT: 0,
      _mineT: 0,
      fistT: 0,

      hazards:{ meteors:[], mines:[], storms:[] },

      // Big red chasing coin (always active)
      chaser: { x: WIDTH*0.5, y: HEIGHT*0.25, w: 54, h: 54, speed: 520 },

      player:{ x: WIDTH/2, y: HEIGHT*0.75, speed: 1200 },
      mousePos:{ x: WIDTH/2, y: HEIGHT*0.75 },
      aimPos:{ x: WIDTH/2, y: HEIGHT*0.35 },

      lives:3, level:1, kills:0, targetKills:KILL_BASE,
      phase:'init', awaitingCountdown:false,
      respawnShieldT:0,
      _handlingImpact:false
    };

    function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
    function rectsOverlap(a,b){ return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y; }

    cvs.addEventListener('mousemove', (e)=>{
      const rect = cvs.getBoundingClientRect();
      const mx = (e.clientX - rect.left) * (cvs.width / rect.width);
      const my = (e.clientY - rect.top) * (cvs.height / rect.height);

      Game.mousePos.x = clamp(mx, MARGIN_X, WIDTH - MARGIN_X);
      Game.mousePos.y = clamp(my, MARGIN_Y, HEIGHT - MARGIN_Y);

      // keep aimPos updated (not used, but preserves structure)
      Game.aimPos.x = clamp(mx, 0, WIDTH);
      Game.aimPos.y = clamp(my, 0, HEIGHT);
    });

    // no shooting in collector; keep audio resume on first gesture
    cvs.addEventListener('pointerdown', ()=>{ SFX.resume(); });
    window.addEventListener('pointerup', ()=>{});

    btnStart.addEventListener('click', startOrResume);
    btnPlayCenter.addEventListener('click', startOrResume);
    btnTryAgain.addEventListener('click', resetAndShowIntro);
    btnPlayAgainWin.addEventListener('click', resetAndShowIntro);
    btnPause.addEventListener('click', ()=> togglePause(true));
    btnResume.addEventListener('click', ()=> togglePause(false));

    function runCountdown(done){
      if (Game.awaitingCountdown) return;
      Game.awaitingCountdown = true;
      let n=3;
      countdownEl.textContent=String(n);
      countdownEl.classList.remove('hidden');
      setTimeout(()=>countdownEl.classList.add('show'),0);

      const tick=()=>{
        n--;
        if (n>0){
          countdownEl.classList.remove('show');
          setTimeout(()=>{ countdownEl.textContent=String(n); countdownEl.classList.add('show'); },180);
          setTimeout(tick,800);
        } else {
          countdownEl.classList.remove('show');
          setTimeout(()=>{ countdownEl.classList.add('hidden'); Game.awaitingCountdown=false; done&&done(); },200);
        }
      };
      setTimeout(tick,800);
    }

    function startOrResume(){
      // Safety: always clear any pending countdown lock
      Game.awaitingCountdown = false;
      SFX.resume();
      gameOverOverlay.classList.add('hidden');
      winOverlay.classList.add('hidden');
      pausedOverlay.classList.add('hidden');

      runCountdown(()=>{
        centerPlay.classList.add('hidden');

        // Start (or restart) the level whenever the center Play is used.
        // This avoids edge-cases where the game is left in a half-transition state.
        startGame();

        Game.paused = false;
        Game.lastFrame = performance.now();
        Game.phase = 'playing';
      });
    }

    function togglePause(forcePause){
      if (!Game.running) return;
      const newPaused = typeof forcePause === 'boolean' ? forcePause : !Game.paused;
      Game.paused = newPaused;
      if (!newPaused){
        Game.lastFrame = performance.now();
        pausedOverlay.classList.add('hidden');
      } else {
        pausedOverlay.classList.remove('hidden');
      }
    }

    function collectibleEvery(){
      // L1 ~0.95s -> L6 ~0.45s
      return Math.max(0.45, 0.95 - (Game.level-1)*0.10);
    }

    function spawnCollectible(){
      const w = 18, h = 18;
      const x = Math.random()*(WIDTH - w);
      const y = -h - 10;
      const vy = 115 + Game.level*12;

      // types: coin (common), heart (rare)
      const r = Math.random();
      const type = 'coin';

      Game.collectibles.push({type, x, y, w, h, vy, t:0});
    }

    function mineEvery(){
      // traps start from level 2
      if (Game.level < 2) return Infinity;
      return Math.max(2.0, 3.4 - (Game.level-2)*0.30);
    }

    function dropMine(x,y){
      // bad coin (same geometry as good coin, but red)
      const w=18, h=18;
      Game.hazards.mines.push({x:x-w/2,y:y,w,h,vy:95 + Game.level*10, armedT:0.20, t:0});
    }

function registerImpact(){
      if (Game._handlingImpact) return;
      if (Game.respawnShieldT > 0) return;

      Game._handlingImpact = true;
      try{
        if (typeof Game.lives !== 'number' || !Number.isFinite(Game.lives)) Game.lives = 1;

        SFX.bigHurt();
        Game.lives -= 1;

        if (Game.lives <= 0){
          Game.lives = 0;
          updateHUD();
          endGame();
          return;
        }

        Game.respawnShieldT = 0.80; // i-frames
        updateHUD();
      } finally {
        Game._handlingImpact = false;
      }
    }

    function endGame(){
      Game.running=false; Game.paused=false; Game.phase='over';
      finalScoreEl.textContent = String(Game.score);
      if (Game.score > bestScore){
        bestScore = Game.score;
        bestVal.textContent = bestScore;
        try { localStorage.setItem(STORAGE_BEST_KEY, String(bestScore)); } catch(e){}
      }
      gameOverOverlay.classList.remove('hidden');
    }

    function victory(){
      Game.running=false; Game.paused=false; Game.phase='win';
      winScoreEl.textContent = String(Game.score);
      if (Game.score > bestScore){
        bestScore = Game.score;
        bestVal.textContent = bestScore;
        try { localStorage.setItem(STORAGE_BEST_KEY, String(bestScore)); } catch(e){}
      }
      winOverlay.classList.remove('hidden');
    }

    function onLevelComplete(){
      Game.running = false;
      Game.phase='between';
      Game.awaitingCountdown = false;

      // clear moving objects
      Game.collectibles.length=0;
      Game.hazards.mines.length=0;
      Game.hazards.meteors.length=0;
      Game.hazards.storms.length=0;

      // keep unused arrays cleared for structure consistency
      Game.enemies.length=0;
      Game.enemyBullets.length=0;
      Game.bullets.length=0;
      Game.boss=null;

      if (Game.level >= MAX_LEVEL){
        victory();
        return;
      }

      Game.level += 1;
      Game.kills = 0;
      Game.targetKills = KILL_BASE + KILL_INC*(Game.level-1);
      Game.lives += 1;

      playTitle.textContent = `Level ${Game.level}`;
      playSub.textContent = levelDescription(Game.level);
      centerPlay.classList.remove('hidden');
      updateHUD();
    }

    function levelDescription(lv){
      if (lv===1) return "Collect the gold coins before the horde arrives.";
      if (lv===2) return "Bad coins appear. Stay sharp!";
      if (lv===3) return "More loot drops. Faster pace.";
      if (lv===4) return "Keep moving—bad coins are frequent.";
      // Level 5 is the final level now
      return "Final run. Collect everything!";
    }

    function resetGame(){
      Game.running=false; Game.paused=false;
      Game.score=0;

      Game.collectibles.length=0;
      Game.collectT=0;
      Game._mineT=0;

      Game.fistT=0;

      // keep structure arrays reset
      Game.bullets.length=0; Game.enemyBullets.length=0; Game.enemies.length=0; Game.boss=null;
      Game.hazards.meteors.length=0; Game.hazards.mines.length=0; Game.hazards.storms.length=0;

      Game.player.x=WIDTH/2; Game.player.y=HEIGHT*0.75;
      Game.mousePos.x=Game.player.x; Game.mousePos.y=Game.player.y;

      // reset chaser
      Game.chaser.x = WIDTH*0.5;
      Game.chaser.y = HEIGHT*0.25;

      Game.lives=3; Game.level=1; Game.kills=0; Game.targetKills=KILL_BASE;
      Game.phase='init'; Game.awaitingCountdown=false;
      Game.respawnShieldT=0; Game._handlingImpact=false;

      playTitle.textContent="Level 1";
      playSub.textContent="Click Play to begin.";
      updateHUD();
      centerPlay.classList.remove('hidden');
    }

    function resetAndShowIntro(){
      gameOverOverlay.classList.add('hidden');
      winOverlay.classList.add('hidden');
      pausedOverlay.classList.add('hidden');
      resetGame();
    }

    function startGame(){
      Game.running=true;
      Game.paused=false;
      Game.phase='playing';
      Game.lastFrame=performance.now();

      // Place chaser near top with slight randomness each level
      Game.chaser.w = 54; Game.chaser.h = 54;
      Game.chaser.speed = 94; // 40% slower than previous
      Game.chaser.x = clamp(WIDTH*0.5 + (-120 + Math.random()*240), 40, WIDTH-40);
      Game.chaser.y = clamp(HEIGHT*0.22 + (-60 + Math.random()*120), 40, HEIGHT*0.55);

      // Give a brief grace period at the start of each level
      Game.respawnShieldT = 1.2;

      // Ensure chaser doesn't spawn on top of the player
      {
        const minDist = 170;
        const px = Game.player.x, py = Game.player.y;
        let tries = 0;
        while (tries++ < 8){
          const dx = Game.chaser.x - px;
          const dy = Game.chaser.y - py;
          if (Math.hypot(dx,dy) >= minDist) break;
          Game.chaser.x = clamp(WIDTH*0.5 + (-220 + Math.random()*440), 40, WIDTH-40);
          Game.chaser.y = clamp(HEIGHT*0.22 + (-120 + Math.random()*240), 40, HEIGHT*0.55);
        }
      }
      Game.collectT = 0.10;
      Game._mineT = 0;
      spawnCollectible();
      spawnCollectible();
    }

    function drawPlayer(){
      const p = Game.player;

      // Invincibility blink
      const blink = (Game.respawnShieldT>0) ? (Math.sin(performance.now()/80) > 0 ? 0.35 : 1) : 1;

      // Collect animation -> show thumbs-up briefly
      const okSign = Game.fistT > 0; // reusing fistT timer
      const t = okSign ? (1 - (Game.fistT/0.18)) : 0; // 0..1 during the animation window
      const pop = okSign ? (1.0 + 0.10*Math.sin(t*Math.PI)) : 1.0;

      // Shadow
      ctx.save();
      ctx.globalAlpha = 0.14 * blink;
      ctx.fillStyle = "rgba(0,0,0,0.92)";
      ctx.beginPath();
      ctx.ellipse(p.x+2, p.y+12, 24, 14, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();

      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.globalAlpha = blink;

      // Make hand 30% smaller
      ctx.scale(0.7, 0.7);

      // subtle glow (visibility on sky)

      glow.addColorStop(0, "rgba(255,245,220,0.14)");
      glow.addColorStop(1, "rgba(0,0,0,0)");

      ctx.beginPath(); ctx.arc(0,0,46,0,Math.PI*2); ctx.fill();

      ctx.scale(pop, pop);

      if (!okSign){

        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(-8, 6); ctx.lineTo(16, 4);
        ctx.moveTo(-8, 12); ctx.lineTo(14, 10);

      // i-frame ring
      if (Game.respawnShieldT>0){
        ctx.globalAlpha = 0.16;
        ctx.strokeStyle="rgba(255,255,255,0.65)";

function drawChaser(){
      const c = Game.chaser;
      const cx = c.x, cy = c.y;
      const rOuter = c.w*0.5;     // 27
      const rInner = rOuter*0.84; // face radius
      const t = performance.now()/1000;

      ctx.save();

      // ominous pulsing glow
      const pulse = 0.65 + 0.35*Math.sin(t*3.6);
      ctx.globalAlpha = 0.30 + 0.20*pulse;
      const glow = ctx.createRadialGradient(cx,cy,4, cx,cy, rOuter*1.25);
      glow.addColorStop(0, "rgba(255,80,80,0.95)");
      glow.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = glow;
      ctx.beginPath(); ctx.arc(cx,cy,rOuter*1.25,0,Math.PI*2); ctx.fill();

      // coin rim + face (red)
      ctx.globalAlpha = 1;
      const face = ctx.createRadialGradient(cx-6,cy-8,4, cx,cy, rInner);
      face.addColorStop(0, "rgba(255,210,210,0.98)");
      face.addColorStop(0.35, "rgba(255,40,40,0.98)");
      face.addColorStop(1, "rgba(110,0,0,0.98)");

      // rim
      ctx.fillStyle = "rgba(90,0,0,0.98)";
      ctx.beginPath(); ctx.arc(cx,cy,rOuter*0.92,0,Math.PI*2); ctx.fill();

      // inner face
      ctx.fillStyle = face;
      ctx.beginPath(); ctx.arc(cx,cy,rInner*0.92,0,Math.PI*2); ctx.fill();

      // rim highlight
      ctx.globalAlpha = 0.55;
      ctx.strokeStyle = "rgba(255,255,255,0.45)";
      ctx.lineWidth = 2.0;
      ctx.beginPath(); ctx.arc(cx-1,cy-1,rOuter*0.88,0,Math.PI*2); ctx.stroke();
      ctx.globalAlpha = 1;

      // aggressive face: eyes + angry brows + mouth
      // eyes
      ctx.fillStyle = "rgba(15,0,0,0.85)";
      ctx.beginPath(); ctx.ellipse(cx-8, cy-4, 5, 6, 0.15, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx+8, cy-4, 5, 6, -0.15, 0, Math.PI*2); ctx.fill();

      // eye highlights
      ctx.globalAlpha = 0.25;
      ctx.fillStyle = "rgba(255,255,255,0.9)";
      ctx.fillRect(cx-10, cy-8, 2, 2);
      ctx.fillRect(cx+6, cy-8, 2, 2);
      ctx.globalAlpha = 1;

      // brows
      ctx.strokeStyle = "rgba(40,0,0,0.9)";
      ctx.lineWidth = 3;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(cx-16, cy-12);
      ctx.lineTo(cx-4, cy-9);
      ctx.moveTo(cx+16, cy-12);
      ctx.lineTo(cx+4, cy-9);
      ctx.stroke();

      // mouth (snarl)
      ctx.strokeStyle = "rgba(20,0,0,0.9)";
      ctx.lineWidth = 3.2;
      ctx.beginPath();
      ctx.arc(cx, cy+8, 10, Math.PI*0.12, Math.PI*0.88);
      ctx.stroke();

      // teeth
      ctx.globalAlpha = 0.55;
      ctx.strokeStyle = "rgba(255,255,255,0.7)";
      ctx.lineWidth = 1.2;
      for (let i=-2;i<=2;i++){
        ctx.beginPath();
        ctx.moveTo(cx+i*4, cy+8);
        ctx.lineTo(cx+i*4, cy+12);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;

      // $ mark (subtle)
      ctx.fillStyle = "rgba(30,0,0,0.65)";
      ctx.font = "bold 16px system-ui";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("$", cx, cy+1);

      ctx.restore();
    }

    function update(dt){
      // movement (unchanged)
      const p=Game.player, m=Game.mousePos;
      const dx=m.x-p.x, dy=m.y-p.y;
      const maxStep=p.speed*dt;
      const dist=Math.hypot(dx,dy);
      if (dist<=maxStep){ p.x=m.x; p.y=m.y; } else { p.x += dx/dist*maxStep; p.y += dy/dist*maxStep; }
      p.x = clamp(p.x, MARGIN_X, WIDTH - MARGIN_X);
      p.y = clamp(p.y, MARGIN_Y, HEIGHT - MARGIN_Y);

      if (Game.respawnShieldT>0) Game.respawnShieldT = Math.max(0, Game.respawnShieldT - dt);

      if (Game.fistT>0) Game.fistT = Math.max(0, Game.fistT - dt);

      // Big red chasing coin logic (always follows the hand)
      if (Game.phase==='playing'){
        const c = Game.chaser;
        const tx = Game.player.x;
        const ty = Game.player.y;
        const dx = tx - c.x;
        const dy = ty - c.y;
        const d = Math.hypot(dx,dy) || 1;
        const step = c.speed * dt;

        if (d <= step){
          c.x = tx; c.y = ty;
        } else {
          c.x += (dx/d) * step;
          c.y += (dy/d) * step;
        }

        // Keep within canvas bounds
        c.x = clamp(c.x, c.w/2, WIDTH - c.w/2);
        c.y = clamp(c.y, c.h/2, HEIGHT - c.h/2);
      }


      // spawn collectibles
      if (Game.phase==='playing'){
        Game.collectT += dt;
        const every = collectibleEvery();
        while (Game.collectT >= every){
          Game.collectT -= every;
          spawnCollectible();
        }
      }

      // spawn traps
      if (Game.phase==='playing'){
        Game._mineT += dt;
        const me = mineEvery();
        if (Number.isFinite(me) && Game._mineT >= me){
          Game._mineT = 0;
          dropMine(Math.random()*WIDTH, -10);
        }
      }

      // update traps
      for (let i=Game.hazards.mines.length-1;i>=0;i--){
        const mn=Game.hazards.mines[i];
        mn.y += mn.vy*dt;
        mn.t = (mn.t||0) + dt;
        mn.armedT = Math.max(0, mn.armedT - dt);
        if (mn.y > HEIGHT+60) Game.hazards.mines.splice(i,1);
      }

      const pr = {x:Game.player.x-15,y:Game.player.y-7,w:30,h:14};

      // Collision: chasing coin hits player
      if (Game.phase==='playing' && Game.respawnShieldT<=0){
        const c = Game.chaser;
        const cr = {x:c.x - c.w/2, y:c.y - c.h/2, w:c.w, h:c.h};
        if (rectsOverlap(pr, cr)){
          FX.spawn(c.x, c.y, 1.3);
          registerImpact();
          // Knockback the chaser slightly so it doesn't instantly re-hit during i-frames
          const dx = c.x - Game.player.x;
          const dy = c.y - Game.player.y;
          const d = Math.hypot(dx,dy) || 1;
          c.x += (dx/d) * 60;
          c.y += (dy/d) * 60;
        }
      }


      // update collectibles + pickup
      for (let i=Game.collectibles.length-1;i>=0;i--){
        const c = Game.collectibles[i];
        c.y += c.vy*dt;
        c.t += dt;

        if (rectsOverlap(pr, c)){
          if (c.type === 'coin'){
            Game.score += 8;
            Game.kills += 1; // UI stays "Kills", but it's "Collected"
            Game.fistT = 0.18; // punch animation
            SFX.collect();
            FX.spawn(c.x + c.w/2, c.y + c.h/2, 0.35);
          } else {
            Game.lives += 1;
            Game.score += 15;
            SFX.heal();
            FX.spawn(c.x + c.w/2, c.y + c.h/2, 0.6);
          }

          Game.collectibles.splice(i,1);

          // immediate level complete when reaching target
          if (Game.kills >= Game.targetKills && Game.phase==='playing'){
            onLevelComplete();
            return; // IMPORTANT: stop update to avoid iterating cleared arrays
          }
          continue;
        }

        if (c.y > HEIGHT + 60) Game.collectibles.splice(i,1);
      }

      // trap collision
      if (Game.respawnShieldT<=0){
        for (let i=Game.hazards.mines.length-1;i>=0;i--){
          const mn=Game.hazards.mines[i];
          if (mn.armedT<=0 && rectsOverlap(pr, mn)){
            Game.hazards.mines.splice(i,1);
            FX.spawn(mn.x+mn.w/2, mn.y+mn.h/2, 1.1); SFX.hurt();
            registerImpact();
            break;
          }
        }
      }

      FX.update(dt);
      updateHUD();
    }

    function updateHUD(){
      scoreVal.textContent = Game.score;
      levelVal.textContent = Game.level;
      livesVal.textContent = Game.lives;
      killsVal.textContent = Game.kills;
      targetVal.textContent = Game.targetKills;
      bestVal.textContent = bestScore;
    }

    const debugHud = document.getElementById('debugHud');
    let debugOn = false;
    window.addEventListener('keydown', (e)=>{
      if (e.key === 'd' || e.key === 'D'){
        debugOn = !debugOn;
        debugHud.classList.toggle('hidden', !debugOn);
      }
    });
    function renderDebug(){
      if (!debugOn) return;
      debugHud.textContent = [
        `phase: ${Game.phase}`,
        `level: ${Game.level}`,
        `collected: ${Game.kills}/${Game.targetKills}`,
        `items: ${Game.collectibles.length}`,
        `traps: ${Game.hazards.mines.length}`
      ].join(' | ');
    }

    function drawAll(){
      drawHazards();
      drawChaser();
      drawCollectibles();
      drawPlayer();
      FX.draw(ctx);
      renderDebug();
    }

    let _rafLast = performance.now();
    function raf(){
      const now = performance.now();
      const dt = Math.min(0.033, (now - _rafLast)/1000);
      _rafLast = now;

      BG.draw(ctx, dt);
      drawAll();

      if (Game.running && !Game.paused && !Game.awaitingCountdown){
        update(dt);
      }
      requestAnimationFrame(raf);
    }

    BG.init();
    resetGame();
    requestAnimationFrame(raf);
  </script>
</body>
</html>
