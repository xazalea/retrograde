	<style>

<body>
	<div id="GameDiv">
		<div id="Cocos3dGameContainer">
			<canvas id="GameCanvas" oncontextmenu="event.preventDefault()" tabindex="0"></canvas>
		</div>
	</div>
	<script src="src/system.bundle.js"></script>
	<script src="src/import-map.json" type="systemjs-importmap"></script>
	
	<script>
	window.SDK_OPTIONS = {
      gameId: "u1n5ttd87g2a326o5b2pn1wb9ntpx33f",
      onEvent: function (a) {
         switch (a.name) {
            case "SDK_GAME_PAUSE":
				if (window.__gmGamePause) {
                    window.__gmGamePause();
                    window.__gmGamePause = null;
                }
				break;
            case "SDK_GAME_START":
				if (window.__gmGameStart) {
                    window.__gmGameStart();
                    window.__gmGameStart = null;
                }
				break;
            case "SDK_READY":
               // when sdk is ready
               break;
         }
      }
	};
	</script>
	<script defer src="https://api.gamemonetize.com/sdk.js" id="gamemonetize-sdk"></script>
	<script>	
		const __GameLanguage = "en";

		let cc = null;
		let ccInitialized = false;
		

		async function loadCocosEngine() {
			if (!cc) {		
				cc = await System.import("./cocos-js/cc.js");  
				console.log("CC инициализирован", cc);
			}
			
			if (!ccInitialized) {		
				await cc.game.init({
					debugMode: cc.DebugMode.NONE,
					settingsPath: "src/settings.json",
					effectSettingsPath: "",
					overrideSettings: { profiling: { showFPS: false } },
				});
				ccInitialized = true;
			}
			
			return cc;
		}

		async function applicationStart() {
			await loadCocosEngine();
			
			cc.game.run();
		}

		const gameCanvas = document.getElementById("GameCanvas");
		const parentElement = gameCanvas.parentElement;
		const { width, height } = parentElement.getBoundingClientRect();

		gameCanvas.width = width;
		gameCanvas.height = height;
		applicationStart();
	</script>
</body>
