    }


    #GameDiv {

<body>


  <div id="GameDiv" cc_exact_fit_screen="false" style="width: 720px; height: 1280px;">
    <div id="Cocos3dGameContainer">
      <canvas id="GameCanvas" width="720" height="1280" tabindex="99"></canvas>
    </div>
  </div>


  <!-- <div id="GameDiv">
    <canvas id="GameCanvas" width="720" height="1280" tabindex="99"></canvas>
  </div> -->
  <script src="src/polyfills.bundle.js" charset="utf-8"> </script>
  <!-- SystemJS support. -->
  <script src="src/system.bundle.js" charset="utf-8"> </script>
  <!-- Import map -->
  <script src="src/import-map.json" type="systemjs-importmap" charset="utf-8"> </script>
  <script>


    // 根据User-Agent判断设备类型
    function detectDeviceType() {
      // const userAgent = navigator.userAgent.toLowerCase();
      // const isMobile = /android|iphone|windows phone/i.test(userAgent);
      // return isMobile ? 'mobile' : 'desktop';

      // 获取屏幕像素尺寸
      const width = screen.width;
      const height = screen.height;

      // 计算屏幕比例（宽高比）
      const ratio = width / height;

      const isMobile = ratio < 0.5625;

      return isMobile ? 'mobile' : 'desktop';

    }

    const deviceType = detectDeviceType();

    // 示例：根据设备类型设置不同的适配策略
    if (deviceType === 'mobile') {
      // console.error("移动设备");

      var script = document.createElement('script');
      script.setAttribute('type', 'text/javascript');
      script.setAttribute('src', "cc-resolution2.js");
      document.getElementsByTagName('head')[0].appendChild(script);
      if (fun) script.onload = fun;
      // resolution.init(resolution.clientWidth, resolution.clientHeight);
    } else {
      // console.error("非移动设备");

      var script = document.createElement('script');
      script.setAttribute('type', 'text/javascript');
      script.setAttribute('src', "cc-resolution2.js");
      document.getElementsByTagName('head')[0].appendChild(script);
      if (fun) script.onload = fun;
      // resolution.init(720, 1280);
    }



    function fun() {
      if (deviceType === 'mobile') {
        resolution.init(resolution.clientWidth, resolution.clientHeight);
      } else {
        resolution.init(720, 1280);
      }
    }





    // resolution.init(720, 1280);
    // resolution.init(resolution.clientWidth, resolution.clientHeight);
    System.import('./index.js').catch(function (err) { console.error(err); })


    console.timeEnd = console.time = console.error = console.log = console.info = console.warn = function () { };
    //显示
    YYGGames.showLoadingSourceScene()
      .setAppName("Match-Factory")//需要设置appName
      .setBackgroundColor("#94c4ff") //设置背景颜色 非必填参数
      .setGameLogoUrl("./@base/logo.png") //设置游戏logo
      .setGameBannerUrl("./@base/banner.jpg");//设置游戏banner
    //隐藏
    // YYGGames.hideLoadingSourceScene();


  </script>
</body>
