<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>xo for bro</title>
<style>
 :root{
    --bg:#0b0f14;
    --card:#0f1620;
    --acc:#21d4fd;
    --acc2:#b721ff;
    --win:#22c55e;
    --lose:#ef4444;
    --txt:#eaf2ff;
    --muted:#94a3b8;
    --shadow:0 20px 60px rgba(0,0,0,.35), 0 8px 24px rgba(0,0,0,.25);
    --rad:18px;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0;font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Kufi Arabic", "Cairo", Arial, sans-serif;}
  body{
    display:flex;align-items:center;justify-content:center;
    background: #071018;
  }

  /* الإطار الثابت 800x600 */
  .game-container{
    width:800px;
    height:600px;
    background:
      radial-gradient(1200px 800px at 100% -10%, rgba(33,212,253,.06), transparent),
      radial-gradient(1000px 900px at -10% 110%, rgba(183,33,255,.06), transparent),
      var(--bg);
    border:1px solid rgba(255,255,255,.04);
    border-radius:12px;
    overflow:hidden;
    box-shadow:var(--shadow);
    display:flex;
    align-items:stretch;
    justify-content:stretch;
    padding:14px;
  }

  /* المحتوى داخل الإطار */
  .app{
    width:100%;
    height:100%;
    display:grid;
    grid-template-rows: auto 1fr auto;
    gap:12px;
  }

  .header{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:10px; border-radius:10px;
    background: linear-gradient(135deg, rgba(33,212,253,.03), rgba(183,33,255,.03));
    border:1px solid rgba(255,255,255,.03);
  }
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;color:var(--txt)}
  .logo{width:44px;height:44px;border-radius:10px;background:conic-gradient(from 0deg,var(--acc),var(--acc2));position:relative}
  .logo::after{content:"";position:absolute;inset:4px;border-radius:8px;background:#071018}

  .controls{display:flex;gap:8px;align-items:center}
  button, .select{
    background:linear-gradient(135deg,#0f1720,#0d1319);
    border:1px solid rgba(255,255,255,.04);
    color:var(--txt); padding:8px 12px; border-radius:10px; cursor:pointer;
    box-shadow: 0 8px 30px rgba(0,0,0,.3);
    font-weight:700; font-size:13px;
  }
  .ghost{ background:transparent; border:1px dashed rgba(255,255,255,.06); opacity:.95}
  .controls button:hover{ transform: translateY(-2px) }

  .board-wrap{ display:flex; flex-direction:column; gap:10px; height:100%; }
  .status{
    display:flex; align-items:center; justify-content:space-between; gap:8px;
    padding:8px; border-radius:10px; border:1px solid rgba(255,255,255,.03);
    background: linear-gradient(135deg, rgba(183,33,255,.025), rgba(33,212,253,.02));
  }
  .bar{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .badge{ padding:6px 10px; border-radius:999px; border:1px solid rgba(255,255,255,.04); color:var(--muted); font-weight:700; font-size:13px}

  .switch{ display:flex; gap:8px; align-items:center; font-weight:700; color:var(--muted) }
  input[type="checkbox"]{ width:44px; height:24px; appearance:none; background:#0e1720; border:1px solid rgba(255,255,255,.06); border-radius:999px; position:relative; outline:none; cursor:pointer; transition:.18s}
  input[type="checkbox"]::after{ content:""; position:absolute; width:18px; height:18px; top:3px; left:3px; border-radius:50%; background:linear-gradient(180deg,#fff,#cfd9ff); transition:.18s}
  input[type="checkbox"]:checked{ background:linear-gradient(90deg,var(--acc),var(--acc2)) }
  input[type="checkbox"]:checked::after{ left:23px }

  .board{
    width:100%; height:100%;
    display:grid; grid-template-columns: repeat(3, 1fr); gap:10px;
    padding:10px; border-radius:12px;
    background: linear-gradient(180deg, rgba(255,255,255,.01), transparent);
    border:1px solid rgba(255,255,255,.03);
  }

  .cell{
    border-radius:14px; background:linear-gradient(180deg,#0d1318,#0b0f14);
    border:1px solid rgba(255,255,255,.03); display:grid; place-items:center; cursor:pointer; position:relative;
    transition: transform .14s ease, box-shadow .14s ease;
    min-height:0; /* important for grid */
  }
  .cell:hover{ transform: translateY(-4px); box-shadow: 0 10px 30px rgba(0,0,0,.5); }
  .cell.busy{ cursor:not-allowed; opacity:.95; transform:none; box-shadow:none }

  .ripple{ position:absolute; inset:-25%; pointer-events:none; background: radial-gradient(400px 400px at var(--x) var(--y), rgba(33,212,253,.06), transparent 60%); opacity:0; transition: opacity .28s ease }
  .cell:hover .ripple{ opacity:1 }

  .mark{
    font-size: clamp(30px, 6.8vw, 64px); font-weight:900; letter-spacing:2px; text-shadow:0 8px 20px rgba(0,0,0,.45);
    transform: scale(.75) rotateX(30deg); opacity:0;
    animation: pop .36s cubic-bezier(.2,.7,.2,1) forwards;
    background: linear-gradient(180deg,var(--acc),var(--acc2)); -webkit-background-clip:text; background-clip:text; color:transparent;
    filter: drop-shadow(0 8px 30px rgba(33,212,253,.12));
  }
  @keyframes pop { 60%{ transform: scale(1.12) rotateX(0); opacity:1 } 100%{ transform: scale(1) rotateX(0); opacity:1 } }

  .cell.win{ outline:2px solid rgba(34,197,94,.45); box-shadow: 0 12px 36px rgba(34,197,94,.08) }
  .cell.lose{ outline:2px solid rgba(239,68,68,.45); box-shadow: 0 12px 36px rgba(239,68,68,.06) }

  .score{
    display:flex; gap:12px; align-items:center; padding:8px; border-radius:10px; justify-content:flex-start;
    border:1px solid rgba(255,255,255,.03);
    background: linear-gradient(135deg, rgba(34,197,94,.02), rgba(33,212,253,.02));
    font-weight:700;
  }

  .foot{ text-align:center; color:var(--muted); font-size:13px; padding-top:4px }

  /* overlay */
  .overlay{
    position:fixed; inset:0; display:none; align-items:center; justify-content:center; z-index:9999;
    background: rgba(3,6,12,.6); backdrop-filter: blur(6px);
  }
  .overlay.show{ display:flex }
  .modal{
    width:min(520px,90%); background: linear-gradient(135deg,#0f1620,#0c1116); border-radius:12px; padding:18px; text-align:center; border:1px solid rgba(255,255,255,.04);
    box-shadow: var(--shadow);
  }
  .title{ font-size:20px; font-weight:900; margin:0; background: linear-gradient(90deg,var(--acc),var(--acc2)); -webkit-background-clip:text; color:transparent }
  .sub{ color:var(--muted); margin:6px 0 14px }
  .row{ display:flex; gap:8px; justify-content:center; flex-wrap:wrap }
</style>
</head>
<body>
  <div class="game-container" role="application" aria-label="XO game 800 by 600">
    <div class="app">

      <div class="header">
        <div class="brand">
          <div class="logo" aria-hidden="true"></div>
          <div>xo for bro</div>
        </div>

        <div class="controls">
          <button id="btn-new">new round</button>
          <button id="btn-reset" class="ghost">reset</button>
          <button id="btn-ad">reward</button>
        </div>
      </div>

      <div class="board-wrap">
        <div class="status">
          <div class="bar">
            <span id="turn" class="badge">turn: X</span>
            <span id="mode" class="badge">mode: 2 players</span>
            <span id="soundState" class="badge">sound: on</span>
          </div>

          <label class="switch">
            vs bot
            <input id="vs-bot" type="checkbox" aria-label="play vs bot">
          </label>
        </div>

        <div class="board" id="board" aria-label="لوح XO" role="grid"></div>

        <div class="score" id="score">
          <span>score X: <b id="scoreX">0</b></span>
          <span>score O: <b id="scoreO">0</b></span>
          <span>draw: <b id="scoreD">0</b></span>
        </div>

        <div class="foot">tips: double click for quick game</div>
      </div>

    </div>
  </div>

  <!-- Overlay -->
  <div class="overlay" id="overlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true">
      <p class="title" id="ov-title">win!</p>
      <p class="sub" id="ov-desc">good 🎉</p>
      <div class="row">
        <button id="ov-next">new game</button>
        <button class="ghost" id="ov-ad">reward</button>
      </div>
    </div>
  </div>

  <!-- sounds (tiny placeholders) -->
  <audio id="s-place" preload="auto"><source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAESsAACJWAAACABYAAAAA////" type="audio/wav"></audio>
  <audio id="s-win" preload="auto"><source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAESsAACJWAAACABYAAAAA////" type="audio/wav"></audio>


  <!-- SDK: GameMonetize (ضع GameId الصحيح) -->
  <script type="text/javascript">
   // ==== إعدادات SDK ====
   window.SDK_OPTIONS = {
      gameId: "am1z1iytli8d5g1y4txjp9mfkxluoq7d", // ← استبدلها بـ GameId
      onEvent: function (a) {
         switch (a.name) {
            case "SDK_GAME_PAUSE":
               pauseGame(); muteAll(true);
               break;
            case "SDK_GAME_START":
               resumeGame(); muteAll(false);
               break;
            case "SDK_READY":
               // SDK جاهز
               break;
         }
      }
   };
   (function (a, b, c) {
     var d = a.getElementsByTagName(b)[0];
     a.getElementById(c) || (a = a.createElement(b), a.id = c, a.src = "https://api.gamemonetize.com/sdk.js", d.parentNode.insertBefore(a, d))
   })(document, "script", "gamemonetize-sdk");
  </script>

  <script>
  // ====== لعبة XO مع أنيميشن، بوت بسيط، وتخزين نتيجة ======
  const boardEl = document.getElementById('board');
  const turnEl  = document.getElementById('turn');
  const modeEl  = document.getElementById('mode');
  const soundStateEl = document.getElementById('soundState');
  const scoreXEl = document.getElementById('scoreX');
  const scoreOEl = document.getElementById('scoreO');
  const scoreDEl = document.getElementById('scoreD');
  const overlay = document.getElementById('overlay');
  const ovTitle = document.getElementById('ov-title');
  const ovDesc  = document.getElementById('ov-desc');
  const sPlace = document.getElementById('s-place');
  const sWin   = document.getElementById('s-win');

  const vsBotToggle = document.getElementById('vs-bot');
  const btnNew = document.getElementById('btn-new');
  const btnReset = document.getElementById('btn-reset');
  const btnAd = document.getElementById('btn-ad');
  const ovNext = document.getElementById('ov-next');
  const ovAd = document.getElementById('ov-ad');

  let grid = Array(9).fill('');
  let turn = 'X';
  let playing = true;
  let muted = false;
  let paused = false;

  const WINS = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  // == تخزين النتائج محليًا ==
  const LS_KEY = 'xo_score_v1';
  let score = {X:0, O:0, D:0};
  try{
    const saved = JSON.parse(localStorage.getItem(LS_KEY));
    if(saved && typeof saved==='object'){ score = Object.assign(score, saved); }
  }catch(_) {}
  updateScoreUI();

  // بناء اللوح
  for(let i=0;i<9;i++){
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.dataset.idx = i;

    const rip = document.createElement('div');
    rip.className = 'ripple';
    cell.appendChild(rip);

    cell.addEventListener('pointermove', e=>{
      const r = cell.getBoundingClientRect();
      rip.style.setProperty('--x', (e.clientX-r.left)+'px');
      rip.style.setProperty('--y', (e.clientY-r.top)+'px');
    });

    cell.addEventListener('click', ()=> onCell(i));
    boardEl.appendChild(cell);
  }

  function onCell(i){
    if(!playing || paused) return;
    if(grid[i]) return;
    place(i, turn);
    if (checkEnd()) return;
    swapTurn();

    // ضد البوت: حركة بسيطة (ذكية كفاية للجوال)
    if(vsBotToggle.checked && playing){
      setTimeout(()=>{
        const move = botMove();
        if(move!==null){
          place(move, turn);
          if(checkEnd()) return;
          swapTurn();
        }
      }, 260);
    }
  }

  function place(i, who){
    grid[i]=who;
    const cell = boardEl.children[i];
    cell.classList.add('busy');
    const m = document.createElement('div');
    m.className = 'mark';
    m.textContent = who;
    cell.appendChild(m);
    ping(sPlace);
  }

  function swapTurn(){
    turn = (turn==='X') ? 'O' : 'X';
    turnEl.textContent = 'turn: ' + turn;
  }

  function checkEnd(){
    // فوز؟
    for(const line of WINS){
      const [a,b,c] = line;
      if(grid[a] && grid[a]===grid[b] && grid[a]===grid[c]){
        showWin(line, grid[a]);
        return true;
      }
    }
    // تعادل؟
    if(grid.every(Boolean)){
      showDraw();
      return true;
    }
    return false;
  }

  function showWin(line, who){
    playing=false;
    line.forEach(i=> boardEl.children[i].classList.add('win'));
    ping(sWin);
    score[who]++; saveScore();
    updateScoreUI();
    ovTitle.textContent = 'win ' + who + ' ✨';
    ovDesc.textContent  = ' !good 🎉 ';
    overlay.classList.add('show');
    tryShowAd(); // إعلان بين الجولات
  }

  function showDraw(){
    playing=false;
    Array.from(boardEl.children).forEach(c=> c.classList.add('lose'));
    score.D++; saveScore(); updateScoreUI();
    ovTitle.textContent = 'grow 🤝';
    ovDesc.textContent  = 'ohh !';
    overlay.classList.add('show');
    tryShowAd(); // إعلان بين الجولات
  }

  function newRound(){
    grid = Array(9).fill('');
    playing = true; turn='X';
    turnEl.textContent = 'turn: X';
    Array.from(boardEl.children).forEach(c=>{
      c.classList.remove('busy','win','lose');
      c.innerHTML = '<div class="ripple"></div>';
    });
    overlay.classList.remove('show');
  }

  function resetScore(){
    score={X:0,O:0,D:0}; saveScore(); updateScoreUI();
  }

  function updateScoreUI(){
    scoreXEl.textContent=score.X;
    scoreOEl.textContent=score.O;
    scoreDEl.textContent=score.D;
  }
  function saveScore(){
    try{ localStorage.setItem(LS_KEY, JSON.stringify(score)); }catch(_){}
  }

  // بوت بسيط: 1) الفوز إن أمكن 2) منع الخصم 3) الوسط 4) ركن 5) أي مكان
  function botMove(){
    const me = turn, opp = (turn==='X')?'O':'X';
    // حاول الفوز
    for(const [a,b,c] of WINS){
      const line=[a,b,c];
      const vals=line.map(i=>grid[i]);
      if(vals.filter(v=>v===me).length===2 && vals.includes('') ){
        return line[vals.indexOf('')];
      }
    }
    // امنع الخصم
    for(const [a,b,c] of WINS){
      const line=[a,b,c];
      const vals=line.map(i=>grid[i]);
      if(vals.filter(v=>v===opp).length===2 && vals.includes('') ){
        return line[vals.indexOf('')];
      }
    }
    // الوسط
    if(!grid[4]) return 4;
    // الركن
    const corners=[0,2,6,8].filter(i=>!grid[i]);
    if(corners.length) return corners[Math.floor(Math.random()*corners.length)];
    // أي مكان
    const free = grid.map((v,i)=>v?null:i).filter(v=>v!==null);
    return free.length ? free[Math.floor(Math.random()*free.length)] : null;
  }

  // ===== الصوت / الإيقاف =====
  function ping(aud){
    if(muted) return;
    try{ aud.currentTime=0; aud.play().catch(()=>{});}catch(_){}
  }
  function muteAll(v){
    muted = !!v; soundStateEl.textContent = 'sound: ' + (muted?'of':'on');
    [sPlace,sWin].forEach(a=>{ try{ a.muted = muted; }catch(_){}})
  }
  function pauseGame(){ paused = true; }
  function resumeGame(){ paused = false; }

  // ===== أحداث الواجهة =====
  btnNew.addEventListener('click', newRound);
  btnReset.addEventListener('click', resetScore);
  ovNext.addEventListener('click', newRound);

  vsBotToggle.addEventListener('change', ()=>{
    modeEl.textContent = 'moud: ' + (vsBotToggle.checked?'vs bot':'2 players');
    newRound();
  });

  // زر إعلان يدوي
  btnAd.addEventListener('click', ()=> showAd());
  ovAd.addEventListener('click', ()=> showAd());

  // دبل-كليك للبدء السريع
  boardEl.addEventListener('dblclick', newRound, {passive:true});

  // ===== دمج الإعلان =====
  function showAd(){
    // تصحيح شرط السلامة: تأكد من توفر sdk.showBanner
    if (typeof window.sdk !== 'undefined' && typeof window.sdk.showBanner === 'function') {
      window.sdk.showBanner();
    }
  }
  function tryShowAd(){
    // استدعِ إعلانًا بشكل غير مزعج بين الجولات
    setTimeout(showAd, 300);
  }

  // ملاحظة: SDK_GAME_PAUSE و SDK_GAME_START سيتكفلان بالكتم/الإيقاف أثناء الإعلان.

  </script>
</body>
</html>
